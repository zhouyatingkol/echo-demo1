<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - 修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }
        .stage {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .stage.active { display: block; }
        #value3dCanvas {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="stage active" id="stage0">
        <h1 style="text-align:center;margin-top:20%;color:#ffd700;">ECHO PROTOCOL</h1>
        <button onclick="goTo(1)" style="display:block;margin:20px auto;padding:10px 20px;">开始</button>
    </div>
    
    <div class="stage" id="stage4">
        <canvas id="value3dCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 背景粒子
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            for (let i = 0; i < 1000; i++) {
                positions.push((Math.random() - 0.5) * 100);
                positions.push((Math.random() - 0.5) * 100);
                positions.push((Math.random() - 0.5) * 50);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.2,
                color: 0x00f0ff,
                transparent: true,
                opacity: 0.8
            });
            
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            camera.position.z = 30;
            
            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.0005;
                renderer.render(scene, camera);
            }
            animate();
        }
        
        // Stage 4
        let valueScene, valueCamera, valueRenderer;
        
        function initStage4() {
            const canvas = document.getElementById('value3dCanvas');
            if (!canvas) return;
            
            valueScene = new THREE.Scene();
            valueCamera = new THREE.PerspectiveCamera(60, canvas.clientWidth/canvas.clientHeight, 0.1, 1000);
            valueCamera.position.set(0, 0, 50);
            
            valueRenderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
            valueRenderer.setSize(canvas.clientWidth, canvas.clientHeight);
            
            // 添加几个测试球体
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                const x = Math.cos(angle) * 20;
                const z = Math.sin(angle) * 20;
                
                const geo = new THREE.SphereGeometry(3, 32, 32);
                const mat = new THREE.MeshPhongMaterial({ 
                    color: 0xffd700,
                    emissive: 0xffaa00,
                    emissiveIntensity: 0.3
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, 0, z);
                valueScene.add(mesh);
            }
            
            // 中心球
            const centerGeo = new THREE.SphereGeometry(5, 32, 32);
            const centerMat = new THREE.MeshPhongMaterial({ color: 0x00f0ff });
            const center = new THREE.Mesh(centerGeo, centerMat);
            valueScene.add(center);
            
            // 灯光
            valueScene.add(new THREE.AmbientLight(0xffffff, 0.5));
            valueScene.add(new THREE.PointLight(0xffd700, 1, 100));
            
            animateStage4();
        }
        
        function animateStage4() {
            requestAnimationFrame(animateStage4);
            valueScene.rotation.y += 0.005;
            valueRenderer.render(valueScene, valueCamera);
        }
        
        // 切换 Stage
        function goTo(index) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById('stage' + index).classList.add('active');
            
            if (index === 4 && !valueScene) {
                initStage4();
            }
        }
        
        // 初始化
        window.addEventListener('load', () => {
            initBackground();
        });
    </script>
</body>
</html>
