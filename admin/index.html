<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO 后台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
    }
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 240px;
      background: #111;
      padding: 20px;
    }
    .sidebar-logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .nav-item {
      display: block;
      padding: 12px 16px;
      color: #888;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(0,212,255,0.1);
      color: #00d4ff;
    }
    .main-content {
      flex: 1;
      padding: 30px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 12px;
    }
    .stat-value {
      font-size: 32px;
      color: #00d4ff;
      margin-bottom: 8px;
    }
    .stat-label {
      color: #888;
      font-size: 14px;
    }
    .section {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 18px;
      margin-bottom: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #333;
    }
    th {
      color: #888;
      font-weight: normal;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      color: #fff;
    }
    .btn-danger {
      background: #ff4444;
      color: #fff;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
    }
    .status-active {
      background: rgba(0,255,0,0.2);
      color: #0f0;
    }
    .status-pending {
      background: rgba(255,193,7,0.2);
      color: #ffc107;
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">⚙️ ECHO 后台</div>
      <a href="#" class="nav-item active">📊 概览</a>
      <a href="#" class="nav-item">👥 用户管理</a>
      <a href="#" class="nav-item">🎵 音乐审核</a>
      <a href="#" class="nav-item">⚠️ 举报处理</a>
      <a href="#" class="nav-item">⚙️ 系统设置</a>
      <a href="../pages/index.html" class="nav-item">🏠 返回前台</a>
    </aside>
    
    <main class="main-content">
      <h1>后台概览</h1>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">1,234</div>
          <div class="stat-label">总用户</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">567</div>
          <div class="stat-label">音乐作品</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">89</div>
          <div class="stat-label">今日交易</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">12.5K</div>
          <div class="stat-label">总收益 (MEER)</div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">待审核音乐</div>
        <table>
          <tr>
            <th>ID</th>
            <th>名称</th>
            <th>创作者</th>
            <th>上传时间</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
          <tr>
            <td>#1234</td>
            <td>夏日微风</td>
            <td>0x1234...5678</td>
            <td>2024-03-12 10:30</td>
            <td><span class="status-badge status-pending">待审核</span></td>
            <td>
              <button class="btn btn-primary">通过</button>
              <button class="btn btn-danger">拒绝</button>
            </td>
          </tr>
        </table>
      </div>
      
      <div class="section">
        <div class="section-title">最近用户</div>
        <table>
          <tr>
            <th>地址</th>
            <th>注册时间</th>
            <th>作品数</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
          <tr>
            <td>0xabcd...ef01</td>
            <td>2024-03-12</td>
            <td>5</td>
            <td><span class="status-badge status-active">正常</span></td>
            <td><button class="btn btn-danger">封禁</button></td>
          </tr>
        </table>
      </div>
    </main>
  </div>
</body>
</html>
