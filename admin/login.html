<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - ECHO Music</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
    }
    
    .login-card {
      background: rgba(26, 26, 46, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 212, 255, 0.1);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo {
      font-size: 32px;
      font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
      border-radius: 16px;
      margin-bottom: 20px;
      font-size: 28px;
    }
    
    .login-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      font-size: 14px;
      color: #8892b0;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #ccd6f6;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(10, 10, 26, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
    }
    
    .form-input::placeholder {
      color: #555;
    }
    
    .password-wrapper {
      position: relative;
    }
    
    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #8892b0;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
    }
    
    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 14px;
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #8892b0;
      cursor: pointer;
    }
    
    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #00d4ff;
      cursor: pointer;
    }
    
    .forgot-link {
      color: #00d4ff;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    
    .forgot-link:hover {
      opacity: 0.8;
    }
    
    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .error-message {
      display: none;
      padding: 12px 16px;
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      border-radius: 8px;
      color: #ff4757;
      font-size: 14px;
      margin-bottom: 20px;
    }
    
    .error-message.show {
      display: block;
    }
    
    .back-link {
      text-align: center;
      margin-top: 24px;
    }
    
    .back-link a {
      color: #8892b0;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s;
    }
    
    .back-link a:hover {
      color: #00d4ff;
    }
    
    /* 背景装饰 */
    .bg-decoration {
      position: fixed;
      pointer-events: none;
    }
    
    .bg-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
    }
    
    .bg-circle-1 {
      width: 400px;
      height: 400px;
      background: #00d4ff;
      top: -100px;
      right: -100px;
    }
    
    .bg-circle-2 {
      width: 300px;
      height: 300px;
      background: #7b2cbf;
      bottom: -50px;
      left: -50px;
    }
    
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
      }
      
      .logo {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">🔐</div>
        <div class="logo">ECHO Admin</div>
        <h1 class="login-title">管理员登录</h1>
        <p class="login-subtitle">请输入您的管理员账号和密码</p>
      </div>
      
      <div class="error-message" id="errorMessage">
        用户名或密码错误，请重新输入
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">管理员账号</label>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            placeholder="请输入管理员账号"
            autocomplete="username"
            required
          >
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div class="password-wrapper">
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="请输入密码"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-password" id="togglePassword">👁</button>
          </div>
        </div>
        
        <div class="remember-forgot">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span>记住我</span>
          </label>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>
        
        <button type="submit" class="login-btn">登 录</button>
      </form>
      
      <div class="back-link">
        <a href="../echo-demo/frontend/index.html">← 返回前台首页</a>
      </div>
    </div>
  </div>
  
  <script>
    // 密码显示/隐藏切换
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePassword.textContent = type === 'password' ? '👁' : '👁‍🗨';
    });
    
    // 表单提交
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      // 模拟验证（实际应调用API）
      if (username === 'admin' && password === 'admin123') {
        // 保存登录状态
        if (document.getElementById('rememberMe').checked) {
          localStorage.setItem('adminToken', 'mock-token-12345');
        } else {
          sessionStorage.setItem('adminToken', 'mock-token-12345');
        }
        
        // 跳转到后台首页
        window.location.href = 'dashboard.html';
      } else {
        errorMessage.classList.add('show');
        setTimeout(() => {
          errorMessage.classList.remove('show');
        }, 3000);
      }
    });
    
    // 检查是否已登录
    if (localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
