<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
        }
        #planet-info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 20px;
            min-width: 200px;
            display: none;
            backdrop-filter: blur(10px);
        }
        #planet-info.active { display: block; }
        #planet-info h3 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 18px;
        }
        #planet-info p {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info">
        🖱️ 拖拽旋转视角 &nbsp;|&nbsp; 🖱️ 点击行星查看详情 &nbsp;|&nbsp; 🖱️ 滚轮缩放
    </div>
    <div id="planet-info">
        <h3 id="planet-name">行星名称</h3>
        <p id="planet-desc">行星描述</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 场景设置
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.0005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.set(0, 80, 200);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 行星数据（基于参考图的比例）
        const planetsData = [
            { 
                name: "水星", 
                color: 0x8B7355, 
                size: 2, 
                distance: 35, 
                speed: 0.02,
                desc: "太阳系最小的行星，离太阳最近"
            },
            { 
                name: "金星", 
                color: 0xFFA500, 
                size: 4, 
                distance: 50, 
                speed: 0.015,
                desc: "最热的行星，表面温度可达462°C"
            },
            { 
                name: "地球", 
                color: 0x4169E1, 
                size: 4.2, 
                distance: 70, 
                speed: 0.012,
                desc: "我们的家园，唯一已知存在生命的行星"
            },
            { 
                name: "火星", 
                color: 0xCD5C5C, 
                size: 3, 
                distance: 90, 
                speed: 0.01,
                desc: "红色星球，拥有太阳系最高的山峰"
            },
            { 
                name: "木星", 
                color: 0xDAA520, 
                size: 10, 
                distance: 130, 
                speed: 0.005,
                desc: "最大的行星，拥有79颗已知卫星"
            },
            { 
                name: "土星", 
                color: 0xF0E68C, 
                size: 8.5, 
                distance: 170, 
                speed: 0.004,
                desc: "拥有壮观的环系统",
                hasRing: true
            },
            { 
                name: "天王星", 
                color: 0x87CEEB, 
                size: 6, 
                distance: 210, 
                speed: 0.003,
                desc: "冰巨星，自转轴几乎横躺"
            },
            { 
                name: "海王星", 
                color: 0x4169E1, 
                size: 5.8, 
                distance: 250, 
                speed: 0.002,
                desc: "最远的行星，风速可达2100km/h"
            }
        ];

        // 创建太阳（参考图中的黄色椭圆形）
        const sunGeometry = new THREE.SphereGeometry(18, 64, 64);
        const sunMaterial = new THREE.MeshBasicMaterial({
            color: 0xFFD700,
            emissive: 0xFF8C00,
            emissiveIntensity: 0.5
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        
        // 添加太阳光晕
        const glowGeometry = new THREE.SphereGeometry(22, 64, 64);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0xFFD700,
            transparent: true,
            opacity: 0.2
        });
        const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
        sun.add(sunGlow);
        
        // 添加外层光晕
        const outerGlowGeometry = new THREE.SphereGeometry(28, 64, 64);
        const outerGlowMaterial = new THREE.MeshBasicMaterial({
            color: 0xFF8C00,
            transparent: true,
            opacity: 0.08
        });
        const outerGlow = new THREE.Mesh(outerGlowGeometry, outerGlowMaterial);
        sun.add(outerGlow);
        
        scene.add(sun);

        // 添加太阳点光源
        const sunLight = new THREE.PointLight(0xFFD700, 2, 800);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);

        // 环境光
        const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
        scene.add(ambientLight);

        // 创建行星
        const planets = [];
        const orbitLines = [];

        planetsData.forEach((data, index) => {
            // 轨道线
            const orbitGeometry = new THREE.RingGeometry(data.distance - 0.2, data.distance + 0.2, 128);
            const orbitMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.08,
                side: THREE.DoubleSide
            });
            const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);
            orbitLines.push(orbit);

            // 行星容器（用于公转）
            const planetContainer = new THREE.Object3D();
            
            // 行星本体
            const planetGeometry = new THREE.SphereGeometry(data.size, 32, 32);
            const planetMaterial = new THREE.MeshPhongMaterial({
                color: data.color,
                shininess: 30
            });
            const planet = new THREE.Mesh(planetGeometry, planetMaterial);
            planet.position.x = data.distance;
            
            // 添加行星光晕
            const planetGlowGeometry = new THREE.SphereGeometry(data.size * 1.3, 32, 32);
            const planetGlowMaterial = new THREE.MeshBasicMaterial({
                color: data.color,
                transparent: true,
                opacity: 0.15
            });
            const planetGlow = new THREE.Mesh(planetGlowGeometry, planetGlowMaterial);
            planet.add(planetGlow);

            // 土星环
            if (data.hasRing) {
                const ringGeometry = new THREE.RingGeometry(data.size * 1.4, data.size * 2.2, 64);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0xC0B283,
                    transparent: true,
                    opacity: 0.6,
                    side: THREE.DoubleSide
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.PI / 2.5;
                planet.add(ring);
            }

            planetContainer.add(planet);
            scene.add(planetContainer);
            
            planets.push({
                container: planetContainer,
                mesh: planet,
                data: data,
                angle: Math.random() * Math.PI * 2
            });
        });

        // 创建星空背景
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const positions = new Float32Array(starsCount * 3);
        const colors = new Float32Array(starsCount * 3);

        for (let i = 0; i < starsCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 2000;
            positions[i + 1] = (Math.random() - 0.5) * 2000;
            positions[i + 2] = (Math.random() - 0.5) * 2000;

            // 星星颜色变化
            const colorType = Math.random();
            if (colorType < 0.3) {
                colors[i] = 0.8; colors[i + 1] = 0.8; colors[i + 2] = 1; // 蓝白
            } else if (colorType < 0.6) {
                colors[i] = 1; colors[i + 1] = 1; colors[i + 2] = 0.9; // 黄白
            } else {
                colors[i] = 1; colors[i + 1] = 0.9; colors[i + 2] = 0.9; // 红白色
            }
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const starsMaterial = new THREE.PointsMaterial({
            size: 2,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });

        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // 鼠标交互
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraAngleX = 0;
        let cameraAngleY = 0.3;
        const cameraDistance = 200;

        // Raycaster用于检测点击
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        document.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
            
            // 检测点击
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const planetMeshes = planets.map(p => p.mesh);
            const intersects = raycaster.intersectObjects(planetMeshes);
            
            if (intersects.length > 0) {
                const clickedPlanet = planets.find(p => p.mesh === intersects[0].object);
                if (clickedPlanet) {
                    showPlanetInfo(clickedPlanet.data);
                }
            } else if (e.target.id === 'canvas-container') {
                hidePlanetInfo();
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                cameraAngleX += deltaX * 0.01;
                cameraAngleY += deltaY * 0.01;
                cameraAngleY = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, cameraAngleY));
                
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        });

        document.addEventListener('wheel', (e) => {
            const scale = e.deltaY > 0 ? 1.1 : 0.9;
            camera.position.multiplyScalar(scale);
            camera.position.clampLength(50, 600);
        });

        function showPlanetInfo(data) {
            const infoPanel = document.getElementById('planet-info');
            document.getElementById('planet-name').textContent = data.name;
            document.getElementById('planet-desc').textContent = data.desc;
            infoPanel.classList.add('active');
        }

        function hidePlanetInfo() {
            document.getElementById('planet-info').classList.remove('active');
        }

        // 动画循环
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // 太阳自转
            sun.rotation.y += 0.002;

            // 行星公转和自转
            planets.forEach((planet, index) => {
                planet.angle += planet.data.speed;
                planet.container.rotation.y = planet.angle;
                planet.mesh.rotation.y += 0.01;
            });

            // 星空缓慢旋转
            stars.rotation.y += 0.0002;

            // 更新相机位置
            camera.position.x = Math.sin(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            camera.position.y = Math.sin(cameraAngleY) * cameraDistance;
            camera.position.z = Math.cos(cameraAngleX) * Math.cos(cameraAngleY) * cameraDistance;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        animate();

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
