<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO 编码系统 · 六十四卦图</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --ink-light: #4a4a4a;
            --paper: #faf8f5;
            --paper-warm: #f5f0e8;
            --accent: #c9a961;
            --accent-light: #d4b978;
            --yang: #1a1a1a;
            --yin: #e8e4dc;
            --shadow: rgba(0, 0, 0, 0.06);
            --shadow-hover: rgba(0, 0, 0, 0.12);
            --highlight: #e8d4a8;
            --season-spring: #a8c4a0;
            --season-summer: #d4a574;
            --season-autumn: #c9a961;
            --season-winter: #9db4c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.8;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(180deg, var(--paper-warm) 0%, var(--paper) 100%);
            border-bottom: 1px solid rgba(201, 169, 97, 0.2);
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 12px;
            color: var(--ink);
        }

        .header .subtitle {
            font-size: 1rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            font-weight: 300;
        }

        /* Solar Term Banner */
        .solar-banner {
            background: linear-gradient(135deg, var(--paper-warm) 0%, rgba(201, 169, 97, 0.1) 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(201, 169, 97, 0.15);
        }

        .solar-current {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .solar-label {
            font-size: 0.85rem;
            color: var(--ink-light);
            letter-spacing: 0.1em;
        }

        .solar-name {
            font-size: 1.8rem;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.15em;
        }

        .solar-hex {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: white;
            border-radius: 25px;
            border: 1px solid rgba(201, 169, 97, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .solar-hex:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .solar-hex .hex-symbol {
            font-size: 1.5rem;
        }

        .solar-hex .hex-info {
            text-align: left;
        }

        .solar-hex .hex-name {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .solar-hex .hex-number {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        /* Search */
        .search-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 18px 50px 18px 24px;
            border: 1px solid rgba(201, 169, 97, 0.3);
            border-radius: 50px;
            background: var(--paper);
            font-family: inherit;
            font-size: 1rem;
            color: var(--ink);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 4px 20px var(--shadow-hover);
        }

        .search-box::placeholder {
            color: #999;
            font-weight: 300;
        }

        .search-icon {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.2rem;
        }

        .search-hints {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .search-hint {
            padding: 6px 14px;
            background: rgba(201, 169, 97, 0.08);
            border: 1px solid rgba(201, 169, 97, 0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--ink-light);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-hint:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 10px 24px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--ink);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
            letter-spacing: 0.1em;
        }

        .control-btn:hover, .control-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Grid */
        .grid-container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px;
        }

        .hexagram-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 16px;
        }

        /* Hexagram Card */
        .hex-card {
            background: var(--paper);
            border: 1px solid rgba(201, 169, 97, 0.15);
            border-radius: 10px;
            padding: 18px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .hex-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .hex-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px var(--shadow-hover);
            border-color: rgba(201, 169, 97, 0.4);
        }

        .hex-card:hover::before {
            transform: scaleX(1);
        }

        .hex-card.hidden {
            display: none;
        }

        .hex-card.twelve-changes {
            background: linear-gradient(135deg, var(--highlight) 0%, var(--paper-warm) 100%);
            border-color: var(--accent);
        }

        .hex-card.twelve-changes::after {
            content: '十二变势';
            position: absolute;
            top: 8px;
            right: -25px;
            background: var(--accent);
            color: white;
            font-size: 0.6rem;
            padding: 2px 25px;
            transform: rotate(45deg);
            letter-spacing: 0.05em;
        }

        .hex-card.season-active {
            box-shadow: 0 0 0 2px var(--season-spring);
        }

        .hex-symbol-trigram {
            font-size: 1.6rem;
            margin-bottom: 8px;
            line-height: 1;
            letter-spacing: 0.1em;
        }

        .hex-name-full {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 4px;
            letter-spacing: 0.05em;
        }

        .hex-number-display {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
        }

        .hex-season {
            font-size: 0.7rem;
            color: var(--ink-light);
            margin-top: 6px;
            padding: 3px 8px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 10px;
            display: inline-block;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 26, 0.88);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--paper);
            border-radius: 16px;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(201, 169, 97, 0.1);
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--ink);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .modal-close:hover {
            background: var(--accent);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 50px;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(201, 169, 97, 0.2);
        }

        .modal-trigrams {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 0.2em;
        }

        .modal-name-full {
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }

        .modal-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: var(--ink-light);
        }

        .modal-meta span {
            padding: 4px 12px;
            background: rgba(201, 169, 97, 0.08);
            border-radius: 15px;
        }

        .modal-section {
            margin-bottom: 28px;
        }

        .modal-section h3 {
            font-size: 0.85rem;
            color: var(--accent);
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .modal-section p {
            font-size: 1.05rem;
            line-height: 2;
            color: var(--ink);
            text-align: justify;
        }

        .asset-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .asset-tag {
            padding: 8px 16px;
            background: rgba(201, 169, 97, 0.1);
            border: 1px solid rgba(201, 169, 97, 0.3);
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--ink);
            transition: all 0.3s ease;
        }

        .asset-tag:hover {
            background: var(--accent);
            color: white;
        }

        /* Lineage Evolution Graph */
        .lineage-section {
            margin-top: 35px;
            padding-top: 30px;
            border-top: 1px solid rgba(201, 169, 97, 0.2);
        }

        .lineage-title {
            text-align: center;
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: 0.15em;
            margin-bottom: 25px;
        }

        .lineage-subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--ink-light);
            margin-bottom: 20px;
        }

        .lineage-graph {
            position: relative;
            min-height: 400px;
            padding: 20px;
        }

        .lineage-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 30px 40px;
            background: var(--paper-warm);
            border-radius: 50%;
            border: 3px solid var(--accent);
            z-index: 10;
            width: 140px;
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .lineage-center .center-symbol {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .lineage-center .center-name {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .lineage-center .center-number {
            font-size: 0.75rem;
            color: var(--accent);
            margin-top: 3px;
        }

        .lineage-node {
            position: absolute;
            padding: 15px 20px;
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(201, 169, 97, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-width: 100px;
        }

        .lineage-node:hover {
            background: var(--paper-warm);
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 8px 25px var(--shadow-hover);
        }

        .lineage-node.twelve {
            background: linear-gradient(135deg, var(--highlight) 0%, white 100%);
            border-width: 2px;
            border-color: var(--accent);
        }

        .lineage-node .node-symbol {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .lineage-node .node-name {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .lineage-node .node-prob {
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 4px;
        }

        .lineage-line {
            position: absolute;
            background: linear-gradient(90deg, var(--accent), rgba(201, 169, 97, 0.3));
            transform-origin: left center;
            z-index: 1;
            border-radius: 2px;
        }

        /* Lines visualization */
        .lines-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin: 25px 0;
        }

        .yao-line {
            width: 100px;
            height: 8px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .yao-yang {
            background: var(--yang);
        }

        .yao-yin {
            background: transparent;
            position: relative;
        }

        .yao-yin::before,
        .yao-yin::after {
            content: '';
            position: absolute;
            width: 45%;
            height: 100%;
            background: var(--yang);
            border-radius: 4px;
        }

        .yao-yin::before {
            left: 0;
        }

        .yao-yin::after {
            right: 0;
        }

        /* Season indicator */
        .season-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .season-spring { background: rgba(168, 196, 160, 0.2); color: #5a7a52; }
        .season-summer { background: rgba(212, 165, 116, 0.2); color: #8b6914; }
        .season-autumn { background: rgba(201, 169, 97, 0.2); color: #8b7355; }
        .season-winter { background: rgba(157, 180, 192, 0.2); color: #4a6270; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--ink-light);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }

        .footer .divider {
            width: 60px;
            height: 1px;
            background: var(--accent);
            margin: 0 auto 20px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .hexagram-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        @media (max-width: 900px) {
            .hexagram-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .header h1 {
                font-size: 2rem;
            }
            .modal-body {
                padding: 30px;
            }
            .lineage-graph {
                min-height: 300px;
            }
        }

        @media (max-width: 600px) {
            .hexagram-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .hex-symbol-trigram {
                font-size: 1.3rem;
            }
            .hex-name-full {
                font-size: 0.85rem;
            }
            .lineage-center {
                width: 100px;
                height: 100px;
                padding: 15px;
            }
            .lineage-center .center-symbol {
                font-size: 1.8rem;
            }
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hex-card {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .hex-card:nth-child(1) { animation-delay: 0.02s; }
        .hex-card:nth-child(2) { animation-delay: 0.04s; }
        .hex-card:nth-child(3) { animation-delay: 0.06s; }
        .hex-card:nth-child(4) { animation-delay: 0.08s; }
        .hex-card:nth-child(5) { animation-delay: 0.10s; }
        .hex-card:nth-child(6) { animation-delay: 0.12s; }
        .hex-card:nth-child(7) { animation-delay: 0.14s; }
        .hex-card:nth-child(8) { animation-delay: 0.16s; }
        .hex-card:nth-child(9) { animation-delay: 0.18s; }
        .hex-card:nth-child(10) { animation-delay: 0.20s; }
        .hex-card:nth-child(11) { animation-delay: 0.22s; }
        .hex-card:nth-child(12) { animation-delay: 0.24s; }
        .hex-card:nth-child(13) { animation-delay: 0.26s; }
        .hex-card:nth-child(14) { animation-delay: 0.28s; }
        .hex-card:nth-child(15) { animation-delay: 0.30s; }
        .hex-card:nth-child(16) { animation-delay: 0.32s; }
        .hex-card:nth-child(17) { animation-delay: 0.34s; }
        .hex-card:nth-child(18) { animation-delay: 0.36s; }
        .hex-card:nth-child(19) { animation-delay: 0.38s; }
        .hex-card:nth-child(20) { animation-delay: 0.40s; }
        .hex-card:nth-child(21) { animation-delay: 0.42s; }
        .hex-card:nth-child(22) { animation-delay: 0.44s; }
        .hex-card:nth-child(23) { animation-delay: 0.46s; }
        .hex-card:nth-child(24) { animation-delay: 0.48s; }
        .hex-card:nth-child(25) { animation-delay: 0.50s; }
        .hex-card:nth-child(26) { animation-delay: 0.52s; }
        .hex-card:nth-child(27) { animation-delay: 0.54s; }
        .hex-card:nth-child(28) { animation-delay: 0.56s; }
        .hex-card:nth-child(29) { animation-delay: 0.58s; }
        .hex-card:nth-child(30) { animation-delay: 0.60s; }
        .hex-card:nth-child(31) { animation-delay: 0.62s; }
        .hex-card:nth-child(32) { animation-delay: 0.64s; }
        .hex-card:nth-child(33) { animation-delay: 0.66s; }
        .hex-card:nth-child(34) { animation-delay: 0.68s; }
        .hex-card:nth-child(35) { animation-delay: 0.70s; }
        .hex-card:nth-child(36) { animation-delay: 0.72s; }
        .hex-card:nth-child(37) { animation-delay: 0.74s; }
        .hex-card:nth-child(38) { animation-delay: 0.76s; }
        .hex-card:nth-child(39) { animation-delay: 0.78s; }
        .hex-card:nth-child(40) { animation-delay: 0.80s; }
        .hex-card:nth-child(41) { animation-delay: 0.82s; }
        .hex-card:nth-child(42) { animation-delay: 0.84s; }
        .hex-card:nth-child(43) { animation-delay: 0.86s; }
        .hex-card:nth-child(44) { animation-delay: 0.88s; }
        .hex-card:nth-child(45) { animation-delay: 0.90s; }
        .hex-card:nth-child(46) { animation-delay: 0.92s; }
        .hex-card:nth-child(47) { animation-delay: 0.94s; }
        .hex-card:nth-child(48) { animation-delay: 0.96s; }
        .hex-card:nth-child(49) { animation-delay: 0.98s; }
        .hex-card:nth-child(50) { animation-delay: 1.00s; }
        .hex-card:nth-child(51) { animation-delay: 1.02s; }
        .hex-card:nth-child(52) { animation-delay: 1.04s; }
        .hex-card:nth-child(53) { animation-delay: 1.06s; }
        .hex-card:nth-child(54) { animation-delay: 1.08s; }
        .hex-card:nth-child(55) { animation-delay: 1.10s; }
        .hex-card:nth-child(56) { animation-delay: 1.12s; }
        .hex-card:nth-child(57) { animation-delay: 1.14s; }
        .hex-card:nth-child(58) { animation-delay: 1.16s; }
        .hex-card:nth-child(59) { animation-delay: 1.18s; }
        .hex-card:nth-child(60) { animation-delay: 1.20s; }
        .hex-card:nth-child(61) { animation-delay: 1.22s; }
        .hex-card:nth-child(62) { animation-delay: 1.24s; }
        .hex-card:nth-child(63) { animation-delay: 1.26s; }
        .hex-card:nth-child(64) { animation-delay: 1.28s; }
    </style>
</head>
<body>
    <header class="header">
        <h1>六十四卦图</h1>
        <p class="subtitle">ECHO 编码系统 · 易经智慧 · 十二变势</p>
    </header>

    <div class="solar-banner">
        <div class="solar-current">
            <span class="solar-label">当前节气</span>
            <span class="solar-name" id="currentSolarTerm">春分</span>
            <div class="solar-hex" id="solarHexagram">
                <span class="hex-symbol">☴☲</span>
                <div class="hex-info">
                    <div class="hex-name">风火家人</div>
                    <div class="hex-number">第 37 卦</div>
                </div>
            </div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-box" id="searchBox" placeholder="试试：所有温润的卦 / 适合音乐的卦 / 家族相关的卦...">
        <span class="search-icon">⌕</span>
        <div class="search-hints">
            <span class="search-hint" data-query="温润">温润如水</span>
            <span class="search-hint" data-query="音乐">音乐艺术</span>

        // 诗意关键词映射
        const poeticKeywords = {
            '温润': ['需', '坤', '坎', '兑', '家人', '井', '既济', '未济'],
            '音乐': ['豫', '兑', '随', '中孚', '升', '谦', '咸', '家人'],

            '变动': ['革', '鼎', '震', '巽', '涣', '随', '豫', '大过'],
            '光明': ['离', '大有', '晋', '明夷', '同人', '贲', '丰', '旅'],
            '黑暗': ['坎', '明夷', '蹇', '困', '讼', '否', '剥', '蛊'],
            '喜悦': ['兑', '豫', '丰', '履', '泰', '大有', '晋', '复'],
            '困难': ['蹇', '困', '屯', '坎', '讼', '否', '剥', '明夷'],
            '强大': ['乾', '大壮', '大有', '夬', '丰', '震', '同人', '泰'],
            '柔和': ['坤', '巽', '兑', '谦', '小畜', '观', '渐', '中孚']
        };

        // 获取当前节气
        function getCurrentSolarTerm() {
            const now = new Date();
            const month = now.getMonth();
            const day = now.getDate();
            
            // 简化计算，实际应使用精确的天文算法
            const termIndex = Math.floor((month * 2 + (day > 15 ? 1 : 0))) % 24;
            return solarTerms[termIndex] || solarTerms[0];
        }

        // 获取卦的完整名称
        function getFullHexagramName(hex) {
            const upper = trigrams[hex.upper];
            const lower = trigrams[hex.lower];
            return `${upper.symbol}${lower.symbol}`;
        }

        // 获取节气信息
        function getSolarTermInfo(hexNumber) {
            return solarTerms.find(t => t.hexIndex === hexNumber - 1);
        }

        // 渲染六爻
        function renderLines(lines) {
            return lines.map(line => 
                `<div class="yao-line ${line === 1 ? 'yao-yang' : 'yao-yin'}"></div>`
            ).join('');
        }

        // 创建卦卡
        function createHexCard(hex) {
            const solarInfo = getSolarTermInfo(hex.number);
            const changes = twelveChanges[hex.number];
            const isTwelve = changes && changes.targets.length >= 12;
            
            return `
                <div class="hex-card ${isTwelve ? 'twelve-changes' : ''}" 
                     data-number="${hex.number}" 
                     data-name="${hex.name}"
                     data-fullname="${hex.fullName}"
                     data-season="${solarInfo ? solarInfo.season : ''}"
                     data-keywords="${hex.keywords.join(',')}">
                    <div class="hex-symbol-trigram">${getFullHexagramName(hex)}</div>
                    <div class="hex-name-full">${hex.fullName}</div>
                    <div class="hex-number-display">第 ${hex.number} 卦 · ${hex.name}</div>
                    ${solarInfo ? `<div class="hex-season season-${solarInfo.season}">${solarInfo.name}</div>` : ''}
                </div>
            `;
        }

        // 渲染网格
        function renderGrid(filter = 'all', searchTerm = '') {
            const grid = document.getElementById('hexagramGrid');
            let filtered = hexagrams;

            if (filter === 'upper') {
                filtered = hexagrams.filter(h => h.number <= 30);
            } else if (filter === 'lower') {
                filtered = hexagrams.filter(h => h.number > 30);
            } else if (filter === 'twelve') {
                filtered = hexagrams.filter(h => {
                    const changes = twelveChanges[h.number];
                    return changes && changes.targets.length >= 12;
                });
            } else if (filter === 'season') {
                const current = getCurrentSolarTerm();
                const seasonTerms = solarTerms.filter(t => t.season === current.season);
                const seasonHexNumbers = seasonTerms.map(t => t.hexIndex + 1);
                filtered = hexagrams.filter(h => seasonHexNumbers.includes(h.number));
            }

            // 诗意搜索
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                
                // 检查是否是诗意关键词
                let matchingHexNumbers = [];
                for (const [keyword, hexNames] of Object.entries(poeticKeywords)) {
                    if (term.includes(keyword) || keyword.includes(term)) {
                        hexNames.forEach(name => {
                            const hex = hexagrams.find(h => h.name === name || h.fullName.includes(name));
                            if (hex) matchingHexNumbers.push(hex.number);
                        });
                    }
                }

                filtered = filtered.filter(h => {
                    // 关键词匹配
                    if (matchingHexNumbers.includes(h.number)) return true;
                    
                    // 基本信息匹配
                    const basicMatch = h.name.includes(term) ||
                        h.fullName.includes(term) ||
                        h.text.includes(term) ||
                        h.meaning.includes(term);
                    
                    // 诗意关键词匹配
                    const keywordMatch = h.keywords.some(k => k.includes(term) || term.includes(k));
                    
                    return basicMatch || keywordMatch;
                });
            }

            grid.innerHTML = filtered.map(createHexCard).join('');

            // 添加点击事件
            document.querySelectorAll('.hex-card').forEach(card => {
                card.addEventListener('click', () => {
                    const number = parseInt(card.dataset.number);
                    openModal(number);
                });
            });
        }

        // 打开详情弹窗
        function openModal(number) {
            const hex = hexagrams.find(h => h.number === number);
            const solarInfo = getSolarTermInfo(number);
            const changes = twelveChanges[number];
            const modal = document.getElementById('modalOverlay');
            const modalBody = document.getElementById('modalBody');
            
            // 获取演化目标卦
            const targetHexes = changes ? changes.targets.map((n, i) => ({
                hex: hexagrams.find(h => h.number === n),
                prob: changes.probabilities[i]
            })).filter(item => item.hex) : [];

            modalBody.innerHTML = `
                <div class="modal-header">
                    <div class="modal-trigrams">${getFullHexagramName(hex)}</div>
                    <h2 class="modal-name-full">${hex.fullName} · ${hex.name}</h2>
                    <div class="modal-meta">
                        <span>第 ${hex.number} 卦</span>
                        <span>${hex.group === 'upper' ? '上经' : '下经'}</span>
                        ${solarInfo ? `<span class="season-indicator season-${solarInfo.season}">${solarInfo.name}</span>` : ''}
                    </div>
                </div>

                <div class="lines-visual">
                    ${renderLines(hex.lines)}
                </div>

                <div class="modal-section">
                    <h3>卦辞</h3>
                    <p>${hex.text}</p>
                </div>

                <div class="modal-section">
                    <h3>象曰</h3>
                    <p>${hex.meaning}</p>
                </div>

                <div class="modal-section">
                    <h3>意境关键词</h3>
                    <div class="asset-tags">
                        ${hex.keywords.map(k => `<span class="asset-tag">${k}</span>`).join('')}
                    </div>
                </div>

                <div class="modal-section">
                    <h3>资产映射</h3>
                    <div class="asset-tags">
                        ${hex.assets.map(a => `<span class="asset-tag">${a}</span>`).join('')}
                    </div>
                </div>

                ${changes ? `
                <div class="lineage-section">
                    <h3 class="lineage-title">十二变势演化图</h3>
                    <p class="lineage-subtitle">线条粗细代表演化概率 · 满十二变势卦已高亮</p>
                    <div class="lineage-graph" id="lineageGraph">
                        <div class="lineage-center">
                            <div class="center-symbol">${getFullHexagramName(hex)}</div>
                            <div class="center-name">${hex.name}</div>
                            <div class="center-number">第${hex.number}卦</div>
                        </div>
                        ${targetHexes.map((item, index) => {
                            const angle = (index / targetHexes.length) * 2 * Math.PI - Math.PI / 2;
                            const radius = 150;
                            const x = Math.cos(angle) * radius;
                            const y = Math.sin(angle) * radius;
                            const thickness = Math.max(2, item.prob * 4);
                            const isTwelve = twelveChanges[item.hex.number] && twelveChanges[item.hex.number].targets.length >= 12;
                            return `
                                <div class="lineage-line" 
                                     style="left: 50%; top: 50%; 
                                            width: ${radius}px; 
                                            height: ${thickness}px;
                                            transform: translate(0, -50%) rotate(${angle}rad);">
                                </div>
                                <div class="lineage-node ${isTwelve ? 'twelve' : ''}"
                                     style="left: calc(50% + ${x}px); top: calc(50% + ${y}px); transform: translate(-50%, -50%);"
                                     onclick="openModal(${item.hex.number}); event.stopPropagation();">
                                    <div class="node-symbol">${getFullHexagramName(item.hex)}</div>
                                    <div class="node-name">${item.hex.name}</div>
                                    <div class="node-prob">${(item.prob * 100).toFixed(0)}%</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                ` : ''}
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭弹窗
        function closeModal() {
            const modal = document.getElementById('modalOverlay');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 更新节气显示
        function updateSolarDisplay() {
            const current = getCurrentSolarTerm();
            const hex = hexagrams[current.hexIndex];
            
            document.getElementById('currentSolarTerm').textContent = current.name;
            
            const solarHexEl = document.getElementById('solarHexagram');
            solarHexEl.innerHTML = `
                <span class="hex-symbol">${getFullHexagramName(hex)}</span>
                <div class="hex-info">
                    <div class="hex-name">${hex.fullName}</div>
                    <div class="hex-number">第 ${hex.number} 卦</div>
                </div>
            `;
            solarHexEl.onclick = () => openModal(hex.number);
        }

        document.addEventListener('DOMContentLoaded', () => {

            // 搜索提示点击
            document.querySelectorAll('.search-hint').forEach(hint => {
                hint.addEventListener('click', () => {
                    searchBox.value = hint.dataset.query;
                    const activeView = document.querySelector('.control-btn.active');
                    const view = activeView ? activeView.dataset.view : 'all';
                    renderGrid(view, hint.dataset.query);
                });
            });

            // 视图切换
            document.querySelectorAll('.control-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGrid(btn.dataset.view, searchBox.value);
                });
            });

            // 关闭弹窗事件
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });

            // ESC关闭
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        });

        // 全局暴露openModal供onclick使用
        window.openModal = openModal;
    </script>
</body>
</html>
