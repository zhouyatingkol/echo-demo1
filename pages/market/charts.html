<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>榜 - ECHO</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/styles/xuanzhi-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="../../frontend/js/i18n.js" defer></script>
  <script src="../../frontend/js/wallet-state.js" defer></script>
  <style>
    /* 页面特定样式 */
    .page-header {
      padding: 60px 0 40px;
      text-align: center;
    }
    
    .page-title {
      font-family: var(--font-wenkai);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .page-subtitle {
      font-size: 1rem;
      color: var(--ink-light);
    }
    
    /* 榜单类型标签 */
    .chart-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .chart-tab {
      padding: 10px 24px;
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.15);
      font-family: var(--font-serif);
      font-size: 0.9rem;
      color: var(--ink-light);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .chart-tab:hover {
      border-color: var(--gold-primary);
      color: var(--ink-deep);
    }
    
    .chart-tab.active {
      background: var(--seal-red);
      border-color: var(--seal-red);
      color: white;
    }
    
    /* 时间筛选 */
    .time-filter {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }
    
    .time-btn {
      padding: 8px 20px;
      background: transparent;
      border: 1px solid rgba(122, 110, 95, 0.2);
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: var(--ink-light);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .time-btn:hover {
      border-color: var(--gold-primary);
      color: var(--ink-deep);
    }
    
    .time-btn.active {
      background: var(--gold-faint);
      border-color: var(--gold-primary);
      color: var(--gold-primary);
    }
    
    /* 连接钱包提示 */
    .connect-prompt {
      text-align: center;
      padding: 80px 20px;
      background: var(--bg-secondary);
      border: 1px dashed rgba(122, 110, 95, 0.2);
    }
    
    .connect-prompt-icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    
    .connect-prompt p {
      color: var(--ink-light);
      margin-bottom: 24px;
    }
    
    .connect-btn {
      padding: 12px 32px;
      background: var(--seal-red);
      border: none;
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: white;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    
    .connect-btn:hover {
      background: #802820;
    }
    
    /* 榜单头部 */
    .chart-header {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid rgba(122, 110, 95, 0.1);
      font-size: 0.85rem;
      color: var(--ink-light);
    }
    
    .header-rank { width: 60px; text-align: center; }
    .header-info { flex: 1; }
    .header-stats { width: 150px; text-align: center; }
    .header-score { width: 100px; text-align: center; }
    
    /* 榜单列表 */
    .chart-list {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      overflow: hidden;
    }
    
    .chart-item {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(122, 110, 95, 0.06);
      transition: background var(--transition-fast);
    }
    
    .chart-item:hover {
      background: var(--bg-secondary);
    }
    
    .chart-item:last-child {
      border-bottom: none;
    }
    
    /* 排名样式 */
    .rank {
      width: 60px;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      color: var(--ink-medium);
      font-family: var(--font-wenkai);
    }
    
    .rank.top1 {
      color: var(--gold-primary);
      font-size: 1.5rem;
    }
    
    .rank.top2 {
      color: var(--ink-medium);
      font-size: 1.4rem;
    }
    
    .rank.top3 {
      color: #A67C52;
      font-size: 1.3rem;
    }
    
    /* 音乐信息 */
    .music-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .music-cover {
      width: 56px;
      height: 56px;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border: 1px solid rgba(122, 110, 95, 0.1);
    }
    
    .music-details {
      flex: 1;
    }
    
    .music-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--ink-deep);
    }
    
    .music-meta {
      font-size: 0.8rem;
      color: var(--ink-light);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .music-artist {
      color: var(--gold-primary);
    }
    
    .genre-tag {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.7rem;
      background: var(--gold-faint);
      color: var(--gold-primary);
      border: 1px solid rgba(184, 155, 108, 0.3);
    }
    
    /* 统计数据 */
    .stats-info {
      width: 150px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.75rem;
      color: var(--ink-light);
      text-align: center;
    }
    
    .stat-item {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    
    .stat-value {
      color: var(--ink-deep);
      font-weight: 500;
    }
    
    /* 热度分数 */
    .hot-score {
      width: 100px;
      text-align: center;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--seal-red);
      font-family: var(--font-wenkai);
    }
    
    /* 加载和空状态 */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-light);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-light);
    }
    
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .chart-header { display: none; }
      .stats-info { display: none; }
      .rank { width: 40px; font-size: 1.1rem; }
      .rank.top1 { font-size: 1.3rem; }
      .hot-score { width: 70px; font-size: 0.85rem; }
      .chart-tabs { gap: 8px; }
      .chart-tab { padding: 8px 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="../index.html" class="navbar__brand">ECHO<span>·</span>榜</a>
    <div class="navbar__nav">
      <a href="discover.html" class="navbar__link">探</a>
      <a href="music-market.html" class="navbar__link">集</a>
      <a href="charts.html" class="navbar__link is-active">榜</a>
      <a href="../creator/mint-music.html" class="navbar__link">铸</a>
      <a href="../user/dashboard.html" class="navbar__link">境</a>
    </div>
    <button class="navbar__action" id="connectBtn" onclick="connectWallet()">入链</button>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <!-- 页头 -->
      <div class="page-header">
        <h1 class="page-title">风云榜</h1>
        <p class="page-subtitle">音之流转，众声所归</p>
      </div>
      
      <!-- 榜单类型 -->
      <div class="chart-tabs">
        <div class="chart-tab active" data-tab="all" onclick="switchTab('all')">总榜</div>
        <div class="chart-tab" data-tab="electronic" onclick="switchTab('electronic')">电子</div>
        <div class="chart-tab" data-tab="rock" onclick="switchTab('rock')">摇滚</div>
        <div class="chart-tab" data-tab="pop" onclick="switchTab('pop')">流行</div>
        <div class="chart-tab" data-tab="new" onclick="switchTab('new')">新晋</div>
      </div>
      
      <!-- 时间筛选 -->
      <div class="time-filter">
        <button class="time-btn" data-period="week" onclick="setPeriod('week')">本周</button>
        <button class="time-btn active" data-period="month" onclick="setPeriod('month')">本月</button>
        <button class="time-btn" data-period="all" onclick="setPeriod('all')">总榜</button>
      </div>
      
      <!-- 连接钱包提示 -->
      <div class="connect-prompt" id="connectPrompt">
        <div class="connect-prompt-icon">⛓</div>
        <p>连接钱包，观风云之势</p>
        <button class="connect-btn" onclick="connectWallet()">入链</button>
      </div>
      
      <!-- 榜单内容 -->
      <div id="chartContent" style="display: none;">
        <div class="chart-header">
          <div class="header-rank">序</div>
          <div class="header-info">音境</div>
          <div class="header-stats">流转</div>
          <div class="header-score">热度</div>
        </div>
        
        <div class="chart-list" id="chartList">
          <!-- 动态生成 -->
        </div>
      </div>
    </div>
  </main>
  
  <!-- 底部 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">ECHO · 榜</div>
        <div class="footer-links">
          <a href="discover.html" class="footer-link">探</a>
          <a href="music-market.html" class="footer-link">集</a>
          <a href="charts.html" class="footer-link">榜</a>
        </div>
      </div>
      <div class="footer-copyright">留声于链，归于创作者</div>
    </div>
  </footer>
  
  <script>
    // 合约配置
    const CONTRACT_ADDRESSES = {
      echoAsset: '0x5f5AAe09BB85f561b21845729B79E840AB026148',
      echoFusion: '0x3AD441ECfC193fbe7f086b962d0bCfd2Bc2Bac0d'
    };

    const ECHO_ASSET_ABI = [
      "function getAssetInfo(uint256) view returns (tuple(string,string,string,string,uint256),tuple(address,address,address,address,uint256,uint256,uint256),address)",
      "function getCurrentTokenId() view returns (uint256)",
      "function ownerOf(uint256) view returns (address)"
    ];

    let provider, signer, userAddress;
    let echoAssetContract;
    let currentTab = 'all';
    let currentPeriod = 'month';
    let allMusicData = [];

    // 导航栏滚动效果
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('is-scrolled');
      } else {
        navbar.classList.remove('is-scrolled');
      }
    });

    // 连接钱包
    async function connectWallet() {
      if (!window.ethereum) {
        alert('请先安装 MetaMask');
        return;
      }
      
      try {
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        
        document.getElementById('connectBtn').textContent = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
        
        echoAssetContract = new ethers.Contract(
          CONTRACT_ADDRESSES.echoAsset, 
          ECHO_ASSET_ABI, 
          provider
        );
        
        document.getElementById('connectPrompt').style.display = 'none';
        document.getElementById('chartContent').style.display = 'block';
        
        await loadCharts();
      } catch (error) {
        console.error('连接失败:', error);
      }
    }

    // 热度计算
    function calculateHotScore(music, period) {
      let score = 0;
      const now = Date.now() / 1000;
      
      score += (music.playCount || 0) * 1;
      score += (music.purchaseCount || 0) * 10;
      score += (music.favoriteCount || 0) * 5;
      
      const createdAt = music.createdAt || (now - 86400 * 7);
      const age = now - createdAt;
      const days = age / 86400;
      
      let timeDecay;
      switch(period) {
        case 'week':
          timeDecay = Math.max(0.1, 1 - (days / 7));
          break;
        case 'month':
          timeDecay = Math.max(0.3, 1 - (days / 30));
          break;
        case 'all':
        default:
          timeDecay = Math.max(0.5, 1 - (days / 90));
          break;
      }
      
      if (currentTab === 'new' && days <= 7) {
        score *= 1.5;
      }
      
      return score * timeDecay;
    }

    // 加载榜单
    async function loadCharts() {
      const container = document.getElementById('chartList');
      container.innerHTML = '<div class="loading">载入中...</div>';
      
      try {
        const currentId = await echoAssetContract.getCurrentTokenId();
        const musicList = [];
        
        for (let i = 0; i < currentId; i++) {
          try {
            const info = await echoAssetContract.getAssetInfo(i);
            const assetType = info[0][2]?.toLowerCase() || '';
            
            if (assetType.includes('music') || assetType.includes('audio') || 
                assetType.includes('electronic') || assetType.includes('rock') || 
                assetType.includes('pop')) {
              
              const music = {
                tokenId: i,
                name: info[0][0] || `音境 #${i}`,
                description: info[0][1] || '',
                genre: extractGenre(assetType),
                bpm: extractBpm(info[0][3]),
                createdAt: Number(info[0][4]) || (Date.now()/1000 - Math.random()*86400*30),
                playCount: Math.floor(Math.random() * 10000) + 100,
                purchaseCount: Math.floor(Math.random() * 500) + 10,
                favoriteCount: Math.floor(Math.random() * 2000) + 50,
                artist: info[2] ? (info[2].slice(0, 6) + '...' + info[2].slice(-4)) : '未知创作者'
              };
              
              music.hotScore = calculateHotScore(music, currentPeriod);
              musicList.push(music);
            }
          } catch (e) {}
        }
        
        allMusicData = musicList;
        const filteredList = filterAndSortMusic(musicList);
        renderChartList(filteredList);
        
      } catch (error) {
        console.error('加载失败:', error);
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠</div><p>加载失败</p></div>';
      }
    }

    function extractGenre(assetType) {
      const type = assetType.toLowerCase();
      if (type.includes('electronic')) return 'electronic';
      if (type.includes('rock')) return 'rock';
      if (type.includes('pop')) return 'pop';
      if (type.includes('jazz')) return 'jazz';
      if (type.includes('classical')) return 'classical';
      return 'other';
    }

    function extractBpm(uri) {
      const match = uri?.match(/(\d+)\s*bpm/i);
      return match ? parseInt(match[1]) : (Math.floor(Math.random() * 80) + 80);
    }

    function filterAndSortMusic(musicList) {
      let filtered = [...musicList];
      const now = Date.now() / 1000;
      
      switch(currentTab) {
        case 'electronic':
          filtered = filtered.filter(m => m.genre === 'electronic');
          break;
        case 'rock':
          filtered = filtered.filter(m => m.genre === 'rock');
          break;
        case 'pop':
          filtered = filtered.filter(m => m.genre === 'pop');
          break;
        case 'new':
          filtered = filtered.filter(m => (now - m.createdAt) <= 86400 * 7);
          break;
      }
      
      filtered.forEach(music => {
        music.hotScore = calculateHotScore(music, currentPeriod);
      });
      
      filtered.sort((a, b) => b.hotScore - a.hotScore);
      return filtered.slice(0, 50);
    }

    function renderChartList(musicList) {
      const container = document.getElementById('chartList');
      
      if (musicList.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">♪</div><p>暂无音境</p></div>';
        return;
      }
      
      const genreIcons = {
        electronic: '音', rock: '岩', pop: '流', jazz: '爵', classical: '典', other: '韵'
      };
      
      const genreNames = {
        electronic: '电子', rock: '摇滚', pop: '流行', jazz: '爵士', classical: '古典', other: '其他'
      };
      
      container.innerHTML = musicList.map((music, index) => {
        const rank = index + 1;
        const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
        
        return `
          <div class="chart-item">
            <div class="rank ${rankClass}">${rank}</div>
            <div class="music-info">
              <div class="music-cover">${genreIcons[music.genre] || '♪'}</div>
              <div class="music-details">
                <div class="music-title">${escapeHtml(music.name)}</div>
                <div class="music-meta">
                  <span class="music-artist">${music.artist}</span>
                  <span class="genre-tag">${genreNames[music.genre] || music.genre}</span>
                  <span>${music.bpm} BPM</span>
                </div>
              </div>
            </div>
            <div class="stats-info">
              <div class="stat-item">
                <span>播</span> <span class="stat-value">${formatNumber(music.playCount)}</span>
              </div>
              <div class="stat-item">
                <span>购</span> <span class="stat-value">${formatNumber(music.purchaseCount)}</span>
              </div>
              <div class="stat-item">
                <span>藏</span> <span class="stat-value">${formatNumber(music.favoriteCount)}</span>
              </div>
            </div>
            <div class="hot-score">${Math.floor(music.hotScore)}</div>
          </div>
        `;
      }).join('');
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.chart-tab').forEach(el => {
        el.classList.remove('active');
        if (el.dataset.tab === tab) el.classList.add('active');
      });
      if (allMusicData.length > 0) {
        renderChartList(filterAndSortMusic(allMusicData));
      }
    }

    function setPeriod(period) {
      currentPeriod = period;
      document.querySelectorAll('.time-btn').forEach(el => {
        el.classList.remove('active');
        if (el.dataset.period === period) el.classList.add('active');
      });
      if (allMusicData.length > 0) {
        renderChartList(filterAndSortMusic(allMusicData));
      }
    }

    function formatNumber(num) {
      if (num >= 10000) return (num / 10000).toFixed(1) + '万';
      if (num >= 1000) return (num / 1000).toFixed(1) + '千';
      return num.toString();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    if (window.ethereum && window.ethereum.selectedAddress) {
      connectWallet();
    }
  </script>
</body>
</html>
