<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吾 - ECHO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/lxgwwenkai/dist/LXGWWenKai-Regular/result.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- Ethers.js v6 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="../css/mobile-optimizations.css">
    <style>
        :root {
            --bg-primary: #F8F6F1;
            --bg-secondary: #F0EDE6;
            --bg-card: #FAFAF8;
            --ink-deep: #1A1A1A;
            --ink-medium: #4A4A4A;
            --ink-light: #8A8A8A;
            --gold-primary: #B89B6C;
            --gold-light: #D4C4A8;
            --cinnabar: #A03020;
            --font-display: 'LXGW WenKai', cursive;
            --font-serif: 'Noto Serif SC', serif;
            --font-sans: 'Inter', sans-serif;
            --ease-ink: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 20px;
        }

        body {
            font-family: var(--font-serif);
            background-color: var(--bg-primary);
            color: var(--ink-deep);
            line-height: 1.8;
            letter-spacing: 0.05em;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.5rem 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            transition: all 0.6s ease;
        }

        .navbar.scrolled {
            background: rgba(248, 246, 241, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.05);
            padding: 1rem 5vw;
        }

        .navbar__brand {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            color: var(--ink-deep);
            text-decoration: none;
        }

        .navbar__nav {
            display: flex;
            gap: 3rem;
        }

        .navbar__link {
            font-family: 'Noto Serif SC', serif;
            font-size: 1rem;
            color: var(--ink-medium);
            text-decoration: none;
            letter-spacing: 0.3em;
            position: relative;
            transition: color 0.4s ease;
        }

        .navbar__link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold-primary);
            transition: width 0.4s ease;
        }

        .navbar__link:hover,
        .navbar__link.active {
            color: var(--cinnabar);
        }

        .navbar__link:hover::after,
        .navbar__link.active::after {
            width: 100%;
        }

        .navbar__user {
            text-decoration: none;
            font-size: 0.85rem;
            color: var(--cinnabar);
            letter-spacing: 0.1em;
        }

        /* Hero */
        .profile-hero {
            padding: 20vh 10vw 10vh;
            text-align: center;
        }

        .profile-title {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            margin-bottom: 16px;
        }

        .profile-subtitle {
            font-size: 1rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
        }

        /* Tab 导航 */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 4rem;
            padding: 2rem 0;
            border-bottom: 0.5px solid rgba(0,0,0,0.08);
            margin: 0 10vw;
        }

        .tab-btn {
            font-family: var(--font-serif);
            font-size: 1.1rem;
            color: var(--ink-light);
            background: none;
            border: none;
            cursor: pointer;
            letter-spacing: 0.2em;
            padding: 0.5rem 1rem;
            position: relative;
            transition: color 0.4s ease;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background: var(--cinnabar);
            transition: width 0.4s ease;
        }

        .tab-btn:hover,
        .tab-btn.active {
            color: var(--ink-deep);
        }

        .tab-btn.active::after {
            width: 100%;
        }

        /* 内容区 */
        .tab-content {
            display: none;
            padding: 4rem 10vw;
            min-height: 50vh;
        }

        .tab-content.active {
            display: block;
        }

        /* 资产卡片网格 */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .asset-card {
            background: var(--bg-card);
            border-radius: 2px;
            overflow: hidden;
            transition: transform 0.6s var(--ease-ink);
            border: 0.5px solid rgba(0,0,0,0.06);
        }

        .asset-card:hover {
            transform: translateY(-4px);
        }

        .asset-cover {
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, var(--bg-secondary), #E8E5DE);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--ink-light);
        }

        .asset-info {
            padding: 1.5rem;
        }

        .asset-name {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .asset-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--ink-light);
        }

        .asset-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }

        .asset-type--sound { background: #8B9DC3; color: white; }
        .asset-type--color { background: #C9A9A6; color: white; }
        .asset-type--text { background: #7A8B7C; color: white; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 8rem 2rem;
        }

        .empty-icon {
            font-size: 3rem;
            color: var(--gold-light);
            margin-bottom: 1.5rem;
        }

        .empty-text {
            font-size: 1.1rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .empty-sub {
            font-size: 0.85rem;
            color: var(--ink-light);
            opacity: 0.7;
        }

        /* 收益统计 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 800px;
            margin: 0 auto 4rem;
        }

        .stat-card {
            text-align: center;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 2px;
            border: 0.5px solid rgba(0,0,0,0.06);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--cinnabar);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--ink-light);
            letter-spacing: 0.1em;
        }

        /* 钱包信息卡片 */
        .wallet-section {
            padding: 2rem 10vw 3rem;
            margin-top: -2rem;
        }

        .wallet-card {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 0.5px solid rgba(122, 110, 95, 0.08);
            border-radius: 2px;
            padding: 2rem;
            position: relative;
        }

        .wallet-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
        }

        .wallet-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 0.5px solid rgba(122, 110, 95, 0.08);
        }

        .wallet-card__title {
            font-family: var(--font-display);
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: var(--ink-deep);
        }

        .wallet-card__status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--ink-light);
        }

        .wallet-card__status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #7A8B7C;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .wallet-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .wallet-info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .wallet-info-item.full-width {
            grid-column: 1 / -1;
        }

        .wallet-info-label {
            font-size: 0.7rem;
            color: var(--ink-light);
            letter-spacing: 0.1em;
        }

        .wallet-info-value {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--ink-deep);
            letter-spacing: 0.02em;
            word-break: break-all;
        }

        .wallet-info-value.address {
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 0.85rem;
        }

        .wallet-info-value.balance {
            font-size: 1.25rem;
            font-weight: 300;
            color: var(--cinnabar);
        }

        .wallet-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .wallet-btn {
            font-family: var(--font-serif);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            padding: 0.6rem 1.2rem;
            border: 0.5px solid rgba(122, 110, 95, 0.2);
            background: transparent;
            color: var(--ink-medium);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .wallet-btn:hover {
            border-color: var(--gold-primary);
            color: var(--ink-deep);
            background: rgba(184, 155, 108, 0.04);
        }

        .wallet-btn.primary {
            background: var(--ink-deep);
            color: var(--bg-primary);
            border-color: var(--ink-deep);
        }

        .wallet-btn.primary:hover {
            background: var(--gold-primary);
            border-color: var(--gold-primary);
        }

        .wallet-btn.disconnect {
            color: var(--cinnabar);
            border-color: rgba(160, 48, 32, 0.3);
        }

        .wallet-btn.disconnect:hover {
            background: rgba(160, 48, 32, 0.04);
            border-color: var(--cinnabar);
        }

        /* 网络选择器 */
        .network-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 0.5px solid rgba(122, 110, 95, 0.08);
        }

        .network-chip {
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            padding: 0.3rem 0.8rem;
            border: 0.5px solid rgba(122, 110, 95, 0.15);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--ink-light);
        }

        .network-chip:hover {
            border-color: var(--gold-primary);
            color: var(--ink-deep);
        }

        .network-chip.active {
            background: var(--ink-deep);
            color: var(--bg-primary);
            border-color: var(--ink-deep);
        }

        @media (max-width: 768px) {
            .wallet-section {
                padding: 2rem 5vw;
            }

            .wallet-info-grid {
                grid-template-columns: 1fr;
            }

            .wallet-card {
                padding: 1.5rem;
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar__nav {
                display: none;
            }
            .navbar__menu-btn {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                width: 44px;
                height: 44px;
                gap: 6px;
                cursor: pointer;
                background: none;
                border: none;
                padding: 0;
            }
            .navbar__menu-line {
                width: 24px;
                height: 1px;
                background: var(--ink-light);
                transition: all 0.4s ease;
                transform-origin: center;
            }
            .navbar__mobile-menu {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(248, 246, 241, 0.98);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2rem;
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
                transition: opacity 0.8s ease, visibility 0.8s ease;
                z-index: 999;
            }
            .navbar__mobile-menu.is-open {
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }
            .navbar__mobile-menu .navbar__link {
                font-size: 1.5rem;
                font-weight: 300;
                color: var(--ink-medium);
                padding: 1rem 0;
                letter-spacing: 0.5em;
            }
            .navbar__mobile-menu .navbar__user {
                margin-top: 1rem;
                padding: 0.75rem 2rem;
                font-size: 0.9rem;
            }
            .navbar__brand {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
            }
            .profile-hero {
                padding: 15vh 5vw 8vh;
            }
            .profile-title {
                font-size: 2rem;
            }
            .tab-nav {
                gap: 0;
                margin: 0;
                border-bottom: none;
                background: var(--bg-secondary);
            }
            .tab-btn {
                flex: 1;
                padding: 1rem 0.5rem;
            }
            .tab-content {
                padding: 2rem 5vw;
            }
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.75rem;
            }
            .asset-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }
        @media (min-width: 769px) {
            .navbar__mobile-menu {
                display: none !important;
            }
            .navbar__menu-btn {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="navbar__brand">ECHO</a>
        <div class="navbar__nav">
            <a href="index.html" class="navbar__link">境</a>
            <a href="marketplace.html" class="navbar__link">集</a>
            <a href="docs.html" class="navbar__link">典</a>
        </div>
        <a href="profile.html" class="navbar__user">吾</a>
        
        <button class="navbar__menu-btn" id="menuBtn" type="button" aria-label="打开导航菜单" aria-expanded="false" aria-controls="mobileMenu">
            <span class="navbar__menu-line"></span>
            <span class="navbar__menu-line"></span>
            <span class="navbar__menu-line"></span>
        </button>
        
        <div class="navbar__mobile-menu" id="mobileMenu" aria-hidden="true">
            <a href="index.html" class="navbar__link">境</a>
            <a href="marketplace.html" class="navbar__link">集</a>
            <a href="docs.html" class="navbar__link">典</a>
            <a href="profile.html" class="navbar__user">吾</a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="profile-hero">
        <h1 class="profile-title">吾</h1>
        <p class="profile-subtitle">此间天地，皆是所缘</p>
    </header>

    <!-- 钱包信息卡片 -->
    <section class="wallet-section">
        <div class="wallet-card">
            <div class="wallet-card__header">
                <span class="wallet-card__title">链上之印</span>
                <div class="wallet-card__status">
                    <span class="wallet-card__status-dot"></span>
                    <span id="walletNetwork">Qitmeer Mainnet</span>
                </div>
            </div>
            
            <div class="wallet-info-grid">
                <div class="wallet-info-item full-width">
                    <span class="wallet-info-label">地址</span>
                    <span class="wallet-info-value address" id="walletAddress">0x...loading</span>
                </div>
                <div class="wallet-info-item">
                    <span class="wallet-info-label">余额</span>
                    <span class="wallet-info-value balance" id="walletBalance">-- MEER</span>
                </div>
                <div class="wallet-info-item">
                    <span class="wallet-info-label">验证状态</span>
                    <span class="wallet-info-value" id="verifyStatus">
                        <span style="color: #B89B6C;">◈ 未验证</span>
                    </span>
                </div>
            </div>

            <div class="wallet-actions">
                <button class="wallet-btn primary" id="verifyWalletBtn">签名验证</button>
                <button class="wallet-btn" data-action="refreshBalance">刷新余额</button>
                <a class="wallet-btn" id="walletExplorer" href="#" target="_blank" style="display: none;">链上查看 →</a>
                <button class="wallet-btn disconnect" data-action="disconnectWallet">断开连接</button>
            </div>

            <div class="network-selector">
                <span style="font-size: 0.7rem; color: var(--ink-light); margin-right: 0.5rem;">切换网络:</span>
                <span class="network-chip" onclick="EchoWallet.switchNetwork(1)">主网</span>
                <span class="network-chip" onclick="EchoWallet.switchNetwork(11155111)">Sepolia</span>
                <span class="network-chip" onclick="EchoWallet.switchNetwork(5)">Goerli</span>
            </div>
        </div>
    </section>

    <!-- Tab 导航 -->
    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="holdings">有</button>
        <button class="tab-btn" data-tab="created">创</button>
        <button class="tab-btn" data-tab="earnings">益</button>
    </nav>

    <!-- 有 - 持有资产 -->
    <section class="tab-content active" id="holdings">
        <div class="asset-grid">
            <div class="asset-card">
                <div class="asset-cover">音</div>
                <div class="asset-info">
                    <h3 class="asset-name">夏日微风</h3>
                    <div class="asset-meta">
                        <span class="asset-type asset-type--sound">音</span>
                        <span>2,880 ECHO</span>
                    </div>
                </div>
            </div>
            <div class="asset-card">
                <div class="asset-cover">色</div>
                <div class="asset-info">
                    <h3 class="asset-name">晨光初现</h3>
                    <div class="asset-meta">
                        <span class="asset-type asset-type--color">色</span>
                        <span>1,500 ECHO</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 创 - 创作资产 -->
    <section class="tab-content" id="created">
        <div class="asset-grid">
            <div class="asset-card">
                <div class="asset-cover">文</div>
                <div class="asset-info">
                    <h3 class="asset-name">山水之间</h3>
                    <div class="asset-meta">
                        <span class="asset-type asset-type--text">文</span>
                        <span>流转 12 次</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 益 - 收益统计 -->
    <section class="tab-content" id="earnings">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">12.5K</div>
                <div class="stat-label">总收益</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">28</div>
                <div class="stat-label">流转次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">6</div>
                <div class="stat-label">创作数</div>
            </div>
        </div>
        
        <div class="empty-state">
            <div class="empty-text">收益随流而长</div>
            <div class="empty-sub">每次流转，皆有增益</div>
        </div>
    </section>

    <!-- 浮动铸造按钮 -->
    <a href="creator.html" class="fab-create" title="铸">铸</a>
    <style>
        .fab-create {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            background: #A03020;
            color: #F8F6F1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'LXGW WenKai', cursive;
            font-size: 1.2rem;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(160, 48, 32, 0.3);
            transition: all 0.4s ease;
            z-index: 1000;
        }
        .fab-create:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(160, 48, 32, 0.4);
        }
        @media (max-width: 768px) {
            .fab-create {
                bottom: 1.5rem;
                right: 1.5rem;
                width: 48px;
                height: 48px;
                font-size: 1rem;
            }
        }
    </style>

    <script>
        // 导航栏滚动效果
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Tab 切换
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;

                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // 页面加载时检查钱包连接
        document.addEventListener('DOMContentLoaded', async () => {
            // 等待 walletManager 初始化
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // 绑定断开钱包按钮
            const disconnectBtn = document.querySelector('[data-action="disconnectWallet"]');
            if (disconnectBtn) {
                disconnectBtn.addEventListener('click', () => {
                    if (typeof walletManager !== 'undefined') {
                        walletManager.disconnect();
                        window.location.href = 'login.html';
                    }
                });
            }
            
            // 绑定签名验证按钮
            const verifyBtn = document.getElementById('verifyWalletBtn');
            if (verifyBtn) {
                verifyBtn.addEventListener('click', async () => {
                    if (typeof walletManager !== 'undefined' && walletManager.isConnected) {
                        try {
                            const message = '验证 ECHO 身份 - ' + new Date().toISOString();
                            const signature = await walletManager.signer.signMessage(message);
                            
                            // 更新验证状态显示
                            const verifyStatus = document.getElementById('verifyStatus');
                            if (verifyStatus) {
                                verifyStatus.innerHTML = '<span style="color: #2d5a27;">✓ 已验证</span>';
                            }
                            
                            // 保存验证状态到本地存储
                            localStorage.setItem('echo_verified', 'true');
                            localStorage.setItem('echo_verify_time', new Date().toISOString());
                            
                            alert('签名成功！身份已验证');
                        } catch (error) {
                            console.error('签名失败:', error);
                            alert('签名失败: ' + error.message);
                        }
                    } else {
                        alert('请先连接钱包');
                    }
                });
            }
            
            // 检查本地存储的验证状态
            if (localStorage.getItem('echo_verified') === 'true') {
                const verifyStatus = document.getElementById('verifyStatus');
                if (verifyStatus) {
                    verifyStatus.innerHTML = '<span style="color: #2d5a27;">✓ 已验证</span>';
                }
            }
            
            // 更新钱包信息显示
            function updateWalletInfo() {
                if (typeof walletManager !== 'undefined' && walletManager.isConnected) {
                    // 更新地址
                    const addressEl = document.getElementById('walletAddress');
                    if (addressEl) {
                        addressEl.textContent = walletManager.address || '0x...';
                    }
                    // 更新余额
                    const balanceEl = document.getElementById('walletBalance');
                    if (balanceEl && walletManager.balance) {
                        balanceEl.textContent = parseFloat(walletManager.balance).toFixed(4) + ' MEER';
                    }
                }
            }
            
            // 初始更新
            updateWalletInfo();
            
            // 每秒检查更新余额
            setInterval(updateWalletInfo, 2000);
            
            // 检查是否已连接
            if (typeof walletManager === 'undefined' || !walletManager.isConnected) {
                window.location.href = 'login.html';
            }
        });
    </script>
    
    <!-- 钱包状态管理 -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="../scripts/wallet.js"></script>
    <!-- 移动端导航 -->
    <script src="../js/mobile-nav.js"></script>
</body>
