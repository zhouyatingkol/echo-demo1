<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集 - ECHO</title>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ===== 色彩系统 ===== */
        :root {
            --bg-primary: #F8F6F1;
            --bg-secondary: #F2EFE8;
            --bg-tertiary: #EBE7DD;
            --ink-deep: #1A1A1A;
            --ink-medium: #4A4A4A;
            --ink-light: #7A6E5F;
            --ink-faint: #B5B5B5;
            --gold-primary: #B89B6C;
            --gold-light: #D4C4A8;
            --vermilion: #A03020;
            --vermilion-light: rgba(160, 48, 32, 0.4);

            /* 三域色 */
            --realm-sound: #8B9DC3;
            --realm-color: #C9A9A6;
            --realm-text: #7A8B7C;

            /* 字体 */
            --font-display: 'LXGW WenKai', cursive;
            --font-serif: 'Noto Serif SC', serif;

            /* 时长 */
            --duration-slow: 1.2s;
            --duration-ambient: 12s;

            /* 缓动 */
            --ease-ink: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ease-breath: cubic-bezier(0.45, 0, 0.55, 1);

            /* 过渡 - 保留作为别名 */
            --transition-medium: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 20px;
        }

        body {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            background: var(--bg-primary);
            color: var(--ink-deep);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(24px, 5vw, 80px);
            background: transparent;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.8s ease,
                        backdrop-filter 0.8s ease;
        }

        .navbar.is-scrolled {
            background: rgba(248, 246, 241, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 1px 0 rgba(122, 110, 95, 0.06);
        }

        .navbar__brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            flex-shrink: 0;
        }

        .navbar__logo {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--ink-deep);
            letter-spacing: 0.3em;
            text-decoration: none;
            opacity: 0.85;
            transition: opacity 0.4s ease;
        }

        .navbar__brand:hover .navbar__logo {
            opacity: 1;
        }

        .navbar__nav {
            display: flex;
            align-items: center;
            gap: 3rem;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .navbar__link {
            position: relative;
            font-family: var(--font-serif);
            font-size: 1rem;
            font-weight: 400;
            color: var(--ink-light);
            text-decoration: none;
            letter-spacing: 0.3em;
            padding: 0.5rem 0;
            transition: color 0.4s ease;
        }

        .navbar__link:hover,
        .navbar__link.active {
            color: var(--ink-deep);
        }

        .navbar__link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0.5px;
            background: var(--gold-primary);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar__link:hover::after {
            width: 100%;
        }

        .navbar__actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-shrink: 0;
        }

        .navbar__user {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            border-radius: 2px;
            border: 0.5px solid rgba(122, 110, 95, 0.15);
            background: transparent;
            font-family: var(--font-serif);
            font-size: 0.8rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .navbar__user:hover {
            border-color: var(--vermilion);
            color: var(--vermilion);
            background: rgba(160, 48, 32, 0.05);
        }

        .navbar__menu-btn {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .navbar__menu-line {
            width: 24px;
            height: 1px;
            background: var(--ink-light);
            transition: all 0.4s ease;
            transform-origin: center;
        }

        .navbar__mobile-menu {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(253, 252, 250, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .navbar__mobile-menu.is-open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .navbar__mobile-menu .navbar__link {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--ink-light);
            padding: 1rem 0;
            letter-spacing: 0.5em;
        }

        .navbar__mobile-menu .navbar__link:hover {
            color: var(--ink-deep);
        }

        .navbar__mobile-menu .navbar__link::after {
            display: none;
        }

        /* 全页纹理背景 */
        .page-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
        }

        /* ===== Hero 区域 ===== */
        .hero {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 140px 10vw 6vh;
            text-align: center;
            overflow: hidden;
        }

        /* 宣纸纹理 */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
        }

        /* 窗棂光晕 */
        .hero::after {
            content: '';
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(ellipse at center, 
                rgba(232, 228, 220, 0.6) 0%, 
                transparent 70%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 1;
            top: -20%;
            right: -10%;
            animation: lightBreath 12s ease-in-out infinite;
        }

        @keyframes lightBreath {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            color: var(--ink-deep);
            margin-bottom: 16px;
            position: relative;
            z-index: 2;
        }

        .hero-subtitle {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            margin-top: 2.5rem;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        .hero-create-btn {
            padding: 12px 40px;
            background: var(--vermilion);
            color: var(--bg-primary);
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1rem;
            letter-spacing: 0.3em;
            text-indent: 0.3em;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        .hero-create-btn:hover {
            background: #8B2419;
            transform: translateY(-2px);
        }

        /* ===== 境界分隔 ===== */
        .realm-divider {
            height: 0.5px;
            background: var(--gold-light);
            margin: 0 auto;
            max-width: 200px;
        }

        /* ===== 第一境：遇 ===== */
        .realm-yu {
            padding: 80px 40px 120px;
        }

        .yu-header {
            max-width: 800px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .yu-quote {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: var(--ink-light);
            letter-spacing: 0.1em;
        }

        .yu-filter {
            padding: 8px 16px;
            border: 0.5px solid var(--gold-light);
            background: transparent;
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.85rem;
            color: var(--ink-light);
            letter-spacing: 0.1em;
            cursor: pointer;
            outline: none;
            transition: border-color 0.4s ease;
        }

        .yu-filter:hover {
            border-color: var(--gold-primary);
        }

        /* 方案 C：遇章节 - 简洁标记 */
        .yu-header-compact {
            max-width: 800px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .yu-quote {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: var(--ink-faint);
            letter-spacing: 0.15em;
        }

        .yu-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .yu-create-btn {
            padding: 6px 16px;
            background: var(--vermilion);
            color: var(--bg-primary);
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .yu-create-btn:hover {
            background: #8B2419;
        }

        .yu-filter {
            padding: 6px 12px;
            border: 0.5px solid var(--gold-light);
            background: transparent;
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.8rem;
            color: var(--ink-light);
            letter-spacing: 0.1em;
            cursor: pointer;
            outline: none;
            transition: border-color 0.4s ease;
        }

        .yu-filter:hover {
            border-color: var(--gold-primary);
        }

        .search-box-wrapper {
            max-width: 520px;
            margin: 0 auto 60px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .random-btn {
            padding: 14px 20px;
            border: 0.5px solid var(--gold-light);
            background: transparent;
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 0.9rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .random-btn:hover {
            border-color: var(--vermilion);
            color: var(--vermilion);
        }

        /* 保留 realm-header 样式用于寻和观 */
        .realm-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .realm-title {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 2rem;
            letter-spacing: 0.3em;
            color: var(--ink-deep);
            margin-bottom: 12px;
        }

        .realm-quote {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: var(--ink-light);
            letter-spacing: 0.1em;
        }

        /* 搜索框 */
        .search-box {
            max-width: 420px;
            margin: 0 auto 60px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 24px 14px 48px;
            border: 0.5px solid var(--gold-light);
            border-radius: 2px;
            background: transparent;
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.95rem;
            color: var(--ink-deep);
            letter-spacing: 0.08em;
            outline: none;
            transition: border-color 0.4s ease;
        }

        .search-input:focus {
            border-color: var(--vermilion);
        }

        .search-input::placeholder {
            color: var(--ink-faint);
        }

        .search-icon {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            color: var(--ink-faint);
        }

        /* 卡片网格 */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .asset-card {
            background: var(--bg-secondary);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 0.5px solid transparent;
        }

        .asset-card:hover {
            transform: rotate(0deg) translateY(-4px);
            border: 0.5px solid var(--gold-primary);
        }

        .asset-card:nth-child(odd) {
            transform: rotate(-1deg);
        }

        .asset-card:nth-child(even) {
            transform: rotate(1deg);
        }

        .asset-image {
            aspect-ratio: 4/3;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 3rem;
            color: var(--ink-faint);
        }

        .asset-info {
            padding: 24px;
        }

        .asset-title {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1.1rem;
            color: var(--ink-deep);
            margin-bottom: 8px;
        }

        .asset-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--ink-light);
        }

        .realm-tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 2px;
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 0.75rem;
            color: white;
            letter-spacing: 0.05em;
        }

        .realm-tag.sound {
            background: var(--realm-sound);
        }

        .realm-tag.color {
            background: var(--realm-color);
        }

        .realm-tag.text {
            background: var(--realm-text);
        }

        /* ===== 第二境：寻 ===== */
        .realm-xun {
            padding: 120px 40px;
        }

        .realm-categories {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .realm-category {
            aspect-ratio: 1;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .realm-category.sound {
            background-color: var(--realm-sound);
        }

        .realm-category.color {
            background-color: var(--realm-color);
        }

        .realm-category.text {
            background-color: var(--realm-text);
        }

        .realm-category.sound:hover,
        .realm-category.color:hover,
        .realm-category.text:hover {
            transform: translateY(-4px);
            filter: brightness(1.05);
        }

        .realm-category .enter-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .realm-category:hover .enter-hint {
            opacity: 1;
            transform: translateY(0);
        }

        .realm-category:hover .icon,
        .realm-category:hover .name,
        .realm-category:hover .desc {
            transform: translateY(-8px);
            transition: transform 0.3s ease;
        }

        .realm-category .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.9);
        }

        .realm-category .name {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1.5rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.95);
        }

        .realm-category .desc {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 8px;
        }

        /* ===== 第三境：观 ===== */
        .realm-guan {
            padding: 120px 40px;
            min-height: 100vh;
        }

        .chart-tabs {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-bottom: 60px;
        }

        .chart-tab {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1rem;
            color: var(--ink-light);
            background: transparent;
            border: none;
            cursor: pointer;
            letter-spacing: 0.2em;
            padding: 8px 0;
            position: relative;
            transition: color 0.4s ease;
        }

        .chart-tab:hover,
        .chart-tab.active {
            color: var(--vermilion);
        }

        .chart-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--vermilion);
        }

        /* 风云图 - SVG 气泡图 */
        .cloud-chart {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cloud-chart svg {
            width: 100%;
            height: 100%;
        }

        .cloud-bubble {
            cursor: pointer;
            transition: all 0.4s ease;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
        }

        .cloud-bubble:hover {
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.15));
            transform: scale(1.05);
        }

        .cloud-bubble circle {
            transition: all 0.4s ease;
        }

        .cloud-bubble-text {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1.2rem;
            fill: white;
            letter-spacing: 0.2em;
            pointer-events: none;
        }

        .cloud-bubble-heat {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.8rem;
            fill: rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }

        .bubble-tooltip {
            position: absolute;
            background: var(--bg-secondary);
            border: 0.5px solid var(--gold-light);
            padding: 16px 20px;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
            min-width: 180px;
        }

        .bubble-tooltip.visible {
            opacity: 1;
            visibility: visible;
        }

        .bubble-tooltip-title {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1rem;
            color: var(--ink-deep);
            margin-bottom: 8px;
        }

        .bubble-tooltip-stat {
            font-size: 0.85rem;
            color: var(--ink-light);
            margin-bottom: 4px;
        }

        /* 响应式隐藏 */
        @media (max-width: 768px) {
            .navbar__nav {
                display: none;
            }
            .navbar__actions {
                display: none;
            }
            .navbar__menu-btn {
                display: flex;
            }
            .navbar__brand {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
            }

            .realm-categories {
                grid-template-columns: 1fr;
            }

            .asset-grid {
                grid-template-columns: 1fr;
            }

            .search-box-wrapper {
                flex-direction: column;
                padding: 0 24px;
            }

            .random-btn {
                width: 100%;
            }
        }

        @media (min-width: 769px) {
            .navbar__mobile-menu {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- 全页纹理背景 -->
    <div class="page-texture"></div>
    
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="navbar__brand" aria-label="返回首页">
            <span class="navbar__logo">ECHO</span>
        </a>
        <div class="navbar__nav">
            <a href="index.html" class="navbar__link">境</a>
            <a href="marketplace.html" class="navbar__link active">集</a>
            <a href="docs.html" class="navbar__link">典</a>
        </div>
        <div class="navbar__actions">
            <button class="navbar__user" id="walletConnect" type="button" aria-label="连接钱包">
                <span>入链</span>
            </button>
        </div>
        <button class="navbar__menu-btn" id="menuBtn" type="button" aria-label="打开导航菜单" aria-expanded="false" aria-controls="mobileMenu">
            <span class="navbar__menu-line"></span>
            <span class="navbar__menu-line"></span>
            <span class="navbar__menu-line"></span>
        </button>
        <div class="navbar__mobile-menu" id="mobileMenu" aria-hidden="true">
            <a href="index.html" class="navbar__link">境</a>
            <a href="marketplace.html" class="navbar__link">集</a>
            <a href="docs.html" class="navbar__link">典</a>
            <button class="navbar__user" id="mobileWalletConnect" type="button">
                <span>入链</span>
            </button>
        </div>
    </nav>

    <main>
    <!-- Hero -->
    <section class="hero">
        <h1 class="hero-title">集</h1>
        <p class="hero-subtitle">随缘而聚，各得其所</p>
    </section>

    <!-- 第一境：遇 -->
    <section class="realm-yu" style="padding-top: 60px;">
        <div class="realm-divider" style="margin-bottom: 32px;"></div>
        
        <div class="yu-header-compact">
            <span class="yu-quote">随缘而遇，不期而会</span>
            <div class="yu-actions">
                <a href="creator.html" class="yu-create-btn">吾作</a>
                <select class="yu-filter">
                    <option value="">价 ▼</option>
                    <option value="0-50">0 - 50</option>
                    <option value="50-100">50 - 100</option>
                    <option value="100-500">100 - 500</option>
                    <option value="500+">500+</option>
                </select>
            </div>
        </div>
        
        <div class="search-box-wrapper">
            <div class="search-box">
                <span class="search-icon">寻</span>
                <input type="text" class="search-input" placeholder="寻觅..." />
            </div>
            <button class="random-btn" onclick="randomAsset()">随机</button>
        </div>

        <div class="asset-grid" id="yuGrid">
            <!-- 卡片由 JS 生成 -->
        </div>
    </section>

    <!-- 第二境：寻 -->
    <section class="realm-xun">
        <div class="realm-divider"></div>

        <div class="realm-header">
            <h2 class="realm-title">寻</h2>
            <p class="realm-quote">按域而寻，各入其门</p>
        </div>

        <div class="realm-categories">
            <div class="realm-category sound" onclick="enterRealm('sound')" style="position: relative;">
                <div class="icon">♪</div>
                <div class="name">音</div>
                <div class="desc">声之境</div>
                <div class="enter-hint">进入此境 →</div>
            </div>
            <div class="realm-category color" onclick="enterRealm('color')" style="position: relative;">
                <div class="icon">◈</div>
                <div class="name">色</div>
                <div class="desc">色之境</div>
                <div class="enter-hint">进入此境 →</div>
            </div>
            <div class="realm-category text" onclick="enterRealm('text')" style="position: relative;">
                <div class="icon">✦</div>
                <div class="name">文</div>
                <div class="desc">文之境</div>
                <div class="enter-hint">进入此境 →</div>
            </div>
        </div>
    </section>

    <!-- 第三境：观 -->
    <section class="realm-guan">
        <div class="realm-divider"></div>

        <div class="realm-header">
            <h2 class="realm-title">观</h2>
            <p class="realm-quote">声至名归，于此显</p>
        </div>

        <div class="chart-tabs">
            <button class="chart-tab active" onclick="switchChart('sound')">音观</button>
            <button class="chart-tab" onclick="switchChart('color')">色观</button>
            <button class="chart-tab" onclick="switchChart('text')">文观</button>
            <button class="chart-tab" onclick="switchChart('all')">总观</button>
        </div>

        <div class="cloud-chart" id="cloudChart">
            <svg viewBox="0 0 600 400">
                <!-- 气泡由 JS 生成 -->
            </svg>
            <div class="bubble-tooltip" id="bubbleTooltip">
                <div class="bubble-tooltip-title" id="tooltipTitle"></div>
                <div class="bubble-tooltip-stat" id="tooltipVolume"></div>
                <div class="bubble-tooltip-stat" id="tooltipHeat"></div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="../scripts/wallet.js"></script>
    <script>
        // 导航栏滚动效果
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('is-scrolled');
            } else {
                navbar.classList.remove('is-scrolled');
            }
        });

        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                const isExpanded = menuBtn.getAttribute('aria-expanded') === 'true';
                menuBtn.setAttribute('aria-expanded', !isExpanded);
                mobileMenu.classList.toggle('is-open');
            });
        }

        // 生成遇境卡片
        function generateYuCards() {
            const grid = document.getElementById('yuGrid');
            const realms = ['音', '色', '文'];
            const realmClasses = ['sound', 'color', 'text'];
            const titles = ['夏日微风', '晨光初现', '山水之间', '月夜清音', '墨染流年', '云淡风轻'];

            for (let i = 0; i < 6; i++) {
                const realm = realms[i % 3];
                const realmClass = realmClasses[i % 3];
                const title = titles[i];
                const price = (Math.random() * 1000 + 100).toFixed(0);

                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div class="asset-image">${realm}</div>
                    <div class="asset-info">
                        <div class="asset-title">${title}</div>
                        <div class="asset-meta">
                            <span class="realm-tag ${realmClass}">${realm}</span>
                            <span>${price} ECHO</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        // 生成风云图气泡
        function generateChartData(type) {
            const svg = document.querySelector('#cloudChart svg');
            const tooltip = document.getElementById('bubbleTooltip');
            const tooltipTitle = document.getElementById('tooltipTitle');
            const tooltipVolume = document.getElementById('tooltipVolume');
            const tooltipHeat = document.getElementById('tooltipHeat');
            
            // 清空现有气泡
            svg.innerHTML = '';
            
            // 三域配置
            const realms = {
                sound: { name: '音境', color: '#8B9DC3', cx: 150, cy: 200 },
                color: { name: '色境', color: '#C9A9A6', cx: 300, cy: 150 },
                text: { name: '文境', color: '#7A8B7C', cx: 450, cy: 200 }
            };
            
            // 生成随机热度数据
            const heatData = {};
            Object.keys(realms).forEach(key => {
                heatData[key] = Math.floor(Math.random() * 3000 + 2000);
            });
            
            // 如果是总观，显示所有三域
            const realmsToShow = type === 'all' ? Object.keys(realms) : [type];
            
            realmsToShow.forEach((realmKey, index) => {
                const realm = realms[realmKey];
                const heat = heatData[realmKey];
                const volume = (Math.random() * 50 + 20).toFixed(1);
                
                // 根据热度计算圆圈大小 (60-120)
                const radius = 60 + (heat / 5000) * 60;
                
                // 总观模式下调整位置
                let cx = realm.cx;
                let cy = realm.cy;
                if (type === 'all') {
                    const positions = [
                        { cx: 150, cy: 200 },
                        { cx: 300, cy: 200 },
                        { cx: 450, cy: 200 }
                    ];
                    cx = positions[index].cx;
                    cy = positions[index].cy;
                }
                
                // 创建气泡组
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'cloud-bubble');
                g.setAttribute('data-realm', realmKey);
                g.setAttribute('data-name', realm.name);
                g.setAttribute('data-volume', volume);
                g.setAttribute('data-heat', heat);
                
                // 创建圆圈
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', cx);
                circle.setAttribute('cy', cy);
                circle.setAttribute('r', radius);
                circle.setAttribute('fill', realm.color);
                circle.setAttribute('opacity', '0.9');
                
                // 创建文字
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', cx);
                text.setAttribute('y', cy - 5);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('class', 'cloud-bubble-text');
                text.textContent = realm.name.charAt(0);
                
                // 创建热度文字
                const heatText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                heatText.setAttribute('x', cx);
                heatText.setAttribute('y', cy + 20);
                heatText.setAttribute('text-anchor', 'middle');
                heatText.setAttribute('class', 'cloud-bubble-heat');
                heatText.textContent = heat.toLocaleString();
                
                g.appendChild(circle);
                g.appendChild(text);
                g.appendChild(heatText);
                
                // 添加悬浮事件
                g.addEventListener('mouseenter', (e) => {
                    tooltipTitle.textContent = realm.name;
                    tooltipVolume.textContent = `流转: ${volume}K`;
                    tooltipHeat.textContent = `热度: ${heat.toLocaleString()}`;
                    
                    const rect = svg.getBoundingClientRect();
                    tooltip.style.left = (cx + rect.left - 90) + 'px';
                    tooltip.style.top = (cy + rect.top - radius - 80) + 'px';
                    tooltip.classList.add('visible');
                });
                
                g.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                });
                
                g.addEventListener('click', () => {
                    enterRealm(realmKey);
                });
                
                svg.appendChild(g);
            });
        }

        // 进入域
        function enterRealm(realm) {
            console.log('进入' + realm + '之境');
            // 可跳转到对应域的浏览页面
        }

        // 切换榜单
        function switchChart(type) {
            document.querySelectorAll('.chart-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            generateChartData(type);
        }

        // 随机跳转
        function randomAsset() {
            const cards = document.querySelectorAll('.asset-card');
            if (cards.length > 0) {
                const randomIndex = Math.floor(Math.random() * cards.length);
                cards[randomIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                cards[randomIndex].style.animation = 'pulse 0.6s ease';
                setTimeout(() => {
                    cards[randomIndex].style.animation = '';
                }, 600);
            }
        }

        // 添加 pulse 动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { box-shadow: 0 0 0 0 rgba(160, 48, 32, 0.4); }
                50% { box-shadow: 0 0 0 10px rgba(160, 48, 32, 0); }
            }
        `;
        document.head.appendChild(style);

        // 初始化
        generateYuCards();
        generateChartData('sound');
    </script>
</main>
</body>
</html>
