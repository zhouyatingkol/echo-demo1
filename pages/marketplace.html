<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集 - ECHO</title>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ===== 色彩系统 - 侘寂调色 ===== */
        :root {
            --bg-primary: #F5F2EA;
            --bg-secondary: #EDE9DE;
            --bg-tertiary: #E5E1D4;
            --ink-deep: #2A2825;
            --ink-medium: #4A4742;
            --ink-light: #7A756D;
            --ink-faint: #B5B0A8;
            --gold-primary: #A68B5B;
            --gold-light: #C9B896;
            --vermilion: #8B2820;
            --vermilion-light: rgba(139, 40, 32, 0.4);

            /* 三域色 */
            --realm-sound: #8B9DC3;
            --realm-color: #C9A9A6;
            --realm-text: #7A8B7C;

            /* 字体 */
            --font-display: 'LXGW WenKai', cursive;
            --font-serif: 'Noto Serif SC', serif;

            /* 时长 */
            --duration-slow: 1.2s;
            --duration-ambient: 12s;

            /* 缓动 */
            --ease-ink: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ease-breath: cubic-bezier(0.45, 0, 0.55, 1);

            /* 过渡 - 保留作为别名 */
            --transition-medium: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 20px;
        }

        body {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            background: var(--bg-primary);
            color: var(--ink-deep);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(24px, 5vw, 80px);
            background: transparent;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.8s ease,
                        backdrop-filter 0.8s ease;
        }

        .navbar.is-scrolled {
            background: rgba(248, 246, 241, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 1px 0 rgba(122, 110, 95, 0.06);
        }

        .navbar__brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            flex-shrink: 0;
        }

        .navbar__logo {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--ink-deep);
            letter-spacing: 0.3em;
            text-decoration: none;
            opacity: 0.85;
            transition: opacity 0.4s ease;
        }

        .navbar__brand:hover .navbar__logo {
            opacity: 1;
        }

        .navbar__nav {
            display: flex;
            align-items: center;
            gap: 3rem;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .navbar__link {
            position: relative;
            font-family: var(--font-serif);
            font-size: 1rem;
            font-weight: 400;
            color: var(--ink-light);
            text-decoration: none;
            letter-spacing: 0.3em;
            padding: 0.5rem 0;
            transition: color 0.4s ease;
        }

        .navbar__link:hover,
        .navbar__link.active {
            color: var(--ink-deep);
        }

        .navbar__link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0.5px;
            background: var(--gold-primary);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar__link:hover::after {
            width: 100%;
        }

        .navbar__actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-shrink: 0;
        }

        .navbar__user {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            border-radius: 2px;
            border: 0.5px solid rgba(122, 110, 95, 0.15);
            background: transparent;
            font-family: var(--font-serif);
            font-size: 0.8rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .navbar__user:hover {
            border-color: var(--vermilion);
            color: var(--vermilion);
            background: rgba(160, 48, 32, 0.05);
        }

        .navbar__menu-btn {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .navbar__menu-line {
            width: 24px;
            height: 1px;
            background: var(--ink-light);
            transition: all 0.4s ease;
            transform-origin: center;
        }

        .navbar__mobile-menu {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(253, 252, 250, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .navbar__mobile-menu.is-open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .navbar__mobile-menu .navbar__link {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--ink-light);
            padding: 1rem 0;
            letter-spacing: 0.5em;
        }

        .navbar__mobile-menu .navbar__link:hover {
            color: var(--ink-deep);
        }

        .navbar__mobile-menu .navbar__link::after {
            display: none;
        }

        /* 全页纹理背景 */
        .page-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
        }

        /* ===== Hero 区域 ===== */
        .hero {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 140px 10vw 8vh;
            text-align: center;
            overflow: hidden;
        }

        /* 宣纸纹理 */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
        }

        /* 窗棂光晕 */
        .hero::after {
            content: '';
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(ellipse at center, 
                rgba(232, 228, 220, 0.6) 0%, 
                transparent 70%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 1;
            top: -20%;
            right: -10%;
            animation: lightBreath 12s ease-in-out infinite;
        }

        @keyframes lightBreath {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 0.5em;
            color: var(--ink-deep);
            margin-bottom: 1.2rem;
            position: relative;
            z-index: 2;
        }

        .hero-subtitle {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 1.1rem;
            color: var(--ink-medium);
            letter-spacing: 0.2em;
            margin-top: 0;
            margin-bottom: 3rem;
            position: relative;
            z-index: 2;
        }

        .hero-create-btn {
            padding: 12px 40px;
            background: var(--vermilion);
            color: var(--bg-primary);
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1rem;
            letter-spacing: 0.3em;
            text-indent: 0.3em;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        .hero-create-btn:hover {
            background: #8B2419;
            transform: translateY(-2px);
        }

        /* ===== 境界分隔 - 飞白效果 ===== */
        .realm-divider {
            height: 1px;
            margin: 0 auto;
            max-width: 300px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                var(--gold-light) 10%, 
                var(--gold-light) 20%, 
                transparent 25%, 
                transparent 40%,
                var(--gold-light) 45%,
                var(--gold-light) 60%,
                transparent 65%,
                transparent 80%,
                var(--gold-light) 85%,
                var(--gold-light) 95%,
                transparent 100%
            );
            opacity: 0.6;
        }

        /* ===== 第一境：遇 ===== */
        .realm-yu {
            padding: 60px 40px 4vh;
        }

        .yu-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .yu-quote {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.95rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
        }

            border-color: var(--gold-primary);

        .arch-item:hover .arch-shape::before,
        .arch-item.active .arch-shape::before {
            opacity: 1;
            color: var(--gold-primary);

        .arch-item:hover .arch-name,
        .arch-item.active .arch-name {
            color: var(--ink-deep);
        }

        .arch-item.active .arch-shape {
            background: linear-gradient(180deg, rgba(166, 139, 91, 0.05) 0%, transparent 100%);
        }

        .search-box-wrapper {
            max-width: 520px;
            margin: 0 auto 60px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-box {

            align-items: center;
            border-bottom: 0.5px solid rgba(166, 139, 91, 0.15);
            padding: 12px 0;

        }

        .search-box:focus-within {
            border-bottom-color: var(--gold-light);
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 1rem;
            color: var(--ink-deep);
            letter-spacing: 0.1em;
            padding-left: 32px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--ink-faint);
        }

        .search-icon {
            position: absolute;
            left: 0;
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            color: var(--ink-faint);
            font-size: 1.1rem;
        }

        .random-btn {
            padding: 14px 20px;
            border: 0.5px solid var(--gold-light);
            background: transparent;
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 0.9rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .random-btn:hover {
            border-color: var(--vermilion);
            color: var(--vermilion);
        }

        /* ===== 方案H：无主之境（定稿） ===== */
        .view-mode-daily {
            padding: 60px 40px;
        }

        .daily-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .daily-date {
            font-size: 0.75rem;
            color: var(--ink-faint);
            letter-spacing: 0.2em;
            margin-bottom: 12px;
        }

        .daily-quote {
            font-size: 1rem;
            color: var(--ink-light);
            letter-spacing: 0.2em;
            margin-bottom: 24px;
            font-family: var(--font-display), 'LXGW WenKai', cursive;
        }

        .daily-refresh-btn {
            padding: 12px 32px;
            border: 0.5px solid var(--gold-light);
            background: transparent;
            color: var(--ink-light);
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.4s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .daily-refresh-btn:hover {
            border-color: var(--gold-primary);
            color: var(--ink-deep);
            background: rgba(166, 139, 91, 0.05);
        }

        .daily-refresh-btn span {
            font-size: 1rem;
        }

        .daily-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 720px;
            margin: 0 auto;
        }

        .daily-card {
            background: var(--bg-secondary);
            border: 0.5px solid rgba(166, 139, 91, 0.3);
            padding: 32px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .daily-card:hover {
            border-color: var(--gold-light);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        .daily-card-realm {
            font-size: 0.7rem;
            color: var(--ink-faint);
            letter-spacing: 0.25em;
            margin-bottom: 16px;
        }

        .daily-card-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            opacity: 0.85;
        }

        .daily-card-icon.sound { background: #8B9DC3; }
        .daily-card-icon.color { background: #C9A9A6; }
        .daily-card-icon.text { background: #7A8B7C; }

        .daily-card-name {
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
            color: var(--ink-deep);

        .daily-card-desc {

        .daily-card-price {

        /* ===== 境界高亮字（朱红印章感） ===== */
        .realm-highlight {
            color: #B85C4F;

        .realm-highlight::after {

            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 0.75rem;
            color: white;
            letter-spacing: 0.05em;
        }

        .realm-tag.sound {
            background: var(--realm-sound);
        }

        .realm-tag.color {
            background: var(--realm-color);
        }

        .realm-tag.text {
            background: var(--realm-text);
        }

        /* ===== 第二境：寻 ===== */
        .realm-xun {
            padding: 4vh 40px;
        }

        .realm-categories {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 48px;
            max-width: 900px;
            margin: 0 auto;
        }

        .realm-category {
            aspect-ratio: 1;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #E8E4D8 50%, var(--bg-secondary) 100%);
            border: 0.5px solid rgba(166, 139, 91, 0.2);
            box-shadow: 
                inset 0 1px 0 rgba(255,255,255,0.5),
                0 2px 12px rgba(0, 0, 0, 0.03);
            position: relative;
            overflow: hidden;
            min-height: 220px;
        }

        .realm-category::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .realm-category.sound:hover::before {
            background: radial-gradient(circle at center, var(--realm-sound) 0%, transparent 70%);
            opacity: 0.08;
        }

        .realm-category.color:hover::before {
            background: radial-gradient(circle at center, var(--realm-color) 0%, transparent 70%);
            opacity: 0.08;
        }

        .realm-category.text:hover::before {
            background: radial-gradient(circle at center, var(--realm-text) 0%, transparent 70%);
            opacity: 0.08;
        }

        .realm-category:hover {
            border-color: var(--gold-light);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            transform: translateY(-4px);
        }

        .realm-category.sound:hover {
            border-color: var(--realm-sound);
            box-shadow: 0 8px 32px rgba(139, 157, 195, 0.12);
        }

        .realm-category.color:hover {
            border-color: var(--realm-color);
            box-shadow: 0 8px 32px rgba(201, 169, 166, 0.12);
        }

        .realm-category.text:hover {
            border-color: var(--realm-text);
            box-shadow: 0 8px 32px rgba(122, 139, 124, 0.12);
        }

        .realm-category .enter-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            color: var(--ink-faint);
            letter-spacing: 0.1em;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .realm-category:hover .enter-hint {
            opacity: 1;
        }

        .realm-category .icon {
            width: 72px;
            height: 72px;
            margin-bottom: 20px;
            color: var(--ink-light);
            transition: color 0.4s ease, transform 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .realm-category .icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .realm-category.sound:hover .icon {
            color: var(--realm-sound);
            transform: scale(1.1);
        }

        .realm-category.color:hover .icon {
            color: var(--realm-color);
            transform: scale(1.1);
        }

        .realm-category.text:hover .icon {
            color: var(--realm-text);
            transform: scale(1.1);
        }

        .realm-category.text:hover .icon {
            color: var(--realm-text);
        }

        .realm-category .name {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 2.2rem;
            letter-spacing: 0.3em;
            text-indent: 0.3em;
            color: var(--ink-deep);
            margin-top: 8px;
        }

        .realm-category .enter-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            color: var(--ink-faint);
            letter-spacing: 0.1em;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .realm-category:hover .enter-hint {
            opacity: 1;
            transform: translateY(0);
        }

        .realm-category:hover .name {
            transform: translateY(-8px);
            transition: transform 0.3s ease;
        }
            font-size: 1.5rem;
            letter-spacing: 0.2em;
            color: var(--ink-deep);
        }

        .realm-category .desc {
            font-size: 0.85rem;
            color: var(--ink-light);
            letter-spacing: 0.1em;
            margin-top: 8px;
        }

        /* 悬停时图标变色 */
        .realm-category.sound:hover .icon { color: var(--realm-sound); }
        .realm-category.color:hover .icon { color: var(--realm-color); }
        .realm-category.text:hover .icon { color: var(--realm-text); }

        /* ===== 第三境：观 ===== */
        .realm-guan {
            padding: 4vh 40px 120px;
            min-height: 100vh;
        }

        .chart-tabs {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-bottom: 60px;
        }

        .chart-tab {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1rem;
            color: var(--ink-light);
            background: transparent;
            border: none;
            cursor: pointer;
            letter-spacing: 0.2em;
            padding: 8px 0;
            position: relative;
            transition: color 0.4s ease;
        }

        .chart-tab:hover,
        .chart-tab.active {
            color: var(--ink-deep);
        }

        .chart-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 0.5px;
            background: var(--gold-primary);
        }

        /* 风云图 - 水墨气泡 */
        .cloud-chart {
            max-width: 700px;
            margin: 0 auto 40px;
            position: relative;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(42, 40, 37, 0.04) 0%, transparent 70%);
        }

        .cloud-chart svg {
            width: 100%;
            height: 100%;
        }

        .cloud-bubble {
            cursor: pointer;
            transition: all 0.4s ease;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
        }

        .cloud-bubble:hover {
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.15));
            transform: scale(1.05);
        }

        .cloud-bubble circle {
            transition: all 0.4s ease;
        }

        .cloud-bubble-text {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1.2rem;
            fill: white;
            letter-spacing: 0.2em;
            pointer-events: none;
        }

        .cloud-bubble-heat {
            font-family: var(--font-serif), 'Noto Serif SC', serif;
            font-size: 0.8rem;
            fill: rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }

        .bubble-tooltip {
            position: absolute;
            background: var(--bg-secondary);
            border: 0.5px solid var(--gold-light);
            padding: 16px 20px;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
            min-width: 180px;
        }

        .bubble-tooltip.visible {
            opacity: 1;
            visibility: visible;
        }

        .bubble-tooltip-title {
            font-family: var(--font-display), 'LXGW WenKai', cursive;
            font-size: 1rem;
            color: var(--ink-deep);
            margin-bottom: 8px;
        }

        .bubble-tooltip-stat {

            color: var(--ink-light);

        /* 响应式隐藏 */
        @media (max-width: 768px) {
            .navbar__nav {

                width: 100%;
            }
        }

            .navbar__mobile-menu {
                display: none !important;
            }
        }
    </style>
</head>

    <script>
        // 导航栏滚动效果
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('is-scrolled');
            } else {
                navbar.classList.remove('is-scrolled');
            }
        });

        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                const isExpanded = menuBtn.getAttribute('aria-expanded') === 'true';
                menuBtn.setAttribute('aria-expanded', !isExpanded);
                mobileMenu.classList.toggle('is-open');
            });
        }

        // 生成今日市集卡片
        function generateDailyCards() {
            const grid = document.getElementById('dailyGrid');
            const items = [
                { realm: '声之境', realmClass: 'sound', icon: '♪', name: '夏日微风', desc: '微风轻拂，如沐春霖', price: 581 },
                { realm: '色之境', realmClass: 'color', icon: '◆', name: '晨光初现', desc: '霞光初绽，晨曦微露', price: 164 },
                { realm: '文之境', realmClass: 'text', icon: '✦', name: '山水之间', desc: '笔墨山水，意境悠远', price: 1079 },
                { realm: '文之境', realmClass: 'text', icon: '◈', name: '墨染流年', desc: '岁月如水，墨染春秋', price: 308 },
                { realm: '色之境', realmClass: 'color', icon: '◇', name: '云淡风轻', desc: '云卷云舒，悠然自得', price: 708 },
                { realm: '声之境', realmClass: 'sound', icon: '♫', name: '月夜清音', desc: '月华如水，清音绕梁', price: 188 }
            ];

            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'daily-card';
                card.innerHTML = `
                    <div class="daily-card-realm">${item.realm}</div>
                    <div class="daily-card-icon ${item.realmClass}">${item.icon}</div>
                    <div class="daily-card-name">${item.name}</div>
                    <div class="daily-card-desc">${item.desc}</div>
                    <div class="daily-card-price">${item.price} ECHO</div>
                `;
                grid.appendChild(card);
            });
        }

        // 刷新今日市集
        function refreshDaily() {
            const grid = document.getElementById('dailyGrid');
            grid.style.opacity = '0';
            
            setTimeout(() => {
                generateDailyCards();
                grid.style.transition = 'opacity 0.4s ease';
                grid.style.opacity = '1';
            }, 200);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            generateDailyCards();
        });

        // 生成风云图气泡
        function generateChartData(type) {
            const svg = document.querySelector('#cloudChart svg');
            const tooltip = document.getElementById('bubbleTooltip');
            const tooltipTitle = document.getElementById('tooltipTitle');
            const tooltipVolume = document.getElementById('tooltipVolume');
            const tooltipHeat = document.getElementById('tooltipHeat');
            
            // 清空现有气泡
            svg.innerHTML = '';
            
            // 三域配置 - 固定三角形布局
            const realms = {
                sound: { name: '律境', color: '#8B9DC3' },
                color: { name: '彩境', color: '#C9A9A6' },
                text: { name: '章境', color: '#7A8B7C' }
            };
            
            // 固定位置 - 品字形布局
            const positions = {
                sound: { cx: 180, cy: 200 },
                color: { cx: 320, cy: 200 },
                text: { cx: 250, cy: 280 }
            };
            
            // 生成随机热度数据
            const heatData = {};
            Object.keys(realms).forEach(key => {
                heatData[key] = Math.floor(Math.random() * 3000 + 2000);
            });
            
            // 显示所有三域 - "众星捧月"效果
            const allRealms = Object.keys(realms);
            
            // 先渲染非选中领域（作为背景星）
            const backgroundRealms = allRealms.filter(key => key !== type && type !== 'all');
            const focusRealms = type === 'all' ? allRealms : [type];
            
            // 渲染函数
            const renderRealm = (realmKey, isFocus) => {
                const realm = realms[realmKey];
                const heat = heatData[realmKey];
                const volume = (Math.random() * 50 + 20).toFixed(1);
                const pos = positions[realmKey];
                
                // 焦点领域正常显示，背景领域缩小淡化
                const scale = isFocus ? 1 : 0.6;
                const opacity = isFocus ? 0.9 : 0.35;
                const radius = (60 + (heat / 5000) * 60) * scale;
                
                // 创建气泡组
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'cloud-bubble');
                g.setAttribute('data-realm', realmKey);
                g.setAttribute('data-name', realm.name);
                g.setAttribute('data-volume', volume);
                g.setAttribute('data-heat', heat);
                g.style.cursor = 'pointer';
                
                // 创建圆圈
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', pos.cx);
                circle.setAttribute('cy', pos.cy);
                circle.setAttribute('r', radius);
                circle.setAttribute('fill', realm.color);
                circle.setAttribute('opacity', opacity);
                circle.style.transition = 'all 0.4s ease';
                
                // 创建文字 - 仅焦点领域显示
                if (isFocus) {
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', pos.cx);
                    text.setAttribute('y', pos.cy - 5);
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('class', 'cloud-bubble-text');
                    text.textContent = realm.name.charAt(0);
                    
                    const heatText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    heatText.setAttribute('x', pos.cx);
                    heatText.setAttribute('y', pos.cy + 20);
                    heatText.setAttribute('text-anchor', 'middle');
                    heatText.setAttribute('class', 'cloud-bubble-heat');
                    heatText.textContent = heat.toLocaleString();
                    
                    g.appendChild(text);
                    g.appendChild(heatText);
                }
                
                g.appendChild(circle);
                
                // 添加悬浮事件
                g.addEventListener('mouseenter', (e) => {
                    tooltipTitle.textContent = realm.name;
                    tooltipVolume.textContent = `流转: ${volume}K`;
                    tooltipHeat.textContent = `热度: ${heat.toLocaleString()}`;
                    
                    const rect = svg.getBoundingClientRect();
                    tooltip.style.left = (pos.cx + rect.left - 90) + 'px';
                    tooltip.style.top = (pos.cy + rect.top - radius - 80) + 'px';
                    tooltip.classList.add('visible');
                    
                    // 悬浮时轻微放大
                    circle.setAttribute('r', radius * 1.1);
                });
                
                g.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                    circle.setAttribute('r', radius);
                });
                
                g.addEventListener('click', () => {
                    enterRealm(realmKey);
                });
                
                svg.appendChild(g);
            };
            
            // 先渲染背景领域（在底层）
            backgroundRealms.forEach(key => renderRealm(key, false));
            // 再渲染焦点领域（在顶层）
            focusRealms.forEach(key => renderRealm(key, true));
        }

        // 进入域
        function enterRealm(realm) {
            console.log('进入' + realm + '之境');
            // 可跳转到对应域的浏览页面
        }

        // 切换榜单
        function switchChart(type) {
            document.querySelectorAll('.chart-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            generateChartData(type);
        }

        // 随机跳转
        function randomAsset() {
            const cards = document.querySelectorAll('.asset-card');
            if (cards.length > 0) {
                const randomIndex = Math.floor(Math.random() * cards.length);
                cards[randomIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                cards[randomIndex].style.animation = 'pulse 0.6s ease';
                setTimeout(() => {
                    cards[randomIndex].style.animation = '';
                }, 600);
            }
        }

        // 添加 pulse 动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { box-shadow: 0 0 0 0 rgba(160, 48, 32, 0.4); }
                50% { box-shadow: 0 0 0 10px rgba(160, 48, 32, 0); }
            }
        `;
        document.head.appendChild(style);

        // 初始化
        generateDailyCards();
        
        // 初始化风云图
        generateChartData('sound');
    </script>

    <!-- 全局浮动铸造按钮 -->
    <a href="creator.html" class="fab-create" title="铸">铸</a>
    <style>
        .fab-create {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            background: var(--vermilion);
            color: var(--bg-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.2rem;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(160, 48, 32, 0.3);
            transition: all 0.4s ease;
            z-index: 1000;
            animation: fabBreathe 4s ease-in-out infinite;
        }
        .fab-create:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 24px rgba(160, 48, 32, 0.4);
            animation: none;
        }
        @keyframes fabBreathe {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 4px 12px rgba(160, 48, 32, 0.3);
            }
            50% { 
                transform: scale(1.03); 
                box-shadow: 0 6px 16px rgba(160, 48, 32, 0.35);

        }
        @media (max-width: 768px) {
            .fab-create {
                bottom: 1.5rem;
                right: 1.5rem;
                width: 48px;
                height: 48px;
                font-size: 1rem;
            }
        }
    </style>
</main>
