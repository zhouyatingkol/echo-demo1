<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心 - ECHO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/styles/xuanzhi-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="../../frontend/js/i18n.js" defer></script>
    <script src="../../frontend/js/wallet-state.js" defer></script>
    <style>
        body {
            background: var(--bg-primary);
        }
        
        /* 页面标题 */
        .page-header {
            padding: 60px 0 40px;
            text-align: center;
        }
        
        .page-title {
            font-family: var(--font-wenkai);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }
        
        .page-subtitle {
            font-size: 1rem;
            color: var(--ink-light);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(122, 110, 95, 0.15);
            padding-bottom: 16px;
        }
        
        .tab {
            padding: 10px 24px;
            background: transparent;
            border: 1px solid rgba(122, 110, 95, 0.2);
            font-family: var(--font-serif);
            font-size: 0.9rem;
            color: var(--ink-light);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .tab:hover {
            border-color: var(--seal-red);
            color: var(--seal-red);
        }
        
        .tab.active {
            background: var(--seal-red);
            border-color: var(--seal-red);
            color: white;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 32px;
            margin-bottom: 32px;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid rgba(122, 110, 95, 0.1);
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--seal-red);
            font-family: var(--font-wenkai);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--ink-light);
        }
        
        /* Create Playlist Button */
        .create-playlist-btn {
            padding: 12px 24px;
            background: var(--seal-red);
            border: none;
            color: white;
            font-family: var(--font-serif);
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background var(--transition-fast);
        }
        
        .create-playlist-btn:hover {
            background: #802820;
        }
        
        /* Playlist Grid */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .playlist-card {
            background: var(--bg-card);
            border: 1px solid rgba(122, 110, 95, 0.1);
            padding: 20px;
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        
        .playlist-card:hover {
            border-color: rgba(184, 155, 108, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }
        
        .playlist-cover {
            height: 140px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            margin-bottom: 16px;
        }
        
        .playlist-count {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            font-size: 0.75rem;
            color: var(--ink-light);
        }
        
        .playlist-name {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--ink-deep);
        }
        
        .playlist-meta {
            font-size: 0.8rem;
            color: var(--ink-light);
        }
        
        .playlist-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .playlist-action-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid rgba(122, 110, 95, 0.2);
            color: var(--ink-light);
            font-family: var(--font-serif);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .playlist-action-btn:hover {
            background: var(--bg-secondary);
            color: var(--ink-deep);
        }
        
        .playlist-action-btn.delete {
            color: var(--seal-red);
            border-color: rgba(139, 69, 19, 0.3);
        }
        
        .playlist-action-btn.delete:hover {
            background: rgba(139, 69, 19, 0.1);
        }
        
        /* Music Grid */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        
        .music-card {
            background: var(--bg-card);
            border: 1px solid rgba(122, 110, 95, 0.1);
            transition: all var(--transition-normal);
        }
        
        .music-card:hover {
            border-color: rgba(184, 155, 108, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }
        
        .music-visual {
            height: 160px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 60px;
        }
        
        .wave-bar {
            width: 4px;
            background: var(--gold-primary);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        
        @keyframes wave {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }
        
        .play-overlay {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        
        .music-card:hover .play-overlay {
            opacity: 1;
        }
        
        .music-info {
            padding: 16px;
        }
        
        .music-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--ink-deep);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .music-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .meta-tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            background: rgba(139, 157, 195, 0.1);
            color: var(--realm-sound);
        }
        
        .music-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(122, 110, 95, 0.1);
        }
        
        .price {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold-primary);
        }
        
        .price-unit {
            font-size: 0.75rem;
            color: var(--ink-light);
            font-weight: normal;
        }
        
        .buy-btn {
            padding: 8px 16px;
            background: var(--seal-red);
            border: none;
            color: white;
            font-family: var(--font-serif);
            font-size: 0.8rem;
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        
        .buy-btn:hover {
            background: #802820;
        }
        
        /* Favorite Button */
        .favorite-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: none;
            color: var(--seal-red);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            z-index: 10;
        }
        
        .favorite-btn:hover {
            background: rgba(139, 69, 19, 0.3);
            transform: scale(1.1);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--bg-secondary);
            border: 1px dashed rgba(122, 110, 95, 0.2);
            grid-column: 1 / -1;
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-family: var(--font-wenkai);
            font-size: 1.25rem;
            margin-bottom: 12px;
            color: var(--ink-deep);
        }
        
        .empty-state p {
            font-size: 0.9rem;
            color: var(--ink-light);
            margin-bottom: 24px;
        }
        
        .empty-state .btn {
            padding: 12px 24px;
            background: var(--seal-red);
            border: none;
            color: white;
            font-family: var(--font-serif);
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background var(--transition-fast);
        }
        
        .empty-state .btn:hover {
            background: #802820;
        }
        
        /* Audio Player Fixed */
        .player-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid rgba(122, 110, 95, 0.15);
            padding: 16px 20px;
            display: none;
            align-items: center;
            gap: 16px;
            z-index: 100;
        }
        
        .player-fixed.active {
            display: flex;
        }
        
        .player-info {
            flex: 0 0 200px;
        }
        
        .player-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--ink-deep);
        }
        
        .player-artist {
            font-size: 0.75rem;
            color: var(--ink-light);
        }
        
        .player-preview {
            font-size: 0.7rem;
            color: var(--gold-primary);
            margin-top: 4px;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1px solid rgba(122, 110, 95, 0.2);
            color: var(--ink-deep);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }
        
        .control-btn:hover {
            background: var(--seal-red);
            border-color: var(--seal-red);
            color: white;
        }
        
        .control-btn.play {
            background: var(--seal-red);
            border-color: var(--seal-red);
            color: white;
        }
        
        .player-progress {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(122, 110, 95, 0.15);
            border-radius: 2px;
            cursor: pointer;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gold-primary);
            border-radius: 2px;
            width: 0%;
        }
        
        .time {
            font-size: 0.75rem;
            color: var(--ink-light);
            min-width: 40px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid rgba(122, 110, 95, 0.15);
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .modal-header {
            font-family: var(--font-wenkai);
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--seal-red);
        }
        
        .modal-body {
            margin-bottom: 24px;
        }
        
        .modal-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid rgba(122, 110, 95, 0.2);
            font-family: var(--font-serif);
            font-size: 0.9rem;
            color: var(--ink-deep);
            margin-bottom: 16px;
            outline: none;
        }
        
        .modal-input:focus {
            border-color: var(--gold-primary);
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .modal-btn {
            padding: 10px 24px;
            border: none;
            font-family: var(--font-serif);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .modal-btn.primary {
            background: var(--seal-red);
            color: white;
        }
        
        .modal-btn.primary:hover {
            background: #802820;
        }
        
        .modal-btn.secondary {
            background: transparent;
            border: 1px solid rgba(122, 110, 95, 0.2);
            color: var(--ink-light);
        }
        
        .modal-btn.secondary:hover {
            border-color: var(--seal-red);
            color: var(--seal-red);
        }
        
        /* Playlist Detail View */
        .playlist-detail {
            display: none;
        }
        
        .playlist-detail.active {
            display: block;
        }
        
        .back-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid rgba(122, 110, 95, 0.2);
            color: var(--ink-light);
            font-family: var(--font-serif);
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition-fast);
        }
        
        .back-btn:hover {
            border-color: var(--seal-red);
            color: var(--seal-red);
        }
        
        .playlist-header {
            display: flex;
            gap: 24px;
            margin-bottom: 30px;
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid rgba(122, 110, 95, 0.1);
        }
        
        .playlist-header-cover {
            width: 160px;
            height: 160px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            flex-shrink: 0;
        }
        
        .playlist-header-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .playlist-header-name {
            font-family: var(--font-wenkai);
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 12px;
            color: var(--ink-deep);
        }
        
        .playlist-header-meta {
            color: var(--ink-light);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        
        .playlist-header-actions {
            display: flex;
            gap: 12px;
        }
        
        .header-action-btn {
            padding: 10px 20px;
            background: var(--seal-red);
            border: none;
            color: white;
            font-family: var(--font-serif);
            font-size: 0.85rem;
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        
        .header-action-btn:hover {
            background: #802820;
        }
        
        .header-action-btn.secondary {
            background: transparent;
            border: 1px solid rgba(122, 110, 95, 0.2);
            color: var(--ink-light);
        }
        
        .header-action-btn.secondary:hover {
            border-color: var(--seal-red);
            color: var(--seal-red);
            background: transparent;
        }
        
        /* Music List (Vertical) */
        .music-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .music-list-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid rgba(122, 110, 95, 0.1);
            transition: all var(--transition-fast);
        }
        
        .music-list-item:hover {
            border-color: rgba(184, 155, 108, 0.3);
        }
        
        .music-list-number {
            width: 32px;
            text-align: center;
            color: var(--ink-light);
            font-size: 0.9rem;
        }
        
        .music-list-play {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1px solid rgba(122, 110, 95, 0.2);
            color: var(--ink-deep);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }
        
        .music-list-play:hover {
            background: var(--seal-red);
            border-color: var(--seal-red);
            color: white;
        }
        
        .music-list-info {
            flex: 1;
        }
        
        .music-list-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--ink-deep);
        }
        
        .music-list-meta {
            font-size: 0.75rem;
            color: var(--ink-light);
        }
        
        .music-list-actions {
            display: flex;
            gap: 8px;
        }
        
        .music-list-action {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--ink-light);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }
        
        .music-list-action:hover {
            background: var(--bg-secondary);
            color: var(--ink-deep);
        }
        
        .music-list-action.remove:hover {
            color: var(--seal-red);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <a href="../index.html" class="navbar__brand">ECHO<span>·</span>心</a>
        <div class="navbar__nav">
            <a href="../market/discover.html" class="navbar__link">探</a>
            <a href="../market/music-market.html" class="navbar__link">集</a>
            <a href="../market/charts.html" class="navbar__link">榜</a>
            <a href="../creator/mint-music.html" class="navbar__link">铸</a>
            <a href="dashboard.html" class="navbar__link is-active">境</a>
        </div>
        <button class="navbar__action" id="connectBtn" onclick="toggleWallet()">入链</button>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            <div id="mainView">
                <div class="page-header">
                    <h1 class="page-title">我的心境</h1>
                    <p class="page-subtitle">收藏所爱，自成一境</p>
                </div>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('favorites')" id="tab-favorites">收藏</button>
                    <button class="tab" onclick="switchTab('playlists')" id="tab-playlists">列表</button>
                </div>

                <!-- Favorites View -->
                <div id="favoritesView">
                    <div class="stats-bar">
                        <div class="stat-item">
                            <span class="stat-value" id="favCount">0</span>
                            <span class="stat-label">首收藏</span>
                        </div>
                    </div>
                    <div class="music-grid" id="favoritesGrid">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- Playlists View -->
                <div id="playlistsView" style="display: none;">
                    <button class="create-playlist-btn" onclick="showCreatePlaylistModal()">
                        创建列表
                    </button>
                    <div class="playlist-grid" id="playlistsGrid">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- Playlist Detail View -->
            <div id="playlistDetailView" class="playlist-detail">
                <button class="back-btn" onclick="backToMain()">← 返回</button>
                <div class="playlist-header">
                    <div class="playlist-header-cover" id="detailCover">♪</div>
                    <div class="playlist-header-info">
                        <div class="playlist-header-name" id="detailName">--</div>
                        <div class="playlist-header-meta" id="detailMeta">--</div>
                        <div class="playlist-header-actions">
                            <button class="header-action-btn" onclick="playPlaylist()">播放</button>
                            <button class="header-action-btn secondary" onclick="showRenameModal()">重命名</button>
                            <button class="header-action-btn secondary" onclick="deleteCurrentPlaylist()">删除</button>
                        </div>
                    </div>
                </div>
                <div class="music-list" id="playlistMusicList">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 固定播放器 -->
    <div class="player-fixed" id="fixedPlayer">
        <div class="player-info">
            <div class="player-title" id="playerTitle">--</div>
            <div class="player-artist" id="playerArtist">--</div>
            <div class="player-preview" id="playerPreviewTag" style="display: none;">预览模式</div>
        </div>
        
        <div class="player-controls">
            <button class="control-btn" onclick="skipBackward()">⏮</button>
            <button class="control-btn play" id="playerPlayBtn" onclick="togglePlayer()">▶</button>
            <button class="control-btn" onclick="skipForward()">⏭</button>
        </div>
        
        <div class="player-progress">
            <span class="time" id="currentTime">0:00</span>
            <div class="progress-bar" onclick="seekPlayer(event)">
                <div class="progress-fill" id="playerProgress"></div>
            </div>
            <span class="time" id="totalTime">0:00</span>
        </div>
        
        <audio id="audioElement" preload="metadata"></audio>
    </div>

    <!-- Create Playlist Modal -->
    <div class="modal" id="createPlaylistModal">
        <div class="modal-content">
            <div class="modal-header">创建列表</div>
            <input type="text" class="modal-input" id="playlistNameInput" placeholder="输入列表名称..." maxlength="50">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="createPlaylist()">创建</button>
                <button class="modal-btn secondary" onclick="closeModal('createPlaylistModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- Rename Playlist Modal -->
    <div class="modal" id="renamePlaylistModal">
        <div class="modal-content">
            <div class="modal-header">重命名</div>
            <input type="text" class="modal-input" id="renameInput" placeholder="输入新名称..." maxlength="50">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="renamePlaylist()">保存</button>
                <button class="modal-btn secondary" onclick="closeModal('renamePlaylistModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        const V2_CONTRACT_ADDRESS = '0xF98f63b7e8064Dcf9c2f25A906B2af89Af4840ce';
        const V2_ABI = [
            "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)"
        ];
        
        let provider, signer, contract, userAddress;
        let isConnected = false;
        let allMusic = [];
        let currentPlaylistId = null;
        let currentMusic = null;
        let isPlaying = false;
        let playlistQueue = [];
        let currentQueueIndex = 0;
        
        const audio = document.getElementById('audioElement');
        
        audio.addEventListener('timeupdate', function() {
            const current = this.currentTime;
            const duration = this.duration || 0;
            
            if (current >= 30) {
                this.pause();
                this.currentTime = 0;
                isPlaying = false;
                document.getElementById('playerPlayBtn').textContent = '▶';
                return;
            }
            
            const percent = (current / duration) * 100;
            document.getElementById('playerProgress').style.width = percent + '%';
            document.getElementById('currentTime').textContent = formatTime(current);
            document.getElementById('totalTime').textContent = formatTime(duration);
        });
        
        audio.addEventListener('ended', function() {
            isPlaying = false;
            document.getElementById('playerPlayBtn').textContent = '▶';
            
            if (playlistQueue.length > 0 && currentQueueIndex < playlistQueue.length - 1) {
                currentQueueIndex++;
                playMusicFromQueue();
            }
        });
        
        audio.addEventListener('loadedmetadata', function() {
            document.getElementById('totalTime').textContent = formatTime(this.duration);
        });
        
        // 钱包连接
        async function toggleWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('请先安装 MetaMask');
                return;
            }
            
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                isConnected = true;
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
                
                document.getElementById('connectBtn').textContent = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                loadAllMusic();
            } catch (e) {
                console.error(e);
            }
        }
        
        async function loadAllMusic() {
            if (!contract) return;
            
            try {
                const currentId = await contract.getCurrentTokenId();
                allMusic = [];
                
                for (let i = 0; i < currentId.toNumber(); i++) {
                    try {
                        const [metadata, blueprint, creator] = await contract.getAssetInfo(i);
                        
                        if (metadata.assetType && metadata.assetType.startsWith('music_')) {
                            allMusic.push({
                                tokenId: i,
                                name: metadata.name,
                                genre: metadata.assetType.replace('music_', ''),
                                creator: creator,
                                price: ethers.utils.formatEther(blueprint.usage.fee),
                                uri: metadata.uri
                            });
                        }
                    } catch (e) {}
                }
                
                renderFavorites();
                renderPlaylists();
            } catch (error) {
                console.error('加载失败:', error);
            }
        }
        
        function getFavorites() {
            const data = localStorage.getItem('echoMusicData');
            if (!data) return [];
            try {
                const parsed = JSON.parse(data);
                return parsed.favorites || [];
            } catch (e) {
                return [];
            }
        }
        
        function saveFavorites(favorites) {
            const data = localStorage.getItem('echoMusicData');
            let parsed = {};
            if (data) {
                try {
                    parsed = JSON.parse(data);
                } catch (e) {}
            }
            parsed.favorites = favorites;
            localStorage.setItem('echoMusicData', JSON.stringify(parsed));
        }
        
        function removeFavorite(tokenId) {
            const favorites = getFavorites();
            const index = favorites.indexOf(tokenId);
            if (index > -1) {
                favorites.splice(index, 1);
                saveFavorites(favorites);
                renderFavorites();
                showToast('已移除');
            }
        }
        
        function renderFavorites() {
            const favorites = getFavorites();
            document.getElementById('favCount').textContent = favorites.length;
            const grid = document.getElementById('favoritesGrid');
            
            if (favorites.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">♡</div>
                        <h3>暂无收藏</h3>
                        <p>去音乐市场发现喜欢的音乐</p>
                        <a href="../market/music-market.html" class="btn">前往市场</a>
                    </div>
                `;
                return;
            }
            
            const favMusic = favorites.map(id => allMusic.find(m => m.tokenId === id)).filter(m => m);
            
            grid.innerHTML = favMusic.map(music => `
                <div class="music-card">
                    <div class="music-visual">
                        <button class="favorite-btn" onclick="removeFavorite(${music.tokenId})" title="取消收藏">♥</button>
                        <div class="waveform">
                            ${Array(20).fill(0).map(() => `
                                <div class="wave-bar" style="height: ${Math.random() * 80 + 20}%; animation-delay: ${Math.random()}s"></div>
                            `).join('')}
                        </div>
                        <div class="play-overlay" onclick="playMusic(${music.tokenId})">▶</div>
                    </div>
                    <div class="music-info">
                        <div class="music-title">${music.name}</div>
                        <div class="music-meta">
                            <span class="meta-tag">${getGenreLabel(music.genre)}</span>
                            <span class="meta-tag">Token #${music.tokenId}</span>
                        </div>
                        <div class="music-stats">
                            <div class="price">
                                ${music.price}
                                <span class="price-unit">MEER/次</span>
                            </div>
                            <button class="buy-btn" onclick="buyLicense(${music.tokenId}, '${music.price}')">购买</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getPlaylists() {
            const data = localStorage.getItem('echoMusicData');
            if (!data) return [];
            try {
                const parsed = JSON.parse(data);
                return parsed.playlists || [];
            } catch (e) {
                return [];
            }
        }
        
        function savePlaylists(playlists) {
            const data = localStorage.getItem('echoMusicData');
            let parsed = {};
            if (data) {
                try {
                    parsed = JSON.parse(data);
                } catch (e) {}
            }
            parsed.playlists = playlists;
            localStorage.setItem('echoMusicData', JSON.stringify(parsed));
        }
        
        function renderPlaylists() {
            const playlists = getPlaylists();
            const grid = document.getElementById('playlistsGrid');
            
            if (playlists.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">☰</div>
                        <h3>暂无列表</h3>
                        <p>创建您的第一个播放列表</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = playlists.map(playlist => `
                <div class="playlist-card" onclick="openPlaylist(${playlist.id})">
                    <div class="playlist-cover">
                        ♪
                        <span class="playlist-count">${playlist.items.length} 首</span>
                    </div>
                    <div class="playlist-info">
                        <div class="playlist-name">${playlist.name}</div>
                        <div class="playlist-meta">创建于 ${formatDate(playlist.id)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function showCreatePlaylistModal() {
            document.getElementById('playlistNameInput').value = '';
            document.getElementById('createPlaylistModal').classList.add('active');
            document.getElementById('playlistNameInput').focus();
        }
        
        function createPlaylist() {
            const name = document.getElementById('playlistNameInput').value.trim();
            if (!name) {
                showToast('请输入列表名称');
                return;
            }
            
            const playlists = getPlaylists();
            const newId = Date.now();
            
            playlists.push({
                id: newId,
                name: name,
                items: []
            });
            
            savePlaylists(playlists);
            closeModal('createPlaylistModal');
            renderPlaylists();
            showToast('创建成功');
        }
        
        function openPlaylist(id) {
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === id);
            if (!playlist) return;
            
            currentPlaylistId = id;
            
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('playlistDetailView').classList.add('active');
            
            document.getElementById('detailName').textContent = playlist.name;
            document.getElementById('detailMeta').textContent = `${playlist.items.length} 首 · 创建于 ${formatDate(playlist.id)}`;
            
            renderPlaylistMusic(playlist);
        }
        
        function renderPlaylistMusic(playlist) {
            const list = document.getElementById('playlistMusicList');
            
            if (playlist.items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">♪</div>
                        <h3>列表为空</h3>
                        <p>去音乐市场添加音乐</p>
                        <a href="../market/music-market.html" class="btn">前往市场</a>
                    </div>
                `;
                return;
            }
            
            const musicItems = playlist.items.map((tokenId, index) => {
                const music = allMusic.find(m => m.tokenId === tokenId);
                if (!music) return null;
                return { ...music, index: index + 1 };
            }).filter(m => m);
            
            list.innerHTML = musicItems.map((music, idx) => `
                <div class="music-list-item">
                    <div class="music-list-number">${music.index}</div>
                    <button class="music-list-play" onclick="playMusic(${music.tokenId})">▶</button>
                    <div class="music-list-info">
                        <div class="music-list-title">${music.name}</div>
                        <div class="music-list-meta">${getGenreLabel(music.genre)} · Token #${music.tokenId}</div>
                    </div>
                    <div class="music-list-actions">
                        <button class="music-list-action remove" onclick="removeFromPlaylist(${music.tokenId})" title="移除">🗑</button>
                    </div>
                </div>
            `).join('');
        }
        
        function backToMain() {
            document.getElementById('playlistDetailView').classList.remove('active');
            document.getElementById('mainView').style.display = 'block';
            currentPlaylistId = null;
            renderPlaylists();
        }
        
        function playPlaylist() {
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (!playlist || playlist.items.length === 0) return;
            
            playlistQueue = playlist.items;
            currentQueueIndex = 0;
            playMusicFromQueue();
        }
        
        function playMusicFromQueue() {
            if (playlistQueue.length === 0 || currentQueueIndex >= playlistQueue.length) return;
            const tokenId = playlistQueue[currentQueueIndex];
            playMusic(tokenId);
        }
        
        function removeFromPlaylist(tokenId) {
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (!playlist) return;
            
            const index = playlist.items.indexOf(tokenId);
            if (index > -1) {
                playlist.items.splice(index, 1);
                savePlaylists(playlists);
                renderPlaylistMusic(playlist);
                showToast('已移除');
            }
        }
        
        function deleteCurrentPlaylist() {
            if (!confirm('确定要删除这个列表吗？')) return;
            
            const playlists = getPlaylists();
            const index = playlists.findIndex(p => p.id === currentPlaylistId);
            if (index > -1) {
                playlists.splice(index, 1);
                savePlaylists(playlists);
                backToMain();
                showToast('已删除');
            }
        }
        
        function showRenameModal() {
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (!playlist) return;
            
            document.getElementById('renameInput').value = playlist.name;
            document.getElementById('renamePlaylistModal').classList.add('active');
            document.getElementById('renameInput').focus();
        }
        
        function renamePlaylist() {
            const name = document.getElementById('renameInput').value.trim();
            if (!name) {
                showToast('请输入列表名称');
                return;
            }
            
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (playlist) {
                playlist.name = name;
                savePlaylists(playlists);
                document.getElementById('detailName').textContent = name;
                closeModal('renamePlaylistModal');
                showToast('重命名成功');
            }
        }
        
        async function playMusic(tokenId) {
            const music = allMusic.find(m => m.tokenId === tokenId);
            if (!music) return;
            
            currentMusic = music;
            
            document.getElementById('playerTitle').textContent = music.name;
            document.getElementById('playerArtist').textContent = '创作者: ' + music.creator.slice(0, 6) + '...' + music.creator.slice(-4);
            document.getElementById('playerPreviewTag').style.display = 'block';
            document.getElementById('fixedPlayer').classList.add('active');
            
            let audioUrl = music.uri;
            if (audioUrl && audioUrl.startsWith('ipfs://')) {
                audioUrl = audioUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');
            }
            if (!audioUrl || audioUrl === '') {
                audioUrl = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
            }
            
            audio.src = audioUrl;
            audio.currentTime = 0;
            
            try {
                await audio.play();
                isPlaying = true;
                document.getElementById('playerPlayBtn').textContent = '⏸';
            } catch (error) {
                console.error('播放失败:', error);
            }
        }
        
        async function togglePlayer() {
            if (!currentMusic) return;
            
            const btn = document.getElementById('playerPlayBtn');
            
            if (isPlaying) {
                audio.pause();
                btn.textContent = '▶';
                isPlaying = false;
            } else {
                try {
                    await audio.play();
                    btn.textContent = '⏸';
                    isPlaying = true;
                } catch (error) {
                    console.error('播放失败:', error);
                }
            }
        }
        
        function skipBackward() {
            if (!audio) return;
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        }
        
        function skipForward() {
            if (!audio) return;
            audio.currentTime = Math.min(30, audio.currentTime + 10);
        }
        
        function seekPlayer(event) {
            const bar = event.currentTarget;
            const clickX = event.offsetX;
            const width = bar.offsetWidth;
            const percent = clickX / width;
            audio.currentTime = Math.min(30, percent * audio.duration);
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if (tab === 'favorites') {
                document.getElementById('favoritesView').style.display = 'block';
                document.getElementById('playlistsView').style.display = 'none';
                renderFavorites();
            } else {
                document.getElementById('favoritesView').style.display = 'none';
                document.getElementById('playlistsView').style.display = 'block';
                renderPlaylists();
            }
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: var(--seal-red);
                color: #fff;
                padding: 12px 24px;
                font-family: var(--font-serif);
                font-size: 0.9rem;
                z-index: 10000;
                animation: slideDown 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }
        
        function getGenreLabel(genre) {
            const labels = {
                electronic: '电子',
                rock: '摇滚',
                classical: '古典',
                jazz: '爵士',
                pop: '流行',
                ambient: '氛围',
                hiphop: '嘻哈',
                folk: '民谣'
            };
            return labels[genre] || genre;
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + secs.toString().padStart(2, '0');
        }
        
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
        }
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
                to { transform: translateX(-50%) translateY(0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translateX(-50%) translateY(0); opacity: 1; }
                to { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        document.getElementById('playlistNameInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createPlaylist();
        });
        document.getElementById('renameInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') renamePlaylist();
        });
        
        if (typeof window.ethereum !== 'undefined') {
            toggleWallet();
        }
    </script>
</body>
</html>
