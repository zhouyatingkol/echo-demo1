<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铸造成功 - ECHO</title>
    
    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
    
    <!-- 组件样式 -->
    <link rel="stylesheet" href="../css/echo-components.css">
    <link rel="stylesheet" href="../css/navbar.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', 'Source Han Serif CN', serif;
            background: var(--bg-primary, #F8F6F1);
            color: var(--ink-deep, #1A1A1A);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 宣纸纹理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }
        
        /* 主内容区 */
        .success-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 80px;
        }
        
        /* 印章成功标记 */
        .success-seal {
            width: 120px;
            height: 120px;
            border: 3px solid #C53030;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 48px;
            position: relative;
            transform: rotate(-3deg);
            animation: sealStamp 0.8s var(--ease-ink, cubic-bezier(0.25, 0.1, 0.25, 1)) forwards;
            opacity: 0;
        }
        
        .success-seal::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(197, 48, 48, 0.4);
            border-radius: 2px;
        }
        
        .success-seal__text {
            font-family: 'LXGW WenKai', 'KaiTi', cursive;
            font-size: 48px;
            font-weight: 700;
            color: #C53030;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 0.2em;
        }
        
        @keyframes sealStamp {
            0% {
                opacity: 0;
                transform: rotate(-3deg) scale(1.5);
            }
            50% {
                opacity: 1;
                transform: rotate(-3deg) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: rotate(-3deg) scale(1);
            }
        }
        
        /* 成功标题 */
        .success-title {
            font-family: 'LXGW WenKai', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--ink-deep, #1A1A1A);
            letter-spacing: 0.3em;
            margin-bottom: 16px;
            opacity: 0;
            animation: emerge 1s var(--ease-ink) 0.3s forwards;
        }
        
        .success-subtitle {
            font-size: 14px;
            color: var(--ink-light, #7A6E5F);
            letter-spacing: 0.15em;
            margin-bottom: 64px;
            opacity: 0;
            animation: emerge 1s var(--ease-ink) 0.5s forwards;
        }
        
        @keyframes emerge {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 作品卡片 */
        .asset-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-primary, #F8F6F1);
            border: 0.5px solid rgba(26, 26, 26, 0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 48px;
            box-shadow: 0 4px 20px rgba(26, 26, 26, 0.06);
            opacity: 0;
            animation: emerge 1s var(--ease-ink) 0.7s forwards;
        }
        
        .asset-card__visual {
            aspect-ratio: 16 / 10;
            background: linear-gradient(135deg, var(--bg-secondary, #F2EFE8) 0%, var(--bg-tertiary, #EBE7DD) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* 音波可视化 */
        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 60px;
        }
        
        .wave-bar {
            width: 3px;
            background: linear-gradient(180deg, var(--song-gold, #C9B896) 0%, transparent 100%);
            border-radius: 1px;
            animation: wave 2s ease-in-out infinite;
        }
        
        .wave-bar:nth-child(1) { height: 40%; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 70%; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 100%; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 80%; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 50%; animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { height: 90%; animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { height: 60%; animation-delay: 0.6s; }
        .wave-bar:nth-child(8) { height: 40%; animation-delay: 0.7s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(0.6); opacity: 0.6; }
            50% { transform: scaleY(1); opacity: 1; }
        }
        
        /* 作品缩略图 */
        .asset-card__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .asset-card__content {
            padding: 24px;
        }
        
        .asset-card__title {
            font-family: 'LXGW WenKai', serif;
            font-size: 18px;
            font-weight: 400;
            color: var(--ink-deep, #1A1A1A);
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }
        
        .asset-card__meta {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .asset-card__tag {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(184, 155, 108, 0.08);
            border: 0.5px solid rgba(184, 155, 108, 0.2);
            border-radius: 999px;
            color: var(--song-gold-deep, #A98B6F);
            letter-spacing: 0.05em;
        }
        
        .asset-card__info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 0.5px solid rgba(26, 26, 26, 0.06);
        }
        
        .asset-card__label {
            font-size: 12px;
            color: var(--ink-light, #7A6E5F);
            letter-spacing: 0.1em;
        }
        
        .asset-card__token {
            font-family: 'LXGW WenKai', serif;
            font-size: 14px;
            color: var(--ink-medium, #5A5045);
            letter-spacing: 0.05em;
        }
        
        /* 按钮组 */
        .action-buttons {
            display: flex;
            gap: 16px;
            opacity: 0;
            animation: emerge 1s var(--ease-ink) 0.9s forwards;
        }
        
        .btn-primary {
            padding: 14px 32px;
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            letter-spacing: 0.2em;
            color: white;
            background: linear-gradient(135deg, var(--ink-medium, #5A5045) 0%, var(--ink-deep, #1A1A1A) 100%);
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(26, 26, 26, 0.15);
        }
        
        .btn-secondary {
            padding: 14px 32px;
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            letter-spacing: 0.2em;
            color: var(--ink-deep, #1A1A1A);
            background: transparent;
            border: 0.5px solid rgba(26, 26, 26, 0.15);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-secondary:hover {
            border-color: var(--song-gold, #C9B896);
            background: rgba(184, 155, 108, 0.04);
        }
        
        /* 交易哈希 */
        .tx-hash {
            margin-top: 32px;
            padding: 12px 20px;
            background: rgba(26, 26, 26, 0.03);
            border-radius: 2px;
            font-size: 12px;
            color: var(--ink-light, #7A6E5F);
            letter-spacing: 0.05em;
            opacity: 0;
            animation: emerge 1s var(--ease-ink) 1.1s forwards;
        }
        
        .tx-hash__label {
            margin-right: 8px;
        }
        
        .tx-hash__value {
            font-family: monospace;
            color: var(--ink-medium, #5A5045);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .success-seal {
                width: 100px;
                height: 100px;
            }
            
            .success-seal__text {
                font-size: 40px;
            }
            
            .success-title {
                font-size: 24px;
            }
            
            .action-buttons {
                flex-direction: column;
                width: 100%;
                max-width: 280px;
            }
            
            .btn-primary,
            .btn-secondary {
                width: 100%;
            }
            
            .asset-card {
                margin-bottom: 32px;
            }
        }
        
        /* 页面切换动画 */
        .page-exit {
            animation: pageExit 0.5s ease forwards;
        }
        
        @keyframes pageExit {
            to {
                opacity: 0;
                transform: scale(0.98);
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar scrolled">
        <a href="index-new.html" class="navbar__brand">
            <span class="navbar__logo">ECHO</span>
        </a>
        
        <div class="navbar__nav">
            <a href="market/music-market.html" class="navbar__link">市场</a>
            <a href="creator/mint.html" class="navbar__link">创作</a>
            <a href="user/my-assets.html" class="navbar__link">吾作</a>
        </div>
        
        <div class="navbar__actions">
            <div class="navbar__user" id="userMenu" style="display: none;">
                <div class="navbar__user-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
                    </svg>
                </div>
                <span id="userName">吾</span>
            </div>
            <button class="navbar__user" id="connectWallet">
                <span>连接</span>
            </button>
        </div>
    </nav>

    <!-- 成功内容 -->
    <main class="success-container">
        <!-- 印章 -->
        <div class="success-seal">
            <span class="success-seal__text">呈</span>
        </div>
        
        <!-- 标题 -->
        <h1 class="success-title">铸造功成</h1>
        <p class="success-subtitle">您的作品已成功上链，开始生长之旅</p>
        
        <!-- 作品卡片 -->
        <div class="asset-card" id="assetCard">
            <div class="asset-card__visual" id="assetVisual">
                <!-- 动态生成的音波或图片 -->
                <div class="waveform" id="waveform">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>
            <div class="asset-card__content">
                <h2 class="asset-card__title" id="assetTitle">加载中...</h2>
                <div class="asset-card__meta">
                    <span class="asset-card__tag" id="assetType">音乐</span>
                    <span class="asset-card__tag" id="assetGenre">--</span>
                </div>
                <div class="asset-card__info">
                    <span class="asset-card__label">Token ID</span>
                    <span class="asset-card__token" id="assetToken">--</span>
                </div>
            </div>
        </div>
        
        <!-- 按钮组 -->
        <div class="action-buttons">
            <a href="market/music-market.html" class="btn-primary">归集</a>
            <a href="user/my-assets.html" class="btn-secondary">吾作</a>
        </div>
        
        <!-- 交易哈希 -->
        <div class="tx-hash" id="txHashContainer" style="display: none;">
            <span class="tx-hash__label">交易哈希</span>
            <span class="tx-hash__value" id="txHashValue">--</span>
        </div>
    </main>

    <!-- Wallet Manager -->
    <script src="../js/wallet-manager.js"></script>
    
    <script>
        // 从 URL 获取铸造信息
        function getMintInfo() {
            const params = new URLSearchParams(window.location.search);
            return {
                tokenId: params.get('tokenId'),
                txHash: params.get('txHash'),
                name: params.get('name'),
                type: params.get('type'),
                genre: params.get('genre'),
                image: params.get('image')
            };
        }
        
        // 从 localStorage 获取最近的铸造信息
        function getStoredMintInfo() {
            try {
                const stored = localStorage.getItem('echo_last_mint');
                if (stored) {
                    return JSON.parse(stored);
                }
            } catch (e) {
                console.log('无存储的铸造信息');
            }
            return null;
        }
        
        // 更新页面显示
        function updateDisplay() {
            const urlInfo = getMintInfo();
            const storedInfo = getStoredMintInfo();
            
            // 合并信息，URL 参数优先
            const info = {
                ...storedInfo,
                ...Object.fromEntries(
                    Object.entries(urlInfo).filter(([_, v]) => v !== null)
                )
            };
            
            // 更新作品标题
            if (info.name) {
                document.getElementById('assetTitle').textContent = info.name;
            } else {
                document.getElementById('assetTitle').textContent = '未命名作品';
            }
            
            // 更新类型标签
            if (info.type) {
                const typeLabels = {
                    'music': '音乐',
                    'image': '图像',
                    'text': '文字',
                    'video': '影像'
                };
                document.getElementById('assetType').textContent = typeLabels[info.type] || info.type;
            }
            
            // 更新风格标签
            if (info.genre) {
                const genreLabels = {
                    'electronic': '电子',
                    'rock': '摇滚',
                    'classical': '古典',
                    'jazz': '爵士',
                    'pop': '流行',
                    'ambient': '氛围',
                    'hiphop': '嘻哈',
                    'folk': '民谣'
                };
                document.getElementById('assetGenre').textContent = genreLabels[info.genre] || info.genre;
            }
            
            // 更新 Token ID
            if (info.tokenId) {
                document.getElementById('assetToken').textContent = '#' + info.tokenId;
            }
            
            // 更新缩略图
            if (info.image) {
                const visual = document.getElementById('assetVisual');
                // XSS防护：创建img元素而不是使用innerHTML
                const img = document.createElement('img');
                img.src = info.image;
                img.alt = '作品缩略图';
                img.className = 'asset-card__image';
                visual.innerHTML = '';
                visual.appendChild(img);
            }
            
            // 显示交易哈希
            if (info.txHash) {
                const container = document.getElementById('txHashContainer');
                const value = document.getElementById('txHashValue');
                value.textContent = info.txHash.slice(0, 20) + '...' + info.txHash.slice(-8);
                container.style.display = 'block';
                
                // 点击复制
                container.style.cursor = 'pointer';
                container.title = '点击复制完整哈希';
                container.addEventListener('click', () => {
                    navigator.clipboard.writeText(info.txHash);
                    showToast('已复制到剪贴板');
                });
            }
        }
        
        // 显示提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background: var(--ink-deep, #1A1A1A);
                color: white;
                font-size: 14px;
                letter-spacing: 0.1em;
                border-radius: 2px;
                z-index: 10000;
                animation: fadeInUp 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateX(-50%) translateY(20px); }
                to { opacity: 1; transform: translateX(-50%) translateY(0); }
            }
            @keyframes fadeOut {
                to { opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // 页面加载时更新显示
        document.addEventListener('DOMContentLoaded', updateDisplay);
        
        // 监听钱包状态变化
        window.addEventListener('echo:walletConnected', (e) => {
            console.log('钱包已连接:', e.detail.address);
        });
        
        window.addEventListener('echo:walletDisconnected', () => {
            console.log('钱包已断开');
        });
    </script>
</body>
</html>
