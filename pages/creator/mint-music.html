<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铸 - ECHO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/styles/xuanzhi-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        .page-header {
            padding: 60px 0 40px;
            text-align: center;
        }
        .page-title {
            font-family: var(--font-wenkai);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }
        .page-subtitle {
            font-size: 1rem;
            color: var(--ink-light);
        }
        
        /* 步骤条 */
        .steps {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 48px;
            padding: 0 20px;
        }
        .step {
            text-align: center;
            position: relative;
        }
        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 16px;
            right: -40px;
            width: 20px;
            height: 1px;
            background: var(--ink-faint);
        }
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 0.85rem;
            color: var(--ink-light);
            border: 1px solid transparent;
        }
        .step.active .step-number {
            background: var(--seal-red);
            color: white;
        }
        .step.completed .step-number {
            background: var(--gold-primary);
            color: white;
        }
        .step-label {
            font-size: 0.8rem;
            color: var(--ink-light);
        }
        .step.active .step-label {
            color: var(--ink-deep);
        }
        
        /* 表单卡片 */
        .form-card {
            background: var(--bg-card);
            border: 1px solid rgba(122, 110, 95, 0.1);
            padding: 32px;
            margin-bottom: 24px;
        }
        .form-card-title {
            font-family: var(--font-wenkai);
            font-size: 1.1rem;
            margin-bottom: 24px;
            color: var(--ink-deep);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-card-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--seal-red);
        }
        
        /* 表单元素 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--ink-medium);
            margin-bottom: 8px;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(122, 110, 95, 0.2);
            background: var(--bg-primary);
            font-family: var(--font-serif);
            font-size: 0.95rem;
            color: var(--ink-deep);
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: var(--gold-primary);
        }
        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-hint {
            font-size: 0.75rem;
            color: var(--ink-faint);
            margin-top: 4px;
        }
        
        /* 上传区域 */
        .upload-zone {
            border: 2px dashed rgba(122, 110, 95, 0.3);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-secondary);
        }
        .upload-zone:hover {
            border-color: var(--gold-primary);
            background: var(--bg-tertiary);
        }
        .upload-zone.has-file {
            border-color: var(--seal-red);
            background: var(--seal-red-light);
        }
        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            color: var(--ink-faint);
        }
        .upload-text {
            font-size: 0.95rem;
            color: var(--ink-medium);
            margin-bottom: 8px;
        }
        .upload-hint {
            font-size: 0.75rem;
            color: var(--ink-faint);
        }
        
        /* 权利配置 */
        .rights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .right-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .right-item:hover {
            background: var(--bg-tertiary);
        }
        .right-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--seal-red);
        }
        .right-label {
            font-size: 0.85rem;
            color: var(--ink-medium);
        }
        
        /* 提交按钮 */
        .submit-section {
            text-align: center;
            padding: 32px;
        }
        .submit-btn {
            padding: 14px 48px;
            background: var(--seal-red);
            color: white;
            border: none;
            font-family: var(--font-serif);
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #802820;
        }
        .submit-btn:disabled {
            background: var(--ink-faint);
            cursor: not-allowed;
        }
        
        /* 进度指示 */
        .progress-section {
            display: none;
            text-align: center;
            padding: 48px;
        }
        .progress-section.active {
            display: block;
        }
        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 4px;
            background: var(--bg-tertiary);
            margin: 24px auto;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: var(--seal-red);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.9rem;
            color: var(--ink-light);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <a href="../index.html" class="navbar__brand">ECHO<span>·</span>铸</a>
        <div class="navbar__nav">
            <a href="../market/discover.html" class="navbar__link">探</a>
            <a href="../market/music-market.html" class="navbar__link">集</a>
            <a href="mint-music.html" class="navbar__link is-active">铸</a>
            <a href="../user/dashboard.html" class="navbar__link">境</a>
        </div>
        <button class="navbar__action" id="connectBtn">入链</button>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            <!-- 页头 -->
            <div class="page-header">
                <h1 class="page-title">铸声为境</h1>
                <p class="page-subtitle">将您的创作铸成独一无二的数字资产</p>
            </div>
            
            <!-- 步骤条 -->
            <div class="steps">
                <div class="step active" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-label">上传</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">信息</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">权利</div>
                </div>
                <div class="step" id="step4">
                    <div class="step-number">4</div>
                    <div class="step-label">铸造</div>
                </div>
            </div>
            
            <!-- 步骤1: 上传 -->
            <div class="form-card" id="uploadCard">
                <div class="form-card-title">上传音频</div>
                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">♪</div>
                    <div class="upload-text">点击或拖拽音频文件至此</div>
                    <div class="upload-hint">支持 MP3, WAV, FLAC 格式，最大 50MB</div>
                </div>
                <input type="file" id="fileInput" accept="audio/*" style="display: none;" onchange="handleFileSelect(event)">
            </div>
            
            <!-- 步骤2: 信息 -->
            <div class="form-card" id="infoCard">
                <div class="form-card-title">作品信息</div>
                <div class="form-group">
                    <label class="form-label">作品名称</label>
                    <input type="text" class="form-input" id="musicName" placeholder="为您的作品取个名字">
                </div>
                <div class="form-group">
                    <label class="form-label">作品描述</label>
                    <textarea class="form-textarea" id="musicDesc" placeholder="描述您的创作灵感、风格..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">音乐类型</label>
                    <select class="form-select" id="musicGenre">
                        <option value="">选择类型</option>
                        <option value="classical">古典</option>
                        <option value="folk">民谣</option>
                        <option value="electronic">电子</option>
                        <option value="pop">流行</option>
                        <option value="jazz">爵士</option>
                        <option value="ambient">氛围</option>
                    </select>
                </div>
            </div>
            
            <!-- 步骤3: 权利 -->
            <div class="form-card" id="rightsCard">
                <div class="form-card-title">权利配置</div>
                <div class="rights-grid">
                    <label class="right-item">
                        <input type="checkbox" checked>
                        <span class="right-label">允许商业使用</span>
                    </label>
                    <label class="right-item">
                        <input type="checkbox" checked>
                        <span class="right-label">允许改编</span>
                    </label>
                    <label class="right-item">
                        <input type="checkbox">
                        <span class="right-label">允许二次创作</span>
                    </label>
                    <label class="right-item">
                        <input type="checkbox" checked>
                        <span class="right-label">署名要求</span>
                    </label>
                </div>
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">授权费用 (MEER)</label>
                    <input type="number" class="form-input" id="licenseFee" placeholder="0.1" step="0.01" min="0">
                    <div class="form-hint">设置为 0 表示免费</div>
                </div>
            </div>
            
            <!-- 提交 -->
            <div class="submit-section" id="submitSection">
                <button class="submit-btn" id="mintBtn" onclick="mintMusic()">开始铸造</button>
            </div>
            
            <!-- 进度 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">正在上传...</div>
            </div>
        </div>
    </main>
    
    <!-- 底部 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">ECHO · 铸</div>
                <div class="footer-links">
                    <a href="../market/discover.html" class="footer-link">探</a>
                    <a href="../market/music-market.html" class="footer-link">集</a>
                    <a href="mint-music.html" class="footer-link">铸</a>
                </div>
            </div>
            <div class="footer-copyright">留声于链，归于创作者</div>
        </div>
    </footer>
    
    <script>
        // 导航栏滚动效果
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('is-scrolled');
            } else {
                navbar.classList.remove('is-scrolled');
            }
        });
        
        // 钱包连接
        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('请先安装 MetaMask');
                return;
            }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connectBtn').textContent = accounts[0].slice(0, 6) + '...' + accounts[0].slice(-4);
            } catch (e) {
                console.error(e);
            }
        }
        document.getElementById('connectBtn').addEventListener('click', connectWallet);
        
        // 文件上传
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const uploadZone = document.getElementById('uploadZone');
                uploadZone.classList.add('has-file');
                uploadZone.querySelector('.upload-text').textContent = file.name;
                uploadZone.querySelector('.upload-hint').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
                document.getElementById('step1').classList.add('completed');
                document.getElementById('step2').classList.add('active');
            }
        }
        
        // 铸造
        async function mintMusic() {
            const btn = document.getElementById('mintBtn');
            const progressSection = document.getElementById('progressSection');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            btn.disabled = true;
            progressSection.classList.add('active');
            
            // 模拟进度
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                progressFill.style.width = progress + '%';
                
                if (progress < 30) {
                    progressText.textContent = '正在上传音频...';
                } else if (progress < 60) {
                    progressText.textContent = '正在生成元数据...';
                } else if (progress < 90) {
                    progressText.textContent = '正在铸造 NFT...';
                } else {
                    progressText.textContent = '铸造完成！';
                }
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        alert('铸造成功！您的作品已上链。');
                        location.reload();
                    }, 500);
                }
            }, 300);
        }
    </script>
</body>
</html>
