<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO — 万物有灵，皆可生长</title>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ===== 导航栏样式（内嵌确保加载） ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(24px, 5vw, 80px);
            background: transparent;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.8s ease,
                        backdrop-filter 0.8s ease;
        }
        
        .navbar.is-scrolled {
            background: rgba(253, 252, 250, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 1px 0 rgba(122, 110, 95, 0.06);
        }
        
        .navbar__brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            flex-shrink: 0;
        }
        
        .navbar__logo {
            font-family: 'LXGW WenKai', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: #3A3530;
            letter-spacing: 0.3em;
            text-decoration: none;
            opacity: 0.85;
            transition: opacity 0.4s ease;
        }
        
        .navbar__brand:hover .navbar__logo {
            opacity: 1;
        }
        
        .navbar__nav {
            display: flex;
            align-items: center;
            gap: 3rem;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .navbar__link {
            position: relative;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: #7A6E5F;
            text-decoration: none;
            letter-spacing: 0.3em;
            padding: 0.5rem 0;
            transition: color 0.4s ease;
        }
        
        .navbar__link:hover {
            color: #3A3530;
        }
        
        .navbar__link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0.5px;
            background: #C9B896;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .navbar__link:hover::after {
            width: 100%;
        }
        
        .navbar__actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-shrink: 0;
        }
        
        .navbar__user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            border-radius: 2px;
            border: 0.5px solid rgba(122, 110, 95, 0.15);
            background: transparent;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.8rem;
            color: #7A6E5F;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        
        .navbar__user:hover {
            border-color: #C9B896;
            color: #3A3530;
            background: rgba(201, 184, 150, 0.05);
        }
        
        .navbar__user-placeholder {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(122, 110, 95, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .navbar__user-placeholder svg {
            width: 12px;
            height: 12px;
            stroke: #7A6E5F;
        }
        
        .navbar__menu-btn {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }
        
        .navbar__menu-line {
            width: 24px;
            height: 1px;
            background: #7A6E5F;
            transition: all 0.4s ease;
            transform-origin: center;
        }
        
        .navbar__mobile-menu {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(253, 252, 250, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        
        .navbar__mobile-menu.is-open {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .navbar__mobile-menu .navbar__link {
            font-size: 1.5rem;
            font-weight: 300;
            color: #5A5045;
            padding: 1rem 0;
            letter-spacing: 0.5em;
        }
        
        .navbar__mobile-menu .navbar__link:hover {
            color: #3A3530;
        }
        
        .navbar__mobile-menu .navbar__link::after {
            display: none;
        }
        
        @media (max-width: 768px) {
            .navbar__nav {
                display: none;
            }
            .navbar__actions {
                display: none;
            }
            .navbar__menu-btn {
                display: flex;
            }
            .navbar__brand {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
            }
        }
        
        @media (min-width: 769px) {
            .navbar__mobile-menu {
                display: none !important;
            }
        }
        :root {
            /* 宣纸质感 */
            --bg-primary: #F8F6F1;
            --bg-secondary: #F2EFE8;
            --bg-tertiary: #EBE7DD;
            
            /* 四阶墨色 */
            --ink-deep: #1A1A1A;
            --ink-medium: #4A4A4A;
            --ink-light: #7A6E5F;
            --ink-faint: #B5B5B5;
            
            /* 宋金 */
            --gold-primary: #B89B6C;
            --gold-light: #D4C4A8;
            
            /* 三域 - 宋瓷高级感 */
            --realm-sound: #8B9DC3;
            --realm-color: #C9A9A6;
            --realm-text: #7A8B7C;
            
            /* 字体 */
            --font-display: 'LXGW WenKai', cursive;
            --font-serif: 'Noto Serif SC', serif;
            
            /* 时长 */
            --duration-slow: 1.2s;
            --duration-ambient: 12s;
            
            /* 缓动 */
            --ease-ink: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ease-breath: cubic-bezier(0.45, 0, 0.55, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--font-serif);
            background: var(--bg-primary);
            color: var(--ink-deep);
            line-height: 1.8;
            overflow-x: hidden;
        }
        
        /* ===== HERO 区 ===== */
        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 5vh 5vw;
            padding-top: 80px; /* 为导航栏留空间 */
        }
        
        /* 宣纸纹理 */
        .hero-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
        }
        
        /* 窗棂光晕 */
        .hero-light {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(ellipse at center, 
                rgba(232, 228, 220, 0.6) 0%, 
                transparent 70%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 1;
            animation: lightBreath var(--duration-ambient) ease-in-out infinite;
        }
        
        .hero-light--primary {
            top: -20%;
            right: -10%;
        }
        
        .hero-light--secondary {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(ellipse at center, 
                rgba(212, 196, 168, 0.3) 0%, 
                transparent 60%);
            top: auto;
            right: auto;
            bottom: -10%;
            left: -5%;
            animation-delay: -6s;
        }
        
        @keyframes lightBreath {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        
        /* 宋瓷开片装饰 */
        .hero-crackle {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 0.5px solid var(--gold-primary);
            opacity: 0.2;
            pointer-events: none;
            z-index: 2;
        }
        
        .hero-crackle--tr {
            top: 10%;
            right: 10%;
            border-right: none;
            border-top: none;
        }
        
        .hero-crackle--bl {
            bottom: 10%;
            left: 10%;
            border-left: none;
            border-bottom: none;
        }
        
        /* 主内容 */
        .hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            text-align: center;
        }
        
        /* 主文案 + 印章 */
        .hero-slogan-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            /* 移除动画，直接显示 */
            opacity: 1;
            transform: none;
            filter: none;
        }
        
        .hero-slogan {
            font-family: var(--font-display);
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 300;
            color: var(--ink-deep);
            letter-spacing: 0.2em;
            line-height: 1.8;
        }
        
        /* 朱红印章 - 使用图片 + SVG 滤镜 */
        .hero-seal {
            width: 48px;
            height: 84px;
            background-image: url('../images/seal-gongsheng.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            opacity: 1;
            /* 整体调色：降低亮度、饱和度，偏向暗朱红 */
            filter: url(#brushEdge) brightness(0.75) saturate(0.85) sepia(0.15);
        }
        
        /* 隐藏文字容器 */
        .hero-seal-text-img {
            display: none;
        }
        
        @keyframes sealStamp {
            0% { 
                opacity: 0; 
                transform: scale(0.8) rotate(-3deg);
            }
            60% {
                opacity: 1;
                transform: scale(1.05) rotate(1deg);
            }
            100% { 
                opacity: 1; 
                transform: scale(1) rotate(0deg);
            }
        }
            100% { 
                opacity: 1; 
                transform: scale(1) rotate(0deg);
            }
        }
        
        @keyframes emerge {
            0% { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        
        /* ECHO 品牌 */
        .hero-brand {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400;
            color: var(--ink-medium);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1.5s ease 1s forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* 底部小字 */
        .hero-subtitle {
            opacity: 0;
            animation: fadeIn 1.5s ease 1.5s forwards;
        }
        
        .subtitle-main {
            font-family: var(--font-serif);
            font-size: 0.85rem;
            color: var(--ink-light);
            letter-spacing: 0.15em;
            font-weight: 300;
            line-height: 2;
        }
        
        /* 宋瓷按钮 */
        .hero-cta {
            margin-top: 1rem;
            position: relative;
            padding: 1.2rem 4rem;
            font-family: var(--font-serif);
            font-size: 0.85rem;
            letter-spacing: 0.5em;
            color: var(--ink-deep);
            background: transparent;
            border: 0.5px solid rgba(26, 26, 26, 0.08);
            border-radius: 1px;
            cursor: pointer;
            overflow: hidden;
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            animation: fadeInUp 1.5s cubic-bezier(0.23, 1, 0.32, 1) 2s forwards;
        }
        
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .hero-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(184, 155, 108, 0.1), 
                transparent);
            transition: left 1.5s ease;
        }
        
        .hero-cta:hover::before {
            left: 100%;
        }
        
        .hero-cta:hover {
            border-color: var(--gold-light);
            letter-spacing: 0.6em;
            color: var(--ink-deep);
        }
        
        .hero-cta span {
            position: relative;
            z-index: 2;
        }
        
        /* ===== 特色介绍区 ===== */
        .features {
            padding: 15vh 10vw;
            background: var(--bg-secondary);
        }
        
        .section-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 4rem;
            text-align: center;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
        }
        
        .feature-card {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--bg-primary);
            border-radius: 2px;
            transition: transform 0.8s var(--ease-ink);
            border: 0.5px solid rgba(26, 26, 26, 0.06);
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
        }
        
        /* 三域卡片背景色 */
        .feature-card--sound {
            background: #8B9DC3;
        }
        
        .feature-card--sound .feature-title,
        .feature-card--sound .feature-desc {
            color: rgba(255, 255, 255, 0.95);
        }
        
        .feature-card--color {
            background: #C9A9A6;
        }
        
        .feature-card--color .feature-title,
        .feature-card--color .feature-desc {
            color: rgba(255, 255, 255, 0.95);
        }
        
        .feature-card--text {
            background: #7A8B7C;
        }
        
        .feature-card--text .feature-title,
        .feature-card--text .feature-desc {
            color: rgba(255, 255, 255, 0.95);
        }
        
        .feature-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 1.5rem;
            opacity: 0.7;
        }
        
        .feature-icon svg {
            width: 100%;
            height: 100%;
        }
        
        .feature-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: 0.15em;
            color: var(--ink-deep);
        }
        
        .feature-desc {
            font-size: 0.85rem;
            color: var(--ink-light);
            line-height: 2;
            letter-spacing: 0.05em;
        }
        
        /* ===== 关于区 ===== */
        .about {
            padding: 15vh 10vw;
            background: var(--bg-primary);
            text-align: center;
        }
        
        .about-text {
            max-width: 600px;
            margin: 0 auto;
            font-family: var(--font-display);
            font-size: 1.1rem;
            line-height: 2.4;
            color: var(--ink-medium);
            letter-spacing: 0.1em;
        }
        
        /* ===== CTA区 ===== */
        .cta {
            padding: 15vh 10vw;
            background: var(--bg-secondary);
            text-align: center;
        }
        
        .cta-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
        }
        
        .cta-btn {
            display: inline-block;
            padding: 1.2rem 4rem;
            font-family: var(--font-serif);
            font-size: 0.85rem;
            letter-spacing: 0.5em;
            color: var(--ink-deep);
            background: transparent;
            border: 0.5px solid var(--gold-primary);
            border-radius: 1px;
            cursor: pointer;
            overflow: hidden;
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
        }
        
        .cta-btn:hover {
            background: var(--gold-primary);
            color: white;
            letter-spacing: 0.6em;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .hero-slogan {
                font-size: clamp(1rem, 4vw, 1.2rem);
                letter-spacing: 0.1em;
            }
            
            .hero-seal {
                width: 40px;
                height: 70px;
            }
            
            .hero-slogan-wrapper {
                gap: 0.5rem;
            }
            
            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 东方美学导航栏 -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="navbar__water-ripple" aria-hidden="true"></div>
        
        <a href="index.html" class="navbar__brand" aria-label="返回首页">
            <span class="navbar__logo">ECHO</span>
        </a>
        
        <div class="navbar__nav">
            <a href="index.html" class="navbar__link" aria-current="page">境</a>
            <a href="marketplace.html" class="navbar__link">集</a>
            <a href="docs.html" class="navbar__link">典</a>
        </div>
        
        <div class="navbar__actions">
            <button class="navbar__user" id="connectWallet" type="button" aria-label="连接钱包">
                <span class="navbar__user-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </span>
                <span>入链</span>
            </button>
            
            <button class="navbar__user navbar__user--connected" id="userMenu" type="button" aria-label="打开用户菜单" style="display: none;">
                <img src="" alt="" class="navbar__user-avatar" id="userAvatar">
                <span id="userName">吾</span>
            </button>
        </div>
        
        <button class="navbar__menu-btn" id="menuBtn" type="button" aria-label="打开导航菜单" aria-expanded="false" aria-controls="mobileMenu">
            <span class="navbar__menu-line"></span>
            <span class="navbar__menu-line"></span>
            <span class="navbar__menu-line"></span>
        </button>
        
        <div class="navbar__mobile-menu" id="mobileMenu" aria-hidden="true">
            <a href="index.html" class="navbar__link">境</a>
            <a href="marketplace.html" class="navbar__link">集</a>
            <a href="docs.html" class="navbar__link">典</a>
            <button class="navbar__user" id="mobileConnectWallet" type="button">
                <span class="navbar__user-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </span>
                <span>入链</span>
            </button>
        </div>
    </nav>

    <!-- SVG Filters for seal -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <defs>
            <!-- 毛笔涂抹边缘 -->
            <filter id="brushEdge" x="-20%" y="-15%" width="140%" height="130%">
                <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <!-- HERO 区 -->
    <section class="hero">
        <div class="hero-texture"></div>
        <div class="hero-light hero-light--primary"></div>
        <div class="hero-light hero-light--secondary"></div>
        <div class="hero-crackle hero-crackle--tr"></div>
        <div class="hero-crackle hero-crackle--bl"></div>
        
        <div class="hero-content">
            <div class="hero-title">
                <div class="hero-slogan-wrapper">
                    <span class="hero-slogan">万物有灵，皆可生长</span>
                    <div class="hero-seal">
                        <div class="hero-seal-text-img"></div>
                    </div>
                </div>
                <span class="hero-brand">ECHO</span>
            </div>
            
            <div class="hero-subtitle">
                <span class="subtitle-main">创作即生命，流转即生长</span>
            </div>
            
            <button class="hero-cta" onclick="document.getElementById('features').scrollIntoView({behavior: 'smooth'})">
                <span>入境</span>
            </button>
        </div>
    </section>
    
    <!-- 特色介绍 -->
    <section class="features" id="features">
        <h2 class="section-title">三生</h2>
        
        <div class="features-grid">
            <div class="feature-card feature-card--sound">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="0.5">
                        <path d="M12 4v16M8 8c-2 2-2 6 0 8M16 6c3 3 3 9 0 12"/>
                    </svg>
                </div>
                <h3 class="feature-title">音</h3>
                <p class="feature-desc">声至心随</p>
            </div>
            
            <div class="feature-card feature-card--color">

    <!-- 导航栏交互脚本 -->
    <script>
        // 移动端菜单切换
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        menuBtn.addEventListener('click', () => {
            const isExpanded = menuBtn.getAttribute('aria-expanded') === 'true';
            menuBtn.setAttribute('aria-expanded', !isExpanded);
            mobileMenu.classList.toggle('is-open');
        });
        
        // 滚动时导航栏背景渐显
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('is-scrolled');
            } else {
                navbar.classList.remove('is-scrolled');
            }
        });
    </script>
