<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>集 - ECHO</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/styles/xuanzhi-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="../../frontend/js/i18n.js" defer></script>
  <script src="../../frontend/js/wallet-state.js" defer></script>
  <style>
    /* 页面特定样式 */
    .page-header {
      padding: 60px 0 40px;
      text-align: center;
    }
    
    .page-title {
      font-family: var(--font-wenkai);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .page-subtitle {
      font-size: 1rem;
      color: var(--ink-light);
    }
    
    /* 筛选区域 */
    .filter-section {
      background: var(--bg-secondary);
      border: 1px solid rgba(122, 110, 95, 0.1);
      padding: 24px;
      margin-bottom: 32px;
    }
    
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .filter-row:last-child {
      margin-bottom: 0;
    }
    
    .filter-label {
      font-size: 0.85rem;
      color: var(--ink-light);
      margin-right: 8px;
      display: flex;
      align-items: center;
    }
    
    .filter-tag {
      padding: 6px 16px;
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.15);
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: var(--ink-medium);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .filter-tag:hover {
      border-color: var(--gold-primary);
      color: var(--ink-deep);
    }
    
    .filter-tag.active {
      background: var(--seal-red);
      border-color: var(--seal-red);
      color: white;
    }
    
    /* 搜索栏 */
    .search-bar {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(122, 110, 95, 0.1);
    }
    
    .search-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(122, 110, 95, 0.2);
      background: var(--bg-card);
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: var(--ink-deep);
      outline: none;
      transition: border-color var(--transition-fast);
    }
    
    .search-input:focus {
      border-color: var(--gold-primary);
    }
    
    .search-input::placeholder {
      color: var(--ink-faint);
    }
    
    .search-btn {
      padding: 12px 28px;
      background: var(--seal-red);
      color: white;
      border: none;
      font-family: var(--font-serif);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    
    .search-btn:hover {
      background: #802820;
    }
    
    /* 高级筛选 */
    .advanced-filters {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(122, 110, 95, 0.1);
    }
    
    .filter-group {
      flex: 1;
      min-width: 200px;
    }
    
    .filter-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--ink-light);
      margin-bottom: 8px;
    }
    
    .filter-select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(122, 110, 95, 0.2);
      background: var(--bg-card);
      font-family: var(--font-serif);
      font-size: 0.9rem;
      color: var(--ink-deep);
      outline: none;
    }
    
    .bpm-range {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .bpm-value {
      min-width: 40px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--ink-medium);
    }
    
    /* 统计栏 */
    .stats-bar {
      display: flex;
      gap: 48px;
      margin-bottom: 32px;
      padding: 20px 24px;
      background: var(--bg-secondary);
      border-left: 3px solid var(--gold-primary);
    }
    
    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    
    .stat-value {
      font-family: var(--font-wenkai);
      font-size: 1.5rem;
      color: var(--seal-red);
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: var(--ink-light);
    }
    
    /* 音乐卡片网格 */
    .music-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    
    .music-card {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      overflow: hidden;
      transition: all var(--transition-normal);
    }
    
    .music-card:hover {
      border-color: rgba(184, 155, 108, 0.3);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      transform: translateY(-2px);
    }
    
    .music-visual {
      height: 160px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .music-icon {
      font-size: 3rem;
      color: var(--ink-faint);
    }
    
    .play-overlay {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--seal-red);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: white;
      cursor: pointer;
      opacity: 0;
      transition: all var(--transition-fast);
    }
    
    .music-card:hover .play-overlay {
      opacity: 1;
    }
    
    .play-overlay:hover {
      transform: scale(1.05);
    }
    
    .favorite-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(248, 246, 241, 0.9);
      border: 1px solid rgba(122, 110, 95, 0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      z-index: 10;
    }
    
    .favorite-btn:hover {
      transform: scale(1.1);
    }
    
    .favorite-btn.active {
      color: var(--seal-red);
    }
    
    .music-info {
      padding: 16px;
    }
    
    .music-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--ink-deep);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .music-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    
    .meta-tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      background: rgba(139, 157, 195, 0.1);
      color: var(--realm-sound);
    }
    
    .music-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(122, 110, 95, 0.1);
    }
    
    .price {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--gold-primary);
    }
    
    .price-unit {
      font-size: 0.75rem;
      color: var(--ink-light);
      font-weight: normal;
    }
    
    .buy-btn {
      padding: 6px 16px;
      background: var(--seal-red);
      border: none;
      color: white;
      font-family: var(--font-serif);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    
    .buy-btn:hover {
      background: #802820;
    }
    
    .share-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid rgba(122, 110, 95, 0.2);
      color: var(--ink-light);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .share-btn:hover {
      border-color: var(--gold-primary);
      color: var(--gold-primary);
    }
    
    /* 固定播放器 */
    .player-fixed {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(253, 252, 250, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(122, 110, 95, 0.1);
      padding: 16px 24px;
      display: none;
      align-items: center;
      gap: 16px;
      z-index: 1000;
    }
    
    .player-fixed.active {
      display: flex;
    }
    
    .player-info {
      flex: 0 0 200px;
    }
    
    .player-title {
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--ink-deep);
    }
    
    .player-artist {
      font-size: 0.8rem;
      color: var(--ink-light);
    }
    
    .player-preview-tag {
      font-size: 0.7rem;
      color: var(--gold-primary);
      margin-top: 4px;
    }
    
    .player-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .control-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1px solid rgba(122, 110, 95, 0.2);
      color: var(--ink-medium);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }
    
    .control-btn:hover {
      border-color: var(--gold-primary);
      color: var(--ink-deep);
    }
    
    .control-btn.play {
      background: var(--seal-red);
      border-color: var(--seal-red);
      color: white;
      width: 44px;
      height: 44px;
    }
    
    .control-btn.play:hover {
      background: #802820;
    }
    
    .player-progress {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .progress-bar {
      flex: 1;
      height: 3px;
      background: rgba(122, 110, 95, 0.2);
      cursor: pointer;
      position: relative;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--gold-primary);
      width: 0%;
    }
    
    .time {
      font-size: 0.75rem;
      color: var(--ink-light);
      font-variant-numeric: tabular-nums;
      min-width: 40px;
    }
    
    /* 弹窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(26, 26, 26, 0.6);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: var(--bg-card);
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(122, 110, 95, 0.1);
    }
    
    .modal-header {
      font-family: var(--font-wenkai);
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: var(--seal-red);
    }
    
    .modal-body {
      margin-bottom: 24px;
    }
    
    .modal-body p {
      color: var(--ink-medium);
      margin-bottom: 16px;
    }
    
    .license-card {
      background: var(--bg-secondary);
      padding: 16px;
      margin-top: 16px;
      text-align: left;
      border: 1px solid rgba(122, 110, 95, 0.1);
    }
    
    .license-title {
      font-size: 0.9rem;
      color: var(--gold-primary);
      margin-bottom: 12px;
      text-align: center;
    }
    
    .license-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(122, 110, 95, 0.1);
      font-size: 0.85rem;
    }
    
    .license-item:last-child {
      border-bottom: none;
    }
    
    .license-item span:first-child {
      color: var(--ink-light);
    }
    
    .license-item span:last-child {
      color: var(--ink-deep);
    }
    
    .modal-close-btn {
      padding: 10px 32px;
      background: var(--seal-red);
      border: none;
      color: white;
      font-family: var(--font-serif);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    
    .modal-close-btn:hover {
      background: #802820;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink-deep);
      color: var(--bg-primary);
      padding: 12px 24px;
      font-size: 0.9rem;
      z-index: 3000;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    /* 空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      background: var(--bg-secondary);
      border: 1px dashed rgba(122, 110, 95, 0.2);
    }
    
    .empty-state-text {
      color: var(--ink-light);
      font-size: 0.95rem;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .stats-bar {
        flex-direction: column;
        gap: 12px;
      }
      
      .player-fixed {
        flex-wrap: wrap;
        padding: 12px 16px;
      }
      
      .player-info {
        flex: 1 1 100%;
      }
      
      .player-progress {
        flex: 1 1 100%;
        order: 3;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="../index.html" class="navbar__brand">ECHO<span>·</span>集</a>
    <div class="navbar__nav">
      <a href="discover.html" class="navbar__link">探</a>
      <a href="music-market.html" class="navbar__link is-active">集</a>
      <a href="charts.html" class="navbar__link">榜</a>
      <a href="../creator/mint-music.html" class="navbar__link">铸</a>
      <a href="../user/dashboard.html" class="navbar__link">境</a>
    </div>
    <button class="navbar__action" id="connectBtn" onclick="connectWallet()">入链</button>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <!-- 页头 -->
      <div class="page-header">
        <h1 class="page-title">乐市集</h1>
        <p class="page-subtitle">寻声觅曲，以乐会友</p>
      </div>
      
      <!-- 筛选区域 -->
      <div class="filter-section">
        <div class="filter-row" id="genreFilters">
          <span class="filter-label">曲风</span>
          <div class="filter-tag active" data-filter="all">全部</div>
          <div class="filter-tag" data-filter="electronic">电子</div>
          <div class="filter-tag" data-filter="rock">摇滚</div>
          <div class="filter-tag" data-filter="classical">古典</div>
          <div class="filter-tag" data-filter="jazz">爵士</div>
          <div class="filter-tag" data-filter="pop">流行</div>
          <div class="filter-tag" data-filter="ambient">氛围</div>
          <div class="filter-tag" data-filter="hiphop">嘻哈</div>
          <div class="filter-tag" data-filter="folk">民谣</div>
        </div>
        
        <div class="search-bar">
          <input type="text" class="search-input" id="searchInput" placeholder="寻曲、寻人..." onkeyup="if(event.key==='Enter')applyFilters()">
          <button class="search-btn" onclick="applyFilters()">寻</button>
        </div>
        
        <!-- 高级筛选 -->
        <div class="advanced-filters">
          <div class="filter-row">
            <div class="filter-group">
              <label>BPM: <span id="bpmRangeValue">60 - 180</span></label>
              <div class="bpm-range">
                <input type="range" id="bpmMin" min="60" max="180" value="60" oninput="updateBPMRange()">
                <span class="bpm-value" id="bpmMinVal">60</span>
                <span style="color:var(--ink-light)">-</span>
                <span class="bpm-value" id="bpmMaxVal">180</span>
                <input type="range" id="bpmMax" min="60" max="180" value="180" oninput="updateBPMRange()">
              </div>
            </div>
            
            <div class="filter-group">
              <label>时长</label>
              <select id="durationFilter" class="filter-select" onchange="applyFilters()">
                <option value="all">全部</option>
                <option value="short">短 (&lt; 1分钟)</option>
                <option value="medium">中 (1-3分钟)</option>
                <option value="long">长 (&gt; 3分钟)</option>
              </select>
            </div>
            
            <div class="filter-group">
              <label>排序</label>
              <select id="sortBy" class="filter-select" onchange="applyFilters()">
                <option value="newest">最新</option>
                <option value="price-low">价低</option>
                <option value="price-high">价高</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 统计栏 -->
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-value" id="totalMusic">--</span>
          <span class="stat-label">首乐曲</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="totalCreators">--</span>
          <span class="stat-label">位创作者</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="totalTransactions">--</span>
          <span class="stat-label">次授权</span>
        </div>
      </div>
      
      <!-- 音乐列表 -->
      <div class="music-grid" id="musicGrid">
        <div class="empty-state">
          <p class="empty-state-text">入链以览乐市集...</p>
        </div>
      </div>
    </div>
  </main>
  
  <!-- 底部 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">ECHO · 集</div>
        <div class="footer-links">
          <a href="discover.html" class="footer-link">探</a>
          <a href="music-market.html" class="footer-link">集</a>
          <a href="charts.html" class="footer-link">榜</a>
        </div>
      </div>
      <div class="footer-copyright">留声于链，归于创作者</div>
    </div>
  </footer>

  <!-- 固定播放器 -->
  <div class="player-fixed" id="fixedPlayer">
    <div class="player-info">
      <div class="player-title" id="playerTitle">--</div>
      <div class="player-artist" id="playerArtist">--</div>
      <div class="player-preview-tag" id="playerPreviewTag" style="display: none;">◉ 30秒试赏</div>
    </div>
    
    <div class="player-controls">
      <button class="control-btn" onclick="skipBackward()">◀◀</button>
      <button class="control-btn play" id="playerPlayBtn" onclick="togglePlayer()">▶</button>
      <button class="control-btn" onclick="skipForward()">▶▶</button>
    </div>
    
    <div class="player-progress">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-bar" onclick="seekPlayer(event)">
        <div class="progress-fill" id="playerProgress"></div>
      </div>
      <span class="time" id="totalTime">0:00</span>
    </div>
    
    <button class="buy-btn" id="playerBuyBtn" onclick="buyCurrentMusic()" style="display: none;">购授权</button>
    
    <audio id="audioElement" preload="metadata"></audio>
  </div>

  <!-- 购买成功弹窗 -->
  <div class="modal" id="successModal">
    <div class="modal-content">
      <div class="modal-header">授权已成</div>
      <div class="modal-body">
        <p>您已获得此曲之权</p>
        <div class="license-card">
          <div class="license-title">权状</div>
          <div class="license-item">
            <span>号</span>
            <span id="licenseTokenId">--</span>
          </div>
          <div class="license-item">
            <span>类</span>
            <span>AI 训习之权</span>
          </div>
          <div class="license-item">
            <span>期</span>
            <span>三十日</span>
          </div>
          <div class="license-item">
            <span>证</span>
            <span id="licenseTxHash" style="font-size: 0.75rem;">--</span>
          </div>
        </div>
        <p style="font-size: 0.8rem; color: var(--ink-light); margin-top: 16px;">
          权录于链，可验于区块浏览器
        </p>
      </div>
      <button class="modal-close-btn" onclick="closeModal()">知悉</button>
    </div>
  </div>

  <script>
    // 合约配置
    const V2_CONTRACT_ADDRESS = '0xF98f63b7e8064Dcf9c2f25A906B2af89Af4840ce';
    const V2_ABI = [
      "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)",
      "function getCurrentTokenId() view returns (uint256)",
      "function payForUsage(uint256 tokenId, uint256 durationDays) payable"
    ];
    
    let provider, signer, contract, userAddress;
    let isConnected = false;
    let currentFilter = 'all';
    let musicList = [];
    let currentMusic = null;
    let isPlaying = false;
    let previewMode = true;
    
    const audio = document.getElementById('audioElement');
    
    // 导航栏滚动
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('is-scrolled');
      } else {
        navbar.classList.remove('is-scrolled');
      }
    });
    
    // 音频事件
    audio.addEventListener('timeupdate', function() {
      const current = this.currentTime;
      const duration = this.duration || 0;
      
      if (previewMode && current >= 30) {
        this.pause();
        this.currentTime = 0;
        isPlaying = false;
        document.getElementById('playerPlayBtn').textContent = '▶';
        showPreviewLimit();
        return;
      }
      
      const percent = (current / duration) * 100;
      document.getElementById('playerProgress').style.width = percent + '%';
      document.getElementById('currentTime').textContent = formatTime(current);
      document.getElementById('totalTime').textContent = formatTime(duration);
    });
    
    audio.addEventListener('ended', function() {
      isPlaying = false;
      document.getElementById('playerPlayBtn').textContent = '▶';
    });
    
    audio.addEventListener('loadedmetadata', function() {
      document.getElementById('totalTime').textContent = formatTime(this.duration);
    });
    
    function showPreviewLimit() {
      const tag = document.getElementById('playerPreviewTag');
      tag.innerHTML = '◉ 试赏已毕，请购授权';
      tag.style.color = 'var(--seal-red)';
      document.getElementById('playerBuyBtn').style.display = 'block';
    }
    
    // 筛选标签
    document.querySelectorAll('#genreFilters .filter-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('#genreFilters .filter-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        currentFilter = tag.dataset.filter;
        renderMusicList();
      });
    });
    
    // 连接钱包
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        showToast('请先置 MetaMask');
        return;
      }
      
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        isConnected = true;
        
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
        
        document.getElementById('connectBtn').textContent = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
        
        loadMusicList();
      } catch (error) {
        console.error('连接失败:', error);
      }
    }
    
    // 加载音乐列表
    async function loadMusicList() {
      if (!contract) return;
      
      try {
        const currentId = await contract.getCurrentTokenId();
        musicList = [];
        const creators = new Set();
        
        for (let i = 0; i < currentId.toNumber(); i++) {
          try {
            const [metadata, blueprint, creator] = await contract.getAssetInfo(i);
            
            if (metadata.assetType && metadata.assetType.startsWith('music_')) {
              let bpm = 120;
              let duration = '0:00';
              
              if (metadata.uri) {
                try {
                  if (metadata.uri.startsWith('data:')) {
                    const base64Data = metadata.uri.split(',')[1];
                    const jsonStr = atob(base64Data);
                    const meta = JSON.parse(jsonStr);
                    bpm = meta.bpm || 120;
                    duration = meta.duration || '0:00';
                  }
                } catch (e) {}
              }
              
              musicList.push({
                tokenId: i,
                name: metadata.name,
                genre: metadata.assetType.replace('music_', ''),
                creator: creator,
                price: ethers.utils.formatEther(blueprint.usage.fee),
                uri: metadata.uri,
                bpm: bpm,
                duration: duration
              });
              creators.add(creator);
            }
          } catch (e) {}
        }
        
        document.getElementById('totalMusic').textContent = musicList.length;
        document.getElementById('totalCreators').textContent = creators.size;
        document.getElementById('totalTransactions').textContent = '--';
        
        renderMusicList();
      } catch (error) {
        console.error('加载失败:', error);
      }
    }
    
    // 渲染音乐列表
    function renderMusicList() {
      const grid = document.getElementById('musicGrid');
      
      let filtered = musicList;
      if (currentFilter !== 'all') {
        filtered = musicList.filter(m => m.genre === currentFilter);
      }
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><p class="empty-state-text">暂无乐曲</p></div>';
        return;
      }
      
      const favorites = getFavorites();
      
      grid.innerHTML = filtered.map(music => {
        const isFav = favorites.includes(music.tokenId);
        return `
        <div class="music-card">
          <div class="music-visual">
            <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${music.tokenId})" title="${isFav ? '去藏' : '藏'}">
              ${isFav ? '●' : '○'}
            </button>
            <span class="music-icon">♪</span>
            <div class="play-overlay" onclick="playMusic(${music.tokenId})">▶</div>
          </div>
          <div class="music-info">
            <div class="music-title">${music.name}</div>
            <div class="music-meta">
              <span class="meta-tag">${getGenreLabel(music.genre)}</span>
              <span class="meta-tag">号${music.tokenId}</span>
            </div>
            <div class="music-stats">
              <div class="price">
                ${music.price}
                <span class="price-unit">MEER</span>
              </div>
              <div style="display: flex; gap: 8px;">
                <button class="share-btn" onclick="showToast('分享功能待续')">分</button>
                <button class="buy-btn" onclick="buyLicense(${music.tokenId}, '${music.price}')">购权</button>
              </div>
            </div>
          </div>
        </div>
      `}).join('');
    }
    
    // 更新BPM范围
    function updateBPMRange() {
      let min = parseInt(document.getElementById('bpmMin').value);
      let max = parseInt(document.getElementById('bpmMax').value);
      
      if (min > max) {
        const temp = min;
        min = max;
        max = temp;
        document.getElementById('bpmMin').value = min;
        document.getElementById('bpmMax').value = max;
      }
      
      document.getElementById('bpmMinVal').textContent = min;
      document.getElementById('bpmMaxVal').textContent = max;
      document.getElementById('bpmRangeValue').textContent = min + ' - ' + max;
    }
    
    // 应用筛选
    function applyFilters() {
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      const bpmMin = parseInt(document.getElementById('bpmMin').value);
      const bpmMax = parseInt(document.getElementById('bpmMax').value);
      const durationFilter = document.getElementById('durationFilter').value;
      const sortBy = document.getElementById('sortBy').value;
      
      let filtered = musicList;
      
      if (currentFilter !== 'all') {
        filtered = filtered.filter(m => m.genre === currentFilter);
      }
      
      if (keyword) {
        filtered = filtered.filter(m => 
          m.name.toLowerCase().includes(keyword) ||
          m.creator.toLowerCase().includes(keyword)
        );
      }
      
      filtered = filtered.filter(m => {
        const bpm = m.bpm || 120;
        return bpm >= bpmMin && bpm <= bpmMax;
      });
      
      if (durationFilter !== 'all') {
        filtered = filtered.filter(m => {
          const durationStr = m.duration || '0:00';
          const parts = durationStr.split(':');
          const seconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
          
          switch(durationFilter) {
            case 'short': return seconds < 60;
            case 'medium': return seconds >= 60 && seconds <= 180;
            case 'long': return seconds > 180;
            default: return true;
          }
        });
      }
      
      switch(sortBy) {
        case 'price-low':
          filtered.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
          break;
        case 'price-high':
          filtered.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
          break;
        case 'newest':
          filtered.sort((a, b) => b.tokenId - a.tokenId);
          break;
      }
      
      renderFilteredList(filtered);
    }
    
    function renderFilteredList(filtered) {
      const grid = document.getElementById('musicGrid');
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><p class="empty-state-text">未得匹配之曲</p></div>';
        return;
      }
      
      const favorites = getFavorites();
      
      grid.innerHTML = filtered.map(music => {
        const isFav = favorites.includes(music.tokenId);
        return `
        <div class="music-card">
          <div class="music-visual">
            <button class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(${music.tokenId})">
              ${isFav ? '●' : '○'}
            </button>
            <span class="music-icon">♪</span>
            <div class="play-overlay" onclick="playMusic(${music.tokenId})">▶</div>
          </div>
          <div class="music-info">
            <div class="music-title">${music.name}</div>
            <div class="music-meta">
              <span class="meta-tag">${getGenreLabel(music.genre)}</span>
              ${music.bpm ? `<span class="meta-tag">${music.bpm} BPM</span>` : ''}
              <span class="meta-tag">号${music.tokenId}</span>
            </div>
            <div class="music-stats">
              <div class="price">${music.price} <span class="price-unit">MEER</span></div>
              <div style="display: flex; gap: 8px;">
                <button class="share-btn" onclick="showToast('分享功能待续')">分</button>
                <button class="buy-btn" onclick="buyLicense(${music.tokenId}, '${music.price}')">购权</button>
              </div>
            </div>
          </div>
        </div>
      `}).join('');
    }
    
    // 收藏功能
    function getFavorites() {
      const data = localStorage.getItem('echoMusicData');
      if (!data) return [];
      try {
        const parsed = JSON.parse(data);
        return parsed.favorites || [];
      } catch (e) {
        return [];
      }
    }
    
    function toggleFavorite(tokenId) {
      const favorites = getFavorites();
      const index = favorites.indexOf(tokenId);
      
      if (index > -1) {
        favorites.splice(index, 1);
        showToast('已去藏');
      } else {
        favorites.push(tokenId);
        showToast('已藏之');
      }
      
      saveFavorites(favorites);
      renderMusicList();
    }
    
    function saveFavorites(favorites) {
      const data = localStorage.getItem('echoMusicData');
      let parsed = {};
      if (data) {
        try {
          parsed = JSON.parse(data);
        } catch (e) {}
      }
      parsed.favorites = favorites;
      localStorage.setItem('echoMusicData', JSON.stringify(parsed));
    }
    
    // 播放功能
    async function playMusic(tokenId) {
      const music = musicList.find(m => m.tokenId === tokenId);
      if (!music) return;
      
      currentMusic = music;
      previewMode = true;
      
      document.getElementById('playerTitle').textContent = music.name;
      document.getElementById('playerArtist').textContent = '作: ' + music.creator.slice(0, 6) + '...' + music.creator.slice(-4);
      document.getElementById('playerPreviewTag').style.display = 'block';
      document.getElementById('playerPreviewTag').innerHTML = '◉ 30秒试赏';
      document.getElementById('playerPreviewTag').style.color = 'var(--gold-primary)';
      document.getElementById('playerBuyBtn').style.display = 'none';
      document.getElementById('fixedPlayer').classList.add('active');
      
      let audioUrl = music.uri;
      if (audioUrl && audioUrl.startsWith('ipfs://')) {
        audioUrl = audioUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');
      }
      
      if (!audioUrl || audioUrl === '') {
        audioUrl = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
      }
      
      audio.src = audioUrl;
      audio.currentTime = 0;
      
      try {
        await audio.play();
        isPlaying = true;
        document.getElementById('playerPlayBtn').textContent = '❚❚';
      } catch (error) {
        console.error('播放失败:', error);
        showToast('音载失败');
      }
    }
    
    async function togglePlayer() {
      if (!currentMusic) return;
      
      const btn = document.getElementById('playerPlayBtn');
      
      if (isPlaying) {
        audio.pause();
        btn.textContent = '▶';
        isPlaying = false;
      } else {
        try {
          await audio.play();
          btn.textContent = '❚❚';
          isPlaying = true;
        } catch (error) {
          console.error('播放失败:', error);
        }
      }
    }
    
    function skipBackward() {
      if (!audio) return;
      audio.currentTime = Math.max(0, audio.currentTime - 10);
    }
    
    function skipForward() {
      if (!audio) return;
      if (previewMode) {
        audio.currentTime = Math.min(30, audio.currentTime + 10);
      } else {
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
      }
    }
    
    function seekPlayer(event) {
      const bar = event.currentTarget;
      const clickX = event.offsetX;
      const width = bar.offsetWidth;
      const percent = clickX / width;
      
      if (previewMode) {
        audio.currentTime = Math.min(30, percent * audio.duration);
      } else {
        audio.currentTime = percent * audio.duration;
      }
    }
    
    // 购买授权
    async function buyLicense(tokenId, price) {
      if (!isConnected) {
        showToast('请先入链');
        return;
      }
      
      try {
        const priceWei = ethers.utils.parseEther(price);
        const tx = await contract.payForUsage(tokenId, 30, { value: priceWei });
        await tx.wait();
        
        document.getElementById('licenseTokenId').textContent = '#' + tokenId;
        document.getElementById('licenseTxHash').textContent = tx.hash.slice(0, 20) + '...';
        document.getElementById('successModal').classList.add('active');
        
        previewMode = false;
        document.getElementById('playerPreviewTag').innerHTML = '◉ 已获全权';
        document.getElementById('playerPreviewTag').style.color = 'var(--gold-primary)';
        document.getElementById('playerBuyBtn').style.display = 'none';
      } catch (error) {
        showToast('购权不成: ' + error.message);
      }
    }
    
    function buyCurrentMusic() {
      if (currentMusic) {
        buyLicense(currentMusic.tokenId, currentMusic.price);
      }
    }
    
    function closeModal() {
      document.getElementById('successModal').classList.remove('active');
    }
    
    // 工具函数
    function getGenreLabel(genre) {
      const labels = {
        electronic: '电',
        rock: '岩',
        classical: '古',
        jazz: '爵',
        pop: '流',
        ambient: '氛',
        hiphop: '嘻',
        folk: '谣'
      };
      return labels[genre] || genre;
    }
    
    function formatTime(seconds) {
      if (isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return mins + ':' + secs.toString().padStart(2, '0');
    }
    
    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2500);
    }
  </script>
</body>
</html>
