<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>探 - ECHO</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/styles/xuanzhi-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="../../frontend/js/recommendation.js"></script>
  <script src="../../frontend/js/i18n.js" defer></script>
  <script src="../../frontend/js/wallet-state.js" defer></script>
  <style>
    /* 页面特定样式 */
    .page-header {
      padding: 60px 0 40px;
      text-align: center;
    }
    
    .page-title {
      font-family: var(--font-wenkai);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .page-subtitle {
      font-size: 1rem;
      color: var(--ink-light);
    }
    
    /* 搜索栏 */
    .search-bar {
      max-width: 600px;
      margin: 0 auto 48px;
      display: flex;
      gap: 12px;
    }
    
    .search-input {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid rgba(122, 110, 95, 0.2);
      background: var(--bg-card);
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: var(--ink-deep);
      outline: none;
      transition: border-color var(--transition-fast);
    }
    
    .search-input:focus {
      border-color: var(--gold-primary);
    }
    
    .search-input::placeholder {
      color: var(--ink-faint);
    }
    
    .search-btn {
      padding: 14px 28px;
      background: var(--seal-red);
      color: white;
      border: none;
      font-family: var(--font-serif);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    
    .search-btn:hover {
      background: #802820;
    }
    
    /* 内容区域 */
    .section {
      margin-bottom: 64px;
    }
    
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    
    .section-title {
      font-family: var(--font-wenkai);
      font-size: 1.25rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section-title::before {
      content: '';
      width: 3px;
      height: 18px;
      background: var(--seal-red);
    }
    
    .section-action {
      font-size: 0.85rem;
      color: var(--ink-light);
      cursor: pointer;
      transition: color var(--transition-fast);
    }
    
    .section-action:hover {
      color: var(--seal-red);
    }
    
    /* 音乐卡片网格 */
    .music-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }
    
    .music-card {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      padding: 20px;
      cursor: pointer;
      transition: all var(--transition-normal);
    }
    
    .music-card:hover {
      border-color: rgba(184, 155, 108, 0.3);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      transform: translateY(-2px);
    }
    
    .music-cover {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg-secondary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    
    .music-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--ink-deep);
    }
    
    .music-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--ink-light);
    }
    
    .music-price {
      color: var(--gold-primary);
      font-weight: 500;
    }
    
    /* 个性化推荐空状态 */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      background: var(--bg-secondary);
      border: 1px dashed rgba(122, 110, 95, 0.2);
    }
    
    .empty-state-text {
      color: var(--ink-light);
      font-size: 0.95rem;
    }
    
    /* 标签 */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.7rem;
      margin-right: 6px;
    }
    
    .tag-sound {
      background: rgba(139, 157, 195, 0.1);
      color: var(--realm-sound);
    }
    
    /* 刷新按钮 */
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--ink-faint);
      color: var(--ink-light);
      font-family: var(--font-serif);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .refresh-btn:hover {
      border-color: var(--seal-red);
      color: var(--seal-red);
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="../index.html" class="navbar__brand">ECHO<span>·</span>探</a>
    <div class="navbar__nav">
      <a href="discover.html" class="navbar__link is-active">探</a>
      <a href="music-market.html" class="navbar__link">集</a>
      <a href="charts.html" class="navbar__link">榜</a>
      <a href="../creator/mint-music.html" class="navbar__link">铸</a>
      <a href="../user/dashboard.html" class="navbar__link">境</a>
    </div>
    <button class="navbar__action" id="connectBtn" onclick="toggleWallet()">入链</button>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <!-- 页头 -->
      <div class="page-header">
        <h1 class="page-title">寻声而来</h1>
        <p class="page-subtitle">于万千音境中，觅得所好</p>
      </div>
      
      <!-- 搜索 -->
      <div class="search-bar">
        <input type="text" class="search-input" placeholder="寻曲、寻人、寻境..." id="searchInput">
        <button class="search-btn" onclick="search()">寻</button>
      </div>
      
      <!-- 个性化推荐 -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">为您而荐</h2>
          <button class="refresh-btn" onclick="refreshPersonalized()">⟳ 换一批</button>
        </div>
        <div class="music-grid" id="personalized">
          <div class="empty-state">
            <p class="empty-state-text">多听多赏，方可知您所好</p>
          </div>
        </div>
      </div>
      
      <!-- 热门推荐 -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">众人之选</h2>
        </div>
        <div class="music-grid" id="trending"></div>
      </div>
      
      <!-- 最新上架 -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">新境初开</h2>
        </div>
        <div class="music-grid" id="newReleases"></div>
      </div>
    </div>
  </main>
  
  <!-- 底部 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">ECHO · 探</div>
        <div class="footer-links">
          <a href="discover.html" class="footer-link">探</a>
          <a href="music-market.html" class="footer-link">集</a>
          <a href="charts.html" class="footer-link">榜</a>
        </div>
      </div>
      <div class="footer-copyright">留声于链，归于创作者</div>
    </div>
  </footer>
  
  <script>
    // 合约配置
    const V2_CONTRACT_ADDRESS = '0xF98f63b7e8064Dcf9c2f25A906B2af89Af4840ce';
    const V2_ABI = [
      "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)",
      "function getCurrentTokenId() view returns (uint256)"
    ];
    
    let provider, contract, userAddress;
    let allMusic = [];
    
    // 导航栏滚动效果
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('is-scrolled');
      } else {
        navbar.classList.remove('is-scrolled');
      }
    });
    
    // 钱包连接
    async function toggleWallet() {
      if (typeof window.ethereum === 'undefined') {
        alert('请先安装 MetaMask');
        return;
      }
      
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        document.getElementById('connectBtn').textContent = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
        
        provider = new ethers.providers.Web3Provider(window.ethereum);
        contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, provider);
        
        await loadAllMusic();
        loadPersonalized();
        loadTrending();
        loadNewReleases();
      } catch (e) {
        console.error(e);
      }
    }
    
    async function loadAllMusic() {
      try {
        const currentId = await contract.getCurrentTokenId();
        
        for (let i = 0; i < currentId.toNumber(); i++) {
          try {
            const [metadata, blueprint, creator] = await contract.getAssetInfo(i);
            if (metadata.assetType && metadata.assetType.startsWith('music_')) {
              allMusic.push({
                tokenId: i,
                name: metadata.name,
                genre: metadata.assetType.replace('music_', ''),
                creator: creator,
                price: ethers.utils.formatEther(blueprint.usage.fee),
                createdAt: metadata.createdAt?.toNumber() || 0
              });
            }
          } catch (e) {}
        }
      } catch (e) {
        console.error('加载音乐失败:', e);
      }
    }
    
    function getUserHistory() {
      return JSON.parse(localStorage.getItem('echoUserHistory') || '[]');
    }
    
    function analyzeUserPreferences(history) {
      const prefs = { genres: {} };
      history.forEach(item => {
        if (item.genre) prefs.genres[item.genre] = (prefs.genres[item.genre] || 0) + 1;
      });
      prefs.topGenres = Object.entries(prefs.genres)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([g]) => g);
      return prefs;
    }
    
    function loadPersonalized() {
      const history = getUserHistory();
      const container = document.getElementById('personalized');
      
      if (history.length === 0 || allMusic.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p class="empty-state-text">多听多赏，方可知您所好</p>
          </div>
        `;
        return;
      }
      
      const prefs = analyzeUserPreferences(history);
      const playedIds = new Set(history.map(h => h.tokenId));
      
      const recommendations = allMusic
        .filter(m => !playedIds.has(m.tokenId))
        .filter(m => prefs.topGenres.includes(m.genre))
        .slice(0, 4);
      
      renderMusicGrid(container, recommendations);
    }
    
    function loadTrending() {
      const trending = [...allMusic]
        .sort((a, b) => b.createdAt - a.createdAt)
        .slice(0, 4);
      renderMusicGrid(document.getElementById('trending'), trending);
    }
    
    function loadNewReleases() {
      const newReleases = [...allMusic]
        .sort((a, b) => b.tokenId - a.tokenId)
        .slice(0, 4);
      renderMusicGrid(document.getElementById('newReleases'), newReleases);
    }
    
    function renderMusicGrid(container, musicList) {
      if (musicList.length === 0) {
        container.innerHTML = '<div class="empty-state"><p class="empty-state-text">暂无音乐</p></div>';
        return;
      }
      
      container.innerHTML = musicList.map(m => `
        <div class="music-card" onclick="location.href='music-market.html'">
          <div class="music-cover">♪</div>
          <div class="music-title">${m.name}</div>
          <div class="music-meta">
            <span><span class="tag tag-sound">${m.genre}</span></span>
            <span class="music-price">${m.price} MEER</span>
          </div>
        </div>
      `).join('');
    }
    
    function refreshPersonalized() {
      loadPersonalized();
    }
    
    function search() {
      const query = document.getElementById('searchInput').value;
      if (query) {
        // 搜索逻辑
        console.log('搜索:', query);
      }
    }
    
    // 初始化
    window.addEventListener('load', () => {
      if (typeof window.ethereum !== 'undefined') {
        toggleWallet();
      }
    });
  </script>
</body>
</html>
