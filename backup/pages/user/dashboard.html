<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>境 - ECHO</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/styles/xuanzhi-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../../frontend/js/transaction-list.js"></script>
  <script src="../../frontend/js/withdraw.js"></script>
  <script src="../../frontend/js/i18n.js" defer></script>
  <script src="../../frontend/js/wallet-state.js" defer></script>
  <style>
    /* 页面特定样式 */
    .page-header {
      padding: 60px 0 40px;
      text-align: center;
    }
    
    .page-title {
      font-family: var(--font-wenkai);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .page-subtitle {
      font-size: 1rem;
      color: var(--ink-light);
    }
    
    /* 统计卡片网格 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 48px;
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      padding: 28px 20px;
      text-align: center;
      transition: all var(--transition-normal);
    }
    
    .stat-card:hover {
      border-color: rgba(184, 155, 108, 0.3);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    }
    
    .stat-value {
      font-family: var(--font-wenkai);
      font-size: 1.75rem;
      font-weight: 400;
      color: var(--seal-red);
      margin-bottom: 8px;
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: var(--ink-light);
      letter-spacing: 0.1em;
    }
    
    /* 图表区域 */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      margin-bottom: 48px;
    }
    
    .chart-card {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      padding: 24px;
    }
    
    .chart-card h3 {
      font-family: var(--font-wenkai);
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--ink-deep);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .chart-card h3::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--gold-primary);
    }
    
    /* 提现区域 */
    .withdraw-section {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      padding: 28px;
      margin-bottom: 48px;
    }
    
    .withdraw-section h3 {
      font-family: var(--font-wenkai);
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--ink-deep);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .withdraw-section h3::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--seal-red);
    }
    
    /* 交易列表 */
    .transactions-section {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      padding: 28px;
    }
    
    .transactions-section h3 {
      font-family: var(--font-wenkai);
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--ink-deep);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .transactions-section h3::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--gold-primary);
    }
    
    /* 筛选器样式 */
    #transactionFilters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    #transactionFilters select {
      background: var(--bg-primary);
      border: 1px solid rgba(122, 110, 95, 0.2);
      padding: 10px 16px;
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: var(--ink-deep);
      cursor: pointer;
      outline: none;
    }
    
    #transactionFilters select:focus {
      border-color: var(--gold-primary);
    }
    
    #transactionFilters button {
      background: var(--seal-red);
      border: none;
      padding: 10px 20px;
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: white;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    
    #transactionFilters button:hover {
      background: #802820;
    }
    
    #transactionList {
      max-height: 400px;
      overflow-y: auto;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="../index.html" class="navbar__brand">ECHO<span>·</span>境</a>
    <div class="navbar__nav">
      <a href="../market/discover.html" class="navbar__link">探</a>
      <a href="../market/music-market.html" class="navbar__link">集</a>
      <a href="../market/charts.html" class="navbar__link">榜</a>
      <a href="../creator/mint-music.html" class="navbar__link">铸</a>
      <a href="dashboard.html" class="navbar__link is-active">境</a>
    </div>
    <button class="navbar__action" id="connectBtn" onclick="init()">入链</button>
  </nav>

  <!-- 主内容 -->
  <main class="main-content">
    <div class="container">
      <!-- 页头 -->
      <div class="page-header">
        <h1 class="page-title">吾之境</h1>
        <p class="page-subtitle">创有所得，声有所归</p>
      </div>
      
      <!-- 统计卡片 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalRevenue">0 MEER</div>
          <div class="stat-label">总收益</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="monthRevenue">0 MEER</div>
          <div class="stat-label">本月收益</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="withdrawable">0 MEER</div>
          <div class="stat-label">可提现</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalLicenses">0</div>
          <div class="stat-label">授权次数</div>
        </div>
      </div>
      
      <!-- 图表 -->
      <div class="charts-grid">
        <div class="chart-card">
          <h3>收益流转（三十日）</h3>
          <canvas id="revenueChart"></canvas>
        </div>
        <div class="chart-card">
          <h3>收益来源</h3>
          <canvas id="sourceChart"></canvas>
        </div>
      </div>
      
      <!-- 提现区域 -->
      <div class="withdraw-section" id="withdrawContainer">
        <h3>提现</h3>
        <div id="withdrawForm"></div>
      </div>
      
      <!-- 交易明细 -->
      <div class="transactions-section">
        <h3>交易明细</h3>
        <div id="transactionFilters">
          <select id="filterType">
            <option value="all">全部类型</option>
            <option value="usage">使用费</option>
            <option value="derivative">衍生费</option>
          </select>
          <select id="filterPeriod">
            <option value="all">全部时间</option>
            <option value="today">今日</option>
            <option value="week">本周</option>
            <option value="month">本月</option>
          </select>
          <button onclick="exportTransactions()">导出CSV</button>
        </div>
        <div id="transactionList"></div>
      </div>
    </div>
  </main>
  
  <!-- 底部 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">ECHO · 境</div>
        <div class="footer-links">
          <a href="../market/discover.html" class="footer-link">探</a>
          <a href="../market/music-market.html" class="footer-link">集</a>
          <a href="dashboard.html" class="footer-link">境</a>
        </div>
      </div>
      <div class="footer-copyright">留声于链，归于创作者</div>
    </div>
  </footer>
  
  <script>
    // 合约配置
    const V2_CONTRACT_ADDRESS = '0x319148d9b9265D75858c508E445d65B649036f75';
    const V2_ABI = [
      "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)",
      "function getCurrentTokenId() view returns (uint256)",
      "event AssetUsed(uint256 indexed tokenId, address indexed user, uint256 amount)"
    ];
    
    let provider, signer, contract, userAddress;
    let transactionList, withdrawalSystem;
    let revenueChartInstance = null;
    let sourceChartInstance = null;
    
    // 导航栏滚动效果
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('is-scrolled');
      } else {
        navbar.classList.remove('is-scrolled');
      }
    });
    
    // 初始化
    async function init() {
      if (typeof window.ethereum === 'undefined') {
        alert('请安装 MetaMask');
        return;
      }
      
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        document.getElementById('connectBtn').textContent = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
        
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
        
        if (typeof TransactionList !== 'undefined') {
          transactionList = new TransactionList('transactionList', contract, userAddress);
          await transactionList.loadTransactions();
        }
        
        if (typeof WithdrawalSystem !== 'undefined') {
          withdrawalSystem = new WithdrawalSystem(contract, userAddress);
          withdrawalSystem.renderWithdrawalForm('withdrawForm');
        }
        
        await loadStats();
        initCharts();
        
        window.ethereum.on('accountsChanged', (accounts) => {
          if (accounts.length > 0) {
            userAddress = accounts[0];
            location.reload();
          }
        });
      } catch (error) {
        console.error('初始化失败:', error);
      }
    }
    
    // 加载统计数据
    async function loadStats() {
      try {
        const filter = contract.filters.AssetUsed(null, null, null);
        const events = await contract.queryFilter(filter, 0, 'latest');
        
        let total = 0;
        let monthTotal = 0;
        let count = 0;
        const now = Math.floor(Date.now() / 1000);
        const monthAgo = now - 30 * 24 * 60 * 60;
        
        const dailyRevenue = new Array(30).fill(0);
        let usageRevenue = 0;
        let derivativeRevenue = 0;
        
        for (const event of events) {
          if (event.args) {
            const amount = parseFloat(ethers.utils.formatEther(event.args.amount));
            total += amount;
            count++;
            
            const block = await provider.getBlock(event.blockNumber);
            if (block && block.timestamp > monthAgo) {
              monthTotal += amount;
              const daysAgo = Math.floor((now - block.timestamp) / (24 * 60 * 60));
              if (daysAgo >= 0 && daysAgo < 30) {
                dailyRevenue[29 - daysAgo] += amount;
              }
            }
            
            if (amount > 0.1) {
              usageRevenue += amount;
            } else {
              derivativeRevenue += amount;
            }
          }
        }
        
        document.getElementById('totalRevenue').textContent = total.toFixed(4) + ' MEER';
        document.getElementById('monthRevenue').textContent = monthTotal.toFixed(4) + ' MEER';
        document.getElementById('withdrawable').textContent = total.toFixed(4) + ' MEER';
        document.getElementById('totalLicenses').textContent = count;
        
        updateCharts(dailyRevenue, usageRevenue, derivativeRevenue);
      } catch (error) {
        console.error('加载统计数据失败:', error);
      }
    }
    
    // 初始化图表
    function initCharts() {
      const ctx1 = document.getElementById('revenueChart').getContext('2d');
      revenueChartInstance = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: Array.from({length: 30}, (_, i) => {
            const date = new Date();
            date.setDate(date.getDate() - (29 - i));
            return `${date.getMonth() + 1}/${date.getDate()}`;
          }),
          datasets: [{
            label: '日收益 (MEER)',
            data: Array.from({length: 30}, () => 0),
            borderColor: '#B89B6C',
            backgroundColor: 'rgba(184, 155, 108, 0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: '#B89B6C'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { 
            legend: { display: false }
          },
          scales: {
            y: { 
              grid: { color: 'rgba(122, 110, 95, 0.1)' }, 
              ticks: { color: '#7A6E5F' },
              beginAtZero: true
            },
            x: { 
              grid: { display: false }, 
              ticks: { color: '#7A6E5F', maxTicksLimit: 10 }
            }
          }
        }
      });
      
      const ctx2 = document.getElementById('sourceChart').getContext('2d');
      sourceChartInstance = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: ['使用费', '衍生费'],
          datasets: [{
            data: [70, 30],
            backgroundColor: ['#B89B6C', '#A03020'],
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          cutout: '60%',
          plugins: {
            legend: { 
              position: 'bottom', 
              labels: { color: '#4A4A4A', padding: 20 } 
            }
          }
        }
      });
    }
    
    // 更新图表数据
    function updateCharts(dailyRevenue, usageRevenue, derivativeRevenue) {
      if (revenueChartInstance) {
        revenueChartInstance.data.datasets[0].data = dailyRevenue;
        revenueChartInstance.update();
      }
      
      if (sourceChartInstance && usageRevenue + derivativeRevenue > 0) {
        sourceChartInstance.data.datasets[0].data = [usageRevenue, derivativeRevenue];
        sourceChartInstance.update();
      }
    }
    
    // 导出交易
    function exportTransactions() {
      if (transactionList && typeof transactionList.exportCSV === 'function') {
        transactionList.exportCSV();
      }
    }
    
    // 筛选交易
    function filterTransactions() {
      if (transactionList && typeof transactionList.filter === 'function') {
        const type = document.getElementById('filterType').value;
        const period = document.getElementById('filterPeriod').value;
        transactionList.filter(type, period);
      }
    }
    
    // 绑定筛选器事件
    document.addEventListener('DOMContentLoaded', () => {
      const filterType = document.getElementById('filterType');
      const filterPeriod = document.getElementById('filterPeriod');
      
      if (filterType) filterType.addEventListener('change', filterTransactions);
      if (filterPeriod) filterPeriod.addEventListener('change', filterTransactions);
    });
    
    if (window.ethereum && window.ethereum.selectedAddress) {
      init();
    }
  </script>
</body>
</html>
