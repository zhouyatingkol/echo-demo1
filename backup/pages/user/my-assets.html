<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藏 - ECHO</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/styles/xuanzhi-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="../../frontend/js/i18n.js" defer></script>
  <script src="../../frontend/js/wallet-state.js" defer></script>
  <style>
    .page-header {
      padding: 60px 0 40px;
      text-align: center;
    }
    
    .page-title {
      font-family: var(--font-wenkai);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .page-subtitle {
      font-size: 1rem;
      color: var(--ink-light);
    }
    
    /* 标签页 */
    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      border-bottom: 1px solid rgba(122, 110, 95, 0.15);
      padding-bottom: 16px;
    }
    
    .tab {
      padding: 10px 24px;
      background: transparent;
      border: 1px solid rgba(122, 110, 95, 0.2);
      font-family: var(--font-serif);
      font-size: 0.9rem;
      color: var(--ink-medium);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .tab:hover {
      border-color: var(--gold-primary);
      color: var(--ink-deep);
    }
    
    .tab.active {
      background: var(--seal-red);
      border-color: var(--seal-red);
      color: white;
    }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      padding: 24px;
      text-align: center;
      transition: all var(--transition-normal);
    }
    
    .stat-card:hover {
      border-color: rgba(184, 155, 108, 0.3);
    }
    
    .stat-value {
      font-family: var(--font-wenkai);
      font-size: 1.5rem;
      color: var(--seal-red);
      margin-bottom: 8px;
    }
    
    .stat-label {
      font-size: 0.85rem;
      color: var(--ink-light);
      letter-spacing: 0.1em;
    }
    
    /* 资产网格 */
    .asset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    
    .asset-card {
      background: var(--bg-card);
      border: 1px solid rgba(122, 110, 95, 0.1);
      overflow: hidden;
      transition: all var(--transition-normal);
    }
    
    .asset-card:hover {
      border-color: rgba(184, 155, 108, 0.3);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      transform: translateY(-2px);
    }
    
    .asset-visual {
      height: 140px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .asset-icon {
      font-size: 3rem;
      color: var(--ink-faint);
    }
    
    .asset-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      font-size: 0.7rem;
      background: var(--gold-faint);
      color: var(--gold-primary);
      border: 1px solid rgba(184, 155, 108, 0.3);
    }
    
    .asset-badge.created {
      background: rgba(139, 157, 195, 0.1);
      color: var(--realm-sound);
      border-color: rgba(139, 157, 195, 0.3);
    }
    
    .asset-info {
      padding: 16px;
    }
    
    .asset-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ink-deep);
    }
    
    .asset-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    
    .meta-tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      background: rgba(139, 157, 195, 0.1);
      color: var(--realm-sound);
    }
    
    .asset-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(122, 110, 95, 0.1);
    }
    
    .stat-mini {
      text-align: center;
    }
    
    .stat-mini-value {
      font-size: 1rem;
      font-weight: 500;
      color: var(--gold-primary);
    }
    
    .stat-mini-label {
      font-size: 0.7rem;
      color: var(--ink-light);
    }
    
    .btn-small {
      padding: 6px 14px;
      background: var(--seal-red);
      border: none;
      font-family: var(--font-serif);
      font-size: 0.8rem;
      color: white;
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    
    .btn-small:hover {
      background: #802820;
    }
    
    .btn-small.secondary {
      background: transparent;
      border: 1px solid rgba(122, 110, 95, 0.3);
      color: var(--ink-medium);
    }
    
    .btn-small.secondary:hover {
      border-color: var(--seal-red);
      color: var(--seal-red);
    }
    
    .action-btns {
      display: flex;
      gap: 8px;
    }
    
    /* 授权卡片 */
    .license-card {
      background: var(--bg-secondary);
      padding: 12px;
      margin-top: 12px;
      border: 1px solid rgba(122, 110, 95, 0.1);
    }
    
    .license-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: var(--realm-text);
    }
    
    .license-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--ink-light);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      background: var(--bg-secondary);
      border: 1px dashed rgba(122, 110, 95, 0.2);
      grid-column: 1 / -1;
    }
    
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    .empty-title {
      font-size: 1.1rem;
      color: var(--ink-medium);
      margin-bottom: 8px;
    }
    
    .empty-desc {
      font-size: 0.9rem;
      color: var(--ink-light);
      margin-bottom: 24px;
    }
    
    /* 加载 */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--ink-light);
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(122, 110, 95, 0.1);
      border-top-color: var(--seal-red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="../index.html" class="navbar__brand">ECHO<span>·</span>藏</a>
    <div class="navbar__nav">
      <a href="../market/discover.html" class="navbar__link">探</a>
      <a href="../market/music-market.html" class="navbar__link">集</a>
      <a href="../market/charts.html" class="navbar__link">榜</a>
      <a href="../creator/mint-music.html" class="navbar__link">铸</a>
      <a href="dashboard.html" class="navbar__link">境</a>
    </div>
    <button class="navbar__action" id="connectBtn" onclick="connectWallet()">入链</button>
  </nav>

  <main class="main-content">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">吾之藏</h1>
        <p class="page-subtitle">声之所铸，权之所归</p>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('created')" id="tabCreated">吾铸</div>
        <div class="tab" onclick="switchTab('licensed')" id="tabLicensed">吾权</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statTotal">--</div>
          <div class="stat-label">总资产</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statCreated">--</div>
          <div class="stat-label">自铸</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statLicensed">--</div>
          <div class="stat-label">获权</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statRevenue">--</div>
          <div class="stat-label">总收益 (MEER)</div>
        </div>
      </div>

      <div id="contentArea">
        <div class="loading">
          <div class="spinner"></div>
          <p>入链以览吾藏...</p>
        </div>
      </div>
    </div>
  </main>
  
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">ECHO · 藏</div>
        <div class="footer-links">
          <a href="../market/discover.html" class="footer-link">探</a>
          <a href="dashboard.html" class="footer-link">境</a>
          <a href="my-assets.html" class="footer-link">藏</a>
        </div>
      </div>
      <div class="footer-copyright">留声于链，归于创作者</div>
    </div>
  </footer>

  <script>
    const V2_CONTRACT_ADDRESS = '0xF98f63b7e8064Dcf9c2f25A906B2af89Af4840ce';
    const V2_ABI = [
      "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)",
      "function getCurrentTokenId() view returns (uint256)",
      "function getUsageLicense(address user, uint256 tokenId) view returns (tuple(uint256 tokenId, address licensee, uint256 startTime, uint256 duration, uint256 paidAmount, bool isValid))"
    ];
    
    let provider, signer, contract, userAddress;
    let isConnected = false;
    let currentTab = 'created';
    let createdAssets = [];
    let licensedAssets = [];
    
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      if (window.scrollY > 50) {
        navbar.classList.add('is-scrolled');
      } else {
        navbar.classList.remove('is-scrolled');
      }
    });
    
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        alert('请先置 MetaMask');
        return;
      }
      
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0];
        isConnected = true;
        
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
        
        document.getElementById('connectBtn').textContent = userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
        
        loadAssets();
      } catch (error) {
        console.error('连接失败:', error);
      }
    }
    
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab' + (tab === 'created' ? 'Created' : 'Licensed')).classList.add('active');
      renderContent();
    }
    
    async function loadAssets() {
      if (!contract) return;
      
      try {
        const currentId = await contract.getCurrentTokenId();
        createdAssets = [];
        licensedAssets = [];
        let totalRevenue = 0;
        
        for (let i = 0; i < currentId.toNumber(); i++) {
          try {
            const [metadata, blueprint, creator] = await contract.getAssetInfo(i);
            
            if (metadata.assetType && metadata.assetType.startsWith('music_')) {
              const asset = {
                tokenId: i,
                name: metadata.name,
                description: metadata.description,
                genre: metadata.assetType.replace('music_', ''),
                creator: creator,
                price: ethers.utils.formatEther(blueprint.usage.fee),
                uri: metadata.uri,
                createdAt: new Date(metadata.createdAt.toNumber() * 1000).toLocaleDateString()
              };
              
              if (creator.toLowerCase() === userAddress.toLowerCase()) {
                createdAssets.push(asset);
              }
              
              try {
                const license = await contract.getUsageLicense(userAddress, i);
                if (license.isValid) {
                  licensedAssets.push({
                    ...asset,
                    licenseStart: new Date(license.startTime.toNumber() * 1000).toLocaleDateString(),
                    licenseDuration: license.duration.toNumber()
                  });
                }
              } catch (e) {}
            }
          } catch (e) {}
        }
        
        document.getElementById('statTotal').textContent = createdAssets.length + licensedAssets.length;
        document.getElementById('statCreated').textContent = createdAssets.length;
        document.getElementById('statLicensed').textContent = licensedAssets.length;
        document.getElementById('statRevenue').textContent = '0';
        
        renderContent();
      } catch (error) {
        console.error('加载失败:', error);
        document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="empty-title">加载失败</div></div>';
      }
    }
    
    function renderContent() {
      const assets = currentTab === 'created' ? createdAssets : licensedAssets;
      const container = document.getElementById('contentArea');
      
      if (assets.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">${currentTab === 'created' ? '♪' : '◉'}</div>
            <div class="empty-title">暂无${currentTab === 'created' ? '铸' : '权'}之音境</div>
            <div class="empty-desc">${currentTab === 'created' ? '去铸您之首曲' : '去市集获权'}</div>
            <button class="btn-small" onclick="location.href='${currentTab === 'created' ? '../creator/mint-music.html' : '../market/music-market.html'}'">
              ${currentTab === 'created' ? '去铸音' : '去市集'}
            </button>
          </div>
        `;
        return;
      }
      
      container.innerHTML = `<div class="asset-grid">${assets.map(asset => renderAssetCard(asset)).join('')}</div>`;
    }
    
    function renderAssetCard(asset) {
      const isCreated = currentTab === 'created';
      
      return `
        <div class="asset-card">
          <div class="asset-visual">
            <span class="asset-icon">♪</span>
            <div class="asset-badge ${isCreated ? 'created' : ''}">
              ${isCreated ? '自铸' : '获权'}
            </div>
          </div>
          <div class="asset-info">
            <div class="asset-title">${asset.name}</div>
            <div class="asset-meta">
              <span class="meta-tag">${getGenreLabel(asset.genre)}</span>
              <span class="meta-tag">号${asset.tokenId}</span>
            </div>
            ${isCreated ? renderCreatedStats(asset) : renderLicenseInfo(asset)}
          </div>
        </div>
      `;
    }
    
    function renderCreatedStats(asset) {
      return `
        <div class="asset-stats">
          <div class="stat-mini">
            <div class="stat-mini-value">${asset.price}</div>
            <div class="stat-mini-label">MEER/次</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-value">0</div>
            <div class="stat-mini-label">流转</div>
          </div>
          <div class="action-btns">
            <button class="btn-small" onclick="viewAsset(${asset.tokenId})">览</button>
          </div>
        </div>
      `;
    }
    
    function renderLicenseInfo(asset) {
      return `
        <div class="license-card">
          <div class="license-header">
            <span>◉</span>
            <span>AI 训习之权</span>
          </div>
          <div class="license-info">
            <span>期: ${asset.licenseDuration} 日</span>
            <span>${asset.licenseStart}</span>
          </div>
        </div>
        <div class="asset-stats" style="margin-top: 12px;">
          <div class="action-btns" style="margin-left: auto;">
            <button class="btn-small" onclick="playAsset(${asset.tokenId})">▶ 赏</button>
            <button class="btn-small secondary" onclick="viewAsset(${asset.tokenId})">详</button>
          </div>
        </div>
      `;
    }
    
    function getGenreLabel(genre) {
      const labels = {
        electronic: '电子', rock: '摇滚', classical: '古典',
        jazz: '爵士', pop: '流行', ambient: '氛围',
        hiphop: '嘻哈', folk: '民谣'
      };
      return labels[genre] || genre;
    }
    
    function viewAsset(tokenId) {
      alert('详览音境 #' + tokenId);
    }
    
    function playAsset(tokenId) {
      const asset = licensedAssets.find(a => a.tokenId === tokenId);
      if (asset) {
        window.open('../market/music-market.html', '_blank');
      }
    }
  </script>
</body>
</html>
