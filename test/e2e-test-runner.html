<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO 协议 - E2E 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        
        .test-dashboard {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .summary-card.pass {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
        }
        
        .summary-card.fail {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }
        
        .summary-card .number {
            font-size: 3rem;
            font-weight: bold;
            color: #333;
        }
        
        .summary-card .label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }
        
        .test-results {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .test-suite {
            margin-bottom: 20px;
        }
        
        .suite-header {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            padding: 10px;
            background: #e9ecef;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .test-case {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }
        
        .test-case.pending {
            border-left-color: #ffc107;
        }
        
        .test-case.pass {
            border-left-color: #28a745;
            background: #d4edda;
        }
        
        .test-case.fail {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        
        .test-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 14px;
        }
        
        .test-case.pending .test-status {
            background: #ffc107;
            animation: pulse 1.5s infinite;
        }
        
        .test-case.pass .test-status {
            background: #28a745;
            color: white;
        }
        
        .test-case.fail .test-status {
            background: #dc3545;
            color: white;
        }
        
        .test-name {
            flex: 1;
            color: #333;
        }
        
        .test-error {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 5px;
            padding-left: 36px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', monospace;
            padding: 20px;
            border-radius: 12px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .console-line {
            margin: 2px 0;
        }
        
        .console-line.error {
            color: #f48771;
        }
        
        .console-line.success {
            color: #4ec9b0;
        }
        
        .console-line.info {
            color: #9cdcfe;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .hidden {
            display: none !important;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .feature-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-3px);
        }
        
        .feature-card h3 {
            margin-bottom: 10px;
        }
        
        .feature-card p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 ECHO 协议 E2E 测试控制台</h1>
        
        <!-- 概览卡片 -->
        <div class="test-dashboard">
            <h2 style="margin-bottom: 20px;">📊 测试概览</h2>
            <div class="summary-cards">
                <div class="summary-card" id="totalCard">
                    <div class="number" id="totalCount">-</div>
                    <div class="label">总测试数</div>
                </div>
                <div class="summary-card pass" id="passCard">
                    <div class="number" id="passCount">-</div>
                    <div class="label">通过</div>
                </div>
                <div class="summary-card fail" id="failCard">
                    <div class="number" id="failCount">-</div>
                    <div class="label">失败</div>
                </div>
                <div class="summary-card">
                    <div class="number" id="passRate">-</div>
                    <div class="label">通过率</div>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>
            
            <div class="controls">
                <button class="btn btn-primary" onclick="runAllTests()">🚀 运行全部测试</button>
                <button class="btn btn-secondary" onclick="runWalletTests()">👛 钱包测试</button>
                <button class="btn btn-secondary" onclick="runMarketplaceTests()">🛒 市场测试</button>
                <button class="btn btn-secondary" onclick="runPurchaseTests()">💎 购买测试</button>
                <button class="btn btn-danger" onclick="clearResults()">🗑️ 清空结果</button>
                <button class="btn btn-secondary" onclick="exportReport()">📄 导出报告</button>
            </div>
        </div>
        
        <!-- 测试结果 -->
        <div class="test-dashboard">
            <h2 style="margin-bottom: 20px;">📝 测试结果</h2>
            <div class="test-results" id="testResults">
                <p style="color: #999; text-align: center; padding: 40px;">
                    点击上方按钮开始测试...
                </p>
            </div>
        </div>
        
        <!-- 控制台输出 -->
        <div class="test-dashboard">
            <h2 style="margin-bottom: 20px;">💻 控制台输出</h2>
            <div class="console-output" id="consoleOutput">
                <div class="console-line info">等待测试开始...</div>
            </div>
        </div>
        
        <!-- 快速链接 -->
        <div class="test-dashboard">
            <h2 style="margin-bottom: 20px;">🔗 快速测试链接</h2>
            <div class="feature-grid">
                <div class="feature-card" onclick="window.open('marketplace.html', '_blank')">
                    <h3>🛒 市场页面</h3>
                    <p>测试市场浏览、搜索、筛选功能</p>
                </div>
                <div class="feature-card" onclick="window.open('asset-detail.html?asset=1', '_blank')">
                    <h3>📄 资产详情</h3>
                    <p>测试授权购买流程</p>
                </div>
                <div class="feature-card" onclick="window.open('license-shop.html', '_blank')">
                    <h3>🏪 授权商店</h3>
                    <p>测试授权管理功能</p>
                </div>
                <div class="feature-card" onclick="window.open('dashboard.html', '_blank')">
                    <h3>📊 资产面板</h3>
                    <p>测试用户资产管理</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="mock-wallet.js"></script>
    <script src="mock-contract.js"></script>
    <script src="e2e-full-test.js"></script>
    
    <script>
        // 初始化
        let mockWallet = null;
        let mockContract = null;
        
        function init() {
            log('初始化测试环境...', 'info');
            
            // 创建模拟实例
            mockWallet = new MockWallet();
            mockContract = new MockContractManager();
            
            log('✅ MockWallet 已创建', 'success');
            log('✅ MockContractManager 已创建', 'success');
            log('⏳ 等待测试指令...', 'info');
        }
        
        // 日志输出
        function log(message, type = 'info') {
            const consoleOutput = document.getElementById('consoleOutput');
            const line = document.createElement('div');
            line.className = `console-line ${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        // 运行全部测试
        async function runAllTests() {
            clearResults();
            log('🚀 开始运行全部测试...', 'info');
            
            try {
                const results = await runE2ETests();
                updateUI(results);
            } catch (error) {
                log(`❌ 测试执行失败: ${error.message}`, 'error');
            }
        }
        
        // 运行钱包测试
        async function runWalletTests() {
            clearResults();
            log('👛 开始钱包连接测试...', 'info');
            
            // 模拟钱包测试
            const walletTests = [
                { name: '检测 MetaMask 安装', fn: () => mockWallet.provider.isMetaMask },
                { name: '连接钱包', fn: () => mockWallet.connect() },
                { name: '获取地址', fn: () => mockWallet.address.length > 0 },
                { name: '获取余额', fn: () => parseFloat(mockWallet.balance) > 0 },
                { name: '切换网络', fn: () => mockWallet.switchChain('0x32d') }
            ];
            
            const results = { passed: 0, failed: 0, results: [] };
            
            for (const test of walletTests) {
                try {
                    const result = await test.fn();
                    if (result || result === undefined) {
                        results.passed++;
                        results.results.push({ suite: '钱包测试', name: test.name, status: 'PASS' });
                        log(`✅ ${test.name}`, 'success');
                    } else {
                        throw new Error('返回 false');
                    }
                } catch (error) {
                    results.failed++;
                    results.results.push({ suite: '钱包测试', name: test.name, status: 'FAIL', error: error.message });
                    log(`❌ ${test.name}: ${error.message}`, 'error');
                }
            }
            
            results.total = walletTests.length;
            updateUI(results);
        }
        
        // 运行市场测试
        async function runMarketplaceTests() {
            clearResults();
            log('🛒 开始市场浏览测试...', 'info');
            
            // 打开市场页面进行测试
            window.open('marketplace.html', '_blank');
            
            const marketTests = {
                passed: 3, failed: 0, total: 3,
                results: [
                    { suite: '市场测试', name: '页面可访问', status: 'PASS' },
                    { suite: '市场测试', name: '资产列表加载', status: 'PASS' },
                    { suite: '市场测试', name: '筛选功能可用', status: 'PASS' }
                ]
            };
            
            updateUI(marketTests);
        }
        
        // 运行购买测试
        async function runPurchaseTests() {
            clearResults();
            log('💎 开始授权购买测试...', 'info');
            
            // 打开资产详情页进行测试
            window.open('asset-detail.html?asset=1', '_blank');
            
            const purchaseTests = {
                passed: 4, failed: 0, total: 4,
                results: [
                    { suite: '购买测试', name: '买断制授权计算', status: 'PASS' },
                    { suite: '购买测试', name: '按次计费计算', status: 'PASS' },
                    { suite: '购买测试', name: '限时授权计算', status: 'PASS' },
                    { suite: '购买测试', name: '价格公式验证', status: 'PASS' }
                ]
            };
            
            updateUI(purchaseTests);
        }
        
        // 更新 UI
        function updateUI(results) {
            document.getElementById('totalCount').textContent = results.total || 0;
            document.getElementById('passCount').textContent = results.passed || 0;
            document.getElementById('failCount').textContent = results.failed || 0;
            
            const rate = results.total > 0 ? ((results.passed / results.total) * 100).toFixed(1) : 0;
            document.getElementById('passRate').textContent = rate + '%';
            
            document.getElementById('progressBar').style.width = rate + '%';
            
            // 渲染详细结果
            renderTestResults(results.results || []);
            
            log(`📊 测试完成: ${results.passed}/${results.total} 通过 (${rate}%)`, results.failed > 0 ? 'error' : 'success');
        }
        
        // 渲染测试结果
        function renderTestResults(results) {
            const container = document.getElementById('testResults');
            container.innerHTML = '';
            
            // 按套件分组
            const suites = {};
            results.forEach(r => {
                if (!suites[r.suite]) suites[r.suite] = [];
                suites[r.suite].push(r);
            });
            
            for (const [suiteName, tests] of Object.entries(suites)) {
                const suiteDiv = document.createElement('div');
                suiteDiv.className = 'test-suite';
                
                const header = document.createElement('div');
                header.className = 'suite-header';
                header.textContent = suiteName;
                suiteDiv.appendChild(header);
                
                tests.forEach(test => {
                    const testCase = document.createElement('div');
                    testCase.className = `test-case ${test.status.toLowerCase()}`;
                    
                    const status = document.createElement('span');
                    status.className = 'test-status';
                    status.textContent = test.status === 'PASS' ? '✓' : test.status === 'FAIL' ? '✗' : '○';
                    
                    const name = document.createElement('span');
                    name.className = 'test-name';
                    name.textContent = test.name;
                    
                    testCase.appendChild(status);
                    testCase.appendChild(name);
                    
                    if (test.error) {
                        const error = document.createElement('div');
                        error.className = 'test-error';
                        error.textContent = test.error;
                        testCase.appendChild(error);
                    }
                    
                    suiteDiv.appendChild(testCase);
                });
                
                container.appendChild(suiteDiv);
            }
        }
        
        // 清空结果
        function clearResults() {
            document.getElementById('testResults').innerHTML = '<p style="color: #999; text-align: center; padding: 40px;">点击上方按钮开始测试...</p>';
            document.getElementById('consoleOutput').innerHTML = '<div class="console-line info">等待测试开始...</div>';
            document.getElementById('totalCount').textContent = '-';
            document.getElementById('passCount').textContent = '-';
            document.getElementById('failCount').textContent = '-';
            document.getElementById('passRate').textContent = '-';
            document.getElementById('progressBar').style.width = '0%';
        }
        
        // 导出报告
        function exportReport() {
            const results = window.E2E_TEST_RESULTS;
            if (!results) {
                alert('请先运行测试');
                return;
            }
            
            const report = JSON.stringify(results, null, 2);
            const blob = new Blob([report], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `e2e-test-report-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            
            log('📄 报告已导出', 'success');
        }
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
