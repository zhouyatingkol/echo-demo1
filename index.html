<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - WebGL Demo v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .timecode {
            position: absolute;
            top: 20px; left: 20px;
            color: rgba(100, 200, 255, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 8px;
        }
        .phase-label {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 180, 100, 0.9);
            font-size: 13px;
            letter-spacing: 4px;
        }
        .subtitle {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(220, 220, 240, 0.9);
            font-size: 16px;
            text-align: center;
            max-width: 80%;
            background: rgba(10,15,35,0.7);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(100,200,255,0.2);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .subtitle.visible { opacity: 1; }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 8px 16px;
            border: 1px solid rgba(100,200,255,0.3);
            background: rgba(0,0,0,0.6);
            color: rgba(200,230,255,0.9);
            font-size: 12px;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(100,200,255,0.2);
        }
        button.active {
            background: rgba(100,200,255,0.3);
        }
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #000 50%, #0a0f14 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s ease, transform 1s ease;
        }
        .loading.hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }
        .loading-content {
            text-align: center;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            border: 2px solid rgba(100, 200, 255, 0.3);
            border-radius: 50%;
            position: relative;
            margin: 0 auto 30px;
            animation: logoPulse 2s ease-in-out infinite;
        }
        .loading-logo::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 60px; height: 60px;
            border: 2px solid rgba(200, 180, 100, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: logoSpin 3s linear infinite;
        }
        .loading-logo::after {
            content: 'ECHO';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(100, 200, 255, 0.9);
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: 300;
        }
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(100, 200, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(100, 200, 255, 0.4), 0 0 60px rgba(200, 180, 100, 0.2); }
        }
        @keyframes logoSpin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .loading-text {
            color: rgba(100, 200, 255, 0.7);
            font-size: 12px;
            letter-spacing: 6px;
            font-weight: 300;
        }
        .loading-progress {
            width: 200px;
            height: 1px;
            background: rgba(100, 200, 255, 0.1);
            margin: 20px auto 0;
            position: relative;
            overflow: hidden;
        }
        .loading-progress-bar {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            background: linear-gradient(90deg, #64c8ff, #c8b464);
            width: 0%;
            transition: width 0.3s ease;
        }
        .loading-percentage {
            color: rgba(200, 180, 100, 0.8);
            font-size: 10px;
            letter-spacing: 2px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
        }
        
        /* 悬停提示框 */
        .hover-tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            transform: translate(-50%, -100%);
            margin-top: -15px;
        }
        .hover-tooltip.visible {
            opacity: 1;
        }
        .tooltip-content {
            background: rgba(10, 15, 20, 0.95);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(100, 200, 255, 0.1);
        }
        .tooltip-title {
            color: #c8b464;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .tooltip-desc {
            color: rgba(200, 210, 220, 0.8);
            font-size: 12px;
            line-height: 1.5;
        }
        .tooltip-arrow {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid rgba(100, 200, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-content">
            <div class="loading-logo"></div>
            <div class="loading-text">INITIALIZING PROTOCOL</div>
            <div class="loading-progress">
                <div class="loading-progress-bar" id="progressBar"></div>
            </div>
            <div class="loading-percentage" id="progressText">0%</div>
        </div>
    </div>
    
    <div id="canvas-container"></div>
    
    <!-- 悬停提示 -->
    <div class="hover-tooltip" id="hoverTooltip">
        <div class="tooltip-content">
            <div class="tooltip-title" id="tooltipTitle">MOLECULE</div>
            <div class="tooltip-desc" id="tooltipDesc">Description</div>
        </div>
        <div class="tooltip-arrow"></div>
    </div>
    
    <div class="ui-layer">
        <div class="timecode" id="timecode">00:00 / 08:30</div>
        <div class="phase-label" id="phaseLabel">阶段零：开场</div>
        <div class="subtitle" id="subtitle"></div>
        
        <div class="controls">
            <button onclick="setScene(0)" id="btn-0" class="active">开场</button>
            <button onclick="setScene(1)" id="btn-1">阶段一</button>
            <button onclick="setScene(2)" id="btn-2">阶段二</button>
            <button onclick="setScene(3)" id="btn-3">阶段三</button>
            <button onclick="setScene(4)" id="btn-4">阶段四</button>
            <button onclick="setScene(5)" id="btn-5" style="color:#ff9696">失败分支</button>
            <button onclick="setScene(6)" id="btn-6" style="color:#c8b464">结尾</button>
            <button onclick="togglePlay()" id="playBtn">▶ 播放完整版</button>
            <button onclick="jumpToTime(0)">|&lt;</button>
            <button onclick="jumpToTime(90)">阶段二</button>
            <button onclick="jumpToTime(210)">阶段四</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== 场景管理 ====================
        const scenes = ['opening', 'phase1', 'phase2', 'phase3', 'phase4', 'failure', 'ending'];
        let currentScene = 0;

        // ==================== 核心设置 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a30);
        scene.fog = new THREE.FogExp2(0x0a0a30, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        // ==================== 摄像机运动系统 ====================
        const cameraRig = {
            target: new THREE.Vector3(0, 0, 0),
            current: new THREE.Vector3(0, 0, 20),
            isMoving: false,
            moveStartTime: 0,
            moveDuration: 0,
            startPos: new THREE.Vector3(),
            endPos: new THREE.Vector3(),
            startTarget: new THREE.Vector3(),
            endTarget: new THREE.Vector3(),
            
            // 缓动函数
            easeInOutCubic: (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
            easeOutExpo: (t) => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
            
            // 移动到指定位置
            moveTo: function(pos, target, duration = 2, easing = 'easeInOutCubic') {
                this.startPos.copy(camera.position);
                this.endPos.copy(pos);
                this.startTarget.copy(this.target);
                this.endTarget.copy(target || new THREE.Vector3(0, 0, 0));
                this.moveStartTime = performance.now() / 1000;
                this.moveDuration = duration;
                this.isMoving = true;
            },
            
            // 推镜效果（匀速）
            dolly: function(startDist, endDist, duration = 8) {
                const start = new THREE.Vector3(0, 0, startDist);
                const end = new THREE.Vector3(0, 0, endDist);
                this.moveTo(end, new THREE.Vector3(0, 0, 0), duration, 'linear');
            },
            
            // 环绕运镜
            orbit: function(radius, height, duration = 5) {
                const angle = (performance.now() / 1000 / duration) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                this.moveTo(new THREE.Vector3(x, height, z), new THREE.Vector3(0, 0, 0), 0.1);
            },
            
            // 更新
            update: function() {
                if (!this.isMoving) return;
                
                const now = performance.now() / 1000;
                const elapsed = now - this.moveStartTime;
                const progress = Math.min(elapsed / this.moveDuration, 1);
                
                const eased = this.easeInOutCubic(progress);
                
                // 插值位置
                camera.position.lerpVectors(this.startPos, this.endPos, eased);
                this.target.lerpVectors(this.startTarget, this.endTarget, eased);
                camera.lookAt(this.target);
                
                if (progress >= 1) {
                    this.isMoving = false;
                }
            },
            
            // 场景预设运镜
            presets: {
                opening: {
                    wide: { pos: [0, 0, 30], target: [0, 0, 0] },
                    push: { pos: [0, 0, 15], target: [0, 0, 0], duration: 8 },
                    penetrate: { pos: [0, 0, 5], target: [0, 0, 0], duration: 0.5 }
                },
                phase1: {
                    overview: { pos: [0, 10, 20], target: [0, 0, 0] },
                    closeup: { pos: [5, 2, 8], target: [0, 0, 0] },
                    blueprint: { pos: [-8, 0, 12], target: [-5, 0, 0] }
                },
                phase2: {
                    workbench: { pos: [12, 5, 10], target: [8, -2, 0] },
                    collision: { pos: [5, 0, 8], target: [8, -2, 0] }
                },
                phase3: {
                    split: { pos: [0, 0, 20], target: [0, 0, 0] },
                    token: { pos: [8, 0, 12], target: [6, 0, 0] }
                },
                phase4: {
                    hall: { pos: [0, 15, 25], target: [0, 0, 0] },
                    pool: { pos: [0, -5, 10], target: [0, -2, 0] },
                    trace: { pos: [-10, 5, 15], target: [0, 0, 0] }
                },
                failure: {
                    broken: { pos: [0, 5, 15], target: [0, 3, 0] },
                    liquidation: { pos: [0, -5, 12], target: [0, -2, 0] }
                }
            }
        };

        // ==================== 后处理管线 ====================
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        composer.addPass(bloomPass);
        
        // 景深效果（Bokeh）
        const bokehPass = new BokehPass(scene, camera, {
            focus: 10.0,
            aperture: 0.005,
            maxblur: 0.01,
            width: window.innerWidth,
            height: window.innerHeight
        });
        bokehPass.enabled = false;
        composer.addPass(bokehPass);
        
        // 色调映射输出
        const outputPass = new OutputPass();
        composer.addPass(outputPass);
        
        // 后处理控制器
        const postProcess = {
            setBloomStrength: (s) => { bloomPass.strength = s; },
            setFocus: (dist, apt = 0.005) => {
                bokehPass.uniforms['focus'].value = dist;
                bokehPass.uniforms['aperture'].value = apt;
                bokehPass.enabled = true;
            },
            disableBokeh: () => { bokehPass.enabled = false; }
        };

        // ==================== 鼠标交互系统 ====================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredObject = null;
        const tooltip = document.getElementById('hoverTooltip');
        const tooltipTitle = document.getElementById('tooltipTitle');
        const tooltipDesc = document.getElementById('tooltipDesc');
        
        // 分子信息映射
        const moleculeInfo = {
            'PDB-001': { title: 'PDB STRUCTURE', desc: 'Protein Data Bank Entry' },
            'CHEM-002': { title: 'CHEMICAL DATA', desc: 'Molecular Structure Data' },
            'GENE-003': { title: 'GENE SEQUENCE', desc: 'Genomic Information Asset' },
            'VSCREEN-004': { title: 'VIRTUAL SCREEN', desc: 'Computational Screening Data' },
            'NeuroBlok': { title: 'NEUROBLOK', desc: 'Collaborative Drug Discovery Asset' },
            'token': { title: 'YIELD TOKEN', desc: 'Revenue Rights Certificate' },
            'value_core': { title: 'VALUE CORE', desc: 'Network Consensus Center' }
        };
        
        function updateTooltip(obj, x, y) {
            const info = moleculeInfo[obj.name] || moleculeInfo[obj.userData.type] || 
                        { title: 'ASSET', desc: 'Protocol Data Unit' };
            
            tooltipTitle.textContent = info.title;
            tooltipDesc.textContent = info.desc;
            
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
            tooltip.classList.add('visible');
        }
        
        function hideTooltip() {
            tooltip.classList.remove('visible');
        }
        
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // 检测悬停
            raycaster.setFromCamera(mouse, camera);
            
            // 收集所有可交互对象
            const interactables = [];
            Object.values(sceneGroups).forEach(group => {
                if (group.visible) {
                    group.children.forEach(child => {
                        if (child.userData.type || child.name === 'token' || child.name === 'value_core') {
                            interactables.push(child);
                        }
                    });
                }
            });
            
            const intersects = raycaster.intersectObjects(interactables, true);
            
            if (intersects.length > 0) {
                document.body.style.cursor = 'pointer';
                const obj = intersects[0].object;
                const parent = obj.parent;
                
                // 高亮效果
                if (hoveredObject !== parent) {
                    // 恢复之前的高亮
                    if (hoveredObject && hoveredObject.children[0] && hoveredObject.children[0].material) {
                        hoveredObject.children[0].material.emissiveIntensity = hoveredObject.userData.originalEmissive || 0.2;
                    }
                    
                    hoveredObject = parent;
                    
                    // 保存原始发光强度
                    if (hoveredObject && hoveredObject.children[0] && hoveredObject.children[0].material) {
                        if (!hoveredObject.userData.originalEmissive) {
                            hoveredObject.userData.originalEmissive = hoveredObject.children[0].material.emissiveIntensity;
                        }
                        
                        // 增强发光
                        hoveredObject.children[0].material.emissiveIntensity = 0.8;
                    }
                    
                    // 显示提示
                    updateTooltip(parent, event.clientX, event.clientY);
                } else {
                    // 更新提示位置
                    tooltip.style.left = event.clientX + 'px';
                    tooltip.style.top = event.clientY + 'px';
                }
            } else {
                document.body.style.cursor = 'default';
                if (hoveredObject) {
                    if (hoveredObject.children[0] && hoveredObject.children[0].material) {
                        hoveredObject.children[0].material.emissiveIntensity = hoveredObject.userData.originalEmissive || 0.2;
                    }
                    hoveredObject = null;
                    hideTooltip();
                }
            }
        }
        
        window.addEventListener('mousemove', onMouseMove, false);

        // ==================== 精确粒子系统 ====================
        const particleSystem = {
            particles: [],
            codeParticles: [],
            trailParticles: [],
            dataFlowParticles: [],
            
            // 创建代码粒子（0/1/片假名）- 镜头2要求80个
            createCodeParticles: function(count = 80) {
                const chars = ['0', '1', 'ア', 'イ', 'ウ', 'エ', 'オ', 'カ', 'キ', 'ク'];
                const group = new THREE.Group();
                group.name = 'codeParticles';
                
                for (let i = 0; i < count; i++) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 32;
                    canvas.height = 32;
                    const ctx = canvas.getContext('2d');
                    ctx.font = 'bold 20px monospace';
                    ctx.fillStyle = '#64c8ff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], 16, 16);
                    
                    const texture = new THREE.CanvasTexture(canvas);
                    const material = new THREE.SpriteMaterial({ 
                        map: texture, 
                        transparent: true,
                        opacity: 0.8,
                        blending: THREE.AdditiveBlending
                    });
                    const sprite = new THREE.Sprite(material);
                    
                    // 从中心向外随机分布
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 5 + Math.random() * 10;
                    sprite.position.set(
                        Math.cos(angle) * radius,
                        (Math.random() - 0.5) * 8,
                        Math.sin(angle) * radius
                    );
                    sprite.scale.set(0.5, 0.5, 0.5);
                    
                    sprite.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.1,
                            0.05 + Math.random() * 0.1,
                            (Math.random() - 0.5) * 0.1
                        ),
                        life: 1.0,
                        decay: 0.02 + Math.random() * 0.02
                    };
                    
                    group.add(sprite);
                    this.codeParticles.push(sprite);
                }
                
                scene.add(group);
                return group;
            },
            
            // 创建绿色飘散粒子带轨迹残影 - 镜头4要求60个
            createGreenTrailParticles: function(count = 60) {
                const group = new THREE.Group();
                group.name = 'greenTrailParticles';
                
                for (let i = 0; i < count; i++) {
                    const geometry = new THREE.SphereGeometry(0.08, 8, 8);
                    const material = new THREE.MeshBasicMaterial({
                        color: 0x64ff96,
                        transparent: true,
                        opacity: 0.9,
                        blending: THREE.AdditiveBlending
                    });
                    const particle = new THREE.Mesh(geometry, material);
                    
                    // 从中心向外爆发
                    const angle = Math.random() * Math.PI * 2;
                    const elevation = (Math.random() - 0.5) * Math.PI;
                    const speed = 0.2 + Math.random() * 0.3;
                    
                    particle.position.set(0, 0, 0);
                    particle.userData = {
                        velocity: new THREE.Vector3(
                            Math.cos(angle) * Math.cos(elevation) * speed,
                            Math.sin(elevation) * speed,
                            Math.sin(angle) * Math.cos(elevation) * speed
                        ),
                        trail: [],
                        maxTrailLength: 10,
                        life: 1.0,
                        decay: 0.008
                    };
                    
                    group.add(particle);
                    this.trailParticles.push(particle);
                }
                
                scene.add(group);
                return group;
            },
            
            // 创建蓝色数据流点 - 镜头3要求25个
            createDataFlowPoints: function(count = 25) {
                const group = new THREE.Group();
                group.name = 'dataFlowPoints';
                
                for (let i = 0; i < count; i++) {
                    const geometry = new THREE.SphereGeometry(0.05, 8, 8);
                    const material = new THREE.MeshBasicMaterial({
                        color: 0x64c8ff,
                        transparent: true,
                        opacity: 0.6,
                        blending: THREE.AdditiveBlending
                    });
                    const point = new THREE.Mesh(geometry, material);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 15 + Math.random() * 20;
                    point.position.set(
                        Math.cos(angle) * radius,
                        (Math.random() - 0.5) * 20,
                        Math.sin(angle) * radius
                    );
                    
                    point.userData = {
                        angle: angle,
                        radius: radius,
                        speed: 0.0005 + Math.random() * 0.001,
                        yOffset: point.position.y,
                        ySpeed: 0.01 + Math.random() * 0.02
                    };
                    
                    group.add(point);
                    this.dataFlowParticles.push(point);
                }
                
                scene.add(group);
                return group;
            },
            
            // 创建能量涟漪 - 镜头4要求
            createEnergyRipple: function() {
                const geometry = new THREE.RingGeometry(0.1, 0.5, 64);
                const material = new THREE.MeshBasicMaterial({
                    color: 0x64c8ff,
                    transparent: true,
                    opacity: 0.8,
                    side: THREE.DoubleSide,
                    blending: THREE.AdditiveBlending
                });
                const ripple = new THREE.Mesh(geometry, material);
                ripple.rotation.x = -Math.PI / 2;
                ripple.position.set(0, 0, 0);
                ripple.userData = {
                    scale: 1,
                    maxScale: 200,
                    life: 1.0,
                    decay: 0.015
                };
                
                scene.add(ripple);
                this.particles.push(ripple);
                return ripple;
            },
            
            // 更新所有粒子
            update: function() {
                // 更新代码粒子
                this.codeParticles.forEach((p, i) => {
                    p.position.add(p.userData.velocity);
                    p.userData.life -= p.userData.decay;
                    p.material.opacity = p.userData.life * 0.8;
                    
                    if (p.userData.life <= 0) {
                        // 重置粒子
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 5 + Math.random() * 10;
                        p.position.set(
                            Math.cos(angle) * radius,
                            (Math.random() - 0.5) * 8,
                            Math.sin(angle) * radius
                        );
                        p.userData.life = 1.0;
                    }
                });
                
                // 更新绿色轨迹粒子
                this.trailParticles.forEach(p => {
                    // 保存轨迹点
                    p.userData.trail.push(p.position.clone());
                    if (p.userData.trail.length > p.userData.maxTrailLength) {
                        p.userData.trail.shift();
                    }
                    
                    p.position.add(p.userData.velocity);
                    p.userData.life -= p.userData.decay;
                    p.material.opacity = p.userData.life;
                    
                    if (p.userData.life <= 0) {
                        p.visible = false;
                    }
                });
                
                // 更新数据流点
                this.dataFlowParticles.forEach(p => {
                    p.userData.angle += p.userData.speed;
                    p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
                    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
                    p.position.y = p.userData.yOffset + Math.sin(Date.now() * 0.001 * p.userData.ySpeed) * 2;
                });
                
                // 更新能量涟漪
                this.particles.forEach((p, i) => {
                    if (p.userData.maxScale) {
                        p.userData.scale += 2;
                        p.scale.set(p.userData.scale, p.userData.scale, p.userData.scale);
                        p.userData.life -= p.userData.decay;
                        p.material.opacity = p.userData.life * 0.8;
                        
                        if (p.userData.life <= 0) {
                            scene.remove(p);
                            this.particles.splice(i, 1);
                        }
                    }
                });
            },
            
            // 触发粒子效果
            triggerCodeParticles: function() {
                this.codeParticles.forEach(p => {
                    p.userData.life = 1.0;
                    p.visible = true;
                });
            },
            
            triggerGreenExplosion: function() {
                this.trailParticles.forEach(p => {
                    p.position.set(0, 0, 0);
                    p.userData.life = 1.0;
                    p.visible = true;
                    
                    const angle = Math.random() * Math.PI * 2;
                    const elevation = (Math.random() - 0.5) * Math.PI;
                    const speed = 0.2 + Math.random() * 0.3;
                    p.userData.velocity.set(
                        Math.cos(angle) * Math.cos(elevation) * speed,
                        Math.sin(elevation) * speed,
                        Math.sin(angle) * Math.cos(elevation) * speed
                    );
                });
            }
        };

        // ==================== 音效系统 ====================
        const audioSystem = {
            ctx: null,
            oscillators: [],
            gainNodes: [],
            
            init: function() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            
            // 环境嗡鸣音（贯穿全程）
            playAmbient: function() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.value = 50;
                osc.type = 'sine';
                filter.type = 'lowpass';
                filter.frequency.value = 100;
                gain.gain.value = 0.02;
                
                osc.start();
                this.oscillators.push(osc);
                this.gainNodes.push(gain);
                
                return { osc, gain };
            },
            
            // 文字激活音
            playTextActivate: function() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.setValueAtTime(1200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1800, this.ctx.currentTime + 0.05);
                osc.type = 'sine';
                
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            
            // 穿透音效
            playPenetration: function() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.setValueAtTime(80, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.4);
                osc.type = 'sawtooth';
                
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.4);
            },
            
            // 悬停提示音
            playHover: function() {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.value = 2000;
                osc.type = 'sine';
                
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            },
            
            // 停止所有音效
            stopAll: function() {
                this.oscillators.forEach(osc => {
                    try { osc.stop(); } catch(e) {}
                });
                this.oscillators = [];
                this.gainNodes = [];
            }
        };
        
        // 在场景切换时触发音效
        const originalSetScene = window.setScene;
        window.setScene = function(index) {
            // 播放切换音效
            if (index === 0) audioSystem.playTextActivate();
            if (index === 2) audioSystem.playHover();
            
            // 调用原函数
            const result = originalSetScene.apply(this, arguments);
            return result;
        };
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        goldLight.position.set(0, 5, 10);
        scene.add(goldLight);

        // ==================== 着色器定义 ====================
        const membraneVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            uniform float uTime;
            
            void main() {
                vUv = uv;
                vNormal = normal;
                vec3 pos = position;
                float wave1 = sin(pos.x * 2.0 + uTime) * 0.1;
                float wave2 = sin(pos.y * 3.0 + uTime * 0.8) * 0.08;
                float wave3 = sin((pos.x + pos.y) * 1.5 + uTime * 1.2) * 0.05;
                pos += normal * (wave1 + wave2 + wave3);
                vPosition = pos;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const membraneFragmentShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            uniform float uTime;
            
            void main() {
                vec3 baseColor = vec3(0.39, 1.0, 0.59);
                float fresnel = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                vec3 glowColor = vec3(0.39, 1.0, 0.59) * fresnel * 2.0;
                float energy = sin(vPosition.x * 10.0 + uTime) * sin(vPosition.y * 10.0 + uTime * 0.7);
                energy = energy * 0.5 + 0.5;
                energy = pow(energy, 3.0) * 0.3;
                vec3 finalColor = baseColor * 0.1 + glowColor + baseColor * energy;
                float alpha = 0.3 + fresnel * 0.4;
                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        // ==================== 场景元素容器 ====================
        const sceneGroups = {

        // ==================== 开场场景：细胞膜 ====================
        function createOpeningScene() {
            const group = sceneGroups.opening;
            
            // 三层细胞膜
            for (let i = 0; i < 3; i++) {
                const geometry = new THREE.SphereGeometry(5 + i * 2.5, 128, 128);
                const material = new THREE.ShaderMaterial({
                    vertexShader: membraneVertexShader,
                    fragmentShader: membraneFragmentShader,
                    uniforms: { uTime: { value: i * 1.3 } },
                    transparent: true,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                const membrane = new THREE.Mesh(geometry, material);
                membrane.userData = { layer: i };
                group.add(membrane);
            }

            // 背景粒子
            const particleCount = 1000;

            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({
                color: 0x64c8ff, size: 0.1, transparent: true, opacity: 0.6
            });
            const particles = new THREE.Points(geometry, material);
            particles.name = 'particles';
            group.add(particles);
        }

        // ==================== 阶段一：分子模型 ====================
        function createMolecule(type, color, position, scale = 1) {
            const group = new THREE.Group();
            
            // 核心球体
            const coreGeo = new THREE.IcosahedronGeometry(0.8 * scale, 2);
            const coreMat = new THREE.MeshPhysicalMaterial({
                color: color,
                metalness: 0.1,
                roughness: 0.2,
                transmission: 0.6,
                thickness: 1,
                emissive: color,
                emissiveIntensity: 0.3
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            group.add(core);

            // 轨道环
            const ringGeo = new THREE.TorusGeometry(1.2 * scale, 0.05 * scale, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 0.5 
            });
            
            for (let i = 0; i < 3; i++) {
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2 + i * (Math.PI / 3);
                ring.rotation.y = i * (Math.PI / 4);
                group.add(ring);
            }

            // 卫星粒子
            const satGeo = new THREE.SphereGeometry(0.15 * scale, 16, 16);
            const satMat = new THREE.MeshBasicMaterial({ color: color });
            for (let i = 0; i < 6; i++) {
                const sat = new THREE.Mesh(satGeo, satMat);
                const angle = (i / 6) * Math.PI * 2;
                sat.position.set(
                    Math.cos(angle) * 1.5 * scale,
                    Math.sin(angle) * 0.5 * scale,
                    Math.sin(angle) * 1.5 * scale
                );
                sat.userData = { angle: angle, radius: 1.5 * scale, speed: 0.5 + Math.random() * 0.5 };
                sat.name = 'satellite';
                group.add(sat);
            }

            group.position.copy(position);
            group.userData = { type: type, originalScale: scale };
            return group;
        }

        // 时间线更新
        function updateTimeline() {
            if (!timeline.isPlaying) return;
            
            timeline.currentTime += 0.016;
            
            // 格式化时间显示
            const mins = Math.floor(timeline.currentTime / 60).toString().padStart(2, '0');
            const secs = Math.floor(timeline.currentTime % 60).toString().padStart(2, '0');
            document.getElementById('timecode').textContent = `${mins}:${secs} / 08:30`;
            
            // 检查当前镜头
            const currentShot = timeline.shots.find((s, i) => {
                const nextShot = timeline.shots[i + 1];
                return timeline.currentTime >= s.time && 
                       (!nextShot || timeline.currentTime < nextShot.time);
            });
            
            if (currentShot && currentShot.subtitle) {
                showSubtitle(currentShot.subtitle);
                // 只在字幕刚显示时播报一次
                if (Math.abs(timeline.currentTime - currentShot.time) < 0.02) {
                    narrator.speak(currentShot.subtitle);
                }
            }
            
            // 触发音效
            if (currentShot && Math.abs(timeline.currentTime - currentShot.time) < 0.02) {
                if (currentShot.action === 'penetrate') {
                    audioSystem.playPenetration();
                    // 镜头4: 触发绿色粒子爆发+能量涟漪
                    particleSystem.triggerGreenExplosion();
                    particleSystem.createEnergyRipple();
                } else if (currentShot.action === 'titleShow') {
                    audioSystem.playTextActivate();
                    // 镜头2: 触发代码粒子
                    particleSystem.triggerCodeParticles();
                } else if (currentShot.action === 'hoverPDB') {
                    audioSystem.playHover();
                }
            }
            
            // 场景自动切换
            const activeScene = timeline.shots.find((s, i) => {
                const nextShot = timeline.shots[i + 1];
                return timeline.currentTime >= s.time && 
                       (!nextShot || timeline.currentTime < nextShot.time);
            });
            
            if (activeScene && activeScene.scene !== currentScene) {
                setScene(activeScene.scene);
            }
            
            // 触发摄像机运动
            if (activeScene && activeScene.camera) {
                const cam = activeScene.camera;
                const startTime = activeScene.time;
                const camProgress = (timeline.currentTime - startTime) / cam.duration;
                
                // 只在摄像机运动期间更新
                if (camProgress >= 0 && camProgress <= 1 && camProgress < 0.1) {
                    cameraRig.moveTo(
                        new THREE.Vector3(...cam.pos),
                        new THREE.Vector3(...cam.target),
                        cam.duration
                    );
                }
            }
            
            // 后期效果控制
            if (activeScene) {
                // 特写镜头启用景深
                if (activeScene.action === 'hoverPDB' || activeScene.action === 'blueprintShow') {
                    postProcess.setFocus(10, 0.01);
                } else if (activeScene.action === 'valueHall' || activeScene.action === 'splitScreen') {
                    postProcess.disableBokeh();
                }
                
                // 高能量场景增强Bloom
                if (activeScene.action === 'penetrate' || activeScene.action === 'collision') {
                    postProcess.setBloomStrength(2.5);
                } else {
                    postProcess.setBloomStrength(1.5);
                }
            }
            
            // 时间到自动停止
            if (timeline.currentTime >= 510) {
                timeline.isPlaying = false;
                document.getElementById('playBtn').textContent = '▶ 播放';
            }
        }

            if (!timeline.isPlaying) {

        window.jumpToTime = function(seconds) {
            timeline.currentTime = seconds;
            timeline.isPlaying = false;
            document.getElementById('playBtn').textContent = '▶ 播放';
            narrator.stop();
            
            // 找到对应场景
            const shot = timeline.shots.find(s => seconds >= s.time && seconds < s.time + s.duration) || 
                        timeline.shots.slice().reverse().find(s => seconds >= s.time);
            if (shot) {
                setScene(shot.scene);
            }
        };

        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新时间线系统
            updateTimeline();
            
            // 使用时间线的时间
            const animTime = timeline.currentTime;
            
            // 更新开场场景
            if (sceneGroups.opening.visible) {
                sceneGroups.opening.children.forEach((child, i) => {
                    if (child.material?.uniforms?.uTime) {
                        child.material.uniforms.uTime.value = animTime + i * 1.3;
                    }
                    if (child.name === 'particles') {
                        child.rotation.y = animTime * 0.02;
                    }
                });
            }

            // 更新阶段一：分子旋转
            if (sceneGroups.phase1.visible) {
                sceneGroups.phase1.children.forEach(child => {
                    if (child.userData.type) {
                        // 核心旋转
                        child.children[0].rotation.y += 0.01;
                        child.children[0].rotation.x += 0.005;
                        
                        // 轨道环旋转
                        for (let i = 1; i <= 3; i++) {
                            if (child.children[i]) {
                                child.children[i].rotation.x += 0.02 * (i % 2 === 0 ? 1 : -1);
                                child.children[i].rotation.z += 0.01;
                            }
                        }
                        
                        // 卫星粒子公转
                        for (let i = 4; i < child.children.length; i++) {
                            const sat = child.children[i];
                            if (sat.name === 'satellite') {
                                sat.userData.angle += 0.02 * sat.userData.speed;
                                sat.position.x = Math.cos(sat.userData.angle) * sat.userData.radius;
                                sat.position.z = Math.sin(sat.userData.angle) * sat.userData.radius;
                            }
                        }
                    }
                });
            }

            // 更新阶段二：数据流动画
            if (sceneGroups.phase2.visible) {
                sceneGroups.phase2.children.forEach(child => {
                    if (child.name === 'flow_particle') {
                        child.userData.progress += child.userData.speed;
                        if (child.userData.progress > 1) child.userData.progress = 0;
                        
                        const path = child.userData.path;
                        const idx = Math.floor(child.userData.progress * (path.length - 1));
                        const nextIdx = Math.min(idx + 1, path.length - 1);
                        const localT = (child.userData.progress * (path.length - 1)) % 1;
                        
                        child.position.lerpVectors(path[idx], path[nextIdx], localT);
                    }
                    if (child.userData.type) {
                        child.children[0].rotation.y += 0.01;
                    }
                });
            }

            // 更新阶段三：令牌旋转
            if (sceneGroups.phase3.visible) {
                sceneGroups.phase3.children.forEach(child => {
                    if (child.geometry?.type === 'CylinderGeometry') {
                        child.rotation.z += 0.02;
                    }
                    if (child.geometry?.type === 'TorusGeometry') {
                        child.rotation.x += 0.01;
                        child.rotation.y += 0.01;
                    }
                    if (child.userData.type) {
                        child.children[0].rotation.y += 0.01;
                    }
                });
            }

            // 更新阶段四：波纹扩散
            if (sceneGroups.phase4.visible) {
                sceneGroups.phase4.children.forEach(child => {
                    if (child.name === 'ripple') {
                        child.scale.addScalar(child.userData.speed);
                        if (child.scale.x > 1.5) {
                            child.scale.set(1, 1, 1);
                        }
                        child.material.opacity = 0.3 - child.userData.index * 0.05 - (child.scale.x - 1) * 0.2;
                    }
                    if (child.userData.type) {
                        child.children[0].rotation.y += 0.01;
                    }
                });
            }

            // 更新阶段五：失败场景
            if (sceneGroups.failure.visible) {
                // 裂痕闪烁
                sceneGroups.failure.children.forEach(child => {
                    if (child.name === 'crack') {
                        child.material.opacity = 0.4 + Math.sin(animTime * 3) * 0.2;
                    }
                    if (child.name === 'liquidation_particle') {
                        // 缓慢清算流动
                        child.userData.progress += child.userData.speed;
                        if (child.userData.progress > 1) child.userData.progress = 0;
                        
                        const path = child.userData.path;
                        const idx = Math.floor(child.userData.progress * (path.length - 1));
                        const nextIdx = Math.min(idx + 1, path.length - 1);
                        const localT = (child.userData.progress * (path.length - 1)) % 1;
                        
                        child.position.lerpVectors(path[idx], path[nextIdx], localT);
                    }
                    if (child.name === 'failure_hint') {
                        // 提示板呼吸效果
                        child.material.opacity = 0.2 + Math.sin(animTime * 2) * 0.1;
                    }
                    if (child.userData.type) {
                        // 破裂分子缓慢旋转
                        child.children[0].rotation.y += 0.002;
                    }
                });
            }

            // 更新结尾场景
            if (sceneGroups.ending.visible) {
                sceneGroups.ending.children.forEach(child => {
                    // 中央光球脉动
                    if (child.name === 'value_core') {
                        const scale = 1 + Math.sin(animTime * 2) * 0.05;
                        child.scale.set(scale, scale, scale);
                    }
                    // 环绕轨道旋转
                    if (child.name === 'orbit_ring') {
                        child.rotation.z += 0.005;
                    }
                    // 轨道粒子公转
                    if (child.name === 'orbit_particle') {
                        child.userData.angle += child.userData.speed * 0.01;
                        child.position.x = Math.cos(child.userData.angle) * child.userData.radius;
                        child.position.z = Math.sin(child.userData.angle) * child.userData.radius;
                        child.position.y = child.userData.yOffset + Math.sin(animTime + child.userData.angle) * 0.3;
                    }
                    // ECHO文字发光
                    if (child.name === 'echo_text') {
                        child.material.emissiveIntensity = 0.2 + Math.sin(animTime * 3) * 0.1;
                    }
                });
            }

            // 更新摄像机运动
            cameraRig.update();
            
            // 更新粒子系统
            particleSystem.update();

            controls.update();
            composer.render();
        }

        // ==================== 初始化 ====================
        // 模拟加载进度
        let loadProgress = 0;
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        function updateLoadingProgress() {
            loadProgress += Math.random() * 15 + 5;
            if (loadProgress > 100) loadProgress = 100;
            
            progressBar.style.width = loadProgress + '%';
            progressText.textContent = Math.floor(loadProgress) + '%';
            
            if (loadProgress < 100) {
                setTimeout(updateLoadingProgress, 100 + Math.random() * 200);
            } else {
                // 加载完成，延迟隐藏
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 500);
            }
        }
        
        // 开始加载动画
        updateLoadingProgress();
        
        createOpeningScene();
        createPhase1Scene();
        createPhase2Scene();
        createPhase3Scene();
        createPhase4Scene();
        createFailureScene();
        createEndingScene();
        
        // 创建粒子系统
        particleSystem.createCodeParticles(80);
        particleSystem.createDataFlowPoints(25);
        particleSystem.createGreenTrailParticles(60);
        
        setScene(0);

        animate();

        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('ECHO Protocol v2 Initialized');
    </script>
</body>
</html>
