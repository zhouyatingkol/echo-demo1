<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .nav-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .nav-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.4);
        }
        
        .nav-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .nav-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .nav-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .nav-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

            <a href="license-shop.html" class="nav-card">

                <div class="nav-desc">买断制 / 按次计费 / 限时授权 三合一模式</div>
            </a>
            
            <a href="creator-dashboard.html" class="nav-card">

                <div class="nav-title">创作者中心</div>
                <div class="nav-desc">上传作品、管理授权、查看收益</div>
            </a>
            
            <a href="creator-upload.html" class="nav-card">

                <div class="nav-desc">铸造音乐资产，设置权属蓝图</div>

        <div class="footer">

            <p>合约地址: 0xF98f63b7e806... / 0x8Eb7a29C414... / 0x2f79b560470...</p>

</body>
</html>
