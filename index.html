<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - WebGL Demo v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .timecode {
            position: absolute;
            top: 20px; left: 20px;
            color: rgba(100, 200, 255, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 8px;
        }
        .phase-label {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 180, 100, 0.9);
            font-size: 13px;
            letter-spacing: 4px;
        }
        .subtitle {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(220, 220, 240, 0.9);
            font-size: 16px;
            text-align: center;
            max-width: 80%;
            background: rgba(10,15,35,0.7);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(100,200,255,0.2);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .subtitle.visible { opacity: 1; }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 8px 16px;
            border: 1px solid rgba(100,200,255,0.3);
            background: rgba(0,0,0,0.6);
            color: rgba(200,230,255,0.9);
            font-size: 12px;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(100,200,255,0.2);
        }
        button.active {
            background: rgba(100,200,255,0.3);
        }
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s;
        }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading-text {
            color: rgba(100,200,255,0.8);
            font-size: 14px;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-text">INITIALIZING WEBGL...</div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <div class="timecode" id="timecode">00:00 / 08:30</div>
        <div class="phase-label" id="phaseLabel">阶段零：开场</div>
        <div class="subtitle" id="subtitle"></div>
        
        <div class="controls">
            <button onclick="setScene(0)" id="btn-0" class="active">开场</button>
            <button onclick="setScene(1)" id="btn-1">阶段一</button>
            <button onclick="setScene(2)" id="btn-2">阶段二</button>
            <button onclick="setScene(3)" id="btn-3">阶段三</button>
            <button onclick="setScene(4)" id="btn-4">阶段四</button>
            <button onclick="togglePlay()" id="playBtn">▶ 播放完整版</button>
            <button onclick="jumpToTime(0)">|&lt;</button>
            <button onclick="jumpToTime(90)">阶段二</button>
            <button onclick="jumpToTime(210)">阶段四</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== 场景管理 ====================
        const scenes = ['opening', 'phase1', 'phase2', 'phase3', 'phase4'];
        let currentScene = 0;

        // ==================== 核心设置 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a30);
        scene.fog = new THREE.FogExp2(0x0a0a30, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // ==================== 后处理 ====================
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        composer.addPass(bloomPass);

        // ==================== 灯光系统 ====================
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const cyanLight = new THREE.PointLight(0x64c8ff, 2, 100);
        cyanLight.position.set(10, 10, 10);
        scene.add(cyanLight);

        const greenLight = new THREE.PointLight(0x64ff96, 1, 50);
        greenLight.position.set(-5, -5, 5);
        scene.add(greenLight);

        const goldLight = new THREE.PointLight(0xc8b464, 1.5, 80);
        goldLight.position.set(0, 5, 10);
        scene.add(goldLight);

        // ==================== 着色器定义 ====================
        const membraneVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            uniform float uTime;
            
            void main() {
                vUv = uv;
                vNormal = normal;
                vec3 pos = position;
                float wave1 = sin(pos.x * 2.0 + uTime) * 0.1;
                float wave2 = sin(pos.y * 3.0 + uTime * 0.8) * 0.08;
                float wave3 = sin((pos.x + pos.y) * 1.5 + uTime * 1.2) * 0.05;
                pos += normal * (wave1 + wave2 + wave3);
                vPosition = pos;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const membraneFragmentShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            uniform float uTime;
            
            void main() {
                vec3 baseColor = vec3(0.39, 1.0, 0.59);
                float fresnel = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                vec3 glowColor = vec3(0.39, 1.0, 0.59) * fresnel * 2.0;
                float energy = sin(vPosition.x * 10.0 + uTime) * sin(vPosition.y * 10.0 + uTime * 0.7);
                energy = energy * 0.5 + 0.5;
                energy = pow(energy, 3.0) * 0.3;
                vec3 finalColor = baseColor * 0.1 + glowColor + baseColor * energy;
                float alpha = 0.3 + fresnel * 0.4;
                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        // ==================== 场景元素容器 ====================
        const sceneGroups = {
            opening: new THREE.Group(),
            phase1: new THREE.Group(),
            phase2: new THREE.Group(),
            phase3: new THREE.Group(),
            phase4: new THREE.Group()
        };

        Object.values(sceneGroups).forEach(g => {
            g.visible = false;
            scene.add(g);
        });

        // ==================== 开场场景：细胞膜 ====================
        function createOpeningScene() {
            const group = sceneGroups.opening;
            
            // 三层细胞膜
            for (let i = 0; i < 3; i++) {
                const geometry = new THREE.SphereGeometry(5 + i * 2.5, 128, 128);
                const material = new THREE.ShaderMaterial({
                    vertexShader: membraneVertexShader,
                    fragmentShader: membraneFragmentShader,
                    uniforms: { uTime: { value: i * 1.3 } },
                    transparent: true,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                const membrane = new THREE.Mesh(geometry, material);
                membrane.userData = { layer: i };
                group.add(membrane);
            }

            // 背景粒子
            const particleCount = 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 50;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({
                color: 0x64c8ff, size: 0.1, transparent: true, opacity: 0.6
            });
            const particles = new THREE.Points(geometry, material);
            particles.name = 'particles';
            group.add(particles);
        }

        // ==================== 阶段一：分子模型 ====================
        function createMolecule(type, color, position, scale = 1) {
            const group = new THREE.Group();
            
            // 核心球体
            const coreGeo = new THREE.IcosahedronGeometry(0.8 * scale, 2);
            const coreMat = new THREE.MeshPhysicalMaterial({
                color: color,
                metalness: 0.1,
                roughness: 0.2,
                transmission: 0.6,
                thickness: 1,
                emissive: color,
                emissiveIntensity: 0.3
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            group.add(core);

            // 轨道环
            const ringGeo = new THREE.TorusGeometry(1.2 * scale, 0.05 * scale, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 0.5 
            });
            
            for (let i = 0; i < 3; i++) {
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2 + i * (Math.PI / 3);
                ring.rotation.y = i * (Math.PI / 4);
                group.add(ring);
            }

            // 卫星粒子
            const satGeo = new THREE.SphereGeometry(0.15 * scale, 16, 16);
            const satMat = new THREE.MeshBasicMaterial({ color: color });
            for (let i = 0; i < 6; i++) {
                const sat = new THREE.Mesh(satGeo, satMat);
                const angle = (i / 6) * Math.PI * 2;
                sat.position.set(
                    Math.cos(angle) * 1.5 * scale,
                    Math.sin(angle) * 0.5 * scale,
                    Math.sin(angle) * 1.5 * scale
                );
                sat.userData = { angle: angle, radius: 1.5 * scale, speed: 0.5 + Math.random() * 0.5 };
                sat.name = 'satellite';
                group.add(sat);
            }

            group.position.copy(position);
            group.userData = { type: type, originalScale: scale };
            return group;
        }

        function createPhase1Scene() {
            const group = sceneGroups.phase1;
            
            // 资产仓库平台
            const platformGeo = new THREE.CylinderGeometry(8, 8, 0.5, 64);
            const platformMat = new THREE.MeshPhysicalMaterial({
                color: 0xc8b464,
                metalness: 0.8,
                roughness: 0.3,
                emissive: 0x64ff96,
                emissiveIntensity: 0.1
            });
            const platform = new THREE.Mesh(platformGeo, platformMat);
            platform.position.y = -3;
            group.add(platform);

            // 5个分子模型
            const molecules = [
                { type: 'PDB-001', color: 0x64c8ff, pos: new THREE.Vector3(-4, 0, -2), scale: 1 },
                { type: 'CHEM-002', color: 0x64ff96, pos: new THREE.Vector3(0, 1, 2), scale: 0.9 },
                { type: 'GENE-003', color: 0x64dddd, pos: new THREE.Vector3(4, 0, -2), scale: 0.95 },
                { type: 'VSCREEN-004', color: 0x96ffc8, pos: new THREE.Vector3(-2, -1, 3), scale: 1.1 },
                { type: 'NeuroBlok', color: 0xc8b464, pos: new THREE.Vector3(2, 2, 0), scale: 1.5 }
            ];

            molecules.forEach(m => {
                const mol = createMolecule(m.type, m.color, m.pos, m.scale);
                mol.name = m.type;
                group.add(mol);
            });

            // 关系图谱框架（左侧）
            const frameGeo = new THREE.BoxGeometry(0.2, 12, 8);
            const frameMat = new THREE.MeshPhysicalMaterial({
                color: 0xc8c8dc,
                metalness: 0.9,
                roughness: 0.1,
                transparent: true,
                opacity: 0.3
            });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.position.set(-12, 0, 0);
            group.add(frame);

            // 图谱节点
            const nodePositions = [
                new THREE.Vector3(-12, 3, 0),
                new THREE.Vector3(-12, 1, 2),
                new THREE.Vector3(-12, -1, -2),
                new THREE.Vector3(-12, -3, 0)
            ];
            
            nodePositions.forEach((pos, i) => {
                const nodeGeo = new THREE.SphereGeometry(0.3, 32, 32);
                const nodeMat = new THREE.MeshBasicMaterial({ 
                    color: [0x64c8ff, 0x64ff96, 0x64dddd, 0xc8b464][i] 
                });
                const node = new THREE.Mesh(nodeGeo, nodeMat);
                node.position.copy(pos);
                group.add(node);
            });
        }

        // ==================== 阶段二：工作台与协作 ====================
        function createPhase2Scene() {
            const group = sceneGroups.phase2;
            
            // 工作台
            const workbenchGeo = new THREE.BoxGeometry(6, 0.3, 4);
            const workbenchMat = new THREE.MeshPhysicalMaterial({
                color: 0x1a1a40,
                metalness: 0.7,
                roughness: 0.3,
                emissive: 0x64c8ff,
                emissiveIntensity: 0.1
            });
            const workbench = new THREE.Mesh(workbenchGeo, workbenchMat);
            workbench.position.set(8, -2, 0);
            workbench.name = 'workbench';
            group.add(workbench);

            // 工作台发光边框
            const edges = new THREE.EdgesGeometry(workbenchGeo);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x64c8ff, linewidth: 2 });
            const wireframe = new THREE.LineSegments(edges, lineMat);
            workbench.add(wireframe);

            // 提示文字板
            const textGeo = new THREE.PlaneGeometry(4, 0.8);
            const textMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });
            const textPanel = new THREE.Mesh(textGeo, textMat);
            textPanel.position.set(0, 1, 0);
            workbench.add(textPanel);

            // 源分子（左侧）
            const chemMol = createMolecule('CHEM', 0x64ff96, new THREE.Vector3(-6, 0, -2), 0.9);
            chemMol.name = 'source_chem';
            chemMol.userData.draggable = true;
            group.add(chemMol);

            const geneMol = createMolecule('GENE', 0x64dddd, new THREE.Vector3(-6, 0, 2), 0.95);
            geneMol.name = 'source_gene';
            geneMol.userData.draggable = true;
            group.add(geneMol);

            // 关系图谱连线
            const lineMat2 = new THREE.LineBasicMaterial({ 
                color: 0x64c8ff, 
                transparent: true, 
                opacity: 0.5 
            });
            
            // CHEM -> 工作台
            const line1Points = [
                new THREE.Vector3(-6, 0, -2),
                new THREE.Vector3(0, 0, -1),
                new THREE.Vector3(8, -2, 0)
            ];
            const line1Geo = new THREE.BufferGeometry().setFromPoints(line1Points);
            const line1 = new THREE.Line(line1Geo, lineMat2);
            line1.name = 'connection_chem';
            group.add(line1);

            // GENE -> 工作台
            const line2Points = [
                new THREE.Vector3(-6, 0, 2),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(8, -2, 0)
            ];
            const line2Geo = new THREE.BufferGeometry().setFromPoints(line2Points);
            const line2 = new THREE.Line(line2Geo, lineMat2);
            line2.name = 'connection_gene';
            group.add(line2);

            // 数据流动画粒子
            const flowParticleGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const flowParticleMat = new THREE.MeshBasicMaterial({ color: 0x64ff96 });
            
            for (let i = 0; i < 10; i++) {
                const particle = new THREE.Mesh(flowParticleGeo, flowParticleMat);
                particle.userData = { 
                    progress: i / 10, 
                    speed: 0.01 + Math.random() * 0.01,
                    path: line1Points 
                };
                particle.name = 'flow_particle';
                group.add(particle);
            }
        }

        // ==================== 阶段三：融资对比 ====================
        function createPhase3Scene() {
            const group = sceneGroups.phase3;
            
            // 分割线
            const splitGeo = new THREE.BoxGeometry(0.1, 12, 0.1);
            const splitMat = new THREE.MeshBasicMaterial({ 
                color: 0x64c8ff,
                transparent: true,
                opacity: 0.6
            });
            const splitLine = new THREE.Mesh(splitGeo, splitMat);
            group.add(splitLine);

            // 左侧：传统融资（灰色压抑）
            const traditionalGeo = new THREE.BoxGeometry(4, 5, 2);
            const traditionalMat = new THREE.MeshPhysicalMaterial({
                color: 0x555555,
                metalness: 0.3,
                roughness: 0.8,
                transparent: true,
                opacity: 0.6
            });
            const traditional = new THREE.Mesh(traditionalGeo, traditionalMat);
            traditional.position.set(-6, 0, 0);
            group.add(traditional);

            // 右侧：ECHO融资（金色明亮）
            const vscreenMol = createMolecule('VSCREEN', 0x96ffc8, new THREE.Vector3(6, 1, 0), 1.2);
            group.add(vscreenMol);

            // 收益权令牌
            const tokenGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.2, 32);
            const tokenMat = new THREE.MeshPhysicalMaterial({
                color: 0xc8b464,
                metalness: 1,
                roughness: 0.2,
                emissive: 0xc8b464,
                emissiveIntensity: 0.3
            });
            const token = new THREE.Mesh(tokenGeo, tokenMat);
            token.position.set(6, -1.5, 0);
            token.rotation.x = Math.PI / 2;
            group.add(token);

            // 令牌发光环
            const ringGeo = new THREE.TorusGeometry(1, 0.05, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xc8b464 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(6, -1.5, 0);
            group.add(ring);
        }

        // ==================== 阶段四：价值分配 ====================
        function createPhase4Scene() {
            const group = sceneGroups.phase4;
            
            // 中央资金池
            const poolGeo = new THREE.CylinderGeometry(5, 5, 1, 64);
            const poolMat = new THREE.MeshPhysicalMaterial({
                color: 0xc8b464,
                metalness: 0.9,
                roughness: 0.1,
                emissive: 0xc8b464,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.8
            });
            const pool = new THREE.Mesh(poolGeo, poolMat);
            pool.position.y = -3;
            group.add(pool);

            // 波纹效果（同心圆环）
            for (let i = 0; i < 5; i++) {
                const rippleGeo = new THREE.RingGeometry(2 + i, 2.2 + i, 64);
                const rippleMat = new THREE.MeshBasicMaterial({
                    color: 0xc8b464,
                    transparent: true,
                    opacity: 0.3 - i * 0.05,
                    side: THREE.DoubleSide
                });
                const ripple = new THREE.Mesh(rippleGeo, rippleMat);
                ripple.rotation.x = -Math.PI / 2;
                ripple.position.y = -2.4;
                ripple.userData = { index: i, speed: 0.02 };
                ripple.name = 'ripple';
                group.add(ripple);
            }

            // NeuroBlok分子（上方）
            const neuroMol = createMolecule('NeuroBlok', 0xc8b464, new THREE.Vector3(0, 4, 0), 1.8);
            group.add(neuroMol);

            // 贡献节点（四周）
            const contributors = [
                { name: '智药科技', color: 0x64c8ff, pos: new THREE.Vector3(-8, 0, 0) },
                { name: '康源医院', color: 0x64ff96, pos: new THREE.Vector3(8, 0, 0) },
                { name: '公共联盟', color: 0x64dddd, pos: new THREE.Vector3(0, 0, -8) },
                { name: '元生资本', color: 0xc8b464, pos: new THREE.Vector3(0, 0, 8) }
            ];

            contributors.forEach(c => {
                const nodeGeo = new THREE.SphereGeometry(0.8, 32, 32);
                const nodeMat = new THREE.MeshPhysicalMaterial({
                    color: c.color,
                    metalness: 0.5,
                    roughness: 0.3,
                    emissive: c.color,
                    emissiveIntensity: 0.2
                });
                const node = new THREE.Mesh(nodeGeo, nodeMat);
                node.position.copy(c.pos);
                node.name = c.name;
                group.add(node);

                // 连接线到资金池
                const linePoints = [c.pos, new THREE.Vector3(0, -2, 0)];
                const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
                const lineMat = new THREE.LineBasicMaterial({ 
                    color: c.color, 
                    transparent: true, 
                    opacity: 0.4 
                });
                const line = new THREE.Line(lineGeo, lineMat);
                group.add(line);
            });
        }
        window.setScene = function(index) {
            currentScene = index;
            timeline.isPlaying = false;
            document.getElementById('playBtn').textContent = '▶ 播放完整版';
            narrator.stop();
            
            // 隐藏所有场景
            Object.values(sceneGroups).forEach(g => g.visible = false);
            
            // 显示当前场景
            sceneGroups[scenes[index]].visible = true;
            
            // 更新按钮状态
            document.querySelectorAll('.controls button').forEach((btn, i) => {
                if (i < 5) btn.classList.toggle('active', i === index);
            });

            // 更新阶段标签
            const labels = ['阶段零：开场', '阶段一：基础资产', '阶段二：首次协作', '阶段三：风险融资', '阶段四：价值分配'];
            document.getElementById('phaseLabel').textContent = labels[index];

            // 重置摄像机
            camera.position.set(0, 0, 20);
            controls.reset();
        };

        // ==================== 47镜头时间线系统 ====================
        const timeline = {
            currentTime: 0,
            isPlaying: false,
            shots: [
                { time: 0, scene: 0, action: 'fadeIn', duration: 5, subtitle: '' },
                { time: 5, scene: 0, action: 'titleShow', duration: 7, subtitle: '' },
                { time: 12, scene: 0, action: 'membrane', duration: 8, subtitle: '在传统模式中，药物的成功是一座孤岛。' },
                { time: 20, scene: 0, action: 'penetrate', duration: 5, subtitle: '但在ECHO协议上，它是一片被清晰测绘的雨林。' },
                { time: 25, scene: 0, action: 'toSandbox', duration: 5, subtitle: '每一滴雨水都知道它来自哪片云。' },
                { time: 30, scene: 1, action: 'moleculesAppear', duration: 8, subtitle: '' },
                { time: 44, scene: 1, action: 'hoverPDB', duration: 8, subtitle: '' },
                { time: 59, scene: 1, action: 'blueprintShow', duration: 12, subtitle: '即使是开源数据，其贡献也被ECHO协议铭记。' },
                { time: 90, scene: 2, action: 'workbenchAppear', duration: 8, subtitle: '' },
                { time: 108, scene: 2, action: 'dragStart', duration: 12, subtitle: '' },
                { time: 120, scene: 2, action: 'collision', duration: 12, subtitle: '每一次协作都生成新的资产，权属像基因一样被继承和组合。' },
                { time: 150, scene: 3, action: 'splitScreen', duration: 15, subtitle: '新药研发离不开资本，但传统融资往往意味着妥协。' },
                { time: 165, scene: 3, action: 'tokenGenerate', duration: 15, subtitle: '而ECHO协议实现了所有权与收益权的分离。' },
                { time: 195, scene: 3, action: 'fundFlow', duration: 15, subtitle: '您获得了推进试验的资金，却从未丢失数据的灵魂。' },
                { time: 210, scene: 4, action: 'valueHall', duration: 10, subtitle: '' },
                { time: 228, scene: 4, action: 'distribution', duration: 15, subtitle: '当新药成功上市，价值不再是集中于终点的盛宴。' },
                { time: 255, scene: 4, action: 'traceBack', duration: 18, subtitle: '而是沿链条逆流而上的回馈。' },
                { time: 315, scene: 4, action: 'upstreamReward', duration: 15, subtitle: '哪怕是十年前的一份开源数据，也能收获应有的荣光。' }
            ]
        };

        // 旁白系统
        const narrator = {
            speak: function(text) {
                if (!window.speechSynthesis) return;
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-CN';
                u.rate = 0.85;
                u.pitch = 0.75;
                u.volume = 0.9;
                window.speechSynthesis.speak(u);
            },
            stop: function() {
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                }
            }
        };

        // 时间线更新
        function updateTimeline() {
            if (!timeline.isPlaying) return;
            
            timeline.currentTime += 0.016;
            
            // 格式化时间显示
            const mins = Math.floor(timeline.currentTime / 60).toString().padStart(2, '0');
            const secs = Math.floor(timeline.currentTime % 60).toString().padStart(2, '0');
            document.getElementById('timecode').textContent = `${mins}:${secs} / 08:30`;
            
            // 检查当前镜头
            const currentShot = timeline.shots.find((s, i) => {
                const nextShot = timeline.shots[i + 1];
                return timeline.currentTime >= s.time && 
                       (!nextShot || timeline.currentTime < nextShot.time);
            });
            
            if (currentShot && currentShot.subtitle) {
                showSubtitle(currentShot.subtitle);
                // 只在字幕刚显示时播报一次
                if (Math.abs(timeline.currentTime - currentShot.time) < 0.02) {
                    narrator.speak(currentShot.subtitle);
                }
            }
            
            // 场景自动切换
            const activeScene = timeline.shots.find((s, i) => {
                const nextShot = timeline.shots[i + 1];
                return timeline.currentTime >= s.time && 
                       (!nextShot || timeline.currentTime < nextShot.time);
            });
            
            if (activeScene && activeScene.scene !== currentScene) {
                setScene(activeScene.scene);
            }
            
            // 时间到自动停止
            if (timeline.currentTime >= 510) {
                timeline.isPlaying = false;
                document.getElementById('playBtn').textContent = '▶ 播放';
            }
        }

        window.togglePlay = function() {
            timeline.isPlaying = !timeline.isPlaying;
            document.getElementById('playBtn').textContent = timeline.isPlaying ? '⏸ 暂停' : '▶ 播放';
            
            if (!timeline.isPlaying) {
                narrator.stop();
            }
        };

        window.jumpToTime = function(seconds) {
            timeline.currentTime = seconds;
            timeline.isPlaying = false;
            document.getElementById('playBtn').textContent = '▶ 播放';
            narrator.stop();
            
            // 找到对应场景
            const shot = timeline.shots.find(s => seconds >= s.time && seconds < s.time + s.duration) || 
                        timeline.shots.slice().reverse().find(s => seconds >= s.time);
            if (shot) {
                setScene(shot.scene);
            }
        };

        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新时间线系统
            updateTimeline();
            
            // 使用时间线的时间
            const animTime = timeline.currentTime;
            
            // 更新开场场景
            if (sceneGroups.opening.visible) {
                sceneGroups.opening.children.forEach((child, i) => {
                    if (child.material?.uniforms?.uTime) {
                        child.material.uniforms.uTime.value = animTime + i * 1.3;
                    }
                    if (child.name === 'particles') {
                        child.rotation.y = animTime * 0.02;
                    }
                });
            }

            // 更新阶段一：分子旋转
            if (sceneGroups.phase1.visible) {
                sceneGroups.phase1.children.forEach(child => {
                    if (child.userData.type) {
                        // 核心旋转
                        child.children[0].rotation.y += 0.01;
                        child.children[0].rotation.x += 0.005;
                        
                        // 轨道环旋转
                        for (let i = 1; i <= 3; i++) {
                            if (child.children[i]) {
                                child.children[i].rotation.x += 0.02 * (i % 2 === 0 ? 1 : -1);
                                child.children[i].rotation.z += 0.01;
                            }
                        }
                        
                        // 卫星粒子公转
                        for (let i = 4; i < child.children.length; i++) {
                            const sat = child.children[i];
                            if (sat.name === 'satellite') {
                                sat.userData.angle += 0.02 * sat.userData.speed;
                                sat.position.x = Math.cos(sat.userData.angle) * sat.userData.radius;
                                sat.position.z = Math.sin(sat.userData.angle) * sat.userData.radius;
                            }
                        }
                    }
                });
            }

            // 更新阶段二：数据流动画
            if (sceneGroups.phase2.visible) {
                sceneGroups.phase2.children.forEach(child => {
                    if (child.name === 'flow_particle') {
                        child.userData.progress += child.userData.speed;
                        if (child.userData.progress > 1) child.userData.progress = 0;
                        
                        const path = child.userData.path;
                        const idx = Math.floor(child.userData.progress * (path.length - 1));
                        const nextIdx = Math.min(idx + 1, path.length - 1);
                        const localT = (child.userData.progress * (path.length - 1)) % 1;
                        
                        child.position.lerpVectors(path[idx], path[nextIdx], localT);
                    }
                    if (child.userData.type) {
                        child.children[0].rotation.y += 0.01;
                    }
                });
            }

            // 更新阶段三：令牌旋转
            if (sceneGroups.phase3.visible) {
                sceneGroups.phase3.children.forEach(child => {
                    if (child.geometry?.type === 'CylinderGeometry') {
                        child.rotation.z += 0.02;
                    }
                    if (child.geometry?.type === 'TorusGeometry') {
                        child.rotation.x += 0.01;
                        child.rotation.y += 0.01;
                    }
                    if (child.userData.type) {
                        child.children[0].rotation.y += 0.01;
                    }
                });
            }

            // 更新阶段四：波纹扩散
            if (sceneGroups.phase4.visible) {
                sceneGroups.phase4.children.forEach(child => {
                    if (child.name === 'ripple') {
                        child.scale.addScalar(child.userData.speed);
                        if (child.scale.x > 1.5) {
                            child.scale.set(1, 1, 1);
                        }
                        child.material.opacity = 0.3 - child.userData.index * 0.05 - (child.scale.x - 1) * 0.2;
                    }
                    if (child.userData.type) {
                        child.children[0].rotation.y += 0.01;
                    }
                });
            }

            controls.update();
            composer.render();
        }

        // ==================== 初始化 ====================
        createOpeningScene();
        createPhase1Scene();
        createPhase2Scene();
        createPhase3Scene();
        createPhase4Scene();
        setScene(0);
        
        // 隐藏loading
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1000);

        animate();

        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('ECHO Protocol v2 Initialized');
    </script>
