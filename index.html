<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - WebGL Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .timecode {
            position: absolute;
            top: 20px; left: 20px;
            color: rgba(100, 200, 255, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 8px;
        }
        .subtitle {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(220, 220, 240, 0.9);
            font-size: 16px;
            text-align: center;
            max-width: 80%;
            background: rgba(10,15,35,0.7);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(100,200,255,0.2);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .subtitle.visible { opacity: 1; }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        button {
            padding: 10px 20px;
            border: 1px solid rgba(100,200,255,0.3);
            background: rgba(0,0,0,0.6);
            color: rgba(200,230,255,0.9);
            font-size: 13px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(100,200,255,0.2);
        }
        button.active {
            background: rgba(100,200,255,0.3);
        }
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1s;
        }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading-text {
            color: rgba(100,200,255,0.8);
            font-size: 14px;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-text">INITIALIZING WEBGL...</div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <div class="timecode" id="timecode">00:00 / 08:30</div>
        <div class="subtitle" id="subtitle"></div>
        <div class="controls">
            <button onclick="jumpTo(0)" id="btn-0">开场</button>
            <button onclick="jumpTo(30)" id="btn-1">阶段一</button>
            <button onclick="jumpTo(90)" id="btn-2">阶段二</button>
            <button onclick="jumpTo(180)" id="btn-3">阶段三</button>
            <button onclick="jumpTo(270)" id="btn-4">阶段四</button>
            <button onclick="jumpTo(390)" id="btn-5">失败</button>
            <button onclick="jumpTo(480)" id="btn-6">结尾</button>
            <button onclick="togglePlay()" id="playBtn">▶ 播放</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ==================== 场景设置 ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a30);
        scene.fog = new THREE.FogExp2(0x0a0a30, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // ==================== 后处理 ====================
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,  // strength
            0.4,  // radius
            0.85  // threshold
        );
        composer.addPass(bloomPass);

        // ==================== 细胞膜着色器 ====================
        const membraneVertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            uniform float uTime;
            
            void main() {
                vUv = uv;
                vNormal = normal;
                
                vec3 pos = position;
                
                // 有机波动
                float wave1 = sin(pos.x * 2.0 + uTime) * 0.1;
                float wave2 = sin(pos.y * 3.0 + uTime * 0.8) * 0.08;
                float wave3 = sin((pos.x + pos.y) * 1.5 + uTime * 1.2) * 0.05;
                
                pos += normal * (wave1 + wave2 + wave3);
                
                vPosition = pos;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const membraneFragmentShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            uniform float uTime;
            
            void main() {
                // 基础淡绿色
                vec3 baseColor = vec3(0.39, 1.0, 0.59);
                
                // 边缘发光
                float fresnel = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                vec3 glowColor = vec3(0.39, 1.0, 0.59) * fresnel * 2.0;
                
                // 内部能量纹理
                float energy = sin(vPosition.x * 10.0 + uTime) * sin(vPosition.y * 10.0 + uTime * 0.7);
                energy = energy * 0.5 + 0.5;
                energy = pow(energy, 3.0) * 0.3;
                
                vec3 finalColor = baseColor * 0.1 + glowColor + baseColor * energy;
                float alpha = 0.3 + fresnel * 0.4;
                
                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        // 创建细胞膜
        function createMembrane(radius, timeOffset = 0) {
            const geometry = new THREE.SphereGeometry(radius, 128, 128);
            const material = new THREE.ShaderMaterial({
                vertexShader: membraneVertexShader,
                fragmentShader: membraneFragmentShader,
                uniforms: {
                    uTime: { value: timeOffset }
                },
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            
            const membrane = new THREE.Mesh(geometry, material);
            return membrane;
        }

        // ==================== 粒子系统 ====================
        const particleCount = 1000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleVelocities = [];

        for (let i = 0; i < particleCount; i++) {
            particlePositions[i * 3] = (Math.random() - 0.5) * 50;
            particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 50;
            particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            
            particleVelocities.push({
                x: (Math.random() - 0.5) * 0.02,
                y: (Math.random() - 0.5) * 0.02,
                z: (Math.random() - 0.5) * 0.02
            });
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

        const particleMaterial = new THREE.PointsMaterial({
            color: 0x64c8ff,
            size: 0.1,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // ==================== 场景内容 ====================
        const membranes = [];
        const membraneGroup = new THREE.Group();
        
        // 三层细胞膜
        const m1 = createMembrane(5, 0);
        const m2 = createMembrane(7.5, 1.3);
        m2.material.uniforms.uTime.value = 1.3;
        m2.material.opacity = 0.7;
        
        const m3 = createMembrane(10, 2.6);
        m3.material.uniforms.uTime.value = 2.6;
        m3.material.opacity = 0.5;
        
        membranes.push(m1, m2, m3);
        membraneGroup.add(m1, m2, m3);
        scene.add(membraneGroup);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x64c8ff, 2, 100);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        const bioLight = new THREE.PointLight(0x64ff96, 1, 50);
        bioLight.position.set(-5, -5, 5);
        scene.add(bioLight);

        // ==================== 动画循环 ====================
        let time = 0;
        let isPlaying = false;
        let currentTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlaying) {
                time += 0.016;
                currentTime += 0.016;
                updateTimecode();
            }
            
            // 更新细胞膜
            membranes.forEach((m, i) => {
                m.material.uniforms.uTime.value = time + i * 1.3;
                m.rotation.y = time * 0.05;
            });
            
            // 更新粒子
            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] += particleVelocities[i].x;
                positions[i * 3 + 1] += particleVelocities[i].y;
                positions[i * 3 + 2] += particleVelocities[i].z;
                
                // 边界重置
                if (Math.abs(positions[i * 3]) > 25) particleVelocities[i].x *= -1;
                if (Math.abs(positions[i * 3 + 1]) > 25) particleVelocities[i].y *= -1;
                if (Math.abs(positions[i * 3 + 2]) > 25) particleVelocities[i].z *= -1;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y = time * 0.02;
            
            // 摄像机运动（示例：缓慢推镜）
            if (isPlaying && currentTime > 12 && currentTime < 20) {
                camera.position.z = 20 - (currentTime - 12) * 0.5;
            }
            
            composer.render();
        }

        // ==================== UI控制 ====================
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function updateTimecode() {
            document.getElementById('timecode').textContent = 
                `${formatTime(currentTime)} / 08:30`;
        }

        function showSubtitle(text) {
            const sub = document.getElementById('subtitle');
            sub.textContent = text;
            sub.classList.add('visible');
            setTimeout(() => sub.classList.remove('visible'), 4000);
        }

        window.jumpTo = function(seconds) {
            currentTime = seconds;
            updateTimecode();
            
            // 更新按钮状态
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (seconds < 30) document.getElementById('btn-0').classList.add('active');
            else if (seconds < 90) document.getElementById('btn-1').classList.add('active');
            else if (seconds < 180) document.getElementById('btn-2').classList.add('active');
            else if (seconds < 270) document.getElementById('btn-3').classList.add('active');
            else if (seconds < 390) document.getElementById('btn-4').classList.add('active');
            else if (seconds < 480) document.getElementById('btn-5').classList.add('active');
            else document.getElementById('btn-6').classList.add('active');
            
            // 场景切换逻辑
            if (seconds < 12) {
                membraneGroup.visible = false;
                particles.visible = false;
            } else {
                membraneGroup.visible = true;
                particles.visible = true;
            }
        };

        window.togglePlay = function() {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').textContent = isPlaying ? '⏸ 暂停' : '▶ 播放';
        };

        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // 初始化
        animate();
        
        // 隐藏loading
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1000);

        console.log('ECHO Protocol WebGL Initialized');
    </script>
</body>
</html>
