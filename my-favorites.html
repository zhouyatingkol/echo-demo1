<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - ECHO Music</title>
    <script src="ethers.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding-top: 64px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 24px;
        }
        .nav-links a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #00d4ff; }
        .nav-links a.active { color: #00d4ff; }
        .wallet-btn {
            padding: 10px 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        .wallet-btn.connected {
            background: rgba(0,255,0,0.2);
            border: 1px solid #0f0;
        }
        
        /* Page Title */
        .page-title {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .page-subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 8px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .tab.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
        }
        
        /* Create Playlist Button */
        .create-playlist-btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .create-playlist-btn:hover {
            opacity: 0.9;
        }
        
        /* Playlist Grid */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .playlist-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        .playlist-card:hover {
            border-color: rgba(0,212,255,0.3);
            transform: translateY(-4px);
        }
        .playlist-cover {
            height: 140px;
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
        }
        .playlist-count {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .playlist-info {
            padding: 16px;
        }
        .playlist-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .playlist-meta {
            font-size: 12px;
            color: #888;
        }
        .playlist-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .playlist-action-btn {
            padding: 6px 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        .playlist-action-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .playlist-action-btn.delete {
            color: #ff6b6b;
        }
        .playlist-action-btn.delete:hover {
            background: rgba(255,107,107,0.2);
        }
        
        /* Music Grid */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .music-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .music-card:hover {
            border-color: rgba(0,212,255,0.3);
            transform: translateY(-4px);
        }
        .music-visual {
            height: 160px;
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 60px;
        }
        .wave-bar {
            width: 4px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }
        .play-overlay {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .music-card:hover .play-overlay {
            opacity: 1;
        }
        .music-info {
            padding: 16px;
        }
        .music-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-meta {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .meta-tag {
            font-size: 11px;
            padding: 4px 8px;
            background: rgba(0,212,255,0.1);
            border-radius: 4px;
            color: #00d4ff;
        }
        .music-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .price {
            font-size: 18px;
            font-weight: bold;
            color: #0f0;
        }
        .price-unit {
            font-size: 12px;
            color: #888;
            font-weight: normal;
        }
        .buy-btn {
            padding: 8px 16px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        
        /* Favorite Button */
        .favorite-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #ff4757;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }
        .favorite-btn:hover {
            background: rgba(255,71,87,0.3);
            transform: scale(1.1);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #888;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 14px;
            margin-bottom: 24px;
        }
        .empty-state .btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        /* Audio Player Fixed */
        .player-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,26,0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px;
            display: none;
            align-items: center;
            gap: 16px;
        }
        .player-fixed.active {
            display: flex;
        }
        .player-info {
            flex: 0 0 200px;
        }
        .player-title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .player-artist {
            font-size: 12px;
            color: #888;
        }
        .player-preview {
            font-size: 11px;
            color: #ffd700;
            margin-top: 4px;
        }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-btn.play {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        }
        .player-progress {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
            width: 0%;
        }
        .time {
            font-size: 12px;
            color: #888;
            min-width: 40px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-header {
            font-size: 24px;
            margin-bottom: 20px;
            color: #0f0;
        }
        .modal-body { padding-top: 64px;
            margin-bottom: 24px;
        }
        .modal-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .modal-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-btn.primary {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        .modal-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        /* Playlist Detail View */
        .playlist-detail {
            display: none;
        }
        .playlist-detail.active {
            display: block;
        }
        .back-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .playlist-header {
            display: flex;
            gap: 24px;
            margin-bottom: 30px;
            padding: 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }
        .playlist-header-cover {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }
        .playlist-header-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .playlist-header-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .playlist-header-meta {
            color: #888;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .playlist-header-actions {
            display: flex;
            gap: 12px;
        }
        .header-action-btn {
            padding: 10px 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .header-action-btn.secondary {
            background: rgba(255,255,255,0.1);
        }
        .header-action-btn.secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* Music List (Vertical) */
        .music-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .music-list-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .music-list-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .music-list-number {
            width: 32px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
        .music-list-play {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .music-list-play:hover {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
        }
        .music-list-info {
            flex: 1;
        }
        .music-list-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .music-list-meta {
            font-size: 12px;
            color: #888;
        }
        .music-list-actions {
            display: flex;
            gap: 8px;
        }
        .music-list-action {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .music-list-action:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .music-list-action.remove:hover {
            color: #ff6b6b;
        }
    </style>
  <script src="frontend/js/theme-switcher.js" defer></script>
  <script src="frontend/js/i18n.js" defer></script>
  <link rel="stylesheet" href="frontend/css/global.css"
  <link rel="stylesheet" href="frontend/css/theme.css">
  <link rel="stylesheet" href="frontend/css/mobile.css">
  <script src="frontend/js/wallet-state.js" defer></script>
</head>
<body><nav class="main-nav" style="position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;"><div style="max-width: 1400px; margin: 0 auto; height: 100%; display: flex; align-items: center; padding: 0 20px; gap: 30px;"><a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 20px; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎵 ECHO Music</a><div style="display: flex; gap: 8px; flex: 1;"><a href="discover.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">发现</a><a href="music-market.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">市场</a><a href="charts.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">榜单</a><a href="mint-music.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">生成</a><a href="dashboard.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">收益</a></div><div style="display: flex; align-items: center; gap: 12px;"><a href="my-favorites.html" style="padding: 8px; text-decoration: none; font-size: 18px;">❤️</a><button style="padding: 8px 20px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer;" id="connectBtn">连接钱包</button></div></div></nav>
    <div class="container">
        <div class="header">
            <div class="logo">🎵 ECHO Music</div>
            <div class="nav-links">
                <a href="mint-music.html">上传音乐</a>
                <a href="music-market.html">音乐市场</a>
                <a href="my-favorites.html" class="active">我的收藏</a>
                <a href="my-assets.html">我的资产</a>
            </div>
            <button class="wallet-btn" id="connectBtn" id="connectBtn">连接钱包</button>
        </div>

        <div id="mainView">
            <h1 class="page-title">我的收藏</h1>
            <p class="page-subtitle">管理您收藏的音乐和播放列表</p>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('favorites')" id="tab-favorites">❤️ 收藏音乐</button>
                <button class="tab" onclick="switchTab('playlists')" id="tab-playlists">📋 播放列表</button>
            </div>

            <!-- Favorites View -->
            <div id="favoritesView">
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-value" id="favCount">0</span>
                        <span class="stat-label">首收藏</span>
                    </div>
                </div>
                <div class="music-grid" id="favoritesGrid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- Playlists View -->
            <div id="playlistsView" style="display: none;">
                <button class="create-playlist-btn" onclick="showCreatePlaylistModal()">
                    ➕ 创建播放列表
                </button>
                <div class="playlist-grid" id="playlistsGrid">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- Playlist Detail View -->
        <div id="playlistDetailView" class="playlist-detail">
            <button class="back-btn" onclick="backToMain()">← 返回</button>
            <div class="playlist-header">
                <div class="playlist-header-cover" id="detailCover">🎵</div>
                <div class="playlist-header-info">
                    <div class="playlist-header-name" id="detailName">--</div>
                    <div class="playlist-header-meta" id="detailMeta">--</div>
                    <div class="playlist-header-actions">
                        <button class="header-action-btn" onclick="playPlaylist()">▶ 播放全部</button>
                        <button class="header-action-btn secondary" onclick="showRenameModal()">重命名</button>
                        <button class="header-action-btn secondary" onclick="deleteCurrentPlaylist()" style="color: #ff6b6b;">删除</button>
                    </div>
                </div>
            </div>
            <div class="music-list" id="playlistMusicList">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 固定播放器 -->
    <div class="player-fixed" id="fixedPlayer">
        <div class="player-info">
            <div class="player-title" id="playerTitle">--</div>
            <div class="player-artist" id="playerArtist">--</div>
            <div class="player-preview" id="playerPreviewTag" style="display: none;">🔒 30秒预览模式</div>
        </div>
        
        <div class="player-controls">
            <button class="control-btn" onclick="skipBackward()">⏮</button>
            <button class="control-btn play" id="playerPlayBtn" onclick="togglePlayer()">▶</button>
            <button class="control-btn" onclick="skipForward()">⏭</button>
        </div>
        
        <div class="player-progress">
            <span class="time" id="currentTime">0:00</span>
            <div class="progress-bar" onclick="seekPlayer(event)">
                <div class="progress-fill" id="playerProgress"></div>
            </div>
            <span class="time" id="totalTime">0:00</span>
        </div>
        
        <audio id="audioElement" preload="metadata"></audio>
    </div>

    <!-- Create Playlist Modal -->
    <div class="modal" id="createPlaylistModal">
        <div class="modal-content">
            <div style="font-size: 20px; margin-bottom: 16px;">📋 创建播放列表</div>
            <input type="text" class="modal-input" id="playlistNameInput" placeholder="输入播放列表名称..." maxlength="50">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="createPlaylist()">创建</button>
                <button class="modal-btn secondary" onclick="closeModal('createPlaylistModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- Rename Playlist Modal -->
    <div class="modal" id="renamePlaylistModal">
        <div class="modal-content">
            <div style="font-size: 20px; margin-bottom: 16px;">✏️ 重命名播放列表</div>
            <input type="text" class="modal-input" id="renameInput" placeholder="输入新名称..." maxlength="50">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="renamePlaylist()">保存</button>
                <button class="modal-btn secondary" onclick="closeModal('renamePlaylistModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        const V2_CONTRACT_ADDRESS = '0xF98f63b7e8064Dcf9c2f25A906B2af89Af4840ce';
        const V2_ABI = [
            "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)"
        ];
        
        let provider, signer, contract, userAddress;
        let isConnected = false;
        let allMusic = [];
        let currentPlaylistId = null;
        let currentMusic = null;
        let isPlaying = false;
        let playlistQueue = [];
        let currentQueueIndex = 0;
        
        // 音频元素
        const audio = document.getElementById('audioElement');
        
        // 音频时间更新
        audio.addEventListener('timeupdate', function() {
            const current = this.currentTime;
            const duration = this.duration || 0;
            
            // 30秒预览限制
            if (current >= 30) {
                this.pause();
                this.currentTime = 0;
                isPlaying = false;
                document.getElementById('playerPlayBtn').textContent = '▶';
                return;
            }
            
            const percent = (current / duration) * 100;
            document.getElementById('playerProgress').style.width = percent + '%';
            document.getElementById('currentTime').textContent = formatTime(current);
            document.getElementById('totalTime').textContent = formatTime(duration);
        });
        
        audio.addEventListener('ended', function() {
            isPlaying = false;
            document.getElementById('playerPlayBtn').textContent = '▶';
            
            // 播放队列中的下一首
            if (playlistQueue.length > 0 && currentQueueIndex < playlistQueue.length - 1) {
                currentQueueIndex++;
                playMusicFromQueue();
            }
        });
        
        audio.addEventListener('loadedmetadata', function() {
            document.getElementById('totalTime').textContent = formatTime(this.duration);
        });
        
        // ========== 钱包连接 ==========
        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('请先安装 MetaMask 钱包！');
                return;
            }
            
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                isConnected = true;
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
                
                document.getElementById('connectBtn').textContent = 
                    userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                document.getElementById('connectBtn').classList.add('connected');
                
                loadAllMusic();
            } catch (error) {
                console.error('连接失败:', error);
            }
        }
        
        // ========== 数据加载 ==========
        async function loadAllMusic() {
            if (!contract) return;
            
            try {
                const currentId = await contract.getCurrentTokenId();
                allMusic = [];
                
                for (let i = 0; i < currentId.toNumber(); i++) {
                    try {
                        const [metadata, blueprint, creator] = await contract.getAssetInfo(i);
                        
                        if (metadata.assetType && metadata.assetType.startsWith('music_')) {
                            allMusic.push({
                                tokenId: i,
                                name: metadata.name,
                                genre: metadata.assetType.replace('music_', ''),
                                creator: creator,
                                price: ethers.utils.formatEther(blueprint.usage.fee),
                                uri: metadata.uri
                            });
                        }
                    } catch (e) {}
                }
                
                renderFavorites();
                renderPlaylists();
            } catch (error) {
                console.error('加载失败:', error);
            }
        }
        
        // ========== 收藏功能 ==========
        function getFavorites() {
            const data = localStorage.getItem('echoMusicData');
            if (!data) return [];
            try {
                const parsed = JSON.parse(data);
                return parsed.favorites || [];
            } catch (e) {
                return [];
            }
        }
        
        function saveFavorites(favorites) {
            const data = localStorage.getItem('echoMusicData');
            let parsed = {};
            if (data) {
                try {
                    parsed = JSON.parse(data);
                } catch (e) {}
            }
            parsed.favorites = favorites;
            localStorage.setItem('echoMusicData', JSON.stringify(parsed));
        }
        
        function removeFavorite(tokenId) {
            const favorites = getFavorites();
            const index = favorites.indexOf(tokenId);
            if (index > -1) {
                favorites.splice(index, 1);
                saveFavorites(favorites);
                renderFavorites();
                showToast('已从收藏中移除');
            }
        }
        
        function renderFavorites() {
            const favorites = getFavorites();
            document.getElementById('favCount').textContent = favorites.length;
            const grid = document.getElementById('favoritesGrid');
            
            if (favorites.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="icon">🤍</div>
                        <h3>暂无收藏</h3>
                        <p>去音乐市场发现喜欢的音乐吧</p>
                        <a href="music-market.html" class="btn">前往音乐市场</a>
                    </div>
                `;
                return;
            }
            
            const favMusic = favorites.map(id => allMusic.find(m => m.tokenId === id)).filter(m => m);
            
            grid.innerHTML = favMusic.map(music => `
                <div class="music-card">
                    <div class="music-visual">
                        <button class="favorite-btn" onclick="removeFavorite(${music.tokenId})" title="取消收藏">
                            ❤️
                        </button>
                        <div class="waveform">
                            ${Array(20).fill(0).map(() => `
                                <div class="wave-bar" style="height: ${Math.random() * 80 + 20}%; animation-delay: ${Math.random()}s"></div>
                            `).join('')}
                        </div>
                        <div class="play-overlay" onclick="playMusic(${music.tokenId})">▶</div>
                    </div>
                    <div class="music-info">
                        <div class="music-title">${music.name}</div>
                        <div class="music-meta">
                            <span class="meta-tag">${getGenreLabel(music.genre)}</span>
                            <span class="meta-tag">Token #${music.tokenId}</span>
                        </div>
                        <div class="music-stats">
                            <div class="price">
                                ${music.price}
                                <span class="price-unit">MEER/次</span>
                            </div>
                            <button class="buy-btn" onclick="buyLicense(${music.tokenId}, '${music.price}')">购买授权</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== 播放列表功能 ==========
        function getPlaylists() {
            const data = localStorage.getItem('echoMusicData');
            if (!data) return [];
            try {
                const parsed = JSON.parse(data);
                return parsed.playlists || [];
            } catch (e) {
                return [];
            }
        }
        
        function savePlaylists(playlists) {
            const data = localStorage.getItem('echoMusicData');
            let parsed = {};
            if (data) {
                try {
                    parsed = JSON.parse(data);
                } catch (e) {}
            }
            parsed.playlists = playlists;
            localStorage.setItem('echoMusicData', JSON.stringify(parsed));
        }
        
        function renderPlaylists() {
            const playlists = getPlaylists();
            const grid = document.getElementById('playlistsGrid');
            
            if (playlists.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="icon">📋</div>
                        <h3>暂无播放列表</h3>
                        <p>创建您的第一个播放列表</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = playlists.map(playlist => `
                <div class="playlist-card" onclick="openPlaylist(${playlist.id})">
                    <div class="playlist-cover">
                        🎵
                        <span class="playlist-count">${playlist.items.length} 首</span>
                    </div>
                    <div class="playlist-info">
                        <div class="playlist-name">${playlist.name}</div>
                        <div class="playlist-meta">创建于 ${formatDate(playlist.id)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function showCreatePlaylistModal() {
            document.getElementById('playlistNameInput').value = '';
            document.getElementById('createPlaylistModal').classList.add('active');
            document.getElementById('playlistNameInput').focus();
        }
        
        function createPlaylist() {
            const name = document.getElementById('playlistNameInput').value.trim();
            if (!name) {
                showToast('请输入播放列表名称');
                return;
            }
            
            const playlists = getPlaylists();
            const newId = Date.now();
            
            playlists.push({
                id: newId,
                name: name,
                items: []
            });
            
            savePlaylists(playlists);
            closeModal('createPlaylistModal');
            renderPlaylists();
            showToast('播放列表创建成功');
        }
        
        function openPlaylist(id) {
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === id);
            if (!playlist) return;
            
            currentPlaylistId = id;
            
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('playlistDetailView').classList.add('active');
            
            document.getElementById('detailName').textContent = playlist.name;
            document.getElementById('detailMeta').textContent = `${playlist.items.length} 首音乐 · 创建于 ${formatDate(playlist.id)}`;
            
            renderPlaylistMusic(playlist);
        }
        
        function renderPlaylistMusic(playlist) {
            const list = document.getElementById('playlistMusicList');
            
            if (playlist.items.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎵</div>
                        <h3>播放列表为空</h3>
                        <p>去音乐市场添加音乐到播放列表</p>
                        <a href="music-market.html" class="btn">前往音乐市场</a>
                    </div>
                `;
                return;
            }
            
            const musicItems = playlist.items.map((tokenId, index) => {
                const music = allMusic.find(m => m.tokenId === tokenId);
                if (!music) return null;
                return { ...music, index: index + 1 };
            }).filter(m => m);
            
            list.innerHTML = musicItems.map((music, idx) => `
                <div class="music-list-item">
                    <div class="music-list-number">${music.index}</div>
                    <button class="music-list-play" onclick="playMusic(${music.tokenId})">▶</button>
                    <div class="music-list-info">
                        <div class="music-list-title">${music.name}</div>
                        <div class="music-list-meta">${getGenreLabel(music.genre)} · Token #${music.tokenId}</div>
                    </div>
                    <div class="music-list-actions">
                        <button class="music-list-action remove" onclick="removeFromPlaylist(${music.tokenId})" title="从播放列表移除">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        function backToMain() {
            document.getElementById('playlistDetailView').classList.remove('active');
            document.getElementById('mainView').style.display = 'block';
            currentPlaylistId = null;
            renderPlaylists();
        }
        
        function playPlaylist() {
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (!playlist || playlist.items.length === 0) return;
            
            playlistQueue = playlist.items;
            currentQueueIndex = 0;
            playMusicFromQueue();
        }
        
        function playMusicFromQueue() {
            if (playlistQueue.length === 0 || currentQueueIndex >= playlistQueue.length) return;
            const tokenId = playlistQueue[currentQueueIndex];
            playMusic(tokenId);
        }
        
        function removeFromPlaylist(tokenId) {
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (!playlist) return;
            
            const index = playlist.items.indexOf(tokenId);
            if (index > -1) {
                playlist.items.splice(index, 1);
                savePlaylists(playlists);
                renderPlaylistMusic(playlist);
                showToast('已从播放列表移除');
            }
        }
        
        function deleteCurrentPlaylist() {
            if (!confirm('确定要删除这个播放列表吗？')) return;
            
            const playlists = getPlaylists();
            const index = playlists.findIndex(p => p.id === currentPlaylistId);
            if (index > -1) {
                playlists.splice(index, 1);
                savePlaylists(playlists);
                backToMain();
                showToast('播放列表已删除');
            }
        }
        
        function showRenameModal() {
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (!playlist) return;
            
            document.getElementById('renameInput').value = playlist.name;
            document.getElementById('renamePlaylistModal').classList.add('active');
            document.getElementById('renameInput').focus();
        }
        
        function renamePlaylist() {
            const name = document.getElementById('renameInput').value.trim();
            if (!name) {
                showToast('请输入播放列表名称');
                return;
            }
            
            const playlists = getPlaylists();
            const playlist = playlists.find(p => p.id === currentPlaylistId);
            if (playlist) {
                playlist.name = name;
                savePlaylists(playlists);
                document.getElementById('detailName').textContent = name;
                closeModal('renamePlaylistModal');
                showToast('重命名成功');
            }
        }
        
        // ========== 播放器 ==========
        async function playMusic(tokenId) {
            const music = allMusic.find(m => m.tokenId === tokenId);
            if (!music) return;
            
            currentMusic = music;
            
            document.getElementById('playerTitle').textContent = music.name;
            document.getElementById('playerArtist').textContent = '创作者: ' + music.creator.slice(0, 6) + '...' + music.creator.slice(-4);
            document.getElementById('playerPreviewTag').style.display = 'block';
            document.getElementById('fixedPlayer').classList.add('active');
            
            // 加载音频
            let audioUrl = music.uri;
            if (audioUrl && audioUrl.startsWith('ipfs://')) {
                audioUrl = audioUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');
            }
            if (!audioUrl || audioUrl === '') {
                audioUrl = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
            }
            
            audio.src = audioUrl;
            audio.currentTime = 0;
            
            try {
                await audio.play();
                isPlaying = true;
                document.getElementById('playerPlayBtn').textContent = '⏸';
            } catch (error) {
                console.error('播放失败:', error);
            }
        }
        
        async function togglePlayer() {
            if (!currentMusic) return;
            
            const btn = document.getElementById('playerPlayBtn');
            
            if (isPlaying) {
                audio.pause();
                btn.textContent = '▶';
                isPlaying = false;
            } else {
                try {
                    await audio.play();
                    btn.textContent = '⏸';
                    isPlaying = true;
                } catch (error) {
                    console.error('播放失败:', error);
                }
            }
        }
        
        function skipBackward() {
            if (!audio) return;
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        }
        
        function skipForward() {
            if (!audio) return;
            audio.currentTime = Math.min(30, audio.currentTime + 10);
        }
        
        function seekPlayer(event) {
            const bar = event.currentTarget;
            const clickX = event.offsetX;
            const width = bar.offsetWidth;
            const percent = clickX / width;
            audio.currentTime = Math.min(30, percent * audio.duration);
        }
        
        // ========== Tab 切换 ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if (tab === 'favorites') {
                document.getElementById('favoritesView').style.display = 'block';
                document.getElementById('playlistsView').style.display = 'none';
                renderFavorites();
            } else {
                document.getElementById('favoritesView').style.display = 'none';
                document.getElementById('playlistsView').style.display = 'block';
                renderPlaylists();
            }
        }
        
        // ========== 通用函数 ==========
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: linear-gradient(90deg, #00d4ff, #7b2cbf);
                color: #fff;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 10000;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                animation: slideDown 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }
        
        function getGenreLabel(genre) {
            const labels = {
                electronic: '电子',
                rock: '摇滚',
                classical: '古典',
                jazz: '爵士',
                pop: '流行',
                ambient: '氛围',
                hiphop: '嘻哈',
                folk: '民谣'
            };
            return labels[genre] || genre;
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + secs.toString().padStart(2, '0');
        }
        
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
                to { transform: translateX(-50%) translateY(0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translateX(-50%) translateY(0); opacity: 1; }
                to { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // 回车键确认
        document.getElementById('playlistNameInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createPlaylist();
        });
        document.getElementById('renameInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') renamePlaylist();
        });
        
        // 初始化
        if (typeof window.ethereum !== 'undefined') {
            connectWallet();
        }
    </script>
</body>
</html>
