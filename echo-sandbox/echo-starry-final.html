<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - 星空协作版</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 星空背景 */
        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }
        
        /* 页面 */
        .stage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            padding: 20px;
        }
        .stage.active { display: flex; flex-direction: column; }
        
        /* ===== 开场 ===== */
        .opening {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .glass-card {
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid rgba(100, 120, 150, 0.2);
            border-radius: 24px;
            padding: 60px 100px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 48px;
            letter-spacing: 12px;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }
        .tagline {
            color: rgba(150, 170, 200, 0.8);
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }
        .start-btn {
            padding: 14px 40px;
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .start-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
        
        /* ===== 协作页面 ===== */
        .fusion-page {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        /* 顶部导航 */
        .top-nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }
        .nav-tab {
            padding: 10px 20px;
            color: rgba(150, 170, 200, 0.6);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .nav-tab:hover { color: rgba(150, 170, 200, 0.9); }
        .nav-tab.active {
            color: #00f0ff;
            border-bottom-color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        /* 主区域 */
        .main-area {
            display: flex;
            flex: 1;
            gap: 20px;
        }
        
        /* 面板 */
        .panel {
            background: rgba(15, 20, 35, 0.7);
            border: 1px solid rgba(100, 120, 150, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            padding: 20px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        
        /* 左侧面板 */
        .left-panel { width: 280px; display: flex; flex-direction: column; }
        .panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            color: #00f0ff;
            font-size: 14px;
        }
        .panel-header-icon { width: 8px; height: 8px; background: #00f0ff; border-radius: 50%; box-shadow: 0 0 10px #00f0ff; }
        .panel-subtitle {
            color: rgba(150, 170, 200, 0.5);
            font-size: 11px;
            margin-bottom: 15px;
        }
        
        /* 资产列表 */
        .asset-list { flex: 1; overflow-y: auto; }
        .asset-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .asset-item:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.2);
        }
        .asset-icon-box {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .asset-info { flex: 1; }
        .asset-name { font-size: 13px; margin-bottom: 2px; }
        .asset-id { font-size: 10px; font-family: 'Orbitron', sans-serif; opacity: 0.6; }
        .asset-type { font-size: 9px; color: rgba(150,170,200,0.5); text-transform: uppercase; }
        
        /* 中央协作池 */
        .center-panel { flex: 1; position: relative; display: flex; flex-direction: column; }
        .pool-area {
            flex: 1;
            position: relative;
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            background: rgba(0,0,0,0.2);
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        /* 池内资产 */
        .pool-asset {
            position: absolute;
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid;
            background: rgba(10,15,30,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px currentColor;
        }
        .pool-asset:hover { transform: scale(1.1); }
        .pool-asset-icon { font-size: 32px; margin-bottom: 4px; }
        .pool-asset-id { font-size: 10px; font-family: 'Orbitron', sans-serif; }
        .pool-asset-remove {
            position: absolute;
            top: -5px; right: -5px;
            width: 22px; height: 22px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .pool-asset:hover .pool-asset-remove { opacity: 1; }
        
        /* 连线 */
        .connection-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.6), transparent);
            transform-origin: left center;
            pointer-events: none;
        }
        
        /* 底部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid rgba(100, 120, 150, 0.15);
            border-radius: 16px;
        }
        .stats { display: flex; gap: 40px; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 28px; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .stat-label { font-size: 10px; color: rgba(150,170,200,0.6); margin-top: 4px; }
        
        .action-btns { display: flex; gap: 12px; }
        .clear-btn {
            padding: 10px 24px;
            background: transparent;
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: rgba(255, 100, 100, 0.8);
            font-size: 12px;
            cursor: pointer;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
        }
        .clear-btn.visible { opacity: 1; pointer-events: auto; }
        .fuse-btn {
            padding: 12px 30px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            cursor: not-allowed;
            border-radius: 8px;
            opacity: 0.4;
            pointer-events: none;
            transition: all 0.3s;
        }
        .fuse-btn.active {
            opacity: 1;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .fuse-btn.active:hover {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        
        /* 右侧面板 */
        .right-panel { width: 300px; }
        .panel-header.gold { color: #ffd700; }
        .panel-header.gold .panel-header-icon { background: #ffd700; box-shadow: 0 0 10px #ffd700; }
        
        .selected-assets { margin-bottom: 20px; }
        .selected-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid;
            border-radius: 20px;
            font-size: 11px;
            margin: 4px;
        }
        
        .distribution-list { margin-bottom: 20px; }
        .dist-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .dist-name { font-size: 12px; color: rgba(200,220,240,0.8); }
        .dist-value { font-size: 12px; color: #ffd700; }
        
        .rules-box {
            padding: 15px;
            background: rgba(255, 215, 0, 0.05);
            border-left: 3px solid #ffd700;
            border-radius: 0 10px 10px 0;
            font-size: 11px;
            color: rgba(200,220,240,0.7);
            line-height: 1.8;
        }
        
        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            padding: 50px 70px;
            text-align: center;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.2);
        }
        .modal-icon { font-size: 60px; margin-bottom: 20px; }
        .modal-title { font-size: 28px; color: #ffd700; margin-bottom: 10px; }
        .modal-subtitle { color: rgba(150,170,200,0.7); margin-bottom: 30px; }
        .modal-result {
            padding: 15px 40px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    
    <!-- 开场 -->
    <div class="stage active" id="stage0">
        <div class="opening">
            <div class="glass-card">
                <div class="logo">ECHO PROTOCOL</div>
                <div class="tagline">价值溯源：一款新药的数字旅程</div>
                <button class="start-btn" onclick="goTo(1)">开始探索</button>
            </div>
        </div>
    </div>
    
    <!-- 协作页面 -->
    <div class="stage" id="stage1">
        <div class="fusion-page">
            <div class="top-nav">
                <div class="nav-tab">资产铸造</div>
                <div class="nav-tab active">协作衍生</div>
                <div class="nav-tab">融资决策</div>
            </div>
            
            <div class="main-area">
                <!-- 左侧面板 -->
                <div class="panel left-panel">
                    <div class="panel-header">
                        <div class="panel-header-icon"></div>
                        <span>已铸造资产</span>
                    </div>
                    <div class="panel-subtitle">拖拽资产到协作池</div>
                    <div class="asset-list" id="assetList"></div>
                </div>
                
                <!-- 中央协作池 -->
                <div class="panel center-panel">
                    <div class="pool-area" id="poolArea">
                        <!-- 动态添加的资产 -->
                    </div>
                    
                    <div class="status-bar">
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-number" id="assetCount">0</div>
                                <div class="stat-label">已选资产</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number" id="totalPower">100%</div>
                                <div class="stat-label">总权益</div>
                            </div>
                        </div>
                        
                        <div class="action-btns">
                            <button class="clear-btn" id="clearBtn" onclick="clearPool()">清空</button>
                            <button class="fuse-btn" id="fuseBtn" onclick="doFusion()">✨ 开始融合</button>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧面板 -->
                <div class="panel right-panel">
                    <div class="panel-header gold">
                        <div class="panel-header-icon"></div>
                        <span>融合权属</span>
                    </div>
                    
                    <div id="ownershipContent">
                        <div class="section-label" style="font-size: 10px; color: rgba(150,170,200,0.6); margin-bottom: 10px;">已选资产</div>
                        <div class="selected-assets" id="selectedAssets"></div>
                        
                        <div class="section-label" style="font-size: 10px; color: rgba(150,170,200,0.6); margin: 15px 0 10px;">权益分配</div>
                        <div class="distribution-list" id="distributionList"></div>
                        
                        <div class="section-label" style="font-size: 10px; color: rgba(150,170,200,0.6); margin: 15px 0 10px;">融合规则</div>
                        <div class="rules-box">
                            • 所有选中资产的权属将合并<br>
                            • 收益按资产类型权重自动分配<br>
                            • 继承上游资产全部规则<br>
                            • 里程碑触发即时结算
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">✨</div>
            <div class="modal-title">融合成功</div>
            <div class="modal-subtitle">新资产已生成</div>
            <div class="modal-result">NeuroBlok-v2</div>
            <button class="start-btn" onclick="closeModal()">继续协作</button>
        </div>
    </div>

    <script>
        // 数据
        const assets = [
            { id: 'PDB-001', name: '蛋白质结构', icon: '🧬', color: '#00f0ff', type: 'PROTEIN', weight: 1.2 },
            { id: 'CHEM-002', name: '化合物库', icon: '⚗️', color: '#00ff88', type: 'COMPOUND', weight: 1.0 },
            { id: 'GENE-003', name: '基因序列', icon: '🧪', color: '#0088ff', type: 'GENE', weight: 1.5 },
            { id: 'VSCREEN-004', name: '虚拟筛选', icon: '💻', color: '#88ffcc', type: 'SCREENING', weight: 0.8 },
            { id: 'ASSAY-005', name: '实验数据', icon: '📊', color: '#a29bfe', type: 'ASSAY', weight: 1.3 },
            { id: 'CLINICAL-006', name: '临床数据', icon: '🏥', color: '#ffa502', type: 'CLINICAL', weight: 2.0 },
            { id: 'PATENT-007', name: '专利信息', icon: '📜', color: '#ff69b4', type: 'PATENT', weight: 1.8 }
        ];
        
        let poolAssets = [];
        let assetCounter = 0;
        
        // 星空背景
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random() * 0.8 + 0.2,
                    speed: Math.random() * 0.2
                });
            }
            
            function animate() {
                ctx.fillStyle = '#050508';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                stars.forEach(star => {
                    star.y += star.speed;
                    if (star.y > canvas.height) star.y = 0;
                    
                    ctx.fillStyle = `rgba(200, 220, 255, ${star.opacity})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // 初始化
        function init() {
            initStarfield();
            renderAssetList();
        }
        
        // 渲染资产列表
        function renderAssetList() {
            const list = document.getElementById('assetList');
            list.innerHTML = '';
            
            assets.forEach(asset => {
                const item = document.createElement('div');
                item.className = 'asset-item';
                item.innerHTML = `
                    <div class="asset-icon-box" style="color: ${asset.color}; border: 1px solid ${asset.color}30;">${asset.icon}</div>
                    <div class="asset-info">
                        <div class="asset-name">${asset.name}</div>
                        <div class="asset-id" style="color: ${asset.color};">${asset.id}</div>
                        <div class="asset-type">${asset.type}</div>
                    </div>
                `;
                item.onclick = () => addToPool(asset);
                list.appendChild(item);
            });
        }
        
        // 添加到协作池
        function addToPool(asset) {
            if (poolAssets.find(p => p.id === asset.id)) return;
            
            poolAssets.push(asset);
            assetCounter++;
            
            const pool = document.getElementById('poolArea');
            const el = document.createElement('div');
            el.className = 'pool-asset';
            el.id = 'pool-' + assetCounter;
            el.style.color = asset.color;
            el.style.borderColor = asset.color;
            el.style.left = (100 + Math.random() * (pool.offsetWidth - 250)) + 'px';
            el.style.top = (50 + Math.random() * (pool.offsetHeight - 200)) + 'px';
            el.innerHTML = `
                <div class="pool-asset-icon">${asset.icon}</div>
                <div class="pool-asset-id">${asset.id}</div>
                <div class="pool-asset-remove" onclick="removeFromPool('${asset.id}', 'pool-${assetCounter}')">×</div>
            `;
            pool.appendChild(el);
            
            updateStats();
            drawConnections();
        }
        
        // 移除资产
        function removeFromPool(assetId, elementId) {
            poolAssets = poolAssets.filter(p => p.id !== assetId);
            document.getElementById(elementId)?.remove();
            updateStats();
            drawConnections();
        }
        
        // 清空
        function clearPool() {
            poolAssets = [];
            document.querySelectorAll('.pool-asset').forEach(el => el.remove());
            updateStats();
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('assetCount').textContent = poolAssets.length;
            
            // 权益分配
            const totalWeight = poolAssets.reduce((s, a) => s + a.weight, 0);
            const distList = document.getElementById('distributionList');
            const selectedTags = document.getElementById('selectedAssets');
            
            selectedTags.innerHTML = poolAssets.map(a => `
                <span class="selected-tag" style="border-color: ${a.color}40; color: ${a.color};">${a.id}</span>
            `).join('');
            
            distList.innerHTML = poolAssets.map(a => {
                const share = totalWeight > 0 ? ((a.weight / totalWeight) * 100).toFixed(0) : 0;
                return `
                    <div class="dist-item">
                        <span class="dist-name">${a.name}</span>
                        <span class="dist-value">${share}%</span>
                    </div>
                `;
            }).join('');
            
            // 按钮状态
            document.getElementById('fuseBtn').classList.toggle('active', poolAssets.length >= 2);
            document.getElementById('clearBtn').classList.toggle('visible', poolAssets.length > 0);
        }
        
        // 绘制连线（简化版）
        function drawConnections() {
            // 移除旧连线
            document.querySelectorAll('.connection-line').forEach(l => l.remove());
            
            if (poolAssets.length < 2) return;
            
            const pool = document.getElementById('poolArea');
            const centerX = pool.offsetWidth / 2;
            const centerY = pool.offsetHeight / 2;
            
            poolAssets.forEach((asset, i) => {
                const el = document.getElementById('pool-' + (i + 1));
                if (!el) return;
                
                const line = document.createElement('div');
                line.className = 'connection-line';
                const rect = el.getBoundingClientRect();
                const poolRect = pool.getBoundingClientRect();
                const x = rect.left - poolRect.left + 50;
                const y = rect.top - poolRect.top + 50;
                
                const length = Math.sqrt((centerX - x) ** 2 + (centerY - y) ** 2);
                const angle = Math.atan2(centerY - y, centerX - x) * 180 / Math.PI;
                
                line.style.width = length + 'px';
                line.style.left = x + 'px';
                line.style.top = y + 'px';
                line.style.transform = `rotate(${angle}deg)`;
                pool.appendChild(line);
            });
        }
        
        // 融合
        function doFusion() {
            if (poolAssets.length < 2) return;
            document.getElementById('successModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
        }
        
        // 导航
        function goTo(stage) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById('stage' + stage).classList.add('active');
        }
        
        // 启动
        init();
    </script>
</body>
</html>
