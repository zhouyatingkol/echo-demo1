<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - 价值溯源</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 3D背景 */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }
        
        /* Stage容器 */
        .stage {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .stage.active { display: block; }
        
        /* 导航 */
        .top-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .nav-item {
            color: rgba(200,220,240,0.7);
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0,240,255,0.5);
        }
        
        /* Stage 4画布 */
        #value3dCanvas {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #value3dCanvas:active { cursor: grabbing; }
        
        /* 详情面板 */
        .detail-panel {
            position: fixed;
            right: 40px;
            top: 100px;
            width: 350px;
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(20px);
            z-index: 10;
        }
        .detail-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .detail-icon { font-size: 40px; }
        .detail-title {
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
        }
        
        /* 贡献者列表 */
        .contributor-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 3px solid;
        }
        .contributor-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .contributor-info { flex: 1; }
        .contributor-name { font-size: 13px; }
        .contributor-share { font-size: 11px; color: rgba(150,170,200,0.6); }
        .contributor-amount {
            font-size: 14px;
            font-family: 'Orbitron', sans-serif;
            color: #ffd700;
        }
        
        /* 总收益 */
        .total-revenue {
            position: fixed;
            top: 100px;
            left: 40px;
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 20px 30px;
            z-index: 10;
        }
        .revenue-label {
            font-size: 11px;
            color: rgba(150,170,200,0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .revenue-amount {
            font-size: 28px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        /* 控制提示 */
        .controls-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            font-size: 12px;
            color: rgba(150,170,200,0.7);
            background: rgba(0,0,0,0.4);
            padding: 12px 25px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
    </style>
</head>
<body>
    <!-- 3D背景 -->
    <canvas id="bg-canvas"></canvas>
    
    <!-- 导航 -->
    <div class="top-nav">
        <div class="nav-item" onclick="goTo(0)">开场</div>
        <div class="nav-item" onclick="goTo(1)">资产铸造</div>
        <div class="nav-item" onclick="goTo(2)">协作衍生</div>
        <div class="nav-item" onclick="goTo(3)">融资决策</div>
        <div class="nav-item active" onclick="goTo(4)">价值分配</div>
    </div>
    
    <!-- Stage 0: 开场 -->
    <div class="stage" id="stage0">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;">
            <h1 style="font-size:48px;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,0.5);margin-bottom:20px;">ECHO PROTOCOL</h1>
            <p style="color:rgba(200,220,240,0.8);margin-bottom:40px;">价值溯源：一款新药的数字旅程</p>
            <button onclick="goTo(1)" style="padding:15px 40px;background:linear-gradient(135deg,#ffd700,#ffaa00);border:none;border-radius:30px;color:#000;font-family:'Orbitron',sans-serif;font-size:16px;cursor:pointer;box-shadow:0 10px30px rgba(255,215,0,0.3);">开始探索</button>
        </div>
    </div>
    
    <!-- Stage 1-3: 占位 -->
    <div class="stage" id="stage1"><div style="padding-top:100px;text-align:center;">资产铸造 (开发中)</div></div>
    <div class="stage" id="stage2"><div style="padding-top:100px;text-align:center;">协作衍生 (开发中)</div></div>
    <div class="stage" id="stage3"><div style="padding-top:100px;text-align:center;">融资决策 (开发中)</div></div>
    
    <!-- Stage 4: 价值分配 -->
    <div class="stage active" id="stage4">
        <canvas id="value3dCanvas"></canvas>
        
        <!-- 总收益显示 -->
        <div class="total-revenue">
            <div class="revenue-label">总收益池</div>
            <div class="revenue-amount">$100M</div>
        </div>
        
        <!-- 详情面板 -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <div class="detail-icon" id="detailIcon">💊</div>
                <div class="detail-title" id="detailTitle" style="color:#ffd700;">新药上市</div>
            </div>
            <div id="detailContent">
                <div style="text-align:center;padding:30px;color:rgba(150,170,200,0.6);">
                    点击网络中的节点查看详细收益分配
                </div>
            </div>
        </div>
        
        <!-- 控制提示 -->
        <div class="controls-hint">
            <span>🖱️ 拖拽旋转</span>
            <span>👆 点击节点</span>
            <span>🔍 滚轮缩放</span>
        </div>
    </div>

    <script>
        // ===== 资产数据 =====
        const assets = [
            { id: 'PDB-001', name: '蛋白质结构', icon: '🧬', color: '#00f0ff', colorHex: 0x00f0ff, type: 'protein', value: 5, minted: true, contributors: [{name: 'AlphaFold Team', share: '45%'}, {name: 'Dr. Zhang Lab', share: '35%'}, {name: 'Open Data Fund', share: '20%'}] },
            { id: 'CHEM-002', name: '化合物库', icon: '⚗️', color: '#00ff88', colorHex: 0x00ff88, type: 'compound', value: 4, minted: true, contributors: [{name: 'ChemCorp Inc.', share: '60%'}, {name: 'University Lab', share: '30%'}, {name: 'Community', share: '10%'}] },
            { id: 'GENE-003', name: '基因序列', icon: '🧪', color: '#0088ff', colorHex: 0x0088ff, type: 'gene', value: 6, minted: true, contributors: [{name: 'Genome Project', share: '50%'}, {name: 'MIT Lab', share: '30%'}, {name: 'Public', share: '20%'}] },
            { id: 'VSCREEN-004', name: '虚拟筛选', icon: '💻', color: '#88ffcc', colorHex: 0x88ffcc, type: 'screening', value: 3, minted: true, contributors: [{name: 'AI Pharma', share: '70%'}, {name: 'Cloud Compute', share: '30%'}] },
            { id: 'ASSAY-005', name: '实验数据', icon: '📊', color: '#a29bfe', colorHex: 0xa29bfe, type: 'assay', value: 5, minted: true, contributors: [{name: 'BioLab Co.', share: '80%'}, {name: 'Researchers', share: '20%'}] },
            { id: 'CLINICAL-006', name: '临床数据', icon: '🏥', color: '#ffa502', colorHex: 0xffa502, type: 'clinical', value: 8, minted: true, contributors: [{name: 'Hospital Network', share: '40%'}, {name: 'Patient Consent', share: '35%'}, {name: 'Ethics Board', share: '25%'}] },
            { id: 'PATENT-007', name: '专利信息', icon: '📜', color: '#ff69b4', colorHex: 0xff69b4, type: 'patent', value: 7, minted: true, contributors: [{name: 'Inventor Team', share: '50%'}, {name: 'Institution', share: '35%'}, {name: 'Legal DAO', share: '15%'}] },
            { id: 'PAPER-008', name: '论文数据', icon: '📄', color: '#ff6b6b', colorHex: 0xff6b6b, type: 'paper', value: 4, minted: true, contributors: [{name: 'Author Team', share: '60%'}, {name: 'Journal DAO', share: '25%'}, {name: 'Peer Reviewers', share: '15%'}] },
            { id: 'NeuroBlok', name: '协作成果', icon: '✨', color: '#ffd700', colorHex: 0xffd700, type: 'collaboration', value: 10, minted: true, contributors: [{name: 'NeuroDAO', share: '40%'}, {name: 'Core Contributors', share: '35%'}, {name: 'Community Treasury', share: '25%'}], generatedFrom: 'PDB-001+CHEM-002' }
        ];
        
        // ===== 背景粒子 =====
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const particleCount = 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.2,
                color: 0x00f0ff,
                transparent: true,
                opacity: 0.6
            });
            
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            camera.position.z = 30;
            
            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.0003;
                renderer.render(scene, camera);
            }
            animate();
        }
        
        // ===== Stage 4: 价值网络 =====
        let valueScene, valueCamera, valueRenderer, valueNodes = [], valueLines = [], valueParticles = [];
        let isDragging = false, mouseX = 0, mouseY = 0, targetRotX = 0, targetRotY = 0;
        
        function initValueNetwork() {
            const canvas = document.getElementById('value3dCanvas');
            if (!canvas) return;
            
            valueScene = new THREE.Scene();
            valueScene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);
            
            valueCamera = new THREE.PerspectiveCamera(60, canvas.clientWidth/canvas.clientHeight, 0.1, 1000);
            valueCamera.position.set(0, 25, 70);
            
            valueRenderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            valueRenderer.setSize(canvas.clientWidth, canvas.clientHeight);
            valueRenderer.setPixelRatio(window.devicePixelRatio);
            
            // 灯光
            valueScene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const pl1 = new THREE.PointLight(0xffd700, 1.2, 150);
            pl1.position.set(20, 40, 20);
            valueScene.add(pl1);
            const pl2 = new THREE.PointLight(0x00f0ff, 0.8, 150);
            pl2.position.set(-20, 30, -20);
            valueScene.add(pl2);
            
            buildNetwork();
            
            // 事件
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('wheel', onWheel);
            
            animateNetwork();
        }
        
        function createMolecule(type, color, scale) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.3,
                shininess: 100
            });
            
            if (type === 'protein') {
                // 螺旋
                for (let i = 0; i < 15; i++) {
                    const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.25 * scale, 16, 16), mat);
                    const angle = i * 0.5;
                    sphere.position.set(Math.cos(angle) * scale, (i - 7) * 0.2 * scale, Math.sin(angle) * scale);
                    group.add(sphere);
                }
            } else if (type === 'compound') {
                // 六边形
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.3 * scale, 16, 16), mat);
                    sphere.position.set(Math.cos(angle) * scale, 0, Math.sin(angle) * scale);
                    group.add(sphere);
                }
                const center = new THREE.Mesh(new THREE.SphereGeometry(0.4 * scale, 16, 16), mat);
                group.add(center);
            } else if (type === 'collaboration') {
                // 星形
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.25 * scale, 16, 16), mat);
                    const r = i % 2 === 0 ? scale * 1.2 : scale * 0.6;
                    sphere.position.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
                    group.add(sphere);
                }
            } else {
                // 默认球体
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.5 * scale, 32, 32), mat);
                group.add(sphere);
            }
            
            return group;
        }
        
        function buildNetwork() {
            // 清除旧节点
            valueNodes.forEach(n => valueScene.remove(n.mesh));
            valueLines.forEach(l => valueScene.remove(l));
            valueNodes = []; valueLines = []; valueParticles = [];
            
            const minted = assets.filter(a => a.minted && a.id !== 'NeuroBlok');
            const neuroBlok = assets.find(a => a.id === 'NeuroBlok');
            const hasFusion = neuroBlok && neuroBlok.minted;
            
            // 1. 中心 - 新药
            const rootMesh = createNetworkNode({
                id: 'root', icon: '💊', label: '新药上市', value: 100,
                color: 0xffd700, x: 0, y: 0, z: 0, scale: 4, type: 'drug'
            });
            
            // 2. NeuroBlok（内环）
            let nbMesh = null;
            if (hasFusion) {
                nbMesh = createNetworkNode({
                    id: 'neuroblok', icon: '✨', label: 'NeuroBlok', value: 40,
                    color: 0x00f0ff, x: 0, y: 0, z: -25, scale: 3, type: 'collaboration'
                });
                createLine([0,0,0], [0,0,-25], 0x00f0ff);
            }
            
            // 3. 分子资产（外环）
            const radius = 45;
            minted.forEach((asset, i) => {
                const angle = (i / Math.max(minted.length, 1)) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                const isSource = hasFusion && neuroBlok.generatedFrom && neuroBlok.generatedFrom.includes(asset.id);
                const revenue = isSource ? 20 : (asset.value / 20) * 60;
                
                createNetworkNode({
                    id: asset.id, icon: asset.icon, label: asset.name, value: revenue,
                    color: asset.colorHex, x, y: 0, z, scale: 2.5, type: asset.type, asset: asset
                });
                
                // 连线
                if (isSource && nbMesh) {
                    createLine([x,0,z], [0,0,-25], asset.colorHex);
                } else {
                    createLine([x,0,z], [0,0,0], asset.colorHex);
                }
            });
            
            // 显示第一个节点
            showDetail(valueNodes[0].data);
        }
        
        function createNetworkNode(props) {
            const group = new THREE.Group();
            
            // 分子
            const molecule = createMolecule(props.type, props.color, props.scale);
            group.add(molecule);
            
            // 光晕
            const glow = new THREE.Mesh(
                new THREE.SphereGeometry(props.scale * 2.5, 32, 32),
                new THREE.MeshBasicMaterial({ color: props.color, transparent: true, opacity: 0.1 })
            );
            group.add(glow);
            
            // 光源
            group.add(new THREE.PointLight(props.color, 0.5, 25));
            
            group.position.set(props.x, props.y, props.z);
            group.userData = props;
            
            valueScene.add(group);
            valueNodes.push({ mesh: group, data: props });
            
            return group;
        }
        
        function createLine(start, end, color) {
            const geo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(...start), new THREE.Vector3(...end)
            ]);
            const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.35 });
            const line = new THREE.Line(geo, mat);
            valueScene.add(line);
            valueLines.push(line);
            
            // 流动粒子
            for (let i = 0; i < 2; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.25, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                valueScene.add(p);
                valueParticles.push({
                    mesh: p, from: new THREE.Vector3(...start), to: new THREE.Vector3(...end),
                    t: i / 2, speed: 0.002
                });
            }
        }
        
        function animateNetwork() {
            requestAnimationFrame(animateNetwork);
            if (!valueRenderer || !valueScene || !valueCamera) return;
            
            if (!isDragging) valueScene.rotation.y += 0.0003;
            valueScene.rotation.x += (targetRotX - valueScene.rotation.x) * 0.05;
            valueScene.rotation.y += (targetRotY - valueScene.rotation.y) * 0.05;
            
            valueParticles.forEach(p => {
                p.t += p.speed;
                if (p.t > 1) p.t = 0;
                p.mesh.position.lerpVectors(p.from, p.to, p.t);
            });
            
            valueNodes.forEach(n => n.mesh.rotation.y += 0.004);
            
            valueRenderer.render(valueScene, valueCamera);
        }
        
        // 鼠标事件
        function onMouseDown(e) {
            isDragging = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 射线检测点击
            const rect = valueRenderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, valueCamera);
            const intersects = raycaster.intersectObjects(valueScene.children, true);
            
            if (intersects.length > 0) {
                let target = intersects[0].object;
                while (target.parent && target.parent.type !== 'Scene') {
                    if (target.userData && target.userData.id) break;
                    target = target.parent;
                }
                if (target.userData && target.userData.id) {
                    showDetail(target.userData);
                }
            }
        }
        
        function onMouseMove(e) {
            if (!isDragging) return;
            targetRotY += (e.clientX - mouseX) * 0.008;
            targetRotX += (e.clientY - mouseY) * 0.008;
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function onWheel(e) {
            e.preventDefault();
            valueCamera.position.z += e.deltaY * 0.05;
            valueCamera.position.z = Math.max(30, Math.min(120, valueCamera.position.z));
        }
        
        // 显示详情
        function showDetail(data) {
            document.getElementById('detailIcon').textContent = data.icon;
            document.getElementById('detailIcon').style.color = '#' + data.color.toString(16).padStart(6, '0');
            document.getElementById('detailTitle').textContent = data.label;
            document.getElementById('detailTitle').style.color = '#' + data.color.toString(16).padStart(6, '0');
            
            let html = '';
            if (data.asset && data.asset.contributors) {
                html += `<div style="font-size:11px;color:rgba(150,170,200,0.8);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">贡献者收益分配</div>`;
                data.asset.contributors.forEach((c, i) => {
                    const colors = ['#ffd700', '#00f0ff', '#00ff88', '#ff69b4'];
                    const amount = (data.value * parseInt(c.share) / 100).toFixed(2);
                    html += `
                        <div class="contributor-row" style="border-color:${colors[i % colors.length]};">
                            <div class="contributor-avatar" style="border-color:${colors[i % colors.length]}60;color:${colors[i % colors.length]};">${c.name.charAt(0)}</div>
                            <div class="contributor-info">
                                <div class="contributor-name">${c.name}</div>
                                <div class="contributor-share">权益 ${c.share}</div>
                            </div>
                            <div class="contributor-amount">$${amount}M</div>
                        </div>
                    `;
                });
                html += `<div style="margin-top:15px;padding-top:15px;border-top:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span style="font-size:12px;color:rgba(150,170,200,0.8);">该资产总收益</span><span style="font-size:18px;color:#ffd700;font-family:Orbitron;">$${data.value.toFixed(2)}M</span></div>`;
            } else {
                html = `<div style="text-align:center;padding:20px;"><div style="font-size:48px;margin-bottom:15px;">${data.icon}</div><div style="font-size:18px;color:#${data.color.toString(16).padStart(6,'0')};margin-bottom:10px;">${data.label}</div><div style="font-size:24px;color:#ffd700;font-family:Orbitron;">$${data.value}M</div></div>`;
            }
            document.getElementById('detailContent').innerHTML = html;
        }
        
        // 切换Stage
        function goTo(index) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById('stage' + index).classList.add('active');
            document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === index));
            
            if (index === 4 && !valueScene) {
                initValueNetwork();
            }
        }
        
        // 初始化
        window.addEventListener('load', () => {
            initBackground();
            initValueNetwork(); // 直接初始化Stage 4
        });
    </script>
</body>
</html>
