<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - Stage 2 | 协作衍生</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', 'Noto+Sans+SC', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 3D背景 */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        
        /* 粒子画布 */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 30px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }
        .nav-item {
            font-size: 12px;
            color: rgba(150, 170, 200, 0.7);
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            padding: 80px 25px 30px;
            gap: 25px;
        }
        
        /* 左侧：资产列表 */
        .assets-sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .sidebar-header {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-title {
            color: #00f0ff;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .sidebar-subtitle {
            color: rgba(150, 170, 200, 0.6);
            font-size: 11px;
        }
        .assets-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .assets-list::-webkit-scrollbar { width: 4px; }
        .assets-list::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 2px; }
        
        /* 资产项 - 带动画 */
        .asset-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.5s ease backwards;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
        }
        .asset-item:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.2);
        }
        .asset-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
            transform: scale(1.05) rotate(2deg);
        }
        .asset-item.dragging .asset-preview {
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .asset-preview {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }
        .asset-info { flex: 1; }
        .asset-name {
            font-size: 13px;
            color: #fff;
            margin-bottom: 2px;
        }
        .asset-id {
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            opacity: 0.7;
        }
        .asset-type {
            font-size: 9px;
            color: rgba(150, 170, 200, 0.6);
            text-transform: uppercase;
        }
        
        /* 中央：自由协作池 */
        .fusion-pool {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* 协作区域 */
        .collab-area {
            flex: 1;
            position: relative;
            border: 2px dashed rgba(0, 240, 255, 0.2);
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .collab-area.drag-over {
            border-color: rgba(255, 215, 0, 0.6);
            background: rgba(255, 215, 0, 0.08);
            box-shadow: inset 0 0 80px rgba(255, 215, 0, 0.15);
            animation: areaPulse 1.5s infinite;
        }
        @keyframes areaPulse {
            0%, 100% { box-shadow: inset 0 0 60px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: inset 0 0 100px rgba(255, 215, 0, 0.2); }
        }
        .collab-area.has-assets {
            border-style: solid;
            border-color: rgba(255, 215, 0, 0.3);
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
        }
        
        /* 空状态提示 */
        .collab-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .collab-hint.hidden { opacity: 0; }
        .collab-hint-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.2;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .collab-hint-text {
            font-size: 24px;
            color: rgba(150, 170, 200, 0.6);
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 3px;
        }
        .collab-hint-sub {
            font-size: 13px;
            color: rgba(150, 170, 200, 0.4);
            line-height: 1.6;
        }
        
        /* 池中的资产 - 更丰富 */
        .pool-asset {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        @keyframes dropIn {
            0% {
                opacity: 0;
                transform: scale(0) rotate(-180deg);
            }
            60% {
                transform: scale(1.1) rotate(10deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }
        .pool-asset:hover {
            transform: scale(1.15);
            z-index: 20;
            box-shadow: 0 0 40px currentColor;
        }
        .pool-asset::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px dashed currentColor;
            opacity: 0.3;
            animation: rotate 10s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .pool-asset-icon {
            font-size: 36px;
            margin-bottom: 4px;
            animation: iconFloat 2s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .pool-asset-id {
            font-size: 11px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
        }
        .pool-asset-type {
            font-size: 8px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-top: 2px;
        }
        .pool-asset-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120%; height: 120%;
            border-radius: 50%;
            background: radial-gradient(circle, currentColor 0%, transparent 70%);
            opacity: 0.2;
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.1); }
        }
        .pool-asset-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(255, 71, 87, 0.4);
        }
        .pool-asset:hover .pool-asset-remove {
            opacity: 1;
            transform: scale(1);
        }
        .pool-asset-remove:hover {
            transform: scale(1.2);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.6);
        }
        
        /* 能量线 */
        .energy-line {
            position: absolute;
            height: 3px;
            transform-origin: left center;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 215, 0, 0.8) 20%, 
                rgba(0, 240, 255, 0.8) 50%,
                rgba(255, 215, 0, 0.8) 80%,
                transparent 100%
            );
            border-radius: 2px;
            animation: energyFlow 2s linear infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        @keyframes energyFlow {
            0% { 
                background-position: -200% 0;
                opacity: 0.4;
            }
            50% { opacity: 1; }
            100% { 
                background-position: 200% 0;
                opacity: 0.4;
            }
        }
        
        /* 底部控制栏 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .pool-stats {
            display: flex;
            gap: 30px;
        }
        .stat {
            text-align: center;
            position: relative;
        }
        .stat::after {
            content: '';
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
        }
        .stat:last-child::after { display: none; }
        .stat-value {
            font-size: 28px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s;
        }
        .stat-value.changed {
            animation: numberPop 0.4s ease;
        }
        @keyframes numberPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #fff; }
            100% { transform: scale(1); }
        }
        .stat-label {
            font-size: 10px;
            color: rgba(150, 170, 200, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .fuse-btn {
            padding: 14px 40px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(200, 150, 0, 0.1));
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            opacity: 0.4;
            pointer-events: none;
            position: relative;
            overflow: hidden;
        }
        .fuse-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        .fuse-btn.active {
            opacity: 1;
            pointer-events: auto;
            animation: btnGlow 2s infinite;
        }
        .fuse-btn.active::before {
            left: 100%;
        }
        .fuse-btn.active:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(200, 150, 0, 0.2));
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            transform: translateY(-3px) scale(1.02);
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
        }
        
        .clear-btn {
            padding: 12px 25px;
            background: transparent;
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: rgba(255, 100, 100, 0.8);
            font-size: 12px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        .clear-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .clear-btn:hover {
            border-color: rgba(255, 71, 87, 0.6);
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.2);
        }
        
        /* 右侧：权属面板 */
        .ownership-panel {
            width: 300px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 22px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            text-align: center;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 18px;
        }
        .panel-title {
            color: #ffd700;
            font-size: 18px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        .ownership-content {
            flex: 1;
            overflow-y: auto;
        }
        .ownership-content::-webkit-scrollbar { width: 4px; }
        .ownership-content::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.3); border-radius: 2px; }
        
        .section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInUp 0.5s ease backwards;
        }
        .section:nth-child(1) { animation-delay: 0.1s; }
        .section:nth-child(2) { animation-delay: 0.2s; }
        .section:nth-child(3) { animation-delay: 0.3s; }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
        }
        .section-title {
            font-size: 11px;
            color: rgba(150, 170, 200, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
        }
        
        .asset-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .asset-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid;
            transition: all 0.3s;
            animation: tagIn 0.4s ease backwards;
        }
        @keyframes tagIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
        }
        .asset-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .asset-tag-icon { font-size: 16px; }
        .asset-tag-id { font-family: 'Orbitron', sans-serif; font-size: 10px; }
        
        .share-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        .share-item:hover {
            background: rgba(255, 255, 255, 0.02);
            margin: 0 -10px;
            padding-left: 10px;
            padding-right: 10px;
            border-radius: 8px;
        }
        .share-item:last-child { border-bottom: none; }
        .share-icon { font-size: 16px; margin-right: 10px; }
        .share-name {
            font-size: 13px;
            color: rgba(220, 230, 240, 0.9);
            display: flex;
            align-items: center;
        }
        .share-value {
            font-size: 14px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        .rule-box {
            padding: 15px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(0, 240, 255, 0.05));
            border-left: 3px solid #ffd700;
            border-radius: 0 12px 12px 0;
            font-size: 12px;
            color: rgba(220, 230, 240, 0.85);
            line-height: 1.8;
        }
        .rule-box li {
            margin-bottom: 6px;
            list-style: none;
            padding-left: 15px;
            position: relative;
        }
        .rule-box li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: #ffd700;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(150, 170, 200, 0.5);
            animation: float 4s ease-in-out infinite;
        }
        .empty-icon { 
            font-size: 50px; 
            margin-bottom: 20px; 
            opacity: 0.3;
            animation: pulse 2s ease-in-out infinite;
        }
        
        /* 成功弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .success-card {
            background: linear-gradient(135deg, rgba(10, 15, 30, 0.98), rgba(20, 25, 50, 0.98));
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 40px;
            padding: 60px 90px;
            text-align: center;
            box-shadow: 
                0 0 100px rgba(255, 215, 0, 0.2),
                inset 0 0 60px rgba(255, 215, 0, 0.05);
            animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .success-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.1), transparent 30%);
            animation: rotate 8s linear infinite;
        }
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: scale(0.5) translateY(50px);
            }
        }
        .success-content {
            position: relative;
            z-index: 1;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 25px;
            animation: bounce 1s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .success-title {
            font-size: 36px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 6px;
            margin-bottom: 12px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        .success-subtitle {
            font-size: 15px;
            color: rgba(200, 220, 240, 0.7);
            margin-bottom: 40px;
        }
        .result-preview {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.3);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.2);
            animation: resultFloat 3s ease-in-out infinite;
        }
        @keyframes resultFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .result-3d { width: 170px; height: 170px; }
        
        .modal-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 14px 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        .btn-gold {
            border-color: rgba(255, 215, 0, 0.5);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(200, 150, 0, 0.1));
            color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        .btn-gold:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(200, 150, 0, 0.2));
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
    
    <div class="top-nav">
        <div class="nav-item" onclick="goToStage1()">资产铸造</div>
        <div class="nav-item active">协作衍生</div>
        <div class="nav-item">融资决策</div>
    </div>
    
    <div class="main-container">
        <!-- 左侧：资产列表 -->
        <div class="assets-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">⬡ 已铸造资产</div>
                <div class="sidebar-subtitle">拖拽资产到协作池</div>
            </div>
            <div class="assets-list" id="assetsList">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 中央：自由协作池 -->
        <div class="fusion-pool">
            <div class="collab-area" id="collabArea">
                <div class="collab-hint" id="collabHint">
                    <div class="collab-hint-icon">⬡</div>
                    <div class="collab-hint-text">协作池</div>
                    <div class="collab-hint-sub">从左侧拖拽资产到此处<br>可组合任意数量的资产</div>
                </div>
            </div>
            
            <div class="control-bar">
                <div class="pool-stats">
                    <div class="stat">
                        <div class="stat-value" id="assetCount">0</div>
                        <div class="stat-label">已选资产</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalShare">100%</div>
                        <div class="stat-label">总权益</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="fusionPower">0</div>
                        <div class="stat-label">融合力</div>
                    </div>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="clear-btn" id="clearBtn" onclick="clearPool()">清空</button>
                    <button class="fuse-btn" id="fuseBtn" onclick="performFusion()"
                        >✨ 开始融合</button>
                </div>
            </div>
        </div>
        
        <!-- 右侧：权属面板 -->
        <div class="ownership-panel">
            <div class="panel-header">
                <div class="panel-title">⬡ 融合权属</div>
            </div>
            <div class="ownership-content" id="ownershipContent">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">⬡</div>
                    <div>拖拽资产到协作池</div>
                    <div style="font-size: 11px; margin-top: 10px; opacity: 0.6;">查看融合权属分配</div>
                </div>
                <div id="ownershipDetails" style="display: none;">
                    <div class="section">
                        <div class="section-title">已选资产</div>
                        <div class="asset-tags" id="selectedAssets"></div>
                    </div>
                    <div class="section">
                        <div class="section-title">权益分配</div>
                        <div id="shareDistribution"></div>
                    </div>
                    <div class="section" style="border-bottom: none;">
                        <div class="section-title">融合规则</div>
                        <ul class="rule-box">
                            <li>所有选中资产的权属将合并</li>
                            <li>收益按资产类型权重自动分配</li>
                            <li>继承上游资产全部规则</li>
                            <li>里程碑触发即时结算</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="successModal">
        <div class="success-card">
            <div class="success-content">
                <div class="success-icon">🎉</div>
                <div class="success-title">融合成功</div>
                <div class="success-subtitle">新资产 NeuroBlok 已生成</div>
                <div class="result-preview">
                    <canvas id="result3d" class="result-3d"></canvas>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal()">继续添加</button>
                    <button class="btn btn-gold" onclick="goNext()">进入下一阶段 →</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 资产数据（带权重）
        const mintedAssets = [
            { id: 'PDB-001', name: '蛋白质结构', color: '#00f0ff', type: 'protein', icon: '🧬', weight: 1.2 },
            { id: 'CHEM-002', name: '化合物库', color: '#00ff88', type: 'compound', icon: '⚗️', weight: 1.0 },
            { id: 'GENE-003', name: '基因序列', color: '#0088ff', type: 'gene', icon: '🧪', weight: 1.5 },
            { id: 'VSCREEN-004', name: '虚拟筛选', color: '#88ffcc', type: 'screening', icon: '💻', weight: 0.8 },
            { id: 'ASSAY-005', name: '实验数据', color: '#a29bfe', type: 'assay', icon: '📊', weight: 1.3 },
            { id: 'CLINICAL-006', name: '临床数据', color: '#ffa502', type: 'clinical', icon: '🏥', weight: 2.0 },
            { id: 'PATENT-007', name: '专利信息', color: '#ff69b4', type: 'patent', icon: '📜', weight: 1.8 },
        ];
        
        let draggedAsset = null;
        let poolAssets = [];
        let assetCounter = 0;
        
        // 音效（简单的Web Audio）
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'drop') {
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.value = 0.2;
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'remove') {
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gain.gain.value = 0.15;
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'success') {
                // 成功和弦
                [523, 659, 784, 1047].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.value = freq;
                    g.gain.value = 0;
                    g.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                    g.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + i * 0.1 + 0.05);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.5);
                    o.start(audioCtx.currentTime + i * 0.1);
                    o.stop(audioCtx.currentTime + i * 0.1 + 0.5);
                });
            }
        }
        
        // WebGL 检测
        function isWebGLAvailable() {
            try {
                const canvas = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
            } catch (e) {
                return false;
            }
        }
        
        window.addEventListener('load', () => {
            if (isWebGLAvailable()) {
                initBackground();
            } else {
                console.warn('WebGL not available');
            }
            initAssetList();
            initCollabArea();
            initParticleCanvas();
        });
        
        // 初始化左侧列表（带延迟动画）
        function initAssetList() {
            const list = document.getElementById('assetsList');
            mintedAssets.forEach((asset, index) => {
                const item = document.createElement('div');
                item.className = 'asset-item';
                item.style.animationDelay = `${index * 0.1}s`;
                item.draggable = true;
                item.dataset.id = asset.id;
                item.innerHTML = `
                    <div class="asset-preview" style="color: ${asset.color}; border-color: ${asset.color}40;">${asset.icon}</div>
                    <div class="asset-info">
                        <div class="asset-name">${asset.name}</div>
                        <div class="asset-id" style="color: ${asset.color};">${asset.id}</div>
                        <div class="asset-type">权重: ${asset.weight}x</div>
                    </div>
                `;
                
                item.addEventListener('dragstart', (e) => {
                    draggedAsset = asset;
                    item.classList.add('dragging');
                    playSound('pickup');
                });
                
                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    draggedAsset = null;
                });
                
                list.appendChild(item);
            });
        }
        
        // 初始化协作区域
        function initCollabArea() {
            const area = document.getElementById('collabArea');
            
            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                area.classList.add('drag-over');
            });
            
            area.addEventListener('dragleave', () => {
                area.classList.remove('drag-over');
            });
            
            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('drag-over');
                
                if (draggedAsset) {
                    const rect = area.getBoundingClientRect();
                    // 随机位置，但不要太靠边
                    const padding = 60;
                    const x = padding + Math.random() * (rect.width - padding * 2 - 100);
                    const y = padding + Math.random() * (rect.height - padding * 2 - 100);
                    addAssetToPool(draggedAsset, x, y);
                }
            });
        }
        
        // 添加资产到池
        function addAssetToPool(asset, x, y) {
            if (poolAssets.find(a => a.assetData.id === asset.id)) return;
            
            const poolAsset = {
                id: `pool-${assetCounter++}`,
                assetData: asset,
                x, y
            };
            poolAssets.push(poolAsset);
            
            const el = document.createElement('div');
            el.className = 'pool-asset';
            el.id = poolAsset.id;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.color = asset.color;
            el.innerHTML = `
                <div class="pool-asset-glow"></div>
                <div class="pool-asset-icon">${asset.icon}</div>
                <div class="pool-asset-id">${asset.id}</div>
                <div class="pool-asset-type">${asset.type}</div>
                <div class="pool-asset-remove" onclick="removeAssetFromPool('${poolAsset.id}')">×</div>
            `;
            
            document.getElementById('collabArea').appendChild(el);
            document.getElementById('collabHint').classList.add('hidden');
            document.getElementById('collabArea').classList.add('has-assets');
            
            playSound('drop');
            drawConnections();
            updateUI();
        }
        
        // 移除资产
        function removeAssetFromPool(poolId) {
            const index = poolAssets.findIndex(a => a.id === poolId);
            if (index === -1) return;
            
            poolAssets.splice(index, 1);
            document.getElementById(poolId)?.remove();
            
            playSound('remove');
            drawConnections();
            
            if (poolAssets.length === 0) {
                document.getElementById('collabHint').classList.remove('hidden');
                document.getElementById('collabArea').classList.remove('has-assets');
            }
            
            updateUI();
        }
        
        // 绘制能量线
        function drawConnections() {
            document.querySelectorAll('.energy-line').forEach(l => l.remove());
            
            if (poolAssets.length < 2) return;
            
            const area = document.getElementById('collabArea');
            const centerX = area.offsetWidth / 2;
            const centerY = area.offsetHeight / 2;
            
            poolAssets.forEach(({ x, y }) => {
                const line = document.createElement('div');
                line.className = 'energy-line';
                const x1 = x + 50;
                const y1 = y + 50;
                const length = Math.sqrt((centerX - x1) ** 2 + (centerY - y1) ** 2);
                const angle = Math.atan2(centerY - y1, centerX - x1) * 180 / Math.PI;
                
                line.style.width = `${length}px`;
                line.style.left = `${x1}px`;
                line.style.top = `${y1}px`;
                line.style.transform = `rotate(${angle}deg)`;
                area.appendChild(line);
            });
        }
        
        // 清空
        function clearPool() {
            poolAssets = [];
            document.querySelectorAll('.pool-asset').forEach(el => el.remove());
            document.querySelectorAll('.energy-line').forEach(l => l.remove());
            document.getElementById('collabHint').classList.remove('hidden');
            document.getElementById('collabArea').classList.remove('has-assets');
            updateUI();
        }
        
        // 更新UI
        function updateUI() {
            const count = poolAssets.length;
            const countEl = document.getElementById('assetCount');
            countEl.textContent = count;
            countEl.classList.add('changed');
            setTimeout(() => countEl.classList.remove('changed'), 400);
            
            // 计算融合力
            const power = poolAssets.reduce((sum, { assetData }) => sum + assetData.weight, 0);
            document.getElementById('fusionPower').textContent = power.toFixed(1);
            
            // 按钮
            const fuseBtn = document.getElementById('fuseBtn');
            const clearBtn = document.getElementById('clearBtn');
            
            if (count >= 2) {
                fuseBtn.classList.add('active');
            } else {
                fuseBtn.classList.remove('active');
            }
            
            clearBtn.classList.toggle('visible', count > 0);
            
            updateOwnershipPanel();
        }
        
        // 更新权属面板
        function updateOwnershipPanel() {
            const emptyState = document.getElementById('emptyState');
            const details = document.getElementById('ownershipDetails');
            
            if (poolAssets.length === 0) {
                emptyState.style.display = 'block';
                details.style.display = 'none';
                return;
            }
            
            emptyState.style.display = 'none';
            details.style.display = 'block';
            
            // 标签
            const tagsContainer = document.getElementById('selectedAssets');
            tagsContainer.innerHTML = poolAssets.map(({ assetData }, i) => `
                <span class="asset-tag" style="border-color: ${assetData.color}40; animation-delay: ${i * 0.1}s;">
                    <span class="asset-tag-icon">${assetData.icon}</span>
                    <span class="asset-tag-id" style="color: ${assetData.color};">${assetData.id}</span>
                </span>
            `).join('');
            
            // 按权重分配
            const totalWeight = poolAssets.reduce((sum, { assetData }) => sum + assetData.weight, 0);
            const shareContainer = document.getElementById('shareDistribution');
            
            shareContainer.innerHTML = poolAssets.map(({ assetData }) => {
                const share = ((assetData.weight / totalWeight) * 100).toFixed(1);
                return `
                    <div class="share-item">
                        <div class="share-name">
                            <span class="share-icon">${assetData.icon}</span>
                            ${assetData.name}
                        </div>
                        <div class="share-value">${share}%</div>
                    </div>
                `;
            }).join('');
        }
        
        // 融合
        function performFusion() {
            if (poolAssets.length < 2) return;
            
            playSound('success');
            document.getElementById('successModal').classList.add('active');
            
            setTimeout(() => {
                const canvas = document.getElementById('result3d');
                if (!canvas || !isWebGLAvailable()) return;
                
                try {
                    const scene = new THREE.Scene();
                    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                    camera.position.z = 5;
                    
                    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
                    renderer.setSize(170, 170);
                    
                    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                    const light = new THREE.PointLight(0xffd700, 2, 100);
                    light.position.set(5, 5, 5);
                    scene.add(light);
                    
                    const group = new THREE.Group();
                    const core = new THREE.Mesh(
                        new THREE.IcosahedronGeometry(0.8, 1),
                        new THREE.MeshPhongMaterial({ 
                            color: 0xffd700, 
                            emissive: 0xffd700, 
                            emissiveIntensity: 0.4,
                            wireframe: true
                        })
                    );
                    group.add(core);
                    
                    // 周围粒子
                    for (let i = 0; i < 12; i++) {
                        const angle = (i / 12) * Math.PI * 2;
                        const sphere = new THREE.Mesh(
                            new THREE.SphereGeometry(0.15, 8, 8),
                            new THREE.MeshPhongMaterial({ 
                                color: 0xffd700, 
                                emissive: 0xffd700, 
                                emissiveIntensity: 0.6 
                            })
                        );
                        const radius = 1.8;
                        sphere.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, 0);
                        group.add(sphere);
                    }
                    
                    scene.add(group);
                    
                    function animate() {
                        requestAnimationFrame(animate);
                        group.rotation.y += 0.015;
                        group.rotation.x += 0.008;
                        core.scale.setScalar(1 + Math.sin(Date.now() * 0.002) * 0.1);
                        renderer.render(scene, camera);
                    }
                    animate();
                } catch (e) {
                    console.warn('3D result preview failed:', e);
                }
            }, 100);
        }
        
        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }
        
        function goNext() {
            alert('进入融资决策阶段！');
        }
        
        function goToStage1() {
            window.location.href = 'stage1-mint.html';
        }
        
        // 粒子画布（连接线效果）
        function initParticleCanvas() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 240, 255, 0.3)';
                    ctx.fill();
                });
                
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // 背景
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 2000; i++) {
                vertices.push(
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 50
                );
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.15,
                color: 0x00f0ff,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            });
            
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            camera.position.z = 30;
            
            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.0003;
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
