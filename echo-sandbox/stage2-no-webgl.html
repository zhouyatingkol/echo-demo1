<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - Stage 2 修复版</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        .main-container {
            height: 100vh;
            display: flex;
            padding: 80px 25px 30px;
            gap: 25px;
        }
        
        /* 左侧 */
        .assets-sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .sidebar-title { color: #00f0ff; font-size: 16px; letter-spacing: 2px; margin-bottom: 5px; }
        .sidebar-subtitle { color: rgba(150, 170, 200, 0.6); font-size: 11px; }
        .assets-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .assets-list::-webkit-scrollbar { width: 4px; }
        .assets-list::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); }
        
        .asset-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: grab;
            transition: all 0.3s;
        }
        .asset-item:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateX(5px);
        }
        .asset-item-icon { width: 45px; height: 45px; border-radius: 10px; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid; }
        .asset-item-name { font-size: 13px; color: #fff; }
        .asset-item-id { font-size: 10px; font-family: 'Orbitron', sans-serif; }
        
        /* 中央 */
        .fusion-pool { flex: 1; display: flex; flex-direction: column; }
        
        .collab-area {
            flex: 1;
            position: relative;
            border: 2px dashed rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .collab-area.drag-over {
            border-color: rgba(255, 215, 0, 0.6);
            background: rgba(255, 215, 0, 0.08);
        }
        
        .collab-hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }
        .collab-hint-icon { font-size: 80px; opacity: 0.2; margin-bottom: 20px; }
        .collab-hint-text { font-size: 24px; color: rgba(150, 170, 200, 0.6); letter-spacing: 3px; }
        
        .pool-asset {
            position: absolute;
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: dropIn 0.5s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        @keyframes dropIn {
            0% { opacity: 0; transform: scale(0); }
            60% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .pool-asset:hover { transform: scale(1.15); z-index: 20; }
        .pool-asset-icon { font-size: 40px; }
        .pool-asset-id { font-size: 10px; font-family: 'Orbitron', sans-serif; font-weight: 600; margin-top: 2px; }
        .pool-asset-remove {
            position: absolute;
            top: -8px; right: -8px;
            width: 26px; height: 26px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transition: all 0.3s;
            cursor: pointer;
        }
        .pool-asset:hover .pool-asset-remove { opacity: 1; }
        
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
        }
        .pool-stats { display: flex; gap: 30px; }
        .stat { text-align: center; }
        .stat-value { font-size: 28px; color: #ffd700; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .stat-label { font-size: 10px; color: rgba(150, 170, 200, 0.6); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        
        .fuse-btn {
            padding: 14px 40px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(200, 150, 0, 0.1));
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: not-allowed;
            border-radius: 30px;
            opacity: 0.4;
            transition: all 0.3s;
        }
        .fuse-btn.active {
            opacity: 1;
            cursor: pointer;
            animation: btnGlow 2s infinite;
        }
        .fuse-btn.active:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(200, 150, 0, 0.2));
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
        }
        
        .clear-btn {
            padding: 12px 25px;
            background: transparent;
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: rgba(255, 100, 100, 0.8);
            font-size: 12px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        .clear-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .clear-btn:hover {
            border-color: rgba(255, 71, 87, 0.6);
            color: #ff4757;
        }
        
        /* 右侧 */
        .ownership-panel {
            width: 300px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            padding: 22px;
            display: flex;
            flex-direction: column;
        }
        .panel-title { color: #ffd700; font-size: 18px; letter-spacing: 4px; text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255, 215, 0, 0.2); }
        .section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .section-title { font-size: 11px; color: rgba(150, 170, 200, 0.6); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
        .contributor-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .contributor-name { font-size: 13px; color: rgba(220, 230, 240, 0.9); }
        .contributor-share { font-size: 12px; color: #ffd700; font-family: 'Orbitron', sans-serif; }
        .rule-box { padding: 15px; background: linear-gradient(135deg, rgba(255, 215, 0, 0.08), rgba(0, 240, 255, 0.05)); border-left: 3px solid #ffd700; border-radius: 0 12px 12px 0; font-size: 12px; color: rgba(220, 230, 240, 0.85); line-height: 1.8; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: rgba(150, 170, 200, 0.5); }
        .empty-icon { font-size: 50px; margin-bottom: 20px; opacity: 0.3; }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .success-card {
            background: linear-gradient(135deg, rgba(10, 15, 30, 0.98), rgba(20, 25, 50, 0.98));
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 40px;
            padding: 60px 90px;
            text-align: center;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.2);
        }
        .success-icon { font-size: 80px; margin-bottom: 25px; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .success-title { font-size: 36px; color: #ffd700; font-family: 'Orbitron', sans-serif; letter-spacing: 6px; margin-bottom: 12px; }
        .result-3d { width: 180px; height: 180px; margin: 0 auto 40px; border-radius: 50%; border: 3px solid rgba(255, 215, 0, 0.3); background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%); display: flex; align-items: center; justify-content: center; font-size: 100px; }
        .modal-actions { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .btn { padding: 14px 35px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); color: #fff; font-family: 'Orbitron', sans-serif; font-size: 13px; cursor: pointer; border-radius: 25px; transition: all 0.3s; }
        .btn:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-gold { border-color: rgba(255, 215, 0, 0.5); background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(200, 150, 0, 0.1)); color: #ffd700; margin-left: 15px; }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 左侧 -->
        <div class="assets-sidebar">
            <div class="sidebar-title">⬡ 已铸造资产</div>
            <div class="sidebar-subtitle">拖拽资产到协作池</div>
            <div class="assets-list" id="assetsList"></div>
        </div>
        
        <!-- 中央 -->
        <div class="fusion-pool">
            <div class="collab-area" id="collabArea">
                <div class="collab-hint" id="collabHint">
                    <div class="collab-hint-icon">⬡</div>
                    <div class="collab-hint-text">协作池</div>
                    <div style="font-size: 13px; color: rgba(150, 170, 200, 0.4); margin-top: 10px;">从左侧拖拽资产到此处<br>可组合任意数量的资产</div>
                </div>
            </div>
            
            <div class="control-bar">
                <div class="pool-stats">
                    <div class="stat">
                        <div class="stat-value" id="assetCount">0</div>
                        <div class="stat-label">已选资产</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="fusionPower">0</div>
                        <div class="stat-label">融合力</div>
                    </div>
                </div>
                <div>
                    <button class="clear-btn" id="clearBtn">清空</button>
                    <button class="fuse-btn" id="fuseBtn">✨ 开始融合</button>
                </div>
            </div>
        </div>
        
        <!-- 右侧 -->
        <div class="ownership-panel">
            <div class="panel-title">⬡ 融合权属</div>
            <div id="ownershipContent">
                <div class="empty-state">
                    <div class="empty-icon">⬡</div>
                    <div>拖拽资产到协作池<br>查看融合权属分配</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="success-card">
            <div class="success-icon">✨</div>
            <div class="success-title">融合成功</div>
            <div class="result-3d">🧬</div>
            <div style="font-size: 15px; color: rgba(200, 220, 240, 0.7); margin-bottom: 20px;">新资产 NeuroBlok 已生成</div>
            <div class="modal-actions">
                <button class="btn" id="closeModalBtn">继续协作</button>
                <button class="btn btn-gold" id="nextStageBtn">进入下一阶段 →</button>
            </div>
        </div>
    </div>

    <script>
        // 资产数据
        const mintedAssets = [
            { id: 'PDB-001', name: '蛋白质结构', icon: '🧬', color: '#00f0ff', weight: 1.2 },
            { id: 'CHEM-002', name: '化合物库', icon: '⚗️', color: '#00ff88', weight: 1.0 },
            { id: 'GENE-003', name: '基因序列', icon: '🧪', color: '#0088ff', weight: 1.5 },
            { id: 'VSCREEN-004', name: '虚拟筛选', icon: '💻', color: '#88ffcc', weight: 0.8 },
            { id: 'ASSAY-005', name: '实验数据', icon: '📊', color: '#a29bfe', weight: 1.3 },
            { id: 'CLINICAL-006', name: '临床数据', icon: '🏥', color: '#ffa502', weight: 2.0 },
        ];
        
        let draggedAsset = null;
        let poolAssets = [];
        let assetCounter = 0;
        
        // DOM 加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initAssetsList();
            initCollabArea();
            initButtons();
        });
        
        // 初始化左侧资产列表
        function initAssetsList() {
            const list = document.getElementById('assetsList');
            
            mintedAssets.forEach((asset, index) => {
                const item = document.createElement('div');
                item.className = 'asset-item';
                item.draggable = true;
                item.innerHTML = `
                    <div class="asset-item-icon" style="border-color: ${asset.color}40; color: ${asset.color}">${asset.icon}</div>
                    <div>
                        <div class="asset-item-name">${asset.name}</div>
                        <div class="asset-item-id" style="color: ${asset.color}">${asset.id}</div>
                    </div>
                `;
                
                item.ondragstart = function() {
                    draggedAsset = asset;
                    item.style.opacity = '0.5';
                };
                
                item.ondragend = function() {
                    item.style.opacity = '1';
                    draggedAsset = null;
                };
                
                list.appendChild(item);
            });
        }
        
        // 初始化协作区域
        function initCollabArea() {
            const area = document.getElementById('collabArea');
            
            area.ondragover = function(e) {
                e.preventDefault();
                area.classList.add('drag-over');
            };
            
            area.ondragleave = function() {
                area.classList.remove('drag-over');
            };
            
            area.ondrop = function(e) {
                e.preventDefault();
                area.classList.remove('drag-over');
                
                if (draggedAsset) {
                    const rect = area.getBoundingClientRect();
                    const padding = 60;
                    const x = padding + Math.random() * (rect.width - padding * 2 - 100);
                    const y = padding + Math.random() * (rect.height - padding * 2 - 100);
                    addAssetToPool(draggedAsset, x, y);
                }
            };
        }
        
        // 🔧 关键修复：初始化按钮事件
        function initButtons() {
            const fuseBtn = document.getElementById('fuseBtn');
            const clearBtn = document.getElementById('clearBtn');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const nextStageBtn = document.getElementById('nextStageBtn');
            
            // 融合按钮
            fuseBtn.onclick = function() {
                console.log('融合按钮点击，资产数量:', poolAssets.length);
                if (poolAssets.length >= 2) {
                    document.getElementById('successModal').classList.add('active');
                } else {
                    alert('请至少选择2个资产进行融合');
                }
            };
            
            // 清空按钮
            clearBtn.onclick = function() {
                console.log('清空按钮点击');
                poolAssets = [];
                document.querySelectorAll('.pool-asset').forEach(el => el.remove());
                document.getElementById('collabHint').style.display = 'block';
                updateUI();
            };
            
            // 关闭弹窗按钮
            closeModalBtn.onclick = function() {
                document.getElementById('successModal').classList.remove('active');
            };
            
            // 下一阶段按钮
            nextStageBtn.onclick = function() {
                alert('进入下一阶段！');
            };
        }
        
        // 添加资产到池
        function addAssetToPool(asset, x, y) {
            // 检查是否已在池中
            if (poolAssets.find(a => a.assetData.id === asset.id)) {
                alert('该资产已在协作池中');
                return;
            }
            
            const poolAsset = {
                id: 'pool-' + assetCounter++,
                assetData: asset,
                x: x,
                y: y
            };
            poolAssets.push(poolAsset);
            
            const area = document.getElementById('collabArea');
            
            const el = document.createElement('div');
            el.className = 'pool-asset';
            el.id = poolAsset.id;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.borderColor = asset.color;
            el.style.color = asset.color;
            el.innerHTML = `
                <div class="pool-asset-icon">${asset.icon}</div>
                <div class="pool-asset-id">${asset.id}</div>
                <div class="pool-asset-remove" data-id="${poolAsset.id}">×</div>
            `;
            
            // 绑定移除事件
            el.querySelector('.pool-asset-remove').onclick = function(e) {
                e.stopPropagation();
                removeAssetFromPool(poolAsset.id);
            };
            
            area.appendChild(el);
            document.getElementById('collabHint').style.display = 'none';
            
            updateUI();
        }
        
        // 从池中移除资产
        function removeAssetFromPool(poolId) {
            const index = poolAssets.findIndex(a => a.id === poolId);
            if (index > -1) {
                poolAssets.splice(index, 1);
                const el = document.getElementById(poolId);
                if (el) el.remove();
                
                if (poolAssets.length === 0) {
                    document.getElementById('collabHint').style.display = 'block';
                }
                
                updateUI();
            }
        }
        
        // 更新UI
        function updateUI() {
            const count = poolAssets.length;
            
            document.getElementById('assetCount').textContent = count;
            
            const power = poolAssets.reduce((sum, a) => sum + a.assetData.weight, 0);
            document.getElementById('fusionPower').textContent = power.toFixed(1);
            
            const fuseBtn = document.getElementById('fuseBtn');
            const clearBtn = document.getElementById('clearBtn');
            
            // 更新融合按钮状态
            if (count >= 2) {
                fuseBtn.classList.add('active');
            } else {
                fuseBtn.classList.remove('active');
            }
            
            // 更新清空按钮状态
            if (count > 0) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
            
            // 更新右侧面板
            updateOwnershipPanel();
        }
        
        // 更新权属面板
        function updateOwnershipPanel() {
            const content = document.getElementById('ownershipContent');
            
            if (poolAssets.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⬡</div>
                        <div>拖拽资产到协作池<br>查看融合权属分配</div>
                    </div>
                `;
                return;
            }
            
            const totalWeight = poolAssets.reduce((sum, a) => sum + a.assetData.weight, 0);
            
            content.innerHTML = `
                <div class="section">
                    <div class="section-title">已选资产</div>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${poolAssets.map(p => `
                            <span style="padding: 6px 12px; background: rgba(0,0,0,0.3); border-radius: 15px; font-size: 12px; border: 1px solid ${p.assetData.color}40;">
                                <span style="color: ${p.assetData.color}">${p.assetData.icon} ${p.assetData.id}</span>
                            </span>
                        `).join('')}
                    </div>
                </div>
                
                <div class="section">
                    <div class="section-title">权益分配</div>
                    ${poolAssets.map(p => {
                        const share = ((p.assetData.weight / totalWeight) * 100).toFixed(1);
                        return `
                            <div class="contributor-item">
                                <span class="contributor-name">${p.assetData.name}</span>
                                <span class="contributor-share">${share}%</span>
                            </div>
                        `;
                    }).join('')}
                </div>
                
                <div class="section">
                    <div class="section-title">融合规则</div>
                    <div class="rule-box">
                        所有选中资产的权属将合并<br>
                        收益按资产类型权重自动分配<br>
                        继承上游资产全部规则<br>
                        里程碑触发即时结算
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
