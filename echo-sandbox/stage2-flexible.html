<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - Stage 2 | 协作衍生</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', 'Noto+Sans+SC', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 3D背景 */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        
        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 30px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }
        .nav-item {
            font-size: 12px;
            color: rgba(150, 170, 200, 0.7);
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            padding: 80px 25px 30px;
            gap: 25px;
        }
        
        /* 左侧：资产列表 */
        .assets-sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .sidebar-header {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-title {
            color: #00f0ff;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .sidebar-subtitle {
            color: rgba(150, 170, 200, 0.6);
            font-size: 11px;
        }
        .assets-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .assets-list::-webkit-scrollbar { width: 4px; }
        .assets-list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .assets-list::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 2px; }
        
        /* 资产项 - 列表样式 */
        .asset-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: grab;
            transition: all 0.3s ease;
        }
        .asset-item:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateX(5px);
        }
        .asset-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }
        .asset-preview {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .asset-info { flex: 1; }
        .asset-name {
            font-size: 13px;
            color: #fff;
            margin-bottom: 2px;
        }
        .asset-id {
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            opacity: 0.7;
        }
        .asset-type {
            font-size: 9px;
            color: rgba(150, 170, 200, 0.6);
            text-transform: uppercase;
        }
        
        /* 中央：自由协作池 */
        .fusion-pool {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* 协作区域 */
        .collab-area {
            flex: 1;
            position: relative;
            border: 2px dashed rgba(0, 240, 255, 0.2);
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .collab-area.drag-over {
            border-color: rgba(255, 215, 0, 0.5);
            background: rgba(255, 215, 0, 0.05);
            box-shadow: inset 0 0 60px rgba(255, 215, 0, 0.1);
        }
        .collab-area.has-assets {
            border-style: solid;
            border-color: rgba(255, 215, 0, 0.3);
        }
        
        /* 空状态提示 */
        .collab-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .collab-hint.hidden { opacity: 0; }
        .collab-hint-icon {
            font-size: 60px;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        .collab-hint-text {
            font-size: 16px;
            color: rgba(150, 170, 200, 0.5);
            margin-bottom: 8px;
        }
        .collab-hint-sub {
            font-size: 12px;
            color: rgba(150, 170, 200, 0.4);
        }
        
        /* 池中的资产 - 自由定位 */
        .pool-asset {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: floatIn 0.5s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .pool-asset:hover {
            transform: scale(1.1);
            z-index: 10;
        }
        .pool-asset-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }
        .pool-asset-id {
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
        }
        .pool-asset-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 22px;
            height: 22px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .pool-asset:hover .pool-asset-remove {
            opacity: 1;
        }
        
        /* 连接线动画 */
        .connection-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.6), transparent);
            transform-origin: left center;
            animation: linePulse 2s infinite;
        }
        @keyframes linePulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        /* 底部控制栏 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 16px;
        }
        .pool-stats {
            display: flex;
            gap: 20px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
        }
        .stat-label {
            font-size: 10px;
            color: rgba(150, 170, 200, 0.6);
            text-transform: uppercase;
        }
        .fuse-btn {
            padding: 12px 35px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(200, 150, 0, 0.1));
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
            opacity: 0.4;
            pointer-events: none;
        }
        .fuse-btn.active {
            opacity: 1;
            pointer-events: auto;
            animation: btnGlow 2s infinite;
        }
        .fuse-btn.active:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.25), rgba(200, 150, 0, 0.2));
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
        }
        .clear-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(200, 220, 240, 0.7);
            font-size: 11px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            border-color: rgba(255, 71, 87, 0.5);
            color: #ff4757;
        }
        
        /* 右侧：权属面板 */
        .ownership-panel {
            width: 300px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 15px;
        }
        .panel-title {
            color: #ffd700;
            font-size: 16px;
            letter-spacing: 3px;
        }
        .ownership-content {
            flex: 1;
            overflow-y: auto;
        }
        .ownership-content::-webkit-scrollbar { width: 4px; }
        .ownership-content::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.3); border-radius: 2px; }
        
        .section {
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .section-title {
            font-size: 10px;
            color: rgba(150, 170, 200, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .asset-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin: 4px;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .asset-tag-icon { font-size: 14px; }
        .asset-tag-id { font-family: 'Orbitron', sans-serif; opacity: 0.8; }
        
        .share-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .share-item:last-child { border-bottom: none; }
        .share-name {
            font-size: 12px;
            color: rgba(220, 230, 240, 0.9);
        }
        .share-value {
            font-size: 13px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
        }
        
        .rule-box {
            padding: 12px;
            background: rgba(255, 215, 0, 0.05);
            border-left: 3px solid #ffd700;
            border-radius: 0 10px 10px 0;
            font-size: 11px;
            color: rgba(220, 230, 240, 0.8);
            line-height: 1.7;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(150, 170, 200, 0.5);
        }
        .empty-icon { font-size: 40px; margin-bottom: 15px; opacity: 0.4; }
        
        /* 成功弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .success-card {
            background: rgba(10, 15, 30, 0.95);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            padding: 50px 70px;
            text-align: center;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.2);
            animation: cardAppear 0.6s ease;
        }
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .success-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        .success-title {
            font-size: 32px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .success-subtitle {
            font-size: 14px;
            color: rgba(200, 220, 240, 0.7);
            margin-bottom: 30px;
        }
        .result-preview {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }
        .result-3d {
            width: 150px;
            height: 150px;
        }
        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 12px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-gold {
            border-color: rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(200, 150, 0, 0.1));
            color: #ffd700;
        }
        .btn-gold:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.25), rgba(200, 150, 0, 0.2));
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="top-nav">
        <div class="nav-item">资产铸造</div>
        <div class="nav-item active">协作衍生</div>
        <div class="nav-item">融资决策</div>
    </div>
    
    <div class="main-container">
        <!-- 左侧：资产列表 -->
        <div class="assets-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">⬡ 已铸造资产</div>
                <div class="sidebar-subtitle">拖拽资产到协作池</div>
            </div>
            <div class="assets-list" id="assetsList">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 中央：自由协作池 -->
        <div class="fusion-pool">
            <div class="collab-area" id="collabArea">
                <!-- 空状态提示 -->
                <div class="collab-hint" id="collabHint">
                    <div class="collab-hint-icon">⬡</div>
                    <div class="collab-hint-text">协作池</div>
                    <div class="collab-hint-sub">从左侧拖拽资产到此处<br>可组合任意数量的资产</div>
                </div>
                <!-- 动态放置的资产 -->
            </div>
            
            <div class="control-bar">
                <div class="pool-stats">
                    <div class="stat">
                        <div class="stat-value" id="assetCount">0</div>
                        <div class="stat-label">已选资产</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalShare">100%</div>
                        <div class="stat-label">总权益</div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="clear-btn" id="clearBtn" onclick="clearPool()" style="display: none;">清空</button>
                    <button class="fuse-btn" id="fuseBtn" onclick="performFusion()">✨ 开始融合</button>
                </div>
            </div>
        </div>
        
        <!-- 右侧：权属面板 -->
        <div class="ownership-panel">
            <div class="panel-header">
                <div class="panel-title">⬡ 融合权属</div>
            </div>
            <div class="ownership-content" id="ownershipContent">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">⬡</div>
                    <div>拖拽资产到协作池</div>
                    <div style="font-size: 10px; margin-top: 8px;">查看融合权属分配</div>
                </div>
                <div id="ownershipDetails" style="display: none;">
                    <div class="section">
                        <div class="section-title">已选资产</div>
                        <div id="selectedAssets"></div>
                    </div>
                    <div class="section">
                        <div class="section-title">权益分配</div>
                        <div id="shareDistribution"></div>
                    </div>
                    <div class="section" style="border-bottom: none;">
                        <div class="section-title">融合规则</div>
                        <div class="rule-box">
                            • 所有选中资产的权属将合并<br>
                            • 收益按贡献比例自动分配<br>
                            • 继承上游资产全部规则<br>
                            • 里程碑触发即时结算
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="success-card">
            <div class="success-icon">🎉</div>
            <div class="success-title">融合成功</div>
            <div class="success-subtitle">新资产 NeuroBlok 已生成</div>
            <div class="result-preview">
                <canvas id="result3d" class="result-3d"></canvas>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal()">继续添加</button>
                <button class="btn btn-gold" onclick="goNext()">进入下一阶段 →</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 模拟已铸造资产（从Stage 1继承）
        const mintedAssets = [
            { id: 'PDB-001', name: '蛋白质结构', color: '#00f0ff', type: 'protein', icon: '🧬' },
            { id: 'CHEM-002', name: '化合物库', color: '#00ff88', type: 'compound', icon: '⚗️' },
            { id: 'GENE-003', name: '基因序列', color: '#0088ff', type: 'gene', icon: '🧪' },
            { id: 'VSCREEN-004', name: '虚拟筛选', color: '#88ffcc', type: 'screening', icon: '💻' },
            { id: 'ASSAY-005', name: '实验数据', color: '#a29bfe', type: 'assay', icon: '📊' },
            { id: 'CLINICAL-006', name: '临床数据', color: '#ffa502', type: 'clinical', icon: '🏥' },
            { id: 'PATENT-007', name: '专利信息', color: '#ff69b4', type: 'patent', icon: '📜' },
        ];
        
        let draggedAsset = null;
        let poolAssets = []; // 池中的资产
        let assetCounter = 0; // 计数器用于唯一ID
        
        // 初始化
        window.addEventListener('load', () => {
            initBackground();
            initAssetList();
            initCollabArea();
        });
        
        // 初始化左侧资产列表
        function initAssetList() {
            const list = document.getElementById('assetsList');
            
            mintedAssets.forEach(asset => {
                const item = document.createElement('div');
                item.className = 'asset-item';
                item.draggable = true;
                item.dataset.id = asset.id;
                item.innerHTML = `
                    <div class="asset-preview" style="border: 1px solid ${asset.color}40; color: ${asset.color};">
                        ${asset.icon}
                    </div>
                    <div class="asset-info">
                        <div class="asset-name">${asset.name}</div>
                        <div class="asset-id" style="color: ${asset.color};">${asset.id}</div>
                        <div class="asset-type">${asset.type}</div>
                    </div>
                `;
                
                item.addEventListener('dragstart', (e) => {
                    draggedAsset = asset;
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'copy';
                });
                
                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    draggedAsset = null;
                });
                
                list.appendChild(item);
            });
        }
        
        // 初始化协作区域
        function initCollabArea() {
            const area = document.getElementById('collabArea');
            
            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                area.classList.add('drag-over');
            });
            
            area.addEventListener('dragleave', () => {
                area.classList.remove('drag-over');
            });
            
            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('drag-over');
                
                if (draggedAsset) {
                    const rect = area.getBoundingClientRect();
                    const x = e.clientX - rect.left - 45; // 居中
                    const y = e.clientY - rect.top - 45;
                    addAssetToPool(draggedAsset, x, y);
                }
            });
        }
        
        // 添加资产到协作池
        function addAssetToPool(asset, x, y) {
            // 检查是否已在池中
            if (poolAssets.find(a => a.assetData.id === asset.id)) {
                return; // 避免重复
            }
            
            const area = document.getElementById('collabArea');
            const poolAsset = {
                id: `pool-${assetCounter++}`,
                assetData: asset,
                x: x,
                y: y
            };
            poolAssets.push(poolAsset);
            
            // 创建元素
            const el = document.createElement('div');
            el.className = 'pool-asset';
            el.id = poolAsset.id;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.borderColor = asset.color;
            el.style.boxShadow = `0 5px 20px ${asset.color}40`;
            el.innerHTML = `
                <div class="pool-asset-icon">${asset.icon}</div>
                <div class="pool-asset-id" style="color: ${asset.color};">${asset.id}</div>
                <div class="pool-asset-remove" onclick="removeAssetFromPool('${poolAsset.id}')">×</div>
            `;
            
            area.appendChild(el);
            
            // 隐藏提示
            document.getElementById('collabHint').classList.add('hidden');
            area.classList.add('has-assets');
            
            // 绘制连接线
            if (poolAssets.length > 1) {
                drawConnections();
            }
            
            updateUI();
        }
        
        // 从协作池移除资产
        function removeAssetFromPool(poolId) {
            const index = poolAssets.findIndex(a => a.id === poolId);
            if (index === -1) return;
            
            poolAssets.splice(index, 1);
            
            const el = document.getElementById(poolId);
            if (el) el.remove();
            
            // 移除所有连接线
            document.querySelectorAll('.connection-line').forEach(l => l.remove());
            
            // 重新绘制
            if (poolAssets.length > 1) {
                drawConnections();
            }
            
            // 检查是否为空
            if (poolAssets.length === 0) {
                document.getElementById('collabHint').classList.remove('hidden');
                document.getElementById('collabArea').classList.remove('has-assets');
            }
            
            updateUI();
        }
        
        // 绘制资产间的连接线
        function drawConnections() {
            // 移除旧线
            document.querySelectorAll('.connection-line').forEach(l => l.remove());
            
            const area = document.getElementById('collabArea');
            
            for (let i = 0; i < poolAssets.length; i++) {
                for (let j = i + 1; j < poolAssets.length; j++) {
                    const a1 = poolAssets[i];
                    const a2 = poolAssets[j];
                    
                    const line = document.createElement('div');
                    line.className = 'connection-line';
                    
                    const x1 = a1.x + 45;
                    const y1 = a1.y + 45;
                    const x2 = a2.x + 45;
                    const y2 = a2.y + 45;
                    
                    const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
                    const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
                    
                    line.style.width = `${length}px`;
                    line.style.left = `${x1}px`;
                    line.style.top = `${y1}px`;
                    line.style.transform = `rotate(${angle}deg)`;
                    
                    area.appendChild(line);
                }
            }
        }
        
        // 清空协作池
        function clearPool() {
            poolAssets = [];
            document.querySelectorAll('.pool-asset').forEach(el => el.remove());
            document.querySelectorAll('.connection-line').forEach(l => l.remove());
            document.getElementById('collabHint').classList.remove('hidden');
            document.getElementById('collabArea').classList.remove('has-assets');
            updateUI();
        }
        
        // 更新UI
        function updateUI() {
            const count = poolAssets.length;
            
            // 更新统计
            document.getElementById('assetCount').textContent = count;
            
            // 更新按钮状态
            const fuseBtn = document.getElementById('fuseBtn');
            const clearBtn = document.getElementById('clearBtn');
            
            if (count >= 2) {
                fuseBtn.classList.add('active');
            } else {
                fuseBtn.classList.remove('active');
            }
            
            clearBtn.style.display = count > 0 ? 'block' : 'none';
            
            // 更新右侧面板
            updateOwnershipPanel();
        }
        
        // 更新权属面板
        function updateOwnershipPanel() {
            const emptyState = document.getElementById('emptyState');
            const details = document.getElementById('ownershipDetails');
            
            if (poolAssets.length === 0) {
                emptyState.style.display = 'block';
                details.style.display = 'none';
                return;
            }
            
            emptyState.style.display = 'none';
            details.style.display = 'block';
            
            // 已选资产标签
            const selectedContainer = document.getElementById('selectedAssets');
            selectedContainer.innerHTML = poolAssets.map(({ assetData }) => `
                <span class="asset-tag" style="border-color: ${assetData.color}40;">
                    <span class="asset-tag-icon">${assetData.icon}</span>
                    <span class="asset-tag-id" style="color: ${assetData.color};">${assetData.id}</span>
                </span>
            `).join('');
            
            // 权益分配
            const shareContainer = document.getElementById('shareDistribution');
            const share = Math.floor(100 / poolAssets.length);
            const remainder = 100 - share * poolAssets.length;
            
            shareContainer.innerHTML = poolAssets.map(({ assetData }, index) => {
                const finalShare = share + (index === 0 ? remainder : 0);
                return `
                    <div class="share-item">
                        <span class="share-name">${assetData.name}</span>
                        <span class="share-value">${finalShare}%</span>
                    </div>
                `;
            }).join('');
        }
        
        // 执行融合
        function performFusion() {
            if (poolAssets.length < 2) return;
            
            document.getElementById('successModal').classList.add('active');
            
            // 初始化3D结果
            setTimeout(() => {
                const canvas = document.getElementById('result3d');
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
                camera.position.z = 5;
                
                const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
                renderer.setSize(150, 150);
                
                scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const light = new THREE.PointLight(0xffd700, 1.5, 100);
                light.position.set(5, 5, 5);
                scene.add(light);
                
                // 创建一个组合分子
                const group = new THREE.Group();
                
                // 中心核心
                const core = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(0.8, 0),
                    new THREE.MeshPhongMaterial({ 
                        color: 0xffd700, 
                        emissive: 0xffd700, 
                        emissiveIntensity: 0.3,
                        wireframe: true
                    })
                );
                group.add(core);
                
                // 周围小球
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const sphere = new THREE.Mesh(
                        new THREE.SphereGeometry(0.2, 8, 8),
                        new THREE.MeshPhongMaterial({ 
                            color: 0xffd700, 
                            emissive: 0xffd700, 
                            emissiveIntensity: 0.5 
                        })
                    );
                    sphere.position.set(Math.cos(angle) * 1.5, Math.sin(angle) * 1.5, 0);
                    group.add(sphere);
                }
                
                scene.add(group);
                
                function animate() {
                    requestAnimationFrame(animate);
                    group.rotation.y += 0.01;
                    group.rotation.x += 0.005;
                    renderer.render(scene, camera);
                }
                animate();
            }, 100);
        }
        
        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }
        
        function goNext() {
            alert('进入融资决策阶段');
        }
        
        // 背景粒子
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 1500; i++) {
                vertices.push(
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 50
                );
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.15,
                color: 0x00f0ff,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            });
            
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            camera.position.z = 30;
            
            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.0003;
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
