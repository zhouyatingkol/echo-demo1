<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - 可用版本</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }
        .nav-dots {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            padding: 10px 18px;
            border-radius: 25px;
        }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(0,240,255,0.2);
            border: 1px solid rgba(0,240,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        .dot:hover { background: rgba(0,240,255,0.4); }
        .dot.active { background: #00f0ff; box-shadow: 0 0 15px rgba(0,240,255,0.6); }
        
        .stage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            z-index: 1;
        }
        .stage.active { display: block; }
        
        /* Stage 0 */
        .stage-0-content {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .glass-card {
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 70px 100px;
            text-align: center;
        }
        .main-title {
            font-size: 48px;
            letter-spacing: 10px;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.6);
        }
        .subtitle {
            font-size: 16px;
            color: rgba(200,220,240,0.8);
            margin-bottom: 40px;
            letter-spacing: 3px;
        }
        .btn {
            padding: 14px 36px;
            border: 1px solid rgba(0,240,255,0.4);
            background: linear-gradient(135deg, rgba(0,240,255,0.1), rgba(0,100,200,0.05));
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(0,150,255,0.1));
            box-shadow: 0 0 30px rgba(0,240,255,0.3);
            transform: translateY(-2px);
        }
        
        /* Stage 1 */
        .stage-1-content {
            display: flex;
            height: 100vh;
            padding: 60px 30px 100px;
            gap: 25px;
        }
        .asset-library {
            width: 320px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .library-header {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0,240,255,0.2);
        }
        .library-title { color: #00f0ff; font-size: 16px; letter-spacing: 2px; }
        .library-subtitle { color: rgba(150,170,200,0.6); font-size: 11px; margin-top: 5px; }
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            overflow-y: auto;
        }
        .asset-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .asset-card:hover {
            border-color: rgba(0,240,255,0.4);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .asset-card.selected {
            border-color: #00f0ff;
            box-shadow: 0 0 20px rgba(0,240,255,0.3);
        }
        .asset-icon {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .asset-name { font-size: 13px; text-align: center; margin-bottom: 8px; }
        
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .preview-container {
            width: 350px; height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,240,255,0.1) 0%, rgba(10,15,30,0.9) 60%, transparent 70%);
            border: 1px solid rgba(0,240,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-fallback {
            width: 200px; height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,240,255,0.3) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }
        
        .mint-btn {
            margin-top: 30px;
            padding: 16px 50px;
            border: 2px solid rgba(0,240,255,0.4);
            background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(0,150,200,0.1));
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            opacity: 0.4;
            pointer-events: none;
        }
        .mint-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .mint-btn.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(0,240,255,0.5);
        }
        
        .config-panel {
            width: 300px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
        }
        .panel-title { color: #ffd700; font-size: 16px; letter-spacing: 2px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.2); }
        .config-item { margin-bottom: 20px; }
        .config-label { font-size: 11px; color: rgba(150,170,200,0.6); letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .config-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
        }
        
        /* Stage 2 */
        .stage-2-content {
            display: flex;
            height: 100vh;
            padding: 60px 25px 100px;
            gap: 20px;
        }
        .fusion-sidebar {
            width: 260px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            flex-direction: column;
        }
        .fusion-sidebar-title { color: #ffd700; font-size: 15px; letter-spacing: 2px; margin-bottom: 5px; }
        .fusion-sidebar-subtitle { color: rgba(150,170,200,0.6); font-size: 11px; margin-bottom: 15px; }
        .fusion-asset-list { flex: 1; overflow-y: auto; }
        .fusion-asset-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: grab;
            transition: all 0.3s;
        }
        .fusion-asset-item:hover {
            background: rgba(255,215,0,0.1);
            border-color: rgba(255,215,0,0.3);
            transform: translateX(5px);
        }
        .fusion-asset-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .fusion-asset-info { flex: 1; }
        .fusion-asset-name { font-size: 13px; }
        
        .collab-container { flex: 1; display: flex; flex-direction: column; }
        .collab-area {
            flex: 1;
            border: 2px dashed rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            background: rgba(0,0,0,0.2);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .collab-area.drag-over {
            border-color: rgba(255, 215, 0, 0.6);
            background: rgba(255, 215, 0, 0.08);
        }
        .collab-hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(150,170,200,0.5);
        }
        .collab-hint-icon { font-size: 60px; margin-bottom: 15px; }
        .collab-hint-text { font-size: 20px; letter-spacing: 3px; }
        
        .pool-asset {
            position: absolute;
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 2px solid;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: dropIn 0.5s ease;
        }
        @keyframes dropIn {
            from { opacity: 0; transform: scale(0); }
            to { opacity: 1; transform: scale(1); }
        }
        .pool-asset-icon { font-size: 30px; }
        .pool-asset-id { font-size: 10px; margin-top: 2px; }
        .pool-asset-remove {
            position: absolute;
            top: -5px; right: -5px;
            width: 22px; height: 22px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: all 0.3s;
            cursor: pointer;
        }
        .pool-asset:hover .pool-asset-remove { opacity: 1; }
        
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
        }
        .pool-stats { display: flex; gap: 30px; }
        .stat { text-align: center; }
        .stat-value { font-size: 24px; color: #ffd700; font-family: 'Orbitron', sans-serif; }
        .stat-label { font-size: 10px; color: rgba(150,170,200,0.6); margin-top: 4px; }
        
        .fuse-btn {
            padding: 14px 35px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(200, 150, 0, 0.1));
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
            opacity: 0.4;
            pointer-events: none;
        }
        .fuse-btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .fuse-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }
        
        .clear-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: rgba(255, 100, 100, 0.8);
            font-size: 12px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        .clear-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .ownership-panel {
            width: 280px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 18px;
        }
        .ownership-title { color: #ffd700; font-size: 15px; letter-spacing: 2px; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,215,0,0.2); }
        .empty-state { text-align: center; padding: 40px 20px; color: rgba(150,170,200,0.5); }
        .empty-state-icon { font-size: 40px; margin-bottom: 15px; }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .success-card {
            background: linear-gradient(135deg, rgba(10,15,30,0.98), rgba(20,25,50,0.98));
            border: 2px solid rgba(0,240,255,0.4);
            border-radius: 30px;
            padding: 50px 70px;
            text-align: center;
        }
        .success-card.fusion { border-color: rgba(255,215,0,0.4); }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
        .success-title { font-size: 28px; color: #00f0ff; margin-bottom: 10px; }
        .success-card.fusion .success-title { color: #ffd700; }
        .success-subtitle { color: rgba(200,220,240,0.7); margin-bottom: 30px; }
        .result-id {
            font-size: 24px;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            padding: 15px 30px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 12px;
            margin-bottom: 25px;
            display: inline-block;
        }
        .modal-actions { display: flex; gap: 15px; justify-content: center; }
        .modal-btn {
            padding: 12px 28px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .modal-btn:hover { background: rgba(255,255,255,0.1); }
        .modal-btn.primary {
            border-color: rgba(0,240,255,0.5);
            background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(0,150,200,0.1));
            color: #00f0ff;
        }
        .modal-btn.gold {
            border-color: rgba(255,215,0,0.5);
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(200,150,0,0.1));
            color: #ffd700;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="nav-dots">
        <div class="dot active" onclick="goToStage(0)"></div>
        <div class="dot" onclick="goToStage(1)"></div>
        <div class="dot" onclick="goToStage(2)"></div>
    </div>
    
    <!-- Stage 0 -->
    <div class="stage active" id="stage0">
        <div class="stage-0-content">
            <div class="glass-card">
                <div class="main-title">ECHO PROTOCOL</div>
                <div class="subtitle">科学数据资产化协作平台</div>
                <button class="btn" id="startBtn">开始体验</button>
            </div>
        </div>
    </div>
    
    <!-- Stage 1 -->
    <div class="stage" id="stage1">
        <div class="stage-1-content">
            <div class="asset-library">
                <div class="library-header">
                    <div class="library-title">数据资产库</div>
                    <div class="library-subtitle">选择要铸造的数据资产</div>
                </div>
                <div class="asset-grid" id="assetGrid"></div>
            </div>
            
            <div class="preview-area">
                <div class="preview-container">
                    <div class="preview-fallback" id="previewFallback">⬡</div>
                </div>
                <button class="mint-btn" id="mintBtn">铸造资产</button>
            </div>
            
            <div class="config-panel">
                <div class="panel-title">铸造配置</div>
                <div class="config-item">
                    <label class="config-label">资产名称</label>
                    <input type="text" class="config-input" id="assetName" value="NeuroData-001">
                </div>
                <div class="config-item">
                    <label class="config-label">开放程度</label>
                    <div class="config-options">
                        <div class="config-option selected">完全开放</div>
                        <div class="config-option">有限授权</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Stage 2 -->
    <div class="stage" id="stage2">
        <div class="stage-2-content">
            <div class="fusion-sidebar">
                <div class="fusion-sidebar-title">已铸造资产</div>
                <div class="fusion-sidebar-subtitle">拖拽资产到协作池</div>
                <div class="fusion-asset-list" id="fusionAssetList"></div>
            </div>
            
            <div class="collab-container">
                <div class="collab-area" id="collabArea">
                    <div class="collab-hint" id="collabHint">
                        <div class="collab-hint-icon">⬡</div>
                        <div class="collab-hint-text">协作池</div>
                    </div>
                </div>
                
                <div class="control-bar">
                    <div class="pool-stats">
                        <div class="stat">
                            <div class="stat-value" id="assetCount">0</div>
                            <div class="stat-label">已选资产</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="fusionPower">0</div>
                            <div class="stat-label">融合力</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <button class="clear-btn" id="clearBtn">清空</button>
                        <button class="fuse-btn" id="fuseBtn">开始融合</button>
                    </div>
                </div>
            </div>
            
            <div class="ownership-panel">
                <div class="ownership-title">融合权属</div>
                <div class="empty-state">
                    <div class="empty-state-icon">⬡</div>
                    <div>拖拽资产查看权属分配</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal-overlay" id="mintModal">
        <div class="success-card">
            <div class="success-icon">🎉</div>
            <div class="success-title">铸造成功</div>
            <div class="success-subtitle">您的数据资产已上链</div>
            <div class="result-id" id="mintResultId">PDB-001</div>
            <div class="modal-actions">
                <button class="modal-btn" id="continueMintBtn">继续铸造</button>
                <button class="modal-btn primary" id="goToFusionBtn">进入融合 →</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="fusionModal">
        <div class="success-card fusion">
            <div class="success-icon">✨</div>
            <div class="success-title">融合成功</div>
            <div class="success-subtitle">新资产已生成</div>
            <div class="result-id" id="fusionResultId">NeuroBlok-v2</div>
            <div class="modal-actions">
                <button class="modal-btn" id="continueFusionBtn">继续融合</button>
                <button class="modal-btn gold" id="finishBtn">完成</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 数据 ==========
        const assets = [
            { id: 'PDB-001', name: '蛋白质结构', icon: '🧬', color: '#00f0ff', weight: 1.2 },
            { id: 'CHEM-002', name: '化合物库', icon: '⚗️', color: '#00ff88', weight: 1.0 },
            { id: 'GENE-003', name: '基因序列', icon: '🧪', color: '#0088ff', weight: 1.5 },
            { id: 'VSCREEN-004', name: '虚拟筛选', icon: '💻', color: '#88ffcc', weight: 0.8 },
            { id: 'ASSAY-005', name: '实验数据', icon: '📊', color: '#a29bfe', weight: 1.3 },
            { id: 'SIM-006', name: '分子模拟', icon: '🔬', color: '#74b9ff', weight: 1.1 },
            { id: 'PATENT-007', name: '专利信息', icon: '📜', color: '#ff69b4', weight: 1.8 },
            { id: 'PAPER-008', name: '论文数据', icon: '📄', color: '#ffa502', weight: 1.0 }
        ];
        
        let selectedAsset = null;
        let poolAssets = [];
        let currentStage = 0;
        let draggedAsset = null;
        let mintedAssets = [];
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initBackground();
            initAssetGrid();
            initEventListeners();
        });
        
        // ========== 背景 ==========
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2
                });
            }
            
            function animate() {
                ctx.fillStyle = 'rgba(2, 2, 8, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(0, 240, 255, 0.5)';
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // ========== Stage 1 ==========
        function initAssetGrid() {
            const grid = document.getElementById('assetGrid');
            grid.innerHTML = '';
            
            assets.forEach((asset, index) => {
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="asset-icon">${asset.icon}</div>
                    <div class="asset-name">${asset.name}</div>
                `;
                card.addEventListener('click', () => selectAsset(asset, card));
                grid.appendChild(card);
            });
        }
        
        function selectAsset(asset, card) {
            document.querySelectorAll('.asset-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedAsset = asset;
            
            const preview = document.getElementById('previewFallback');
            preview.textContent = asset.icon;
            preview.style.color = asset.color;
            preview.style.boxShadow = `0 0 60px ${asset.color}40`;
            
            document.getElementById('mintBtn').classList.add('active');
        }
        
        function performMint() {
            if (!selectedAsset) return;
            
            mintedAssets.push(selectedAsset);
            document.getElementById('mintResultId').textContent = selectedAsset.id;
            document.getElementById('mintModal').classList.add('active');
        }
        
        // ========== Stage 2 ==========
        function initFusionPage() {
            const list = document.getElementById('fusionAssetList');
            list.innerHTML = '';
            
            if (mintedAssets.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(150,170,200,0.5)">请先铸造资产</div>';
                return;
            }
            
            mintedAssets.forEach((asset, index) => {
                const item = document.createElement('div');
                item.className = 'fusion-asset-item';
                item.draggable = true;
                item.innerHTML = `
                    <div class="fusion-asset-icon" style="color:${asset.color}">${asset.icon}</div>
                    <div class="fusion-asset-info">
                        <div class="fusion-asset-name">${asset.name}</div>
                    </div>
                `;
                
                item.addEventListener('dragstart', () => {
                    draggedAsset = asset;
                    item.style.opacity = '0.5';
                });
                
                item.addEventListener('dragend', () => {
                    item.style.opacity = '1';
                });
                
                list.appendChild(item);
            });
        }
        
        function setupCollabArea() {
            const area = document.getElementById('collabArea');
            
            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                area.classList.add('drag-over');
            });
            
            area.addEventListener('dragleave', () => {
                area.classList.remove('drag-over');
            });
            
            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.classList.remove('drag-over');
                
                if (!draggedAsset) return;
                if (poolAssets.find(a => a.id === draggedAsset.id)) return;
                
                const rect = area.getBoundingClientRect();
                const x = 60 + Math.random() * (rect.width - 180);
                const y = 60 + Math.random() * (rect.height - 180);
                
                addAssetToPool(draggedAsset, x, y);
            });
        }
        
        function addAssetToPool(asset, x, y) {
            poolAssets.push(asset);
            
            const el = document.createElement('div');
            el.className = 'pool-asset';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.color = asset.color;
            el.style.borderColor = asset.color;
            el.innerHTML = `
                <div class="pool-asset-icon">${asset.icon}</div>
                <div class="pool-asset-id">${asset.id}</div>
                <div class="pool-asset-remove" data-id="${asset.id}">×</div>
            `;
            
            el.querySelector('.pool-asset-remove').addEventListener('click', (e) => {
                e.stopPropagation();
                removeFromPool(asset.id);
                el.remove();
            });
            
            document.getElementById('collabArea').appendChild(el);
            document.getElementById('collabHint').style.display = 'none';
            
            updatePoolStats();
        }
        
        function removeFromPool(id) {
            poolAssets = poolAssets.filter(a => a.id !== id);
            if (poolAssets.length === 0) {
                document.getElementById('collabHint').style.display = 'block';
            }
            updatePoolStats();
        }
        
        function clearPool() {
            poolAssets = [];
            document.querySelectorAll('.pool-asset').forEach(el => el.remove());
            document.getElementById('collabHint').style.display = 'block';
            updatePoolStats();
        }
        
        function updatePoolStats() {
            document.getElementById('assetCount').textContent = poolAssets.length;
            const power = poolAssets.reduce((sum, a) => sum + a.weight, 0);
            document.getElementById('fusionPower').textContent = power.toFixed(1);
            
            const fuseBtn = document.getElementById('fuseBtn');
            const clearBtn = document.getElementById('clearBtn');
            
            if (poolAssets.length >= 2) {
                fuseBtn.classList.add('active');
            } else {
                fuseBtn.classList.remove('active');
            }
            
            if (poolAssets.length > 0) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
        }
        
        function performFusion() {
            if (poolAssets.length < 2) return;
            document.getElementById('fusionModal').classList.add('active');
        }
        
        // ========== 事件绑定 ==========
        function initEventListeners() {
            // Stage 0
            document.getElementById('startBtn').addEventListener('click', () => goToStage(1));
            
            // Stage 1
            document.getElementById('mintBtn').addEventListener('click', performMint);
            document.getElementById('continueMintBtn').addEventListener('click', () => {
                document.getElementById('mintModal').classList.remove('active');
            });
            document.getElementById('goToFusionBtn').addEventListener('click', () => {
                document.getElementById('mintModal').classList.remove('active');
                goToStage(2);
            });
            
            // Stage 2
            setupCollabArea();
            document.getElementById('fuseBtn').addEventListener('click', performFusion);
            document.getElementById('clearBtn').addEventListener('click', clearPool);
            document.getElementById('continueFusionBtn').addEventListener('click', () => {
                document.getElementById('fusionModal').classList.remove('active');
            });
            document.getElementById('finishBtn').addEventListener('click', () => {
                document.getElementById('fusionModal').classList.remove('active');
            });
        }
        
        // ========== 导航 ==========
        function goToStage(index) {
            if (index < 0 || index > 2) return;
            
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById('stage' + index).classList.add('active');
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === index));
            currentStage = index;
            
            if (index === 2) {
                initFusionPage();
            }
        }
    </script>
</body>
</html>
