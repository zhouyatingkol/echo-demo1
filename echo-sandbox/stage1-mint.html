<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - Stage 1 | 资产铸造</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', 'Noto+Sans+SC', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        
        .top-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 30px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }
        .nav-item {
            font-size: 12px;
            color: rgba(150, 170, 200, 0.7);
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item:hover, .nav-item.active {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        .main-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            padding: 80px 30px 30px;
            gap: 30px;
        }
        
        .data-panel {
            width: 320px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }
        .panel-title {
            color: #00f0ff;
            font-size: 18px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        .panel-subtitle {
            font-size: 11px;
            color: rgba(150, 170, 200, 0.6);
            margin-top: 6px;
        }
        
        .data-sources {
            flex: 1;
            overflow-y: auto;
        }
        .data-sources::-webkit-scrollbar { width: 4px; }
        
        .source-category {
            margin-bottom: 20px;
            animation: slideIn 0.5s ease backwards;
        }
        .source-category:nth-child(1) { animation-delay: 0.1s; }
        .source-category:nth-child(2) { animation-delay: 0.2s; }
        .source-category:nth-child(3) { animation-delay: 0.3s; }
        .source-category:nth-child(4) { animation-delay: 0.4s; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 12px;
            color: rgba(150, 170, 200, 0.7);
            letter-spacing: 2px;
        }
        .category-icon { font-size: 16px; }
        
        .source-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .source-item:hover {
            background: rgba(0, 240, 255, 0.08);
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateX(5px);
        }
        .source-item.selected {
            background: rgba(0, 240, 255, 0.15);
            border-color: rgba(0, 240, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        .source-check {
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.3s;
        }
        .source-item.selected .source-check {
            background: #00f0ff;
            border-color: #00f0ff;
            color: #000;
        }
        .source-name {
            flex: 1;
            font-size: 12px;
        }
        .source-tag {
            font-size: 9px;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: rgba(150, 170, 200, 0.8);
        }
        
        .forge-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .forge-platform {
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, rgba(10, 15, 30, 0.9) 60%, transparent 70%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forge-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px dashed rgba(0, 240, 255, 0.3);
        }
        .forge-ring:nth-child(1) { width: 80%; height: 80%; animation: rotate 20s linear infinite; }
        .forge-ring:nth-child(2) { width: 60%; height: 60%; animation: rotate-reverse 15s linear infinite; }
        .forge-ring:nth-child(3) { width: 40%; height: 40%; animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        
        .forge-canvas {
            width: 300px;
            height: 300px;
            border-radius: 50%;
        }
        
        .mint-btn {
            margin-top: 30px;
            padding: 16px 50px;
            border: 2px solid rgba(0, 240, 255, 0.4);
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(0, 150, 200, 0.1));
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            opacity: 0.4;
            pointer-events: none;
        }
        .mint-btn.active {
            opacity: 1;
            pointer-events: auto;
            animation: btnGlow 2s infinite;
        }
        .mint-btn.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.5);
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 240, 255, 0.6); }
        }
        
        .config-panel {
            width: 320px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 24px;
        }
        .config-panel .panel-header { border-color: rgba(255, 215, 0, 0.2); }
        .config-panel .panel-title {
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        
        .config-section {
            margin-bottom: 24px;
            animation: fadeInUp 0.5s ease backwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
        }
        
        .section-title {
            font-size: 11px;
            color: rgba(150, 170, 200, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-value {
            min-width: 50px;
            text-align: right;
            font-size: 18px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
        }
        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .option-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .option-btn {
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: rgba(200, 220, 240, 0.8);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-btn.selected {
            background: rgba(255, 215, 0, 0.2);
            border-color: rgba(255, 215, 0, 0.5);
            color: #ffd700;
        }
        
        /* 成功弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .success-card {
            background: linear-gradient(135deg, rgba(10, 15, 30, 0.98), rgba(20, 25, 50, 0.98));
            border: 2px solid rgba(0, 240, 255, 0.4);
            border-radius: 40px;
            padding: 50px 70px;
            text-align: center;
            box-shadow: 0 0 100px rgba(0, 240, 255, 0.2);
            animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .success-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 240, 255, 0.1), transparent 30%);
            animation: rotate 8s linear infinite;
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.5) translateY(50px); }
        }
        .success-content {
            position: relative;
            z-index: 1;
        }
        .success-icon {
            font-size: 70px;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .success-title {
            font-size: 32px;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .success-subtitle {
            font-size: 14px;
            color: rgba(200, 220, 240, 0.7);
            margin-bottom: 30px;
        }
        .asset-result {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .asset-id-display {
            font-size: 28px;
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 12px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-cyan {
            border-color: rgba(0, 240, 255, 0.5);
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 150, 200, 0.1));
            color: #00f0ff;
        }
        .btn-cyan:hover {
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="top-nav">
        <div class="nav-item active">资产铸造</div>
        <div class="nav-item" onclick="goToStage2()">协作衍生</div>
        <div class="nav-item">融资决策</div>
    </div>
    
    <div class="main-container">
        <!-- 左侧：数据源 -->
        <div class="data-panel">
            <div class="panel-header">
                <div class="panel-title">⬡ 数据源</div>
                <div class="panel-subtitle">选择要上链的数据</div>
            </div>
            <div class="data-sources" id="dataSources">
                <div class="source-category">
                    <div class="category-header"><span class="category-icon">🧬</span> 生物信息</div>
                    <div class="source-item" data-id="protein" onclick="toggleSource(this)">
                        <div class="source-check">✓</div><div class="source-name">蛋白质结构</div><div class="source-tag">PDB</div>
                    </div>
                    <div class="source-item" data-id="gene" onclick="toggleSource(this)">
                        <div class="source-check">✓</div><div class="source-name">基因序列</div><div class="source-tag">NGS</div>
                    </div>
                </div>
                <div class="source-category">
                    <div class="category-header"><span class="category-icon">⚗️</span> 化学数据</div>
                    <div class="source-item" data-id="compound" onclick="toggleSource(this)">
                        <div class="source-check">✓</div><div class="source-name">化合物库</div><div class="source-tag">Mol</div>
                    </div>
                    <div class="source-item" data-id="assay" onclick="toggleSource(this)">
                        <div class="source-check">✓</div><div class="source-name">实验数据</div><div class="source-tag">Bio</div>
                    </div>
                </div>
                <div class="source-category">
                    <div class="category-header"><span class="category-icon">💻</span> 计算数据</div>
                    <div class="source-item" data-id="screening" onclick="toggleSource(this)">
                        <div class="source-check">✓</div><div class="source-name">虚拟筛选</div><div class="source-tag">AI</div>
                    </div>
                    <div class="source-item" data-id="simulation" onclick="toggleSource(this)">
                        <div class="source-check">✓</div><div class="source-name">分子模拟</div><div class="source-tag">MD</div>
                    </div>
                </div>
                <div class="source-category">
                    <div class="category-header"><span class="category-icon">📄</span> 文档资料</div>
                    <div class="source-item" data-id="patent" onclick="toggleSource(this)">
                        <div class="source-check">✓</div><div class="source-name">专利信息</div><div class="source-tag">IP</div>
                    </div>
                    <div class="source-item" data-id="paper" onclick="toggleSource(this)">
                        <div class="source-check">✓</div><div class="source-name">论文数据</div><div class="source-tag">DOI</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 中央：3D铸造台 -->
        <div class="forge-center">
            <div class="forge-platform">
                <div class="forge-ring"></div>
                <div class="forge-ring"></div>
                <div class="forge-ring"></div>
                <canvas id="forgeCanvas" class="forge-canvas"></canvas>
            </div>
            <button class="mint-btn" id="mintBtn" onclick="performMint()">⚡ 开始铸造</button>
        </div>
        
        <!-- 右侧：权属配置 -->
        <div class="config-panel">
            <div class="panel-header">
                <div class="panel-title">⬡ 权属配置</div>
                <div class="panel-subtitle">设置资产参数</div>
            </div>
            <div class="config-section">
                <div class="section-title">资产名称</div>
                <input type="text" class="input-field" placeholder="输入资产名称..." value="PDB Dataset 001">
            </div>
            <div class="config-section">
                <div class="section-title">开放程度</div>
                <div class="slider-container">
                    <input type="range" min="0" max="100" value="50" id="openSlider" oninput="updateSlider(this.value)">
                    <div class="slider-value" id="sliderValue">50%</div>
                </div>
            </div>
            <div class="config-section">
                <div class="section-title">收益分配</div>
                <div class="option-group">
                    <div class="option-btn selected" onclick="selectOption(this)">研究者 70%</div>
                    <div class="option-btn" onclick="selectOption(this)">团队 50/50</div>
                    <div class="option-btn" onclick="selectOption(this)">自定义</div>
                </div>
            </div>
            <div class="config-section">
                <div class="section-title">授权许可</div>
                <div class="option-group">
                    <div class="option-btn selected" onclick="selectOption(this)">CC-BY</div>
                    <div class="option-btn" onclick="selectOption(this)">CC-BY-SA</div>
                    <div class="option-btn" onclick="selectOption(this)">私有</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="success-card">
            <div class="success-content">
                <div class="success-icon">🎉</div>
                <div class="success-title">铸造成功</div>
                <div class="success-subtitle">您的数据资产已上链</div>
                <div class="asset-result">
                    <div class="asset-id-display" id="resultId">PDB-001</div>
                    <div style="color: rgba(150,170,200,0.7); font-size: 13px;">蛋白质结构数据 · 完全开放</div>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal()">继续铸造</button>
                    <button class="btn btn-cyan" onclick="goToStage2()">进入协作衍生 →</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let selectedSources = new Set();
        
        function toggleSource(el) {
            const id = el.dataset.id;
            if (selectedSources.has(id)) {
                selectedSources.delete(id);
                el.classList.remove('selected');
            } else {
                selectedSources.add(id);
                el.classList.add('selected');
            }
            updateMintBtn();
        }
        
        function updateMintBtn() {
            const btn = document.getElementById('mintBtn');
            if (selectedSources.size > 0) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }
        
        function updateSlider(val) {
            document.getElementById('sliderValue').textContent = val + '%';
        }
        
        function selectOption(el) {
            el.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }
        
        function performMint() {
            if (selectedSources.size === 0) return;
            document.getElementById('successModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }
        
        function goToStage2() {
            // 跳转到协作衍生页面
            window.location.href = 'stage2-rich.html';
        }
        
        // 3D铸造台
        function initForge() {
            const canvas = document.getElementById('forgeCanvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            camera.position.z = 5;
            
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(300, 300);
            
            const geometry = new THREE.IcosahedronGeometry(1.2, 1);
            const material = new THREE.MeshPhongMaterial({
                color: 0x00f0ff,
                emissive: 0x00f0ff,
                emissiveIntensity: 0.3,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.PointLight(0x00f0ff, 2, 100);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.y += 0.005;
                mesh.rotation.x += 0.003;
                const scale = 1 + Math.sin(Date.now() * 0.001) * 0.1;
                mesh.scale.setScalar(scale);
                renderer.render(scene, camera);
            }
            animate();
        }
        
        // 背景
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 2000; i++) {
                vertices.push(
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 100,
                    (Math.random() - 0.5) * 50
                );
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.15,
                color: 0x00f0ff,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            });
            
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            camera.position.z = 30;
            
            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.0003;
                renderer.render(scene, camera);
            }
            animate();
        }
        
        // WebGL 检测
        function isWebGLAvailable() {
            try {
                const canvas = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
            } catch (e) {
                return false;
            }
        }
        
        window.onload = () => {
            if (isWebGLAvailable()) {
                initBackground();
                initForge();
            } else {
                console.warn('WebGL not available');
                const forgeCanvas = document.getElementById('forgeCanvas');
                if (forgeCanvas) {
                    forgeCanvas.style.background = 'radial-gradient(circle, rgba(0,240,255,0.2) 0%, transparent 70%)';
                }
            }
        };
    </script>
