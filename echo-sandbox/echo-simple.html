<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - Stage 2 Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        
        .main-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            padding: 80px 25px 30px;
            gap: 25px;
        }
        
        /* 左侧资产列表 */
        .assets-sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar-title {
            color: #00f0ff;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .sidebar-subtitle {
            color: rgba(150, 170, 200, 0.6);
            font-size: 11px;
        }
        .assets-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .assets-list::-webkit-scrollbar { width: 4px; }
        .assets-list::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 2px; }
        
        .asset-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .asset-item:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateX(8px) scale(1.02);
        }
        .asset-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }
        .asset-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 1px solid;
        }
        .asset-info { flex: 1; }
        .asset-name {
            font-size: 13px;
            color: #fff;
            margin-bottom: 2px;
        }
        .asset-id {
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
        }
        
        /* 中央协作池 */
        .fusion-pool {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .collab-area {
            flex: 1;
            position: relative;
            border: 2px dashed rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .collab-area.drag-over {
            border-color: rgba(255, 215, 0, 0.6);
            background: rgba(255, 215, 0, 0.08);
        }
        .collab-area.has-assets {
            border-style: solid;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
        }
        
        .collab-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }
        .collab-hint-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.2;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .collab-hint-text {
            font-size: 24px;
            color: rgba(150, 170, 200, 0.6);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        .collab-hint-sub {
            font-size: 13px;
            color: rgba(150, 170, 200, 0.4);
            line-height: 1.6;
        }
        
        /* 池中的资产 */
        .pool-asset {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        @keyframes dropIn {
            0% { opacity: 0; transform: scale(0) rotate(-180deg); }
            60% { transform: scale(1.1) rotate(10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }
        .pool-asset:hover {
            transform: scale(1.15);
            z-index: 20;
        }
        .pool-asset-icon {
            font-size: 40px;
            margin-bottom: 2px;
        }
        .pool-asset-id {
            font-size: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
        }
        .pool-asset-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s;
            cursor: pointer;
        }
        .pool-asset:hover .pool-asset-remove {
            opacity: 1;
            transform: scale(1);
        }
        
        /* 能量线 */
        .energy-line {
            position: absolute;
            height: 3px;
            transform-origin: left center;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.8) 0%, rgba(255, 215, 0, 0.8) 50%, rgba(0, 240, 255, 0.8) 100%);
            border-radius: 2px;
            animation: energyFlow 2s linear infinite;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes energyFlow {
            0% { background-position: -200% 0; opacity: 0.4; }
            50% { opacity: 1; }
            100% { background-position: 200% 0; opacity: 0.4; }
        }
        
        /* 底部控制栏 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
        }
        .pool-stats {
            display: flex;
            gap: 30px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .stat-label {
            font-size: 10px;
            color: rgba(150, 170, 200, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .fuse-btn {
            padding: 14px 40px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(200, 150, 0, 0.1));
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: not-allowed;
            border-radius: 30px;
            transition: all 0.3s;
            opacity: 0.4;
        }
        .fuse-btn.active {
            opacity: 1;
            cursor: pointer;
            animation: btnGlow 2s infinite;
        }
        .fuse-btn.active:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(200, 150, 0, 0.2));
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }
        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
        }
        
        .clear-btn {
            padding: 12px 25px;
            background: transparent;
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: rgba(255, 100, 100, 0.8);
            font-size: 12px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
            opacity: 0;
        }
        .clear-btn.visible {
            opacity: 1;
        }
        .clear-btn:hover {
            border-color: rgba(255, 71, 87, 0.6);
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
        }
        
        /* 右侧权属面板 */
        .ownership-panel {
            width: 300px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            padding: 22px;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            color: #ffd700;
            font-size: 18px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .section-title {
            font-size: 11px;
            color: rgba(150, 170, 200, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(150, 170, 200, 0.5);
        }
        .empty-icon { font-size: 50px; margin-bottom: 20px; opacity: 0.3; }
        
        /* 成功弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .success-card {
            background: linear-gradient(135deg, rgba(10, 15, 30, 0.98), rgba(20, 25, 50, 0.98));
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 40px;
            padding: 60px 90px;
            text-align: center;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.2);
            animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.5) translateY(50px); }
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 25px;
            animation: bounce 1s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .success-title {
            font-size: 36px;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 6px;
            margin-bottom: 12px;
        }
        .result-3d {
            width: 180px;
            height: 180px;
            margin: 0 auto 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.3);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
        }
        
        .btn {
            padding: 14px 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-gold {
            border-color: rgba(255, 215, 0, 0.5);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(200, 150, 0, 0.1));
            color: #ffd700;
            margin-left: 15px;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="main-container">
        <!-- 左侧：资产列表 -->
        <div class="assets-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">⬡ 已铸造资产</div>
                <div class="sidebar-subtitle">拖拽资产到协作池</div>
            </div>
            <div class="assets-list" id="assetsList"></div>
        </div>
        
        <!-- 中央：协作池 -->
        <div class="fusion-pool">
            <div class="collab-area" id="collabArea">
                <div class="collab-hint" id="collabHint">
                    <div class="collab-hint-icon">⬡</div>
                    <div class="collab-hint-text">协作池</div>
                    <div class="collab-hint-sub">从左侧拖拽资产到此处<br>可组合任意数量的资产</div>
                </div>
            </div>
            
            <div class="control-bar">
                <div class="pool-stats">
                    <div class="stat">
                        <div class="stat-value" id="assetCount">0</div>
                        <div class="stat-label">已选资产</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="fusionPower">0</div>
                        <div class="stat-label">融合力</div>
                    </div>
                </div>
                <div>
                    <button class="clear-btn" id="clearBtn">清空</button>
                    <button class="fuse-btn" id="fuseBtn">✨ 开始融合</button>
                </div>
            </div>
        </div>
        
        <!-- 右侧：权属面板 -->
        <div class="ownership-panel">
            <div class="panel-title">⬡ 融合权属</div>
            <div id="ownershipContent">
                <div class="empty-state">
                    <div class="empty-icon">⬡</div>
                    <div>拖拽资产到协作池<br>查看融合权属分配</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="success-card">
            <div class="success-icon">✨</div>
            <div class="success-title">融合成功</div>
            <div class="result-3d">🧬</div>
            <div>
                <button class="btn" onclick="closeModal()">继续协作</button>
                <button class="btn btn-gold">进入下一阶段 →</button>
            </div>
        </div>
    </div>

    <script>
        // 资产数据（带图标和颜色）
        const mintedAssets = [
            { id: 'PDB-001', name: '蛋白质结构', color: '#00f0ff', icon: '🧬', weight: 1.2 },
            { id: 'CHEM-002', name: '化合物库', color: '#00ff88', icon: '⚗️', weight: 1.0 },
            { id: 'GENE-003', name: '基因序列', color: '#0088ff', icon: '🧪', weight: 1.5 },
            { id: 'VSCREEN-004', name: '虚拟筛选', color: '#88ffcc', icon: '💻', weight: 0.8 },
            { id: 'ASSAY-005', name: '实验数据', color: '#a29bfe', icon: '📊', weight: 1.3 },
            { id: 'CLINICAL-006', name: '临床数据', color: '#ffa502', icon: '🏥', weight: 2.0 },
        ];
        
        let draggedAsset = null;
        let poolAssets = [];
        let assetCounter = 0;
        
        // 初始化
        window.onload = function() {
            initAssetList();
            initCollabArea();
            initButtons();
            initBackground();
        };
        
        // 初始化左侧资产列表
        function initAssetList() {
            const list = document.getElementById('assetsList');
            
            mintedAssets.forEach((asset, index) => {
                const item = document.createElement('div');
                item.className = 'asset-item';
                item.draggable = true;
                item.dataset.id = asset.id;
                item.innerHTML = `
                    <div class="asset-icon" style="border-color: ${asset.color}40; color: ${asset.color}">${asset.icon}</div>
                    <div class="asset-info">
                        <div class="asset-name">${asset.name}</div>
                        <div class="asset-id" style="color: ${asset.color}">${asset.id}</div>
                    </div>
                `;
                
                item.addEventListener('dragstart', function() {
                    draggedAsset = asset;
                    item.classList.add('dragging');
                });
                
                item.addEventListener('dragend', function() {
                    item.classList.remove('dragging');
                    draggedAsset = null;
                });
                
                list.appendChild(item);
            });
        }
        
        // 初始化协作区域
        function initCollabArea() {
            const area = document.getElementById('collabArea');
            
            area.addEventListener('dragover', function(e) {
                e.preventDefault();
                area.classList.add('drag-over');
            });
            
            area.addEventListener('dragleave', function() {
                area.classList.remove('drag-over');
            });
            
            area.addEventListener('drop', function(e) {
                e.preventDefault();
                area.classList.remove('drag-over');
                
                if (draggedAsset) {
                    const rect = area.getBoundingClientRect();
                    const padding = 60;
                    const x = padding + Math.random() * (rect.width - padding * 2 - 100);
                    const y = padding + Math.random() * (rect.height - padding * 2 - 100);
                    addAssetToPool(draggedAsset, x, y);
                }
            });
        }
        
        // 添加资产到池
        function addAssetToPool(asset, x, y) {
            if (poolAssets.find(a => a.assetData.id === asset.id)) return;
            
            const poolAsset = {
                id: `pool-${assetCounter++}`,
                assetData: asset,
                x, y
            };
            poolAssets.push(poolAsset);
            
            const area = document.getElementById('collabArea');
            
            const el = document.createElement('div');
            el.className = 'pool-asset';
            el.id = poolAsset.id;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.borderColor = asset.color;
            el.style.color = asset.color;
            el.innerHTML = `
                <div class="pool-asset-icon">${asset.icon}</div>
                <div class="pool-asset-id">${asset.id}</div>
                <div class="pool-asset-remove" onclick="removeAsset('${poolAsset.id}')">×</div>
            `;
            
            area.appendChild(el);
            
            document.getElementById('collabHint').style.display = 'none';
            area.classList.add('has-assets');
            
            if (poolAssets.length > 1) drawConnections();
            updateUI();
        }
        
        // 移除资产
        function removeAsset(poolId) {
            const index = poolAssets.findIndex(a => a.id === poolId);
            if (index === -1) return;
            
            poolAssets.splice(index, 1);
            
            const el = document.getElementById(poolId);
            if (el) el.remove();
            
            document.querySelectorAll('.energy-line').forEach(l => l.remove());
            
            if (poolAssets.length > 1) drawConnections();
            
            if (poolAssets.length === 0) {
                document.getElementById('collabHint').style.display = 'block';
                document.getElementById('collabArea').classList.remove('has-assets');
            }
            
            updateUI();
        }
        
        // 绘制连接线
        function drawConnections() {
            document.querySelectorAll('.energy-line').forEach(l => l.remove());
            
            if (poolAssets.length < 2) return;
            
            const area = document.getElementById('collabArea');
            const centerX = area.offsetWidth / 2;
            const centerY = area.offsetHeight / 2;
            
            poolAssets.forEach(function({ x, y }) {
                const line = document.createElement('div');
                line.className = 'energy-line';
                const x1 = x + 50;
                const y1 = y + 50;
                const length = Math.sqrt((centerX - x1) ** 2 + (centerY - y1) ** 2);
                const angle = Math.atan2(centerY - y1, centerX - x1) * 180 / Math.PI;
                
                line.style.width = length + 'px';
                line.style.left = x1 + 'px';
                line.style.top = y1 + 'px';
                line.style.transform = 'rotate(' + angle + 'deg)';
                area.appendChild(line);
            });
        }
        
        // 初始化按钮
        function initButtons() {
            const fuseBtn = document.getElementById('fuseBtn');
            const clearBtn = document.getElementById('clearBtn');
            
            fuseBtn.addEventListener('click', function() {
                if (poolAssets.length >= 2) {
                    document.getElementById('successModal').classList.add('active');
                }
            });
            
            clearBtn.addEventListener('click', function() {
                poolAssets = [];
                document.querySelectorAll('.pool-asset').forEach(el => el.remove());
                document.querySelectorAll('.energy-line').forEach(l => l.remove());
                document.getElementById('collabHint').style.display = 'block';
                document.getElementById('collabArea').classList.remove('has-assets');
                updateUI();
            });
        }
        
        // 更新UI
        function updateUI() {
            const count = poolAssets.length;
            
            document.getElementById('assetCount').textContent = count;
            
            const power = poolAssets.reduce((sum, { assetData }) => sum + assetData.weight, 0);
            document.getElementById('fusionPower').textContent = power.toFixed(1);
            
            const fuseBtn = document.getElementById('fuseBtn');
            const clearBtn = document.getElementById('clearBtn');
            
            if (count >= 2) {
                fuseBtn.classList.add('active');
            } else {
                fuseBtn.classList.remove('active');
            }
            
            if (count > 0) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('successModal').classList.remove('active');
        }
        
        // 背景粒子
        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(0, 240, 255, 0.5)';
                
                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
