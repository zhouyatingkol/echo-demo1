<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - 完全修复版</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020208; color: #fff; font-family: 'Orbitron', 'Noto Sans SC', sans-serif; overflow: hidden; height: 100vh; }
        .stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 1; }
        .stage.active { display: block; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .nav-dots { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 100; background: rgba(0,0,0,0.4); padding: 10px 18px; border-radius: 25px; border: 1px solid rgba(0,240,255,0.1); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,240,255,0.2); border: 1px solid rgba(0,240,255,0.3); cursor: pointer; transition: all 0.3s; }
        .dot.active { background: #00f0ff; box-shadow: 0 0 15px rgba(0,240,255,0.6); }
        .glass-card { background: rgba(10, 15, 30, 0.85); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 24px; backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
        .btn { padding: 14px 36px; border: 1px solid rgba(0,240,255,0.4); background: linear-gradient(135deg, rgba(0,240,255,0.1), rgba(0,100,200,0.05)); color: #00f0ff; font-family: 'Orbitron', sans-serif; font-size: 13px; letter-spacing: 2px; cursor: pointer; border-radius: 12px; transition: all 0.3s; }
        .btn:hover { box-shadow: 0 0 30px rgba(0,240,255,0.4); }
        .btn-gold { border-color: rgba(255,215,0,0.4); color: #ffd700; background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(200,150,0,0.05)); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="nav-dots"><div class="dot active" onclick="goTo(0)"></div><div class="dot" onclick="goTo(1)"></div><div class="dot" onclick="goTo(2)"></div><div class="dot" onclick="goTo(3)"></div><div class="dot" onclick="goTo(4)"></div></div>
    
    <div class="stage active" id="stage0">
        <div style="display: flex; align-items: center; justify-content: center; height: 100vh;">
            <div class="glass-card" style="padding: 70px 100px; text-align: center; border-color: rgba(255,215,0,0.2);">
                <h1 style="font-size: 48px; letter-spacing: 10px; margin-bottom: 20px; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.6);">ECHO PROTOCOL</h1>
                <div style="font-size: 16px; color: rgba(200,220,240,0.8); margin-bottom: 40px; letter-spacing: 3px;">价值溯源：一款新药的数字旅程</div>
                <button class="btn btn-gold" onclick="goTo(1)">开始探索</button>
            </div>
        </div>
    </div>
    
    <div class="stage" id="stage1">
        <div style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 100; background: rgba(10, 15, 30, 0.8); padding: 12px 30px; border-radius: 30px; border: 1px solid rgba(0, 240, 255, 0.2);">
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(0)">开场</div>
            <div style="font-size: 12px; color: #00f0ff; cursor: pointer;">资产铸造</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(2)">协作衍生</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(3)">融资决策</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(4)">价值分配</div>
        </div>
        <div style="height: 100vh; display: flex; padding: 80px 25px 30px; gap: 25px;">
            <div style="width: 320px; background: rgba(10, 15, 30, 0.85); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 24px; padding: 25px;">
                <div style="color: #00f0ff; font-size: 18px; letter-spacing: 3px;">⬡ 资产分子库</div>
                <div id="assetGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;"></div>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div style="width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; font-size: 150px; border: 2px dashed rgba(0, 240, 255, 0.3); border-radius: 50%;">🧬</div>
                <div style="text-align: center; margin-top: 30px;">
                    <div id="previewId" style="font-family: 'Orbitron', sans-serif; font-size: 28px; letter-spacing: 4px;">选择资产</div>
                    <button class="btn" id="mintBtn" onclick="mintAsset()">开始铸造</button>
                </div>
            </div>
            <div style="width: 320px; background: rgba(10, 15, 30, 0.85); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 24px; padding: 25px;">
                <div style="color: #ffd700; font-size: 16px; letter-spacing: 3px; text-align: center; margin-bottom: 20px;">⬡ 权属蓝图</div>
                <div id="ownershipInfo" style="color: rgba(150,170,200,0.8);">选择一个资产查看权属信息</div>
            </div>
        </div>
    </div>
    
    <div class="stage" id="stage2">
        <div style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 100; background: rgba(10, 15, 30, 0.8); padding: 12px 30px; border-radius: 30px; border: 1px solid rgba(0, 240, 255, 0.2);">
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(0)">开场</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(1)">资产铸造</div>
            <div style="font-size: 12px; color: #00f0ff; cursor: pointer;">协作衍生</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(3)">融资决策</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(4)">价值分配</div>
        </div>
        <div style="height: 100vh; display: flex; padding: 80px 25px 30px; gap: 25px;">
            <div style="width: 280px; background: rgba(10, 15, 30, 0.85); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 24px; padding: 20px;">
                <div style="color: #00f0ff; font-size: 16px;">⬡ 已铸造资产</div>
                <div id="fusionAssetsList" style="margin-top: 15px;"></div>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column;">
                <div id="collabArea" style="flex: 1; border: 2px dashed rgba(255, 215, 0, 0.3); border-radius: 30px; position: relative;">
                    <div id="collabHint" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: rgba(150, 170, 200, 0.5);">
                        <div style="font-size: 80px;">⬡</div><div>拖拽资产到此处</div>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 18px 28px; background: rgba(10, 15, 30, 0.9); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 20px; margin-top: 20px;">
                    <div>已选: <span id="assetCount">0</span></div>
                    <div>
                        <button id="clearBtn" onclick="clearPool()" style="padding: 12px 25px; background: transparent; border: 1px solid rgba(255, 71, 87, 0.3); color: rgba(255, 100, 100, 0.8); cursor: pointer; border-radius: 25px; margin-right: 10px;">清空</button>
                        <button id="fuseBtn" onclick="performFusion()" style="padding: 14px 40px; border: 2px solid rgba(255, 215, 0, 0.4); background: rgba(255, 215, 0, 0.15); color: #ffd700; cursor: pointer; border-radius: 30px;">开始融合</button>
                    </div>
                </div>
            </div>
            <div style="width: 300px; background: rgba(10, 15, 30, 0.85); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 24px; padding: 22px;">
                <div style="color: #ffd700; font-size: 18px; text-align: center;">⬡ 融合权属</div>
                <div id="fusionOwnership">拖拽资产查看权属</div>
            </div>
        </div>
    </div>
    
    <div class="stage" id="stage3">
        <div style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 100; background: rgba(10, 15, 30, 0.8); padding: 12px 30px; border-radius: 30px; border: 1px solid rgba(0, 240, 255, 0.2);">
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(0)">开场</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(1)">资产铸造</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(2)">协作衍生</div>
            <div style="font-size: 12px; color: #00f0ff; cursor: pointer;">融资决策</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(4)">价值分配</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
            <h2 style="color: #00f0ff; font-size: 32px;">风险融资抉择</h2>
            <div style="display: flex; gap: 40px; margin-top: 40px;">
                <div class="glass-card" style="padding: 40px; text-align: center; opacity: 0.5;"><div>传统融资</div><div>股权稀释</div></div>
                <div class="glass-card" style="padding: 40px; text-align: center; border-color: rgba(255,215,0,0.3);"><div style="color: #ffd700;">ECHO融资</div><div style="color: #ffd700;">收益权代币化</div></div>
            </div>
            <button class="btn" onclick="goTo(4)" style="margin-top: 40px;">进入价值分配网络 →</button>
        </div>
    </div>
    
    <div class="stage" id="stage4">
        <div style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; z-index: 100; background: rgba(10, 15, 30, 0.8); padding: 12px 30px; border-radius: 30px; border: 1px solid rgba(0, 240, 255, 0.2);">
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(0)">开场</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(1)">资产铸造</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(2)">协作衍生</div>
            <div style="font-size: 12px; color: rgba(150, 170, 200, 0.7); cursor: pointer;" onclick="goTo(3)">融资决策</div>
            <div style="font-size: 12px; color: #00f0ff; cursor: pointer;">价值分配</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
            <div class="glass-card" style="padding: 60px; text-align: center;">
                <div style="font-size: 60px;">⬡</div>
                <h2 style="color: #ffd700;">价值分配网络</h2>
                <p style="color: rgba(200,220,240,0.6);">当新药成功上市，价值沿链条逆流而上</p>
                <button class="btn btn-gold" onclick="goTo(0)">重新开始 →</button>
            </div>
        </div>
    </div>
    
    <div id="fusionModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center;">
        <div class="glass-card" style="padding: 60px; text-align: center; border-color: rgba(255,215,0,0.4);">
            <div style="font-size: 60px;">✨</div>
            <div style="font-size: 24px; color: #ffd700;">融合成功</div>
            <button class="btn" onclick="closeModal()" style="margin-top: 20px;">关闭</button>
        </div>
    </div>

    <script>
        const assets = [
            { id: 'PDB-001', name: '蛋白质结构', icon: '🧬', color: '#00f0ff', minted: false },
            { id: 'CHEM-002', name: '化合物库', icon: '⚗️', color: '#00ff88', minted: false },
            { id: 'GENE-003', name: '基因序列', icon: '🧪', color: '#0088ff', minted: false },
            { id: 'VSCREEN-004', name: '虚拟筛选', icon: '💻', color: '#88ffcc', minted: false },
            { id: 'ASSAY-005', name: '实验数据', icon: '📊', color: '#a29bfe', minted: false },
            { id: 'CLINICAL-006', name: '临床数据', icon: '🏥', color: '#ffa502', minted: false },
        ];
        
        let currentStage = 0;
        let selectedAsset = null;
        let draggedAsset = null;
        let poolAssets = [];
        
        // 页面切换 - 最基本的函数
        function goTo(index) {
            console.log('goTo called:', index);
            if (index < 0 || index > 4) return;
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById('stage' + index).classList.add('active');
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === index));
            currentStage = index;
            
            if (index === 1) initStage1();
            if (index === 2) initStage2();
        }
        
        // Stage 1
        function initStage1() {
            const grid = document.getElementById('assetGrid');
            grid.innerHTML = '';
            assets.forEach((asset, i) => {
                const card = document.createElement('div');
                card.style.cssText = 'background: rgba(0,0,0,0.4); border: 2px solid ' + asset.color + '; border-radius: 16px; padding: 15px; text-align: center; cursor: pointer;';
                if (asset.minted) card.style.boxShadow = '0 0 30px rgba(255,215,0,0.3)';
                card.innerHTML = '<div style="font-size: 40px;">' + asset.icon + '</div><div style="font-size: 11px; font-family: Orbitron;">' + asset.id + '</div><div style="font-size: 11px;">' + asset.name + '</div>';
                card.onclick = () => selectAsset(asset);
                grid.appendChild(card);
            });
        }
        
        function selectAsset(asset) {
            selectedAsset = asset;
            document.getElementById('previewId').textContent = asset.id + ' - ' + asset.name;
            document.getElementById('ownershipInfo').innerHTML = '<div style="color: ' + asset.color + ';">' + asset.icon + ' ' + asset.id + '</div><div>' + asset.name + '</div>';
        }
        
        function mintAsset() {
            console.log('mintAsset called');
            if (selectedAsset) {
                selectedAsset.minted = true;
                initStage1();
                alert('铸造成功: ' + selectedAsset.id);
            } else {
                alert('请先选择资产');
            }
        }
        
        // Stage 2
        function initStage2() {
            const list = document.getElementById('fusionAssetsList');
            list.innerHTML = '';
            const minted = assets.filter(a => a.minted);
            
            if (minted.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(150,170,200,0.5);">请先铸造资产</div>';
                return;
            }
            
            minted.forEach(asset => {
                const item = document.createElement('div');
                item.style.cssText = 'display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: grab; margin-bottom: 10px;';
                item.draggable = true;
                item.innerHTML = '<div style="width: 45px; height: 45px; border-radius: 10px; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 28px;">' + asset.icon + '</div><div><div>' + asset.name + '</div><div style="font-size: 10px; color: ' + asset.color + ';">' + asset.id + '</div></div>';
                
                item.ondragstart = () => { draggedAsset = asset; item.style.opacity = '0.5'; };
                item.ondragend = () => { item.style.opacity = '1'; draggedAsset = null; };
                list.appendChild(item);
            });
        }
        
        // 拖拽区域
        const collabArea = document.getElementById('collabArea');
        if (collabArea) {
            collabArea.ondragover = (e) => { e.preventDefault(); collabArea.style.borderColor = 'rgba(255, 215, 0, 0.6)'; };
            collabArea.ondragleave = () => { collabArea.style.borderColor = 'rgba(255, 215, 0, 0.3)'; };
            collabArea.ondrop = (e) => {
                e.preventDefault();
                collabArea.style.borderColor = 'rgba(255, 215, 0, 0.3)';
                if (draggedAsset) {
                    if (poolAssets.find(a => a.id === draggedAsset.id)) {
                        alert('该资产已在池中');
                        return;
                    }
                    poolAssets.push(draggedAsset);
                    updatePool();
                }
            };
        }
        
        function updatePool() {
            document.getElementById('assetCount').textContent = poolAssets.length;
            
            // 更新池显示
            document.querySelectorAll('.pool-asset').forEach(el => el.remove());
            poolAssets.forEach((asset, i) => {
                const el = document.createElement('div');
                el.className = 'pool-asset';
                el.style.cssText = 'position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 2px solid ' + asset.color + '; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; font-size: 40px; left: ' + (50 + i * 100) + 'px; top: 50px;';
                el.innerHTML = asset.icon;
                collabArea.appendChild(el);
            });
            
            if (poolAssets.length > 0) {
                document.getElementById('collabHint').style.display = 'none';
            }
        }
        
        function clearPool() {
            console.log('clearPool called');
            poolAssets = [];
            document.querySelectorAll('.pool-asset').forEach(el => el.remove());
            document.getElementById('collabHint').style.display = 'block';
            document.getElementById('assetCount').textContent = '0';
        }
        
        function performFusion() {
            console.log('performFusion called, pool size:', poolAssets.length);
            if (poolAssets.length >= 2) {
                document.getElementById('fusionModal').style.display = 'flex';
            } else {
                alert('请至少选择2个资产');
            }
        }
        
        function closeModal() {
            document.getElementById('fusionModal').style.display = 'none';
        }
        
        console.log('Script loaded successfully');
    </script>
</body>
</html>
