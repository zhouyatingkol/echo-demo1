<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - 简洁可用版</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020208;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        .stage {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            padding: 60px 40px 100px;
        }
        .stage.active { display: flex; flex-direction: column; }
        
        /* 导航 */
        .nav-dots {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: rgba(0,240,255,0.3);
            border: 1px solid rgba(0,240,255,0.5);
            cursor: pointer;
        }
        .dot.active { background: #00f0ff; box-shadow: 0 0 15px rgba(0,240,255,0.6); }
        
        /* Stage 0 */
        .center-box {
            margin: auto;
            text-align: center;
            padding: 60px 80px;
            background: rgba(10,15,30,0.9);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 24px;
        }
        .title { font-size: 42px; color: #ffd700; letter-spacing: 8px; margin-bottom: 20px; }
        .subtitle { color: rgba(200,220,240,0.7); margin-bottom: 30px; }
        .btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(0,100,200,0.1));
            border: 1px solid rgba(0,240,255,0.4);
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,240,255,0.3); }
        
        /* Stage 1 & 2 布局 */
        .main-layout {
            display: flex;
            flex: 1;
            gap: 20px;
        }
        .sidebar {
            width: 280px;
            background: rgba(10,15,30,0.9);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 16px;
            padding: 20px;
        }
        .sidebar-title { color: #00f0ff; font-size: 16px; margin-bottom: 15px; }
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* 资产卡片 */
        .asset-card {
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .asset-card:hover {
            border-color: rgba(0,240,255,0.4);
            transform: translateX(5px);
        }
        .asset-card.selected {
            border-color: #00f0ff;
            box-shadow: 0 0 15px rgba(0,240,255,0.3);
        }
        .asset-icon { font-size: 32px; margin-bottom: 8px; }
        .asset-name { font-size: 13px; }
        
        /* 铸造台 */
        .forge-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .forge-circle {
            width: 280px; height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,240,255,0.2) 0%, transparent 70%);
            border: 2px solid rgba(0,240,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            margin-bottom: 30px;
        }
        
        /* 协作池 */
        .pool-area {
            flex: 1;
            border: 2px dashed rgba(255,215,0,0.3);
            border-radius: 20px;
            position: relative;
            margin-bottom: 20px;
            min-height: 300px;
        }
        .pool-hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(150,170,200,0.5);
        }
        .pool-item {
            position: absolute;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(0,0,0,0.8);
            border: 2px solid;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: move;
        }
        .pool-item-icon { font-size: 28px; }
        .pool-item-id { font-size: 9px; margin-top: 2px; }
        .pool-item-remove {
            position: absolute;
            top: -5px; right: -5px;
            width: 22px; height: 22px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .pool-item:hover .pool-item-remove { opacity: 1; }
        
        /* 控制栏 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(10,15,30,0.9);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
        }
        .stats { display: flex; gap: 30px; }
        .stat { text-align: center; }
        .stat-value { font-size: 24px; color: #ffd700; }
        .stat-label { font-size: 10px; color: rgba(150,170,200,0.6); }
        
        .fuse-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(200,150,0,0.1));
            border: 2px solid rgba(255,215,0,0.4);
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            cursor: not-allowed;
            border-radius: 25px;
            opacity: 0.4;
            pointer-events: none;
        }
        .fuse-btn.enabled {
            opacity: 1;
            cursor: pointer;
            pointer-events: auto;
        }
        .fuse-btn.enabled:hover {
            box-shadow: 0 0 30px rgba(255,215,0,0.4);
            transform: translateY(-2px);
        }
        
        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-box {
            padding: 50px 70px;
            background: rgba(10,15,30,0.95);
            border: 2px solid rgba(0,240,255,0.4);
            border-radius: 24px;
            text-align: center;
        }
        .modal-title { font-size: 28px; color: #00f0ff; margin-bottom: 15px; }
        .modal-text { color: rgba(200,220,240,0.7); margin-bottom: 25px; }
        .modal-result {
            font-size: 22px;
            color: #00f0ff;
            padding: 12px 30px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            margin-bottom: 25px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <div class="nav-dots">
        <div class="dot active" onclick="goTo(0)"></div>
        <div class="dot" onclick="goTo(1)"></div>
        <div class="dot" onclick="goTo(2)"></div>
    </div>
    
    <!-- Stage 0 -->
    <div class="stage active" id="stage0">
        <div class="center-box">
            <div class="title">ECHO</div>
            <div class="subtitle">科学数据资产化协作平台</div>
            <button class="btn" onclick="goTo(1)">开始体验</button>
        </div>
    </div>
    
    <!-- Stage 1: 铸造 -->
    <div class="stage" id="stage1">
        <div class="main-layout">
            <div class="sidebar">
                <div class="sidebar-title">数据资产库</div>
                <div id="assetList"></div>
            </div>
            <div class="main-area">
                <div class="forge-area">
                    <div class="forge-circle" id="preview">⬡</div>
                    <button class="btn" id="mintBtn" onclick="doMint()" style="opacity:0.4;pointer-events:none;">铸造资产</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Stage 2: 融合 -->
    <div class="stage" id="stage2">
        <div class="main-layout">
            <div class="sidebar">
                <div class="sidebar-title" style="color:#ffd700">已铸造资产</div>
                <div style="font-size:11px;color:rgba(150,170,200,0.6);margin-bottom:10px;">点击资产添加到协作池</div>
                <div id="mintedList"></div>
            </div>
            
            <div class="main-area">
                <div class="pool-area" id="poolArea" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="pool-hint" id="poolHint">
                        <div style="font-size:50px;margin-bottom:10px;">⬡</div>
                        <div>拖拽资产到此处</div>
                    </div>
                </div>
                
                <div class="control-bar">
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="count">0</div>
                            <div class="stat-label">已选</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="power">0</div>
                            <div class="stat-label">融合力</div>
                        </div>
                    </div>
                    <button class="fuse-btn" id="fuseBtn">开始融合</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-title">✅ 成功</div>
            <div class="modal-text" id="modalText">资产已创建</div>
            <div class="modal-result" id="modalResult">---</div>
            <button class="btn" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        // 数据
        const assets = [
            { id: 'PDB-001', name: '蛋白质结构', icon: '🧬', color: '#00f0ff', weight: 1.2 },
            { id: 'CHEM-002', name: '化合物库', icon: '⚗️', color: '#00ff88', weight: 1.0 },
            { id: 'GENE-003', name: '基因序列', icon: '🧪', color: '#0088ff', weight: 1.5 },
            { id: 'SCREEN-004', name: '虚拟筛选', icon: '💻', color: '#88ffcc', weight: 0.8 },
            { id: 'ASSAY-005', name: '实验数据', icon: '📊', color: '#a29bfe', weight: 1.3 }
        ];
        
        let selected = null;
        let minted = [];
        let pool = [];
        let dragItem = null;
        
        // 初始化
        function init() {
            const list = document.getElementById('assetList');
            assets.forEach(a => {
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `<div class="asset-icon">${a.icon}</div><div class="asset-name">${a.name}</div>`;
                card.onclick = () => select(a, card);
                list.appendChild(card);
            });
            
            // 绑定融合按钮
            document.getElementById('fuseBtn').onclick = doFusion;
        }
        
        // 选择资产
        function select(asset, card) {
            document.querySelectorAll('.asset-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selected = asset;
            document.getElementById('preview').textContent = asset.icon;
            document.getElementById('preview').style.color = asset.color;
            document.getElementById('preview').style.borderColor = asset.color;
            document.getElementById('mintBtn').style.opacity = '1';
            document.getElementById('mintBtn').style.pointerEvents = 'auto';
        }
        
        // 铸造
        function doMint() {
            if (!selected) return;
            minted.push(selected);
            document.getElementById('modalResult').textContent = selected.id;
            document.getElementById('modal').classList.add('show');
            updateMintedList();
        }
        
        // 更新已铸造列表
        function updateMintedList() {
            const list = document.getElementById('mintedList');
            list.innerHTML = '';
            minted.forEach(a => {
                const item = document.createElement('div');
                item.className = 'asset-card';
                item.innerHTML = `<div class="asset-icon">${a.icon}</div><div class="asset-name">${a.name}</div>`;
                item.onclick = () => addToPool(a);
                list.appendChild(item);
            });
        }
        
        // 拖拽
        function allowDrop(e) { e.preventDefault(); }
        function drop(e) {
            e.preventDefault();
            if (!dragItem) return;
            if (pool.find(p => p.id === dragItem.id)) return;
            
            addToPool(dragItem);
            dragItem = null;
        }
        
        function addToPool(asset) {
            pool.push(asset);
            document.getElementById('poolHint').style.display = 'none';
            
            const item = document.createElement('div');
            item.className = 'pool-item';
            item.style.borderColor = asset.color;
            item.style.color = asset.color;
            item.style.left = (50 + Math.random() * 300) + 'px';
            item.style.top = (50 + Math.random() * 150) + 'px';
            item.innerHTML = `
                <div class="pool-item-icon">${asset.icon}</div>
                <div class="pool-item-id">${asset.id}</div>
                <div class="pool-item-remove" onclick="removeFromPool('${asset.id}')">×</div>
            `;
            document.getElementById('poolArea').appendChild(item);
            
            updateStats();
        }
        
        function removeFromPool(id) {
            pool = pool.filter(p => p.id !== id);
            document.querySelectorAll('.pool-item').forEach(el => {
                if (el.querySelector('.pool-item-id').textContent === id) el.remove();
            });
            if (pool.length === 0) document.getElementById('poolHint').style.display = 'block';
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('count').textContent = pool.length;
            const power = pool.reduce((s, p) => s + p.weight, 0);
            document.getElementById('power').textContent = power.toFixed(1);
            
            const btn = document.getElementById('fuseBtn');
            if (pool.length >= 2) {
                btn.classList.add('enabled');
            } else {
                btn.classList.remove('enabled');
            }
        }
        
        function doFusion() {
            if (pool.length < 2) return;
            document.getElementById('modalText').textContent = '融合成功！新资产已生成';
            document.getElementById('modalResult').textContent = 'NeuroBlok-v2';
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        function goTo(n) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById('stage' + n).classList.add('active');
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === n));
            if (n === 2) updateMintedList();
        }
        
        // 启动
        init();
    </script>
</body>
</html>
