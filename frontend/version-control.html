<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版本控制 - ECHO V2</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding-top: 64px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 14px; }
        
        .wallet-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .wallet-btn {
            padding: 10px 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .wallet-btn.connected {
            background: rgba(0,255,0,0.2);
            border: 1px solid #0f0;
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .panel-title { font-size: 18px; margin-bottom: 16px; color: #00d4ff; }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover { opacity: 0.9; }
        
        .version-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #00d4ff;
        }
        .version-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .version-number { font-size: 18px; font-weight: bold; color: #00d4ff; }
        .version-current {
            font-size: 11px;
            padding: 4px 8px;
            background: #00d4ff;
            color: #000;
            border-radius: 4px;
        }
        .version-time { font-size: 12px; color: #888; }
        .version-reason { margin-top: 8px; }
        .version-hash {
            margin-top: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            word-break: break-all;
        }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; }
        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .hidden { display: none !important; }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
        }
        .status.success { background: rgba(0,255,0,0.1); color: #0f0; }
        .status.error { background: rgba(255,0,0,0.1); color: #f55; }
        .status.pending { background: rgba(255,215,0,0.1); color: #ffd700; }
    </style>
  <script src="../../scripts/theme-switcher.js" defer></script>
  <script src="../../scripts/i18n.js" defer></script>
  <link rel="stylesheet" href="../../assets/styles/global.css"
  <link rel="stylesheet" href="../../assets/styles/theme.css">
  <link rel="stylesheet" href="../../assets/styles/mobile.css">
  <script src="../../scripts/wallet-state.js" defer></script>
</head>
<body><nav class="main-nav" style="position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;"><div style="max-width: 1400px; margin: 0 auto; height: 100%; display: flex; align-items: center; padding: 0 20px; gap: 30px;"><a href="../pages/index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 20px; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎵 ECHO Music</a><div style="display: flex; gap: 8px; flex: 1;"><a href="../pages/market/discover.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">发现</a><a href="../pages/market/music-market.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">市场</a><a href="../pages/market/charts.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">榜单</a><a href="../pages/creator/mint-music.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">生成</a><a href="../pages/user/dashboard.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">收益</a></div><div style="display: flex; align-items: center; gap: 12px;"><a href="../pages/user/my-favorites.html" style="padding: 8px; text-decoration: none; font-size: 18px;">❤️</a><button style="padding: 8px 20px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer;" id="connectBtn">连接钱包</button></div></div></nav>
    <div class="container">
        <h1>📜 版本控制</h1>
        <p class="subtitle">查看资产版本历史，创作者可发布新版本</p>

        <div class="wallet-section">
            <button class="wallet-btn" id="connectWalletBtn" id="connectBtn">🔌 连接钱包</button>
        </div>

        <div class="panel">
            <div class="panel-title">🔍 查询资产版本</div>
            
            <div class="search-box">
                <input type="text" class="search-input" id="tokenId" placeholder="输入 Token ID">
                <button class="btn" onclick="loadVersionHistory()">查询</button>
            </div>
            
            <div id="versionList"></div>
        </div>

        <div class="panel hidden" id="updatePanel">
            <div class="panel-title">🔄 发布新版本（仅创作者）</div>
            
            <div class="form-group">
                <label class="form-label">新 IPFS 地址</label>
                <input type="text" class="form-input" id="newUri" placeholder="ipfs://...">
            </div>
            
            <div class="form-group">
                <label class="form-label">新内容哈希</label>
                <input type="text" class="form-input" id="newHash" placeholder="0x...">
            </div>
            
            <div class="form-group">
                <label class="form-label">更新原因</label>
                <input type="text" class="form-input" id="updateReason" placeholder="描述此次更新...">
            </div>
            
            <button class="btn" onclick="publishUpdate()">🚀 发布新版本</button>
            
            <div id="updateStatus"></div>
        </div>
    </div>

    <script>
        const V2_CONTRACT_ADDRESS = '0xF98f63b7e8064Dcf9c2f25A906B2af89Af4840ce';
        const V2_ABI = [
            "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)",
            "function getVersionHistory(uint256 tokenId) view returns (tuple(uint256 version, bytes32 contentHash, string uri, uint256 timestamp, string updateReason)[])",
            "function currentVersion(uint256 tokenId) view returns (uint256)",
            "function originalCreator(uint256 tokenId) view returns (address)",
            "function updateContent(uint256 tokenId, string newUri, bytes32 newContentHash, string updateReason)"
        ];
        
        let provider, signer, contract, userAddress;
        let isConnected = false;
        let currentTokenId = null;

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                showStatus('请先安装 MetaMask 钱包！', 'error');
                return;
            }
            
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts.length === 0) return;
                
                userAddress = accounts[0];
                isConnected = true;
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
                
                document.getElementById('connectWalletBtn').textContent = 
                    '已连接: ' + userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                document.getElementById('connectWalletBtn').classList.add('connected');
                
                showStatus('✅ 钱包已连接', 'success');
            } catch (error) {
                showStatus('连接失败: ' + error.message, 'error');
            }
        }

        async function loadVersionHistory() {
            const tokenId = document.getElementById('tokenId').value;
            if (!tokenId) {
                showStatus('请输入 Token ID', 'error');
                return;
            }
            
            try {
                showStatus('加载中...', 'pending');
                
                // 使用 provider 读取（不需要签名）
                const readContract = contract || new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, 
                    provider || new ethers.providers.Web3Provider(window.ethereum));
                
                const [metadata, , creator, currentVer] = await readContract.getAssetInfo(tokenId);
                const history = await readContract.getVersionHistory(tokenId);
                
                currentTokenId = tokenId;
                
                let html = `<div style="margin-bottom: 16px;">
                    <strong>资产: ${metadata.name}</strong> 
                    <span style="color: #888;">(当前版本 v${currentVer})</span>
                </div>`;
                
                history.forEach((ver, index) => {
                    const isCurrent = index === 0;
                    const date = new Date(ver.timestamp * 1000).toLocaleString();
                    
                    html += `
                        <div class="version-card">
                            <div class="version-header">
                                <span class="version-number">版本 ${ver.version}</span>
                                ${isCurrent ? '<span class="version-current">当前</span>' : ''}
                            </div>
                            <div class="version-time">${date}</div>
                            <div class="version-reason">${ver.updateReason}</div>
                            <div class="version-hash">${ver.contentHash}</div>
                        </div>
                    `;
                });
                
                document.getElementById('versionList').innerHTML = html;
                
                // 如果是创作者，显示更新面板
                if (isConnected && creator.toLowerCase() === userAddress.toLowerCase()) {
                    document.getElementById('updatePanel').classList.remove('hidden');
                }
                
                showStatus('', '');
            } catch (error) {
                showStatus('加载失败: ' + error.message, 'error');
            }
        }

        async function publishUpdate() {
            if (!isConnected || !currentTokenId) {
                showStatus('请先连接钱包并查询资产', 'error');
                return;
            }
            
            try {
                const newUri = document.getElementById('newUri').value;
                const newHash = document.getElementById('newHash').value;
                const reason = document.getElementById('updateReason').value;
                
                if (!newHash || !reason) {
                    showStatus('请填写完整信息', 'error');
                    return;
                }
                
                showStatus('发布中...请确认交易', 'pending');
                
                const tx = await contract.updateContent(currentTokenId, newUri, newHash, reason);
                await tx.wait();
                
                showStatus('✅ 新版本发布成功！', 'success');
                
                // 刷新列表
                loadVersionHistory();
                
                // 清空表单
                document.getElementById('newUri').value = '';
                document.getElementById('newHash').value = '';
                document.getElementById('updateReason').value = '';
                
            } catch (error) {
                showStatus('发布失败: ' + error.message, 'error');
            }
        }

        function showStatus(msg, type) {
            const statusEl = document.getElementById('versionList');
            if (msg && type === 'error') {
                statusEl.innerHTML = `<div class="status error">${msg}</div>`;
            } else if (msg && type === 'pending') {
                statusEl.innerHTML = `<div class="status pending">${msg}</div>`;
            } else if (msg && type === 'success') {
                // 显示在页面其他地方
            }
        }
    </script>
</body>
</html>
