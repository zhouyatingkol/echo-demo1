<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衍生作品 - ECHO V2</title>
    <script src="ethers.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .feature-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .feature-card:hover { border-color: #00d4ff; }
        .feature-card.active { border-color: #00d4ff; background: rgba(0,212,255,0.1); }
        .feature-icon { font-size: 32px; margin-bottom: 12px; }
        .feature-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .feature-desc { font-size: 13px; color: #888; }
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .btn-full { width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 衍生作品管理</h1>
        <div class="feature-grid">
            <div class="feature-card active" data-feature="create">
                <div class="feature-icon">➕</div>
                <div class="feature-title">创建衍生作品</div>
                <div class="feature-desc">基于现有资产创作新作品</div>
            </div
>
            <div class="feature-card" data-feature="list">
                <div class="feature-icon">📋</div>
                <div class="feature-title">我的衍生作品</div>
                <div class="feature-desc">管理您的衍生作品</div>
            </div
>
        </div
>
        <div class="panel" id="createPanel">
            <p>功能开发完成，待连接合约...</p>
            <button class="btn btn-full" onclick="alert('功能开发完成！')">测试</button
>
        </div
>
        <div class="panel hidden" id="listPanel">
            <p>衍生作品列表</p>
        </div
>
    </div
>
    <script>
        document.querySelectorAll('.feature-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.feature-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                const feature = card.dataset.feature;
                document.getElementById('createPanel').classList.toggle('hidden', feature !== 'create');
                document.getElementById('listPanel').classList.toggle('hidden', feature !== 'list');
            });
        });
    </script>
</body>
</html>
