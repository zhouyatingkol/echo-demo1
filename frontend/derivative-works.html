<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>衍生作品 - ECHO V2</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding-top: 64px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 14px; }
        
        /* 钱包连接 */
        .wallet-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .wallet-btn {
            padding: 10px 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .wallet-btn.connected {
            background: rgba(0,255,0,0.2);
            border: 1px solid #0f0;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .feature-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .feature-card:hover { border-color: #00d4ff; }
        .feature-card.active { border-color: #00d4ff; background: rgba(0,212,255,0.1); }
        .feature-icon { font-size: 32px; margin-bottom: 12px; }
        .feature-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
        .feature-desc { font-size: 13px; color: #888; }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .panel-title { font-size: 18px; margin-bottom: 16px; color: #00d4ff; }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; }
        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-full { width: 100%; }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .hidden { display: none !important; }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
        }
        .status.success { background: rgba(0,255,0,0.1); color: #0f0; }
        .status.error { background: rgba(255,0,0,0.1); color: #f55; }
        .status.pending { background: rgba(255,215,0,0.1); color: #ffd700; }
        
        .asset-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .asset-card-title { font-weight: bold; margin-bottom: 8px; }
        .asset-card-meta { font-size: 12px; color: #888; }
    </style>
  <script src="js/theme-switcher.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <link rel="stylesheet" href="css/global.css"
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/mobile.css">
  <script src="js/wallet-state.js" defer></script>
</head>
<body><nav class="main-nav" style="position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;"><div style="max-width: 1400px; margin: 0 auto; height: 100%; display: flex; align-items: center; padding: 0 20px; gap: 30px;"><a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 20px; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎵 ECHO Music</a><div style="display: flex; gap: 8px; flex: 1;"><a href="discover.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">发现</a><a href="music-market.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">市场</a><a href="charts.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">榜单</a><a href="mint-music.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">生成</a><a href="dashboard.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">收益</a></div><div style="display: flex; align-items: center; gap: 12px;"><a href="my-favorites.html" style="padding: 8px; text-decoration: none; font-size: 18px;">❤️</a><button style="padding: 8px 20px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer;" id="connectBtn">连接钱包</button></div></div></nav>
    <div class="container">
        <h1>🌱 衍生作品管理</h1>
        <p class="subtitle">基于父资产创建新作品，自动分配收益</p>

        <!-- 钱包连接 -->
        <div class="wallet-section">
            <button class="wallet-btn" id="connectWalletBtn" id="connectBtn">🔌 连接钱包</button>
        </div>

        <div class="feature-grid">
            <div class="feature-card active" data-feature="create" onclick="switchTab('create')">
                <div class="feature-icon">➕</div>
                <div class="feature-title">创建衍生作品</div>
                <div class="feature-desc">基于现有资产创作新作品</div>
            </div>
            <div class="feature-card" data-feature="list" onclick="switchTab('list')">
                <div class="feature-icon">📋</div>
                <div class="feature-title">我的衍生作品</div>
                <div class="feature-desc">管理您的衍生作品</div>
            </div>
        </div>

        <!-- 创建衍生作品 -->
        <div class="panel" id="createPanel">
            <div class="panel-title">➕ 创建衍生作品</div>
            
            <div class="form-group">
                <label class="form-label">父资产 Token ID</label>
                <input type="text" class="form-input" id="parentTokenId" placeholder="输入父资产的 Token ID">
            </div>
            
            <button class="btn" onclick="loadParentAsset()">🔍 查询父资产</button>
            
            <div id="parentInfo" class="hidden" style="margin-top: 20px;">
                <div class="asset-card">
                    <div class="asset-card-title" id="parentName">--</div>
                    <div class="asset-card-meta" id="parentMeta">--</div>
                </div>
                
                <div class="form-group" style="margin-top: 16px;">
                    <label class="form-label">衍生作品名称</label>
                    <input type="text" class="form-input" id="derivativeName" placeholder="例如：基于XXX的改进版">
                </div>
                
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <input type="text" class="form-input" id="derivativeDesc" placeholder="描述您的衍生作品...">
                </div>
                
                <div class="form-group">
                    <label class="form-label">IPFS 地址</label>
                    <input type="text" class="form-input" id="derivativeUri" placeholder="ipfs://...">
                </div>
                
                <div class="form-group">
                    <label class="form-label">内容哈希</label>
                    <input type="text" class="form-input" id="derivativeHash" placeholder="0x...">
                </div>
                
                <button class="btn btn-full" onclick="createDerivative()">🚀 创建衍生作品</button>
            </div>
            
            <div id="status"></div>
        </div>

        <!-- 我的衍生作品 -->
        <div class="panel hidden" id="listPanel">
            <div class="panel-title">📋 我的衍生作品</div>
            <div id="derivativeList">
                <p style="color: #666;">请先连接钱包查看</p>
            </div>
        </div>
    </div>

    <script>
        const V2_CONTRACT_ADDRESS = '0xF98f63b7e8064Dcf9c2f25A906B2af89Af4840ce';
        const V2_ABI = [
            "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)",
            "function createDerivative(uint256 parentId, string name, string description, string assetType, string uri, bytes32 contentHash, tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue) blueprint) payable returns (uint256)"
        ];
        
        let provider, signer, contract, userAddress;
        let isConnected = false;
        let currentParentId = null;

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.feature-card').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-feature="${tab}"]`).classList.add('active');
            
            document.getElementById('createPanel').classList.toggle('hidden', tab !== 'create');
            document.getElementById('listPanel').classList.toggle('hidden', tab !== 'list');
            
            if (tab === 'list' && isConnected) {
                loadMyDerivatives();
            }
        }

        // 连接钱包
        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                showStatus('请先安装 MetaMask 钱包！', 'error');
                return;
            }
            
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts.length === 0) return;
                
                userAddress = accounts[0];
                isConnected = true;
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
                
                document.getElementById('connectWalletBtn').textContent = 
                    '已连接: ' + userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                document.getElementById('connectWalletBtn').classList.add('connected');
                
                showStatus('✅ 钱包已连接', 'success');
            } catch (error) {
                showStatus('连接失败: ' + error.message, 'error');
            }
        }

        // 加载父资产信息
        async function loadParentAsset() {
            if (!isConnected) {
                showStatus('请先连接钱包', 'error');
                return;
            }
            
            const tokenId = document.getElementById('parentTokenId').value;
            if (!tokenId) {
                showStatus('请输入 Token ID', 'error');
                return;
            }
            
            try {
                showStatus('加载中...', 'pending');
                const [metadata, blueprint] = await contract.getAssetInfo(tokenId);
                
                currentParentId = tokenId;
                
                document.getElementById('parentName').textContent = metadata.name;
                document.getElementById('parentMeta').textContent = 
                    `类型: ${metadata.assetType} | 衍生费: ${ethers.utils.formatEther(blueprint.derivative.fee)} MEER`;
                
                document.getElementById('parentInfo').classList.remove('hidden');
                showStatus('父资产信息加载成功', 'success');
            } catch (error) {
                showStatus('加载失败: ' + error.message, 'error');
            }
        }

        // 创建衍生作品
        async function createDerivative() {
            if (!isConnected || !currentParentId) {
                showStatus('请先加载父资产信息', 'error');
                return;
            }
            
            try {
                const name = document.getElementById('derivativeName').value;
                const desc = document.getElementById('derivativeDesc').value;
                const uri = document.getElementById('derivativeUri').value;
                const hash = document.getElementById('derivativeHash').value;
                
                if (!name || !hash) {
                    showStatus('请填写完整信息', 'error');
                    return;
                }
                
                showStatus('创建中...请确认交易', 'pending');
                
                // 获取父资产的衍生费
                const [, parentBlueprint] = await contract.getAssetInfo(currentParentId);
                const fee = parentBlueprint.derivative.fee;
                
                // 简化蓝图
                const blueprint = {
                    usage: {
                        owner: userAddress,
                        fee: ethers.utils.parseEther('0.001'),
                        commercialUse: true,
                        modificationAllowed: true,
                        allowedScopes: [],
                        restrictedScopes: [],
                        maxUsers: 0,
                        licenseDuration: 0
                    },
                    derivative: {
                        owner: userAddress,
                        fee: ethers.utils.parseEther('0.01'),
                        allowDerivatives: true,
                        revenueShare: 1000,
                        allowedTypes: []
                    },
                    extension: {
                        owner: userAddress,
                        fee: 0,
                        allowExtensions: false,
                        allowedExtensions: []
                    },
                    revenue: {
                        owner: userAddress,
                        sharePercentage: 10000,
                        autoDistribute: true
                    }
                };
                
                const tx = await contract.createDerivative(
                    currentParentId, name, desc, 'code', uri, hash, blueprint,
                    { value: fee }
                );
                
                await tx.wait();
                
                showStatus('✅ 衍生作品创建成功！', 'success');
                
                // 重置表单
                document.getElementById('derivativeName').value = '';
                document.getElementById('derivativeDesc').value = '';
                document.getElementById('derivativeUri').value = '';
                document.getElementById('derivativeHash').value = '';
                
            } catch (error) {
                showStatus('创建失败: ' + error.message, 'error');
            }
        }

        // 加载我的衍生作品
        async function loadMyDerivatives() {
            // 简化实现
            document.getElementById('derivativeList').innerHTML = 
                '<p style="color: #666;">功能开发中，敬请期待...</p>';
        }

        function showStatus(msg, type) {
            document.getElementById('status').innerHTML = msg ? 
                `<div class="status ${type}">${msg}</div>` : '';
        }
    </script>
</body>
</html>
