<!-- 
  ECHO Music 统一导航栏 v2.0
  所有页面使用此统一导航，确保链接一致性
  将此代码粘贴到每个页面的 <body> 标签后的第一行
-->
<nav style="position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;">
  <div style="max-width: 1400px; margin: 0 auto; height: 100%; display: flex; align-items: center; padding: 0 20px; gap: 30px;">
    <!-- Logo -->
    <a href="../pages/index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 20px; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
      🎵 ECHO Music
    </a>
    
    <!-- 主导航链接 -->
    <div style="display: flex; gap: 8px; flex: 1;">
      <a href="../pages/market/discover.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px; transition: all 0.3s;">发现</a>
      <a href="../pages/market/music-market.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px; transition: all 0.3s;">市场</a>
      <a href="../pages/market/charts.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px; transition: all 0.3s;">榜单</a>
      <a href="../pages/creator/mint-music.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px; transition: all 0.3s;">生成</a>
      <a href="../pages/user/dashboard.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px; transition: all 0.3s;">收益</a>
      <a href="../pages/user/my-assets.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px; transition: all 0.3s;">我的资产</a>
    </div>
    
    <!-- 右侧控制区 -->
    <div style="display: flex; align-items: center; gap: 10px;">
      <!-- 主题切换 -->
      <button id="themeToggle" onclick="toggleTheme()" title="切换主题"
        style="padding: 8px 12px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; color: #fff; font-size: 16px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; min-width: 40px; height: 36px;"
        onmouseover="this.style.background='rgba(255,255,255,0.25)'" 
        onmouseout="this.style.background='rgba(255,255,255,0.15)'">
        🌓
      </button>
      
      <!-- 语言切换 -->
      <select id="langSelect" onchange="changeLanguage(this.value)"
        style="padding: 8px 28px 8px 12px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; color: #fff; font-size: 13px; cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"%3e%3cpolyline points=\"6 9 12 15 18 9\"%3e%3c/polyline%3e%3c/svg%3e'); background-repeat: no-repeat; background-position: right 8px center; background-size: 16px; height: 36px;">
        <option value="zh" style="background: #1a1a2e; color: #fff;">中文</option>
        <option value="en" style="background: #1a1a2e; color: #fff;">EN</option>
      </select>
      
      <!-- 收藏按钮 -->
      <a href="../pages/user/my-favorites.html" style="padding: 8px; text-decoration: none; font-size: 18px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">❤️</a>
      
      <!-- 钱包按钮 -->
      <button id="connectBtn" onclick="if(window.walletManager && walletManager.isWalletConnected()){walletManager.disconnect();}else{walletManager.connect();}"
        style="padding: 8px 20px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; transition: all 0.3s; font-weight: 500; white-space: nowrap; height: 36px;"
        onmouseover="this.style.opacity='0.9'; this.style.transform='translateY(-1px)'" 
        onmouseout="this.style.opacity='1'; this.style.transform='none'">
        连接钱包
      </button>
    </div>
  </div>
</nav>

<!-- 页面内容顶部留白 (在导航栏下方) -->
<div style="height: 80px;"></div>

  导航链接说明：
  - index.html: 首页
  - discover.html: 发现音乐
  - music-market.html: 音乐市场
  - charts.html: 榜单
  - mint-music.html: 生成音乐
  - dashboard.html: 创作者收益面板
  - my-assets.html: 我的资产 (License ECHO)
  - my-favorites.html: 我的收藏
  - profile.html: 个人资料
  - license-shop.html: 授权商店

-->
