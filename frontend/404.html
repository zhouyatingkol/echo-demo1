<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 | ECHO Music</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,26,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 1000;
    }
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-links {
      display: flex;
      gap: 8px;
    }
    .nav-link {
      padding: 8px 16px;
      color: #888;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s;
      font-size: 14px;
    }
    .nav-link:hover {
      color: #fff;
      background: rgba(255,255,255,0.1);
    }
    .nav-link.active {
      color: #00d4ff;
      background: rgba(0,212,255,0.1);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .wallet-btn {
      padding: 8px 20px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }
    .wallet-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    
    /* 404 主要内容 */
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px;
    }
    
    .error-container {
      text-align: center;
      max-width: 600px;
    }
    
    /* 404 动画数字 */
    .error-code {
      font-size: 120px;
      font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf, #00d4ff);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 3s ease infinite;
      line-height: 1;
      margin-bottom: 20px;
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    /* ECHO 声波动画 */
    .wave-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 60px;
      margin-bottom: 30px;
    }
    
    .wave-bar {
      width: 6px;
      background: linear-gradient(180deg, #00d4ff, #7b2cbf);
      border-radius: 3px;
      animation: wave 1.2s ease-in-out infinite;
    }
    
    .wave-bar:nth-child(1) { height: 20px; animation-delay: 0s; }
    .wave-bar:nth-child(2) { height: 35px; animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { height: 50px; animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { height: 40px; animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { height: 25px; animation-delay: 0.4s; }
    .wave-bar:nth-child(6) { height: 45px; animation-delay: 0.5s; }
    .wave-bar:nth-child(7) { height: 30px; animation-delay: 0.6s; }
    
    @keyframes wave {
      0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    
    .error-title {
      font-size: 28px;
      margin-bottom: 12px;
      color: #fff;
    }
    
    .error-desc {
      font-size: 16px;
      color: #888;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    
    .error-desc .echo-highlight {
      color: #00d4ff;
      font-weight: 500;
    }
    
    /* 按钮组 */
    .action-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }
    
    .btn-primary {
      padding: 14px 32px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,212,255,0.3);
    }
    
    .btn-secondary {
      padding: 14px 32px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }
    
    /* 站点地图 */
    .sitemap {
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .sitemap-title {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .sitemap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      text-align: left;
    }
    
    .sitemap-column h4 {
      font-size: 13px;
      color: #00d4ff;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    .sitemap-column ul {
      list-style: none;
    }
    
    .sitemap-column li {
      margin-bottom: 8px;
    }
    
    .sitemap-column a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .sitemap-column a:hover {
      color: #fff;
    }
    
    /* 页脚 */
    .footer {
      padding: 20px;
      text-align: center;
      color: #666;
      font-size: 13px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    
    .footer a {
      color: #888;
      text-decoration: none;
    }
    
    .footer a:hover {
      color: #00d4ff;
    }
    
    /* 响应式 */
    @media (max-width: 600px) {
      .error-code {
        font-size: 80px;
      }
      .error-title {
        font-size: 22px;
      }
      .sitemap-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .nav-links {
        display: none;
      }
    }
  </style>
</head>

  <script>
    // 连接钱包功能
    async function connectWallet() {
      if (typeof window.ethereum === 'undefined') {
        alert('请先安装 MetaMask 钱包！');
        return;
      }
      
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const userAddress = accounts[0];
        document.getElementById('connectBtn').textContent = 
          userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
      } catch (error) {
        console.error('连接失败:', error);
      }
    }
    
    document.getElementById('connectBtn').addEventListener('click', connectWallet);
  </script>
