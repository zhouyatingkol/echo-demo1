<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol - 铸造</title>
    <script src="ethers.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 14px; }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title { font-size: 18px; margin-bottom: 16px; color: #00d4ff; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 14px; }
        .status.success { background: rgba(0,255,0,0.1); color: #0f0; }
        .status.error { background: rgba(255,0,0,0.1); color: #f55; }
        .status.pending { background: rgba(255,215,0,0.1); color: #ffd700; }
        .hidden { display: none !important; }
        .address-display { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; text-align: center; font-family: monospace; margin-bottom: 16px; word-break: break-all; }
        small { color: #666; font-size: 12px; }
        .debug { background: rgba(255,255,0,0.1); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 12px; color: #aa0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ECHO Protocol</h1>
        <p class="subtitle">铸造您的数字种子</p>

        <div class="card" id="walletCard">
            <div class="card-title">👛 连接钱包</div>
            <button class="btn" id="connectBtn">连接 MetaMask</button>
            <div id="walletInfo" class="hidden">
                <div class="address-display" id="walletAddress"></div>
            </div>
        </div>

        <div class="card hidden" id="mintCard">
            <div class="card-title">🔨 铸造数字种子</div>
            
            <div class="form-group">
                <label>资产名称 *</label>
                <input type="text" id="assetName" value="数字种子一号">
            </div>
            
            <div class="form-group">
                <label>资产描述</label>
                <textarea id="assetDesc" rows="2">我的第一颗数字种子</textarea>
            </div>
            
            <div class="form-group">
                <label>资产类型</label>
                <select id="assetType">
                    <option value="code" selected>代码</option>
                    <option value="algorithm">算法</option>
                    <option value="data">数据</option>
                    <option value="patent">专利</option>
                </select>
            </div>
            
            <button class="btn" id="mintBtn">🔨 铸造资产</button>
            <div id="status"></div>
            <div id="debugInfo" class="debug hidden"></div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = '0x5f5AAe09BB85f561b21845729B79E840AB026148';
        
        // 检查ethers是否加载
        if (typeof ethers === 'undefined') {
            alert('ethers.js 加载失败，请刷新页面');
        }
        
        const ABI = [
            "function mintECHO(string,string,string,string,tuple(address,address,address,address,uint256,uint256,uint256)) returns (uint256)",
            "function getCurrentTokenId() view returns (uint256)"
        ];
        
        let provider, signer, contract, userAddress;
        
        document.getElementById('connectBtn').addEventListener('click', connectWallet);
        document.getElementById('mintBtn').addEventListener('click', mintAsset);
        
        function showStatus(msg, type) {
            document.getElementById('status').innerHTML = msg ? '<div class="status ' + type + '">' + msg + '</div>' : '';
        }
        
        function showDebug(msg) {
            const debug = document.getElementById('debugInfo');
            debug.classList.remove('hidden');
            debug.innerHTML += msg + '<br>';
        }
        
        async function connectWallet() {
            showDebug('开始连接...');
            
            if (!window.ethereum) {
                showStatus('❌ 请先安装 MetaMask 钱包', 'error');
                showDebug('未检测到 MetaMask');
                return;
            }
            
            try {
                showStatus('连接中...', 'pending');
                showDebug('请求账户...');
                
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                showDebug('创建 provider...');
                provider = new ethers.providers.Web3Provider(window.ethereum);
                
                showDebug('获取 signer...');
                signer = provider.getSigner();
                
                showDebug('获取地址...');
                userAddress = await signer.getAddress();
                
                showDebug('地址: ' + userAddress);
                
                showDebug('初始化合约...');
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                
                // 更新UI
                document.getElementById('walletAddress').textContent = userAddress;
                document.getElementById('walletInfo').classList.remove('hidden');
                document.getElementById('connectBtn').classList.add('hidden');
                document.getElementById('mintCard').classList.remove('hidden');
                
                showStatus('✅ 连接成功！地址: ' + userAddress.slice(0, 10) + '...', 'success');
                
            } catch (error) {
                showStatus('❌ 连接失败: ' + error.message, 'error');
                showDebug('错误: ' + error.message);
                console.error(error);
            }
        }
        
        async function mintAsset() {
            showDebug('开始铸造...');
            
            if (!contract) {
                showStatus('❌ 请先连接钱包', 'error');
                showDebug('合约未初始化');
                return;
            }
            
            try {
                const name = document.getElementById('assetName').value.trim();
                const description = document.getElementById('assetDesc').value.trim();
                const assetType = document.getElementById('assetType').value;
                
                if (!name) {
                    showStatus('❌ 请输入资产名称', 'error');
                    return;
                }
                
                showDebug('名称: ' + name);
                showDebug('类型: ' + assetType);
                
                const rights = {
                    usageOwner: userAddress,
                    derivativeOwner: userAddress,
                    extensionOwner: userAddress,
                    revenueOwner: userAddress,
                    usageFee: ethers.BigNumber.from('1000000000000000'),
                    derivativeFee: 0,
                    revenueShare: 10000
                };
                
                const uri = JSON.stringify({ name, description, assetType });
                
                showStatus('铸造中...请确认MetaMask交易', 'pending');
                showDebug('发送交易...');
                document.getElementById('mintBtn').disabled = true;
                
                const tx = await contract.mintECHO(name, description, assetType, uri, rights);
                
                showDebug('交易已发送: ' + tx.hash);
                showStatus('交易已提交，等待确认...', 'pending');
                
                const receipt = await tx.wait();
                
                showDebug('交易确认，区块: ' + receipt.blockNumber);
                showStatus('✅ 铸造成功！', 'success');
                
                document.getElementById('assetName').value = '';
                
            } catch (error) {
                showStatus('❌ 铸造失败: ' + error.message, 'error');
                showDebug('错误: ' + error.message);
                console.error(error);
            } finally {
                document.getElementById('mintBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
