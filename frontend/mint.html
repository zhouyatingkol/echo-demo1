<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>铸造</title>
    <script src="ethers.min.js"></script>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); border: none; border-radius: 8px; color: #fff; font-size: 16px; cursor: pointer; margin: 10px 0; }
        .log { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin: 10px 0; font-family: monospace; font-size: 12px; color: #0f0; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .error { color: #f55; }
    </style>
</head>
<body>
    <div class="container">
        <h2>铸造测试</h2>
        
        <button class="btn" id="connectBtn">连接钱包</button>
        <div id="walletInfo" style="display:none;">
            <p>地址: <span id="addr"></span></p>
            <button class="btn" id="mintBtn">铸造资产</button>
        </div>
        
        <div id="log" class="log">日志:</div>
    </div>

    <script>
        const CONTRACT = '0x5f5AAe09BB85f561b21845729B79E840AB026148';
        let contract, signer, userAddr;
        
        function log(msg, isError) {
            const el = document.getElementById('log');
            el.innerHTML += '\n' + (isError ? '❌ ' : '✓ ') + msg;
            console.log(msg);
        }
        
        document.getElementById('connectBtn').onclick = async () => {
            try {
                log('连接中...');
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                userAddr = await signer.getAddress();
                
                log('已连接: ' + userAddr.slice(0, 15) + '...');
                
                // 使用JSON ABI
                const abi = [
                    {
                        "inputs": [
                            {"internalType": "string", "name": "_name", "type": "string"},
                            {"internalType": "string", "name": "_description", "type": "string"},
                            {"internalType": "string", "name": "_assetType", "type": "string"},
                            {"internalType": "string", "name": "_uri", "type": "string"},
                            {
                                "components": [
                                    {"internalType": "address", "name": "usageOwner", "type": "address"},
                                    {"internalType": "address", "name": "derivativeOwner", "type": "address"},
                                    {"internalType": "address", "name": "extensionOwner", "type": "address"},
                                    {"internalType": "address", "name": "revenueOwner", "type": "address"},
                                    {"internalType": "uint256", "name": "usageFee", "type": "uint256"},
                                    {"internalType": "uint256", "name": "derivativeFee", "type": "uint256"},
                                    {"internalType": "uint256", "name": "revenueShare", "type": "uint256"}
                                ],
                                "internalType": "struct ECHOAsset.Rights",
                                "name": "_rights",
                                "type": "tuple"
                            }
                        ],
                        "name": "mintECHO",
                        "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
                        "stateMutability": "nonpayable",
                        "type": "function"
                    }
                ];
                
                contract = new ethers.Contract(CONTRACT, abi, signer);
                log('合约初始化成功');
                
                document.getElementById('addr').textContent = userAddr;
                document.getElementById('walletInfo').style.display = 'block';
                document.getElementById('connectBtn').style.display = 'none';
                
            } catch (e) {
                log('连接失败: ' + e.message, true);
            }
        };
        
        document.getElementById('mintBtn').onclick = async () => {
            try {
                log('开始铸造...');
                
                // 确保地址有效
                log('检查地址: ' + userAddr);
                
                const rights = [
                    userAddr,  // usageOwner
                    userAddr,  // derivativeOwner
                    userAddr,  // extensionOwner
                    userAddr,  // revenueOwner
                    ethers.BigNumber.from('1000000000000000'),  // usageFee
                    ethers.BigNumber.from('0'),                 // derivativeFee
                    10000                                       // revenueShare
                ];
                
                log('rights数组: ' + JSON.stringify(rights.map(r => r.toString ? r.toString() : r)));
                
                log('准备调用合约...');
                
                const tx = await contract.mintECHO(
                    "我的数字种子",      // _name
                    "第一颗种子",        // _description
                    "code",              // _assetType
                    "test-uri",          // _uri
                    rights,              // _rights (作为数组传递)
                    { gasLimit: 500000 }
                );
                
                log('交易已发送: ' + tx.hash.slice(0, 20) + '...');
                
                const receipt = await tx.wait();
                log('✅ 铸造成功! 区块: ' + receipt.blockNumber);
                
            } catch (e) {
                log('铸造失败: ' + e.message, true);
                if (e.code) log('错误码: ' + e.code, true);
                if (e.reason) log('原因: ' + e.reason, true);
                console.error(e);
            }
        };
    </script>
</body>
</html>
