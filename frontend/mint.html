<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ECHO铸造</title>
    <script src="ethers.min.js"></script>
    <style>
        body { padding-top: 64px; background: #1a1a2e; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .btn { width: 100%; padding: 15px; background: #00d4ff; border: none; border-radius: 8px; color: #000; font-size: 16px; cursor: pointer; margin: 10px 0; font-weight: bold; }
        .btn:hover { background: #7b2cbf; color: #fff; }
        .log { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin: 10px 0; font-family: monospace; font-size: 12px; color: #0f0; white-space: pre-wrap; }
        .error { color: #f55; }
    </style>
  <script src="js/theme-switcher.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body><nav class="main-nav" style="position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;"><div style="max-width: 1400px; margin: 0 auto; height: 100%; display: flex; align-items: center; padding: 0 20px; gap: 30px;"><a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 20px; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎵 ECHO Music</a><div style="display: flex; gap: 8px; flex: 1;"><a href="discover.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">发现</a><a href="music-market.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">市场</a><a href="charts.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">榜单</a><a href="mint-music.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">铸造</a><a href="dashboard.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">收益</a></div><div style="display: flex; align-items: center; gap: 12px;"><a href="my-favorites.html" style="padding: 8px; text-decoration: none; font-size: 18px;">❤️</a><button style="padding: 8px 20px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer;" onclick="connectWallet()">连接钱包</button></div></div></nav>
    <div class="container">
        <h2 style="text-align:center;">🌱 ECHO铸造</h2>
        
        <button class="btn" id="connectBtn">连接钱包</button>
        <div id="walletInfo" style="display:none;">
            <p style="word-break:break-all; font-family:monospace; background:rgba(0,0,0,0.3); padding:10px; border-radius:8px;"><span id="addr"></span></p>
            <button class="btn" id="mintBtn">铸造第一颗种子</button>
        </div>
        
        <div id="log" class="log"></div>
    </div>

    <script>
        const CONTRACT = '0x5f5AAe09BB85f561b21845729B79E840AB026148';
        let contract, signer, userAddr;
        const log = (msg, err) => {
            document.getElementById('log').innerHTML += (err ? '❌ ' : '✓ ') + msg + '\n';
            console.log(msg);
        };

        document.getElementById('connectBtn').onclick = async () => {
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                userAddr = await signer.getAddress();
                
                // 直接从合约artifact加载ABI
                const abi = [{"inputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"description","type":"string"},{"internalType":"string","name":"assetType","type":"string"},{"internalType":"string","name":"uri","type":"string"},{"components":[{"internalType":"address","name":"usageOwner","type":"address"},{"internalType":"address","name":"derivativeOwner","type":"address"},{"internalType":"address","name":"extensionOwner","type":"address"},{"internalType":"address","name":"revenueOwner","type":"address"},{"internalType":"uint256","name":"usageFee","type":"uint256"},{"internalType":"uint256","name":"derivativeFee","type":"uint256"},{"internalType":"uint256","name":"revenueShare","type":"uint256"}],"internalType":"struct ECHOAsset.Rights","name":"rights","type":"tuple"}],"name":"mintECHO","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"nonpayable","type":"function"}];
                
                contract = new ethers.Contract(CONTRACT, abi, signer);
                
                document.getElementById('addr').textContent = userAddr;
                document.getElementById('walletInfo').style.display = 'block';
                document.getElementById('connectBtn').style.display = 'none';
                log('已连接: ' + userAddr.slice(0, 10) + '...');
                
            } catch (e) {
                log('连接失败: ' + e.message, true);
            }
        };

        document.getElementById('mintBtn').onclick = async () => {
            try {
                log('铸造中...');
                
                // 确保所有地址都是有效的
                const rights = {
                    usageOwner: ethers.utils.getAddress(userAddr),
                    derivativeOwner: ethers.utils.getAddress(userAddr),
                    extensionOwner: ethers.utils.getAddress(userAddr),
                    revenueOwner: ethers.utils.getAddress(userAddr),
                    usageFee: ethers.BigNumber.from('1000000000000000'),
                    derivativeFee: ethers.BigNumber.from('0'),
                    revenueShare: 10000
                };
                
                log('发送交易...');
                const tx = await contract.mintECHO(
                    "数字种子一号",
                    "我的第一颗种子",
                    "code",
                    JSON.stringify({name:"数字种子一号"}),
                    rights,
                    { gasLimit: 500000 }
                );
                
                log('等待确认: ' + tx.hash.slice(0, 15) + '...');
                const receipt = await tx.wait();
                
                if (receipt.status === 1) {
                    log('✅ 铸造成功！');
                } else {
                    log('❌ 失败', true);
                }
            } catch (e) {
                log('错误: ' + e.message.slice(0, 100), true);
            }
        };
    </script>
</body>
</html>
