<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创作者收益面板 - ECHO Music</title>  
  <script src="ethers.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/transaction-list.js"></script>
  <script src="js/withdraw.js"></script>
  <style>
    /* 暗色主题 */  
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { padding-top: 64px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* 头部 */  
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links a {
      color: #888;
      text-decoration: none;
      margin-right: 20px;
      transition: color 0.3s;
    }
    .nav-links a:hover {
      color: #00d4ff;
    }
    
    /* 统计卡片网格 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.3s, background 0.3s;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
    }
    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: #00d4ff;
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 14px;
      color: #888;
    }
    
    /* 图表区域 */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    .chart-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .chart-card h3 {
      margin-bottom: 16px;
      font-size: 16px;
      color: #aaa;
    }
    
    /* 提现区域 */
    .withdraw-section {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .withdraw-section h3 {
      margin-bottom: 16px;
      color: #aaa;
    }
    
    /* 交易列表 */
    .transactions-section {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .transactions-section h3 {
      margin-bottom: 16px;
      color: #aaa;
    }
    
    /* 筛选器样式 */
    #transactionFilters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    #transactionFilters select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    #transactionFilters select option {
      background: #1a1a2e;
    }
    #transactionFilters button {
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    #transactionFilters button:hover {
      opacity: 0.8;
    }
    
    /* 交易列表容器 */
    #transactionList {
      max-height: 400px;
      overflow-y: auto;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script src="js/theme-switcher.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/mobile.css">
  <script src="js/wallet-state.js" defer></script>
</head>
<body><nav class="main-nav" style="position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;"><div style="max-width: 1400px; margin: 0 auto; height: 100%; display: flex; align-items: center; padding: 0 20px; gap: 30px;"><a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 20px; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎵 ECHO Music</a><div style="display: flex; gap: 8px; flex: 1;"><a href="discover.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">发现</a><a href="music-market.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">市场</a><a href="charts.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">榜单</a><a href="mint-music.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">铸造</a><a href="dashboard.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">收益</a></div><div style="display: flex; align-items: center; gap: 12px;"><a href="my-favorites.html" style="padding: 8px; text-decoration: none; font-size: 18px;">❤️</a><button style="padding: 8px 20px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer;" onclick="connectWallet()">连接钱包</button></div></div></nav>
  <div class="container">
    <!-- 头部 -->  
    <div class="header">
      <div class="logo">📊 创作者收益面板</div>
      <div class="nav-links">
        <a href="music-market.html">音乐市场</a>
        <a href="profile.html">我的主页</a>
      </div>
    </div>
    
    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalRevenue">0 MEER</div>
        <div class="stat-label">总收益</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="monthRevenue">0 MEER</div>
        <div class="stat-label">本月收益</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="withdrawable">0 MEER</div>
        <div class="stat-label">可提现</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalLicenses">0</div>
        <div class="stat-label">授权次数</div>
      </div>
    </div>
    
    <!-- 图表 -->
    <div class="charts-grid">
      <div class="chart-card">
        <h3>📈 收益趋势 (近30天)</h3>
        <canvas id="revenueChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>🥧 收益来源</h3>
        <canvas id="sourceChart"></canvas>
      </div>
    </div>
    
    <!-- 提现区域 -->
    <div class="withdraw-section" id="withdrawContainer">
      <h3>💰 提现</h3>
      <div id="withdrawForm"></div>
    </div>
    
    <!-- 交易明细 -->
    <div class="transactions-section">
      <h3>📜 交易明细</h3>
      <div id="transactionFilters">
        <select id="filterType">
          <option value="all">全部类型</option>
          <option value="usage">使用费</option>
          <option value="derivative">衍生费</option>
        </select>
        <select id="filterPeriod">
          <option value="all">全部时间</option>
          <option value="today">今日</option>
          <option value="week">本周</option>
          <option value="month">本月</option>
        </select>
        <button onclick="exportTransactions()">📥 导出CSV</button>
      </div>
      <div id="transactionList"></div>
    </div>
  </div>
  
  <script>
    // 合约配置
    const V2_CONTRACT_ADDRESS = '0x319148d9b9265D75858c508E445d65B649036f75';
    const V2_ABI = [
      "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)",
      "function getCurrentTokenId() view returns (uint256)",
      "event AssetUsed(uint256 indexed tokenId, address indexed user, uint256 amount)"
    ];
    
    let provider, signer, contract, userAddress;
    let transactionList, withdrawalSystem;
    let revenueChartInstance = null;
    let sourceChartInstance = null;
    
    // 初始化
    async function init() {
      if (typeof window.ethereum === 'undefined') {
        alert('请安装 MetaMask');
        return;
      }
      
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      
      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
      
      // 初始化交易列表
      if (typeof TransactionList !== 'undefined') {
        transactionList = new TransactionList('transactionList', contract, userAddress);
        await transactionList.loadTransactions();
      }
      
      // 初始化提现系统
      if (typeof WithdrawalSystem !== 'undefined') {
        withdrawalSystem = new WithdrawalSystem(contract, userAddress);
        withdrawalSystem.renderWithdrawalForm('withdrawForm');
      }
      
      // 加载统计数据
      await loadStats();
      
      // 初始化图表
      initCharts();
      
      // 监听账户变化
      window.ethereum.on('accountsChanged', (accounts) => {
        if (accounts.length > 0) {
          userAddress = accounts[0];
          location.reload();
        }
      });
    }
    
    // 加载统计数据
    async function loadStats() {
      try {
        // 从事件计算统计数据
        const filter = contract.filters.AssetUsed(null, null, null);
        const events = await contract.queryFilter(filter, 0, 'latest');
        
        let total = 0;
        let monthTotal = 0;
        let count = 0;
        const now = Math.floor(Date.now() / 1000);
        const monthAgo = now - 30 * 24 * 60 * 60;
        
        // 用于图表的日收益数据
        const dailyRevenue = new Array(30).fill(0);
        let usageRevenue = 0;
        let derivativeRevenue = 0;
        
        for (const event of events) {
          if (event.args) {
            const amount = parseFloat(ethers.utils.formatEther(event.args.amount));
            total += amount;
            count++;
            
            // 获取区块时间
            const block = await provider.getBlock(event.blockNumber);
            if (block && block.timestamp > monthAgo) {
              monthTotal += amount;
              
              // 计算日收益索引 (0-29, 0是今天)
              const daysAgo = Math.floor((now - block.timestamp) / (24 * 60 * 60));
              if (daysAgo >= 0 && daysAgo < 30) {
                dailyRevenue[29 - daysAgo] += amount;
              }
            }
            
            // 分类统计 (简化：大于0.1 MEER认为是使用费)
            if (amount > 0.1) {
              usageRevenue += amount;
            } else {
              derivativeRevenue += amount;
            }
          }
        }
        
        // 更新统计卡片
        document.getElementById('totalRevenue').textContent = total.toFixed(4) + ' MEER';
        document.getElementById('monthRevenue').textContent = monthTotal.toFixed(4) + ' MEER';
        document.getElementById('withdrawable').textContent = total.toFixed(4) + ' MEER';
        document.getElementById('totalLicenses').textContent = count;
        
        // 更新图表数据
        updateCharts(dailyRevenue, usageRevenue, derivativeRevenue);
        
      } catch (error) {
        console.error('加载统计数据失败:', error);
      }
    }
    
    // 初始化图表
    function initCharts() {
      // 收益趋势图
      const ctx1 = document.getElementById('revenueChart').getContext('2d');
      revenueChartInstance = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: Array.from({length: 30}, (_, i) => {
            const date = new Date();
            date.setDate(date.getDate() - (29 - i));
            return `${date.getMonth() + 1}/${date.getDate()}`;
          }),
          datasets: [{
            label: '日收益 (MEER)',
            data: Array.from({length: 30}, () => 0),
            borderColor: '#00d4ff',
            backgroundColor: 'rgba(0, 212, 255, 0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: '#00d4ff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { 
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(0,0,0,0.8)',
              titleColor: '#fff',
              bodyColor: '#fff',
              borderColor: '#00d4ff',
              borderWidth: 1
            }
          },
          scales: {
            y: { 
              grid: { color: 'rgba(255,255,255,0.1)' }, 
              ticks: { color: '#888' },
              beginAtZero: true
            },
            x: { 
              grid: { display: false }, 
              ticks: { color: '#888', maxTicksLimit: 10 }
            }
          }
        }
      });
      
      // 收益来源饼图
      const ctx2 = document.getElementById('sourceChart').getContext('2d');
      sourceChartInstance = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: ['使用费', '衍生费'],
          datasets: [{
            data: [70, 30],
            backgroundColor: ['#00d4ff', '#7b2cbf'],
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          cutout: '60%',
          plugins: {
            legend: { 
              position: 'bottom', 
              labels: { color: '#fff', padding: 20 } 
            },
            tooltip: {
              backgroundColor: 'rgba(0,0,0,0.8)',
              bodyColor: '#fff',
              borderColor: '#00d4ff',
              borderWidth: 1,
              callbacks: {
                label: function(context) {
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const percentage = ((context.raw / total) * 100).toFixed(1);
                  return `${context.label}: ${percentage}%`;
                }
              }
            }
          }
        }
      });
    }
    
    // 更新图表数据
    function updateCharts(dailyRevenue, usageRevenue, derivativeRevenue) {
      if (revenueChartInstance) {
        revenueChartInstance.data.datasets[0].data = dailyRevenue;
        revenueChartInstance.update();
      }
      
      if (sourceChartInstance && usageRevenue + derivativeRevenue > 0) {
        sourceChartInstance.data.datasets[0].data = [usageRevenue, derivativeRevenue];
        sourceChartInstance.update();
      }
    }
    
    // 导出交易
    function exportTransactions() {
      if (transactionList && typeof transactionList.exportCSV === 'function') {
        transactionList.exportCSV();
      } else {
        console.warn('交易列表未初始化或导出功能不可用');
      }
    }
    
    // 筛选交易
    function filterTransactions() {
      if (transactionList && typeof transactionList.filter === 'function') {
        const type = document.getElementById('filterType').value;
        const period = document.getElementById('filterPeriod').value;
        transactionList.filter(type, period);
      }
    }
    
    // 绑定筛选器事件
    document.addEventListener('DOMContentLoaded', () => {
      const filterType = document.getElementById('filterType');
      const filterPeriod = document.getElementById('filterPeriod');
      
      if (filterType) filterType.addEventListener('change', filterTransactions);
      if (filterPeriod) filterPeriod.addEventListener('change', filterTransactions);
    });
    
    // 页面加载时初始化
    window.addEventListener('load', init);
  </script>
</body>
</html>
