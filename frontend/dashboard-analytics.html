<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 数据分析面板 - ECHO Music</title>
  <script src="ethers.min.js"></script>
  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- jsPDF for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      padding-top: 64px;
    }
    
    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,26,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 1000;
    }
    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      padding: 8px 16px;
      color: #888;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.3s;
      font-size: 14px;
    }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .nav-link.active { color: #00d4ff; background: rgba(0,212,255,0.1); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .wallet-btn {
      padding: 8px 20px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    
    /* 主容器 */
    .analytics-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    
    /* 页面标题 */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .page-title {
      font-size: 28px;
      font-weight: bold;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-actions { display: flex; gap: 12px; }
    
    /* 导出按钮 */
    .export-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
    }
    .export-btn:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }
    .export-btn.csv { border-color: #4ade80; color: #4ade80; }
    .export-btn.pdf { border-color: #f87171; color: #f87171; }
    .export-btn.csv:hover { background: rgba(74,222,128,0.1); }
    .export-btn.pdf:hover { background: rgba(248,113,113,0.1); }
    
    /* 时间筛选器 */
    .time-filter {
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      padding: 6px;
      border-radius: 12px;
      margin-bottom: 30px;
    }
    .time-filter-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }
    .time-filter-btn:hover { color: #fff; }
    .time-filter-btn.active {
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      color: #fff;
    }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    .stat-card:hover {
      border-color: rgba(0,212,255,0.3);
      transform: translateY(-4px);
    }
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
    }
    .stat-icon.plays { background: linear-gradient(135deg, #00d4ff20, #00d4ff40); }
    .stat-icon.listeners { background: linear-gradient(135deg, #7b2cbf20, #7b2cbf40); }
    .stat-icon.revenue { background: linear-gradient(135deg, #fbbf2420, #fbbf2440); }
    .stat-icon.assets { background: linear-gradient(135deg, #f472b620, #f472b640); }
    .stat-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .stat-change {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-change.positive { color: #4ade80; }
    .stat-change.negative { color: #f87171; }
    
    /* 图表区域 */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .chart-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .chart-card.full-width { grid-column: 1 / -1; }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .chart-title {
      font-size: 18px;
      font-weight: 600;
    }
    .chart-actions {
      display: flex;
      gap: 8px;
    }
    .chart-action-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .chart-action-btn:hover, .chart-action-btn.active {
      color: #00d4ff;
      border-color: #00d4ff;
      background: rgba(0,212,255,0.1);
    }
    .chart-container {
      position: relative;
      height: 300px;
    }
    .chart-container.large { height: 400px; }
    
    /* 听众画像 */
    .audience-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    
    /* 收益分析 */
    .revenue-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    .revenue-list {
      list-style: none;
    }
    .revenue-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s;
    }
    .revenue-item:hover { background: rgba(255,255,255,0.03); }
    .revenue-item:last-child { border-bottom: none; }
    .revenue-rank {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      margin-right: 16px;
    }
    .revenue-rank.top1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
    .revenue-rank.top2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
    .revenue-rank.top3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
    .revenue-rank.other { background: rgba(255,255,255,0.1); color: #888; }
    .revenue-info { flex: 1; }
    .revenue-name { font-weight: 500; margin-bottom: 4px; }
    .revenue-meta { font-size: 12px; color: #888; }
    .revenue-amount { font-weight: bold; font-size: 16px; color: #4ade80; }
    
    /* 收益来源饼图 */
    .source-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
    }
    .source-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 12px;
    }
    .source-name { flex: 1; font-size: 14px; }
    .source-value { font-weight: 600; }
    .source-percent { 
      width: 60px; 
      text-align: right; 
      font-size: 14px; 
      color: #888;
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    
    /* 连接提示 */
    .connect-prompt {
      text-align: center;
      padding: 80px 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      margin: 40px 0;
    }
    .connect-prompt h2 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    .connect-prompt p {
      color: #888;
      margin-bottom: 24px;
    }
    
    /* 加载状态 */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,26,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      z-index: 10;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* 响应式 */
    @media (max-width: 1200px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .audience-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
      .audience-grid { grid-template-columns: 1fr; }
      .revenue-section { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
  <script src="js/theme-switcher.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">🎵 ECHO Music</a>
      <div class="nav-links">
        <a href="discover.html" class="nav-link">发现</a>
        <a href="music-market.html" class="nav-link">市场</a>
        <a href="charts.html" class="nav-link">榜单</a>
        <a href="mint-music.html" class="nav-link">铸造</a>
        <a href="dashboard.html" class="nav-link">收益</a>
        <a href="dashboard-analytics.html" class="nav-link active">数据</a>
      </div>
      <div class="nav-right">
        <button class="wallet-btn" id="connectBtn" onclick="connectWallet()">连接钱包</button>
      </div>
    </div>
  </nav>

  <div class="analytics-container">
    <!-- 连接钱包提示 -->
    <div id="connectPrompt" class="connect-prompt">
      <div class="empty-icon">📊</div>
      <h2>连接钱包查看数据分析</h2>
      <p>查看您的播放量趋势、听众画像和收益分析</p>
      <button class="wallet-btn" onclick="connectWallet()">连接 MetaMask</button>
    </div>

    <!-- 分析内容 -->
    <div id="analyticsContent" style="display: none;">
      <!-- 页面标题 -->
      <div class="page-header">
        <h1 class="page-title">📊 数据分析面板</h1>
        <div class="page-actions">
          <button class="export-btn csv" onclick="exportCSV()">
            📥 导出 CSV
          </button>
          <button class="export-btn pdf" onclick="exportPDF()">
            📄 生成 PDF
          </button>
        </div>
      </div>

      <!-- 时间筛选 -->
      <div class="time-filter">
        <button class="time-filter-btn" data-range="7" onclick="setTimeRange(7)">近7天</button>
        <button class="time-filter-btn active" data-range="30" onclick="setTimeRange(30)">近30天</button>
        <button class="time-filter-btn" data-range="90" onclick="setTimeRange(90)">近90天</button>
        <button class="time-filter-btn" data-range="365" onclick="setTimeRange(365)">近1年</button>
      </div>

      <!-- 统计概览 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon plays">▶️</div>
          <div class="stat-label">总播放量</div>
          <div class="stat-value" id="totalPlays">0</div>
          <div class="stat-change positive" id="playsChange">
            <span>↑</span> <span id="playsChangeValue">0%</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon listeners">👥</div>
          <div class="stat-label">独立听众</div>
          <div class="stat-value" id="totalListeners">0</div>
          <div class="stat-change positive" id="listenersChange">
            <span>↑</span> <span id="listenersChangeValue">0%</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon revenue">💰</div>
          <div class="stat-label">总收益</div>
          <div class="stat-value" id="totalRevenue">0 ETH</div>
          <div class="stat-change positive" id="revenueChange">
            <span>↑</span> <span id="revenueChangeValue">0%</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon assets">🎵</div>
          <div class="stat-label">音乐资产</div>
          <div class="stat-value" id="totalAssets">0</div>
          <div class="stat-change positive" id="assetsChange">
            <span>↑</span> <span id="assetsChangeValue">0%</span>
          </div>
        </div>
      </div>

      <!-- 播放量趋势 -->
      <div class="chart-card full-width">
        <div class="chart-header">
          <h3 class="chart-title">📈 播放量趋势</h3>
          <div class="chart-actions">
            <button class="chart-action-btn active" data-type="plays" onclick="switchTrendType('plays')">播放量</button>
            <button class="chart-action-btn" data-type="revenue" onclick="switchTrendType('revenue')">收益</button>
            <button class="chart-action-btn" data-type="listeners" onclick="switchTrendType('listeners')">听众</button>
          </div>
        </div>
        <div class="chart-container large">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <!-- 听众画像 -->
      <h3 style="font-size: 20px; margin-bottom: 20px;">🎭 听众画像</h3>
      <div class="audience-grid">
        <!-- 地区分布 -->
        <div class="chart-card">
          <div class="chart-header">
            <h3 class="chart-title">🌍 地区分布</h3>
          </div>
          <div class="chart-container">
            <canvas id="regionChart"></canvas>
          </div>
        </div>
        
        <!-- 设备类型 -->
        <div class="chart-card">
          <div class="chart-header">
            <h3 class="chart-title">📱 设备类型</h3>
          </div>
          <div class="chart-container">
            <canvas id="deviceChart"></canvas>
          </div>
        </div>
        
        <!-- 访问时段 -->
        <div class="chart-card">
          <div class="chart-header">
            <h3 class="chart-title">⏰ 访问时段</h3>
          </div>
          <div class="chart-container">
            <canvas id="timeChart"></canvas>
          </div>
        </div>
      </div>

      <!-- 收益分析 -->
      <h3 style="font-size: 20px; margin-bottom: 20px;">💎 收益分析</h3>
      <div class="revenue-section">
        <!-- 收益来源 -->
        <div class="chart-card">
          <div class="chart-header">
            <h3 class="chart-title">📊 收益来源分布</h3>
          </div>
          <div class="chart-container" style="height: 250px;">
            <canvas id="sourceChart"></canvas>
          </div>
          <div id="sourceLegend" style="margin-top: 16px;"></div>
        </div>
        
        <!-- 最畅销作品 -->
        <div class="chart-card">
          <div class="chart-header">
            <h3 class="chart-title">🏆 最畅销作品 TOP 5</h3>
          </div>
          <ul class="revenue-list" id="topAssetsList">
            <!-- 动态生成 -->
          </ul>
        </div>
      </div>
    </div>
  </div>

  <script src="js/analytics.js"></script>
</body>
</html>
