<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铸造 V2 资产 - 权属蓝图</title>
    <script src="ethers.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        /* 步骤条 */
        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }
        .steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            z-index: 0;
        }
        .step {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            border: 2px solid transparent;
            font-weight: bold;
        }
        .step.active .step-number {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-color: #00d4ff;
        }
        .step-label { font-size: 12px; color: #888; }
        .step.active .step-label { color: #00d4ff; }
        
        /* 卡片 */
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title {
            font-size: 18px;
            margin-bottom: 20px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 表单 */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .form-textarea { min-height: 80px; resize: vertical; }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        /* 权属蓝图卡片 */
        .blueprint-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .blueprint-card {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid;
        }
        .blueprint-card.usage { border-color: #00d4ff; }
        .blueprint-card.derivative { border-color: #7b2cbf; }
        .blueprint-card.extension { border-color: #ffd700; }
        .blueprint-card.revenue { border-color: #0f0; }
        .blueprint-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-weight: bold;
        }
        
        /* 开关 */
        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .toggle-label { font-size: 14px; color: #aaa; }
        .toggle {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.1);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle.active { background: #00d4ff; }
        .toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }
        .toggle.active::after { transform: translateX(24px); }
        
        /* 按钮 */
        .btn {
            padding: 14px 28px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-full { width: 100%; }
        
        /* 模板选择 */
        .template-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .template-card {
            background: rgba(0,0,0,0.2);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .template-card:hover { border-color: rgba(0,212,255,0.3); }
        .template-card.selected {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }
        .template-icon { font-size: 32px; margin-bottom: 8px; }
        .template-name { font-size: 14px; font-weight: bold; }
        .template-desc { font-size: 11px; color: #888; margin-top: 4px; }
        
        /* 预览 */
        .preview-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .preview-title { font-size: 16px; color: #00d4ff; margin-bottom: 12px; }
        .preview-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .preview-label { color: #888; }
        .preview-value { color: #fff; }
        
        /* 隐藏 */
        .hidden { display: none !important; }
        
        /* 状态 */
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
        }
        .status.success { background: rgba(0,255,0,0.1); color: #0f0; }
        .status.error { background: rgba(255,0,0,0.1); color: #f55; }
        .status.pending { background: rgba(255,215,0,0.1); color: #ffd700; }
        
        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .nav-buttons .btn { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 铸造 V2 资产</h1>
        <p class="subtitle">配置详细的权属蓝图</p>

        <!-- 步骤条 -->
        <div class="steps">
            <div class="step active" id="step1Indicator">
                <div class="step-number">1</div>
                <div class="step-label">基本信息</div>
            </div
>
            <div class="step" id="step2Indicator">
                <div class="step-number">2</div>
                <div class="step-label">权属蓝图</div>
            </div
>
            <div class="step" id="step3Indicator">
                <div class="step-number">3</div>
                <div class="step-label">确认铸造</div>
            </div
>
        </div
>

        <!-- 步骤1: 基本信息 -->
        <div class="card" id="step1">
            <div class="card-title">📋 步骤 1: 基本信息</div>
            
            <div class="form-group">
                <label class="form-label">资产名称 *</label>
                <input type="text" class="form-input" id="assetName" placeholder="例如：智能合约算法V2">
            </div
>

            <div class="form-group">
                <label class="form-label">资产描述</label>
                <textarea class="form-textarea" id="assetDesc" placeholder="描述您的资产..."></textarea>
            </div
>

            <div class="form-group">
                <label class="form-label">资产类型</label>
                <select class="form-select" id="assetType">
                    <option value="code">💻 代码</option>
                    <option value="algorithm">🔢 算法</option>
                    <option value="data">📊 数据</option>
                    <option value="patent">📜 专利</option>
                </select
>
            </div
>

            <div class="form-group">
                <label class="form-label">IPFS 地址（内容已上传）</label>
                <input type="text" class="form-input" id="ipfsUri" placeholder="ipfs://...">
            </div
>

            <div class="form-group">
                <label class="form-label">内容哈希（用于验证）</label>
                <input type="text" class="form-input" id="contentHash" placeholder="0x...">
                <small style="color: #666;">文件的 keccak256 哈希，用于防篡改验证</small>
            </div
>

            <button class="btn btn-full" onclick="goToStep(2)">下一步：配置权属蓝图 →</button
>
        </div
>

        <!-- 步骤2: 权属蓝图 -->
        <div class="card hidden" id="step2">
            <div class="card-title">⚖️ 步骤 2: 配置权属蓝图</div>

            <!-- 预设模板 -->
            <label class="form-label">选择预设模板（可自定义修改）</label>
            <div class="template-grid">
                <div class="template-card selected" data-template="open">
                    <div class="template-icon">🔓</div>
                    <div class="template-name">开源</div>
                    <div class="template-desc">自由使用</div>
                </div
>
                <div class="template-card" data-template="commercial">
                    <div class="template-icon">💼</div>
                    <div class="template-name">商业</div>
                    <div class="template-desc">付费使用</div>
                </div
>
                <div class="template-card" data-template="education">
                    <div class="template-icon">📚</div>
                    <div class="template-name">教育</div>
                    <div class="template-desc">仅限教育</div>
                </div
>
                <div class="template-card" data-template="custom">
                    <div class="template-icon">⚙️</div>
                    <div class="template-name">自定义</div>
                    <div class="template-desc">完全自定义</div>
                </div
>
            </div
>

            <!-- 权属详细配置 -->
            <div class="blueprint-grid">
                <!-- 使用权 -->
                <div class="blueprint-card usage">
                    <div class="blueprint-header">
                        <span>🔑</span> 使用权配置
                    </div
>
                    
                    <div class="toggle-group">
                        <span class="toggle-label">允许商业使用</span>
                        <div class="toggle active" id="commercialUse"></div>
                    </div
>

                    <div class="toggle-group">
                        <span class="toggle-label">允许修改</span>
                        <div class="toggle active" id="allowModify"></div>
                    </div
>

                    <div class="form-group" style="margin-top: 12px;">
                        <label class="form-label">使用费 (MEER/天)</label>
                        <input type="number" class="form-input" id="usageFee" value="0.001" step="0.001">
                    </div
>
                </div
>

                <!-- 衍生权 -->
                <div class="blueprint-card derivative">
                    <div class="blueprint-header">
                        <span>🌱</span> 衍生权配置
                    </div
>
                    
                    <div class="toggle-group">
                        <span class="toggle-label">允许创作衍生作品</span>
                        <div class="toggle active" id="allowDerivative"></div>
                    </div
>

                    <div class="form-group" style="margin-top: 12px;">
                        <label class="form-label">衍生授权费 (MEER)</label>
                        <input type="number" class="form-input" id="derivativeFee" value="0.01" step="0.001">
                    </div
>

                    <div class="form-group">
                        <label class="form-label">父作品收益分成 (%)</label>
                        <input type="number" class="form-input" id="parentShare" value="10" min="0" max="100">
                    </div
>
                </div
>

                <!-- 扩展权 -->
                <div class="blueprint-card extension">
                    <div class="blueprint-header">
                        <span>🔧</span> 扩展权配置
                    </div
>
                    
                    <div class="toggle-group">
                        <span class="toggle-label">允许扩展功能</span>
                        <div class="toggle" id="allowExtension"></div>
                    </div
>

                    <div class="form-group" style="margin-top: 12px;">
                        <label class="form-label">扩展费 (MEER)</label>
                        <input type="number" class="form-input" id="extensionFee" value="0.05" step="0.001">
                    </div
>
                </div
>

                <!-- 收益权 -->
                <div class="blueprint-card revenue">
                    <div class="blueprint-header">
                        <span>💰</span> 收益权配置
                    </div
>
                    
                    <div class="form-group">
                        <label class="form-label">收益分成比例 (%)</label>
                        <input type="number" class="form-input" id="revenueShare" value="100" min="0" max="100">
                    </div
>

                    <div class="toggle-group">
                        <span class="toggle-label">自动分配收益</span>
                        <div class="toggle active" id="autoDistribute"></div>
                    </div
>
                </div
>
            </div
>

            <div class="nav-buttons">
                <button class="btn btn-secondary" onclick="goToStep(1)">← 上一步</button
>
                <button class="btn" onclick="goToStep(3)">下一步：确认铸造 →</button
>
            </div
>
        </div
>

        <!-- 步骤3: 确认铸造 -->
        <div class="card hidden" id="step3">
            <div class="card-title">🔨 步骤 3: 确认铸造</div>

            <div class="preview-panel">
                <div class="preview-title">铸造预览</div>
                
                <div class="preview-item">
                    <span class="preview-label">资产名称</span>
                    <span class="preview-value" id="previewName">--</span>
                </div
>
                <div class="preview-item">
                    <span class="preview-label">资产类型</span>
                    <span class="preview-value" id="previewType">--</span>
                </div
>
                <div class="preview-item">
                    <span class="preview-label">内容哈希</span>
                    <span class="preview-value" id="previewHash">--</span>
                </div
>
                <div class="preview-item">
                    <span class="preview-label">使用费</span>
                    <span class="preview-value" id="previewUsageFee">-- MEER/天</span>
                </div
>
                <div class="preview-item">
                    <span class="preview-label">衍生授权费</span>
                    <span class="preview-value" id="previewDerivativeFee">-- MEER</span>
                </div
>
                <div class="preview-item">
                    <span class="preview-label">预估Gas费</span>
                    <span class="preview-value">~0.05 MEER</span>
                </div
>
            </div
>

            <div class="nav-buttons">
                <button class="btn btn-secondary" onclick="goToStep(2)">← 上一步</button
>
                <button class="btn" id="mintBtn" onclick="mintAsset()">🔨 确认铸造</button
>
            </div
>
        </div
>

        <div id="status"></div>
    </div
>

    <script>
        let currentStep = 1;

        // 步骤导航
        function goToStep(step) {
            // 隐藏所有步骤
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            
            // 显示目标步骤
            document.getElementById('step' + step).classList.remove('hidden');
            
            // 更新步骤指示器
            document.getElementById('step1Indicator').classList.toggle('active', step >= 1);
            document.getElementById('step2Indicator').classList.toggle('active', step >= 2);
            document.getElementById('step3Indicator').classList.toggle('active', step >= 3);
            
            currentStep = step;
            
            // 如果是第3步，更新预览
            if (step === 3) {
                updatePreview();
            }
        }

        // 更新预览
        function updatePreview() {
            document.getElementById('previewName').textContent = document.getElementById('assetName').value || '--';
            document.getElementById('previewType').textContent = document.getElementById('assetType').value || '--';
            document.getElementById('previewHash').textContent = document.getElementById('contentHash').value.slice(0, 10) + '...' || '--';
            document.getElementById('previewUsageFee').textContent = document.getElementById('usageFee').value + ' MEER/天';
            document.getElementById('previewDerivativeFee').textContent = document.getElementById('derivativeFee').value + ' MEER';
        }

        // 模板选择
        document.querySelectorAll('.template-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                
                // 应用模板预设
                const template = card.dataset.template;
                applyTemplate(template);
            });
        });

        function applyTemplate(template) {
            switch(template) {
                case 'open':
                    document.getElementById('commercialUse').classList.add('active');
                    document.getElementById('allowModify').classList.add('active');
                    document.getElementById('usageFee').value = '0';
                    document.getElementById('allowDerivative').classList.add('active');
                    document.getElementById('derivativeFee').value = '0';
                    document.getElementById('parentShare').value = '0';
                    break;
                case 'commercial':
                    document.getElementById('commercialUse').classList.add('active');
                    document.getElementById('allowModify').classList.remove('active');
                    document.getElementById('usageFee').value = '0.01';
                    document.getElementById('allowDerivative').classList.add('active');
                    document.getElementById('derivativeFee').value = '0.05';
                    document.getElementById('parentShare').value = '10';
                    break;
                case 'education':
                    document.getElementById('commercialUse').classList.remove('active');
                    document.getElementById('allowModify').classList.add('active');
                    document.getElementById('usageFee').value = '0';
                    document.getElementById('allowDerivative').classList.add('active');
                    document.getElementById('derivativeFee').value = '0';
                    document.getElementById('parentShare').value = '5';
                    break;
            }
        }

        // 开关切换
        document.querySelectorAll('.toggle').forEach(toggle => {
            toggle.addEventListener('click', () => {
                toggle.classList.toggle('active');
            });
        });

        // 铸造函数（占位）
        function mintAsset() {
            showStatus('功能开发中...', 'pending');
        }

        function showStatus(msg, type) {
            document.getElementById('status').innerHTML = msg ? `<div class="status ${type}">${msg}</div>` : '';
        }
    </script>
</body>
</html>
