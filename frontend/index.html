<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO Protocol Demo</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title {
            font-size: 18px;
            margin-bottom: 16px;
            color: #00d4ff;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #aaa;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .wallet-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .address {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .asset-list {
            display: grid;
            gap: 12px;
        }
        .asset-item {
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .asset-name {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .asset-type {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(0,212,255,0.2);
            border-radius: 4px;
            font-size: 12px;
            color: #00d4ff;
        }
        .rights-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 8px;
        }
        .right-tag {
            font-size: 12px;
            padding: 6px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }
        .right-tag span {
            color: #888;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }
        .status.success {
            background: rgba(0,255,0,0.1);
            border: 1px solid rgba(0,255,0,0.3);
            color: #0f0;
        }
        .status.error {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            color: #f55;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔷 ECHO Protocol Demo</h1>
        <p class="subtitle">Qitmeer Testnet · 四权分离数字资产</p>

        <!-- 钱包连接 -->
        <div class="card">
            <div class="card-title">👛 钱包连接</div>
            <div id="walletSection">
                <button class="btn" id="connectBtn">连接钱包</button>
            </div>
            <div id="walletInfo" class="wallet-info hidden">
                <span class="address" id="walletAddress"></span>
                <span id="networkName"></span>
            </div>
        </div>

        <!-- 铸造资产 -->
        <div class="card hidden" id="mintSection">
            <div class="card-title">🔨 铸造 ECHO 资产</div>
            <form id="mintForm">
                <div class="form-group">
                    <label>资产名称</label>
                    <input type="text" id="assetName" placeholder="例如：智能合约算法V1" required>
                </div>
                <div class="form-group">
                    <label>资产描述</label>
                    <textarea id="assetDesc" rows="2" placeholder="简要描述资产内容..."></textarea>
                </div>
                <div class="form-group">
                    <label>资产类型</label>
                    <select id="assetType">
                        <option value="code">代码</option>
                        <option value="algorithm">算法</option>
                        <option value="data">数据</option>
                        <option value="patent">专利</option>
                    </select>
                </div>
                
                <div class="card-title" style="font-size: 14px; margin-top: 20px;">⚖️ 四权配置</div>
                
                <div class="form-group">
                    <label>使用权所有者</label>
                    <input type="text" id="usageOwner" placeholder="0x...">
                </div>
                <div class="form-group">
                    <label>衍生权所有者</label>
                    <input type="text" id="derivativeOwner" placeholder="0x...">
                </div>
                <div class="form-group">
                    <label>扩展权所有者</label>
                    <input type="text" id="extensionOwner" placeholder="0x...">
                </div>
                <div class="form-group">
                    <label>收益权所有者</label>
                    <input type="text" id="revenueOwner" placeholder="0x...">
                </div>
                <div class="form-group">
                    <label>使用费 (wei)</label>
                    <input type="number" id="usageFee" value="1000000000000000" placeholder="1000000000000000">
                    <small style="color: #666;">1 MEER = 10^18 wei</small>
                </div>
                
                <button type="submit" class="btn">铸造资产</button>
            </form>
            <div id="mintStatus"></div>
        </div>

        <!-- 资产列表 -->
        <div class="card hidden" id="assetsSection">
            <div class="card-title">📦 我的资产</div>
            <button class="btn btn-secondary" id="refreshBtn" style="margin-bottom: 16px;">刷新列表</button>
            <div class="asset-list" id="assetList"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
