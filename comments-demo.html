<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO Music - 评论系统演示</title>
  <script src="./js/comments.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #eee;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 40px 20px;
    }
    
    header h1 {
      font-size: 2.5em;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    header p {
      color: #888;
    }
    
    .music-player {
      background: rgba(26, 26, 46, 0.8);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
    
    .music-info {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .music-cover {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    
    .music-details h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .music-details .artist {
      color: #00d4ff;
      font-size: 16px;
    }
    
    .music-details .meta {
      color: #888;
      font-size: 14px;
      margin-top: 8px;
    }
    
    .player-controls {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
    }
    
    .play-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    
    .play-btn:hover {
      transform: scale(1.1);
    }
    
    .progress-bar {
      flex: 1;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress {
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
    }
    
    .time {
      color: #888;
      font-size: 14px;
    }
    
    .wallet-section {
      background: rgba(22, 33, 62, 0.8);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .wallet-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .wallet-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4757;
    }
    
    .status-dot.connected {
      background: #2ed573;
    }
    
    .connect-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    
    .connect-btn:hover {
      opacity: 0.9;
    }
    
    .connect-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .token-selector {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .token-selector select {
      padding: 8px 15px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #eee;
      font-size: 14px;
    }
    
    @media (max-width: 768px) {
      .wallet-section {
        flex-direction: column;
        gap: 15px;
      }
      
      .music-info {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
  <script src="frontend/js/wallet-state.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎵 ECHO Music</h1>
      <p>去中心化音乐评论系统演示</p>
    </header>
    
    <!-- 钱包连接区域 -->
    <div class="wallet-section">
      <div class="wallet-info">
        <div class="wallet-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="wallet-address">未连接钱包</span>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 20px;">
        <div class="token-selector">
          <label>选择 ECHO 音乐资产:</label>
          <select id="token-select">
            <option value="1">🎵 区块链之梦 #1</option>
            <option value="2">🎸 去中心化旋律 #2</option>
            <option value="3">🎹 智能合约协奏曲 #3</option>
            <option value="4">🎺 加密货币爵士 #4</option>
          </select>
        </div>
        <button class="connect-btn" id="connect-btn" onclick="connectWallet()">
          连接钱包
        </button>
      </div>
    </div>
    
    <!-- 音乐播放器 -->
    <div class="music-player">
      <div class="music-info">
        <div class="music-cover">🎵</div>
        <div class="music-details">
          <h2 id="music-title">区块链之梦</h2>
          <div class="artist" id="music-artist">Crypto Artist</div>
          <div class="meta">
            <span>Token ID: <span id="current-token">1</span></span> | 
            <span>合约: ECHO Music</span>
          </div>
        </div>
      </div>
      
      <div class="player-controls">
        <button class="play-btn">▶</button>
        <div class="progress-bar">
          <div class="progress"></div>
        </div>
        <span class="time">1:45 / 4:20</span>
      </div>
    </div>
    
    <!-- 评论区 -->
    <div id="comments-container"></div>
  </div>
  
  <!-- Ethers.js (用于钱包连接) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.9.0/ethers.umd.min.js"></script>
  
  <script>
    // 音乐数据
    const musicData = {
      1: { title: '区块链之梦', artist: 'Crypto Artist', icon: '🎵' },
      2: { title: '去中心化旋律', artist: 'Web3 Musician', icon: '🎸' },
      3: { title: '智能合约协奏曲', artist: 'Solidity Composer', icon: '🎹' },
      4: { title: '加密货币爵士', artist: 'DeFi Jazz Band', icon: '🎺' }
    };
    
    // 全局变量
    let commentSystem = null;
    let commentUI = null;
    let currentTokenId = 1;
    let userAddress = '';
    
    // 注入评论样式
    injectCommentStyles();
    
    // 初始化评论系统
    function initCommentSystem() {
      commentSystem = new CommentSystem({
        userAddress: userAddress
      });
      
      commentUI = new CommentUI(commentSystem, 'comments-container');
      commentUI.setToken(currentTokenId);
      
      // 监听Token切换
      document.getElementById('token-select').addEventListener('change', (e) => {
        currentTokenId = parseInt(e.target.value);
        updateMusicInfo(currentTokenId);
        commentUI.setToken(currentTokenId);
      });
    }
    
    // 更新音乐信息
    function updateMusicInfo(tokenId) {
      const music = musicData[tokenId];
      if (music) {
        document.getElementById('music-title').textContent = music.title;
        document.getElementById('music-artist').textContent = music.artist;
        document.querySelector('.music-cover').textContent = music.icon;
        document.getElementById('current-token').textContent = tokenId;
      }
    }
    
    // 连接钱包
    async function connectWallet() {
      const btn = document.getElementById('connect-btn');
      
      if (!window.ethereum) {
        alert('请安装 MetaMask 或其他 Web3 钱包');
        return;
      }
      
      try {
        btn.disabled = true;
        btn.textContent = '连接中...';
        
        // 请求连接
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        
        // 获取地址
        const provider = new ethers.BrowserProvider(window.ethereum);
        const signer = await provider.getSigner();
        userAddress = await signer.getAddress();
        
        // 更新UI
        updateWalletUI(userAddress);
        
        // 更新评论系统用户
        if (commentSystem) {
          commentSystem.setUser(userAddress);
          commentUI.render();
        }
        
        // 监听账户变化
        window.ethereum.on('accountsChanged', (accounts) => {
          if (accounts.length > 0) {
            userAddress = accounts[0];
            updateWalletUI(userAddress);
            commentSystem.setUser(userAddress);
          } else {
            disconnectWallet();
          }
        });
        
      } catch (error) {
        console.error('连接失败:', error);
        alert('连接失败: ' + error.message);
      } finally {
        btn.disabled = false;
        if (userAddress) {
          btn.textContent = '断开连接';
          btn.onclick = disconnectWallet;
        } else {
          btn.textContent = '连接钱包';
        }
      }
    }
    
    // 断开钱包
    function disconnectWallet() {
      userAddress = '';
      updateWalletUI('');
      
      if (commentSystem) {
        commentSystem.setUser('');
        commentUI.render();
      }
      
      const btn = document.getElementById('connect-btn');
      btn.textContent = '连接钱包';
      btn.onclick = connectWallet;
    }
    
    // 更新钱包UI
    function updateWalletUI(address) {
      const statusDot = document.getElementById('status-dot');
      const walletAddress = document.getElementById('wallet-address');
      
      if (address) {
        statusDot.classList.add('connected');
        walletAddress.textContent = `${address.slice(0, 6)}...${address.slice(-4)}`;
      } else {
        statusDot.classList.remove('connected');
        walletAddress.textContent = '未连接钱包';
      }
    }
    
    // 页面加载时初始化
    window.addEventListener('DOMContentLoaded', () => {
      initCommentSystem();
    });
  </script>
</body>
</html>
