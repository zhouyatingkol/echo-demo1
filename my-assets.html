<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的资产 - ECHO Music</title>
    <script src="ethers.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { padding-top: 64px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 24px;
        }
        .nav-links a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #00d4ff; }
        .wallet-btn {
            padding: 10px 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        .wallet-btn.connected {
            background: rgba(0,255,0,0.2);
            border: 1px solid #0f0;
        }
        
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .tab.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
            border-color: transparent;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 13px;
            color: #888;
        }
        
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .asset-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .asset-card:hover {
            border-color: rgba(0,212,255,0.3);
            transform: translateY(-4px);
        }
        
        .asset-visual {
            height: 140px;
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .wave-mini {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 40px;
        }
        .wave-bar-mini {
            width: 3px;
            background: linear-gradient(180deg, #00d4ff, #7b2cbf);
            border-radius: 2px;
        }
        .asset-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 8px;
            background: rgba(0,0,0,0.7);
            border-radius: 4px;
            font-size: 11px;
        }
        .asset-badge.created { color: #00d4ff; }
        .asset-badge.licensed { color: #0f0; }
        
        .asset-info {
            padding: 16px;
        }
        .asset-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .asset-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .meta-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: rgba(0,212,255,0.1);
            border-radius: 4px;
            color: #00d4ff;
        }
        .asset-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .stat-mini {
            text-align: center;
        }
        .stat-mini-value {
            font-size: 14px;
            font-weight: bold;
            color: #0f0;
        }
        .stat-mini-label {
            font-size: 11px;
            color: #888;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        .btn-small.secondary {
            background: rgba(255,255,255,0.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #888;
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-title {
            font-size: 18px;
            margin-bottom: 8px;
        }
        .empty-desc {
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .license-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
        }
        .license-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            color: #0f0;
        }
        .license-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
  <script src="frontend/js/theme-switcher.js" defer></script>
  <script src="frontend/js/i18n.js" defer></script>
  <link rel="stylesheet" href="frontend/css/global.css"
  <link rel="stylesheet" href="frontend/css/theme.css">
  <link rel="stylesheet" href="frontend/css/mobile.css">
  <script src="frontend/js/wallet-state.js" defer></script>
</head>
<body><nav class="main-nav" style="position: fixed; top: 0; left: 0; right: 0; height: 64px; background: rgba(10,10,26,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000;"><div style="max-width: 1400px; margin: 0 auto; height: 100%; display: flex; align-items: center; padding: 0 20px; gap: 30px;"><a href="index.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 20px; font-weight: bold; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎵 ECHO Music</a><div style="display: flex; gap: 8px; flex: 1;"><a href="discover.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">发现</a><a href="music-market.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">市场</a><a href="charts.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">榜单</a><a href="mint-music.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">铸造</a><a href="dashboard.html" style="padding: 8px 14px; color: #aaa; text-decoration: none; border-radius: 6px; font-size: 14px;">收益</a><a href="my-assets.html" style="padding: 8px 14px; color: #00d4ff; text-decoration: none; border-radius: 6px; font-size: 14px; background: rgba(0,212,255,0.1);">我的资产</a></div><div style="display: flex; align-items: center; gap: 12px;"><a href="my-favorites.html" style="padding: 8px; text-decoration: none; font-size: 18px;">❤️</a><button style="padding: 8px 20px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); border: none; border-radius: 6px; color: #fff; font-size: 14px; cursor: pointer;" id="connectBtn">连接钱包</button></div></div></nav>
    <div class="container">
        <div class="header">
            <div class="logo">🎵 ECHO Music</div>
            <div class="nav-links">
                <a href="mint-music.html">上传音乐</a>
                <a href="music-market.html">音乐市场</a>
                <a href="#" style="color: #00d4ff;">我的资产</a>
            </div>
            <button class="wallet-btn" id="connectBtn" id="connectBtn">连接钱包</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('created')" id="tabCreated">
                🎨 我创建的
            </div>
            <div class="tab" onclick="switchTab('licensed')" id="tabLicensed">
                ✅ 已授权
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">--</div>
                <div class="stat-label">总资产</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statCreated">--</div>
                <div class="stat-label">创建</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statLicensed">--</div>
                <div class="stat-label">已授权</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statRevenue">--</div>
                <div class="stat-label">总收益 (MEER)</div>
            </div>
        </div>

        <div id="contentArea">
            <div class="loading">
                <div class="spinner"></div>
                <p>连接钱包后加载资产...</p>
            </div>
        </div>
    </div>

    <script>
        const V2_CONTRACT_ADDRESS = '0xF98f63b7e8064Dcf9c2f25A906B2af89Af4840ce';
        const V2_ABI = [
            "function getAssetInfo(uint256 tokenId) view returns (tuple(string name, string description, string assetType, string uri, bytes32 contentHash, uint256 createdAt, uint256 lastUpdated), tuple(tuple(address owner, uint256 fee, bool commercialUse, bool modificationAllowed, string[] allowedScopes, string[] restrictedScopes, uint256 maxUsers, uint256 licenseDuration) usage, tuple(address owner, uint256 fee, bool allowDerivatives, uint256 revenueShare, string[] allowedTypes) derivative, tuple(address owner, uint256 fee, bool allowExtensions, string[] allowedExtensions) extension, tuple(address owner, uint256 sharePercentage, bool autoDistribute) revenue), address creator, uint256 version)",
            "function getCurrentTokenId() view returns (uint256)",
            "function getUsageLicense(address user, uint256 tokenId) view returns (tuple(uint256 tokenId, address licensee, uint256 startTime, uint256 duration, uint256 paidAmount, bool isValid))"
        ];
        
        let provider, signer, contract, userAddress;
        let isConnected = false;
        let currentTab = 'created';
        let createdAssets = [];
        let licensedAssets = [];
        
        // 连接钱包
        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('请先安装 MetaMask 钱包！');
                return;
            }
            
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                isConnected = true;
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(V2_CONTRACT_ADDRESS, V2_ABI, signer);
                
                document.getElementById('connectBtn').textContent = 
                    userAddress.slice(0, 6) + '...' + userAddress.slice(-4);
                document.getElementById('connectBtn').classList.add('connected');
                
                loadAssets();
            } catch (error) {
                console.error('连接失败:', error);
            }
        }
        
        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + (tab === 'created' ? 'Created' : 'Licensed')).classList.add('active');
            renderContent();
        }
        
        // 加载资产
        async function loadAssets() {
            if (!contract) return;
            
            try {
                const currentId = await contract.getCurrentTokenId();
                createdAssets = [];
                licensedAssets = [];
                let totalRevenue = 0;
                
                for (let i = 0; i < currentId.toNumber(); i++) {
                    try {
                        const [metadata, blueprint, creator] = await contract.getAssetInfo(i);
                        
                        // 只处理音乐类型
                        if (metadata.assetType && metadata.assetType.startsWith('music_')) {
                            const asset = {
                                tokenId: i,
                                name: metadata.name,
                                description: metadata.description,
                                genre: metadata.assetType.replace('music_', ''),
                                creator: creator,
                                price: ethers.utils.formatEther(blueprint.usage.fee),
                                uri: metadata.uri,
                                createdAt: new Date(metadata.createdAt.toNumber() * 1000).toLocaleDateString()
                            };
                            
                            // 我创建的资产
                            if (creator.toLowerCase() === userAddress.toLowerCase()) {
                                createdAssets.push(asset);
                            }
                            
                            // 检查是否已授权（简化版，实际应检查合约的授权记录）
                            try {
                                const license = await contract.getUsageLicense(userAddress, i);
                                if (license.isValid) {
                                    licensedAssets.push({
                                        ...asset,
                                        licenseStart: new Date(license.startTime.toNumber() * 1000).toLocaleDateString(),
                                        licenseDuration: license.duration.toNumber()
                                    });
                                }
                            } catch (e) {
                                // 无授权记录
                            }
                        }
                    } catch (e) {
                        // 跳过错误
                    }
                }
                
                // 更新统计
                document.getElementById('statTotal').textContent = createdAssets.length + licensedAssets.length;
                document.getElementById('statCreated').textContent = createdAssets.length;
                document.getElementById('statLicensed').textContent = licensedAssets.length;
                document.getElementById('statRevenue').textContent = '0';
                
                renderContent();
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('contentArea').innerHTML = 
                    '<div class="empty-state"><div class="empty-title">加载失败</div><div class="empty-desc">' + error.message + '</div></div>';
            }
        }
        
        // 渲染内容
        function renderContent() {
            const assets = currentTab === 'created' ? createdAssets : licensedAssets;
            
            if (assets.length === 0) {
                document.getElementById('contentArea').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">${currentTab === 'created' ? '🎵' : '✅'}</div>
                        <div class="empty-title">暂无${currentTab === 'created' ? '创建' : '授权'}的音乐</div>
                        <div class="empty-desc">${currentTab === 'created' ? '去上传您的第一首音乐吧！' : '去市场购买音乐授权吧！'}</div>
                        <button class="btn-small" onclick="location.href='${currentTab === 'created' ? 'mint-music.html' : 'music-market.html'}'">
                            ${currentTab === 'created' ? '上传音乐' : '浏览市场'}
                        </button>
                    </div>
                `;
                return;
            }
            
            document.getElementById('contentArea').innerHTML = `
                <div class="asset-grid">
                    ${assets.map(asset => renderAssetCard(asset)).join('')}
                </div>
            `;
        }
        
        // 渲染资产卡片
        function renderAssetCard(asset) {
            const isCreated = currentTab === 'created';
            
            return `
                <div class="asset-card">
                    <div class="asset-visual">
                        <div class="wave-mini">
                            ${Array(15).fill(0).map(() => `
                                <div class="wave-bar-mini" style="height: ${Math.random() * 60 + 20}px"></div>
                            `).join('')}
                        </div>
                        <div class="asset-badge ${isCreated ? 'created' : 'licensed'}">
                            ${isCreated ? '🎨 我创建的' : '✅ 已授权'}
                        </div>
                    </div>
                    <div class="asset-info">
                        <div class="asset-title">${asset.name}</div>
                        <div class="asset-meta">
                            <span class="meta-tag">${getGenreLabel(asset.genre)}</span>
                            <span class="meta-tag">Token #${asset.tokenId}</span>
                        </div>
                        ${isCreated ? renderCreatedStats(asset) : renderLicenseInfo(asset)}
                    </div>
                </div>
            `;
        }
        
        // 渲染创建者统计
        function renderCreatedStats(asset) {
            return `
                <div class="asset-stats">
                    <div class="stat-mini">
                        <div class="stat-mini-value">${asset.price}</div>
                        <div class="stat-mini-label">MEER/次</div>
                    </div>
                    <div class="stat-mini">
                        <div class="stat-mini-value">0</div>
                        <div class="stat-mini-label">使用次数</div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-small" onclick="viewAsset(${asset.tokenId})">查看</button>
                    </div>
                </div>
            `;
        }
        
        // 渲染授权信息
        function renderLicenseInfo(asset) {
            return `
                <div class="license-card">
                    <div class="license-header">
                        <span>✅</span>
                        <span>AI 训练使用权</span>
                    </div>
                    <div class="license-info">
                        <span>有效期: ${asset.licenseDuration} 天</span>
                        <span>${asset.licenseStart}</span>
                    </div>
                </div>
                <div class="asset-stats" style="margin-top: 12px;">
                    <div class="action-btns" style="margin-left: auto;">
                        <button class="btn-small" onclick="playAsset(${asset.tokenId})">▶ 播放</button>
                        <button class="btn-small secondary" onclick="viewAsset(${asset.tokenId})">详情</button>
                    </div>
                </div>
            `;
        }
        
        // 获取风格标签
        function getGenreLabel(genre) {
            const labels = {
                electronic: '电子', rock: '摇滚', classical: '古典',
                jazz: '爵士', pop: '流行', ambient: '氛围',
                hiphop: '嘻哈', folk: '民谣'
            };
            return labels[genre] || genre;
        }
        
        // 查看资产
        function viewAsset(tokenId) {
            alert('查看资产详情功能开发中...\nToken ID: ' + tokenId);
        }
        
        // 播放资产
        function playAsset(tokenId) {
            const asset = licensedAssets.find(a => a.tokenId === tokenId);
            if (asset) {
                window.open('music-market.html', '_blank');
            }
        }
    </script>
</body>
</html>
